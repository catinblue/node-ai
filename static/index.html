/* ═══ BREADCRUMB / NAVIGATION HISTORY ═══
   historyStack holds previous article contexts so the user can climb back
   through an Echo exploration chain. Push on echo, pop on back, clear on fresh. */
let historyStack=[];
let _curFrom='saved';   // Tracks the 'from' context of the currently-open article

/* ═══ KNOWLEDGE GRAPH — force-directed keyword co-occurrence visualization ═══ */
const GRAPH_STOP=new Set([...ECHO_STOP,'neuron','every','alphasignal','valley','tinkerers',
  "ai's",'ai-powered','ai-driven','ai-based','ai-enabled','code']);
function normKw(kw){return kw.replace(/['']s$/,'')}

function buildGraphData(stories,topN){
  topN=topN||35;
  const freq={},cooc={};
  for(const s of stories){
    const raw=extractKeywords(s).map(normKw).filter(k=>!GRAPH_STOP.has(k.toLowerCase()));
    const unique=[...new Set(raw)];
    for(const kw of unique)freq[kw]=(freq[kw]||0)+1;
    for(let i=0;i<unique.length;i++)
      for(let j=i+1;j<unique.length;j++){
        const pair=[unique[i],unique[j]].sort().join('|');
        cooc[pair]=(cooc[pair]||0)+1;
      }
  }
  const topKws=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,topN).map(([k])=>k);
  const topSet=new Set(topKws);
  const nodes=topKws.map(kw=>({id:kw,freq:freq[kw],x:0,y:0,vx:0,vy:0,dragging:false}));
  const edges=[];
  for(const[pair,w]of Object.entries(cooc)){
    const[a,b]=pair.split('|');
    if(topSet.has(a)&&topSet.has(b)&&w>=2)edges.push({source:a,target:b,weight:w});
  }
  return{nodes,edges};
}

function tickGraph(nodes,edges,W,H){
  const nm={};nodes.forEach(n=>nm[n.id]=n);
  // Repulsion
  for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){
    const a=nodes[i],b=nodes[j];
    let dx=b.x-a.x,dy=b.y-a.y;
    const d=Math.max(1,Math.sqrt(dx*dx+dy*dy));
    const f=1400/(d*d);
    const fx=(dx/d)*f,fy=(dy/d)*f;
    a.vx-=fx;a.vy-=fy;b.vx+=fx;b.vy+=fy;
  }
  // Attraction along edges
  for(const e of edges){
    const a=nm[e.source],b=nm[e.target];
    if(!a||!b)continue;
    let dx=b.x-a.x,dy=b.y-a.y;
    const d=Math.max(1,Math.sqrt(dx*dx+dy*dy));
    const f=(d-90)*0.007*Math.min(e.weight,6);
    const fx=(dx/d)*f,fy=(dy/d)*f;
    a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;
  }
  // Center gravity
  for(const n of nodes){n.vx+=(W/2-n.x)*0.004;n.vy+=(H/2-n.y)*0.004}
  // Apply + damp + bound
  for(const n of nodes){
    if(n.dragging)continue;
    n.vx*=0.86;n.vy*=0.86;
    n.x+=n.vx;n.y+=n.vy;
    n.x=Math.max(35,Math.min(W-35,n.x));
    n.y=Math.max(35,Math.min(H-35,n.y));
  }
}

function drawGraph(ctx,nodes,edges,W,H,hover){
  ctx.clearRect(0,0,W,H);
  const nm={};nodes.forEach(n=>nm[n.id]=n);
  const maxF=Math.max(...nodes.map(n=>n.freq));
  // Edges
  for(const e of edges){
    const a=nm[e.source],b=nm[e.target];if(!a||!b)continue;
    const hot=hover&&(e.source===hover||e.target===hover);
    ctx.strokeStyle=hot?'rgba(245,158,11,0.50)':'rgba(255,255,255,0.05)';
    ctx.lineWidth=hot?Math.min(3,e.weight*0.6):Math.min(1.5,e.weight*0.3);
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
  }
  // Nodes
  for(const n of nodes){
    const r=5+(n.freq/maxF)*16;
    const isH=hover===n.id;
    const isN=hover&&edges.some(e=>(e.source===hover&&e.target===n.id)||(e.target===hover&&e.source===n.id));
    ctx.beginPath();ctx.arc(n.x,n.y,r,0,Math.PI*2);
    if(isH){ctx.fillStyle='#F59E0B';ctx.shadowColor='rgba(245,158,11,0.5)';ctx.shadowBlur=18}
    else if(isN){ctx.fillStyle='rgba(245,158,11,0.40)';ctx.shadowBlur=0}
    else if(hover){ctx.fillStyle='rgba(255,255,255,0.10)';ctx.shadowBlur=0}
    else{ctx.fillStyle='rgba(255,255,255,0.32)';ctx.shadowBlur=0}
    ctx.fill();ctx.shadowBlur=0;
    // Label
    if(r>=7||isH||isN){
      ctx.fillStyle=isH?'#FCD34D':isN?'rgba(252,211,77,0.70)':'rgba(255,255,255,0.42)';
      ctx.font=`${isH?700:500} ${Math.max(10,r*0.75)}px Outfit`;
      ctx.textAlign='center';ctx.textBaseline='bottom';
      ctx.fillText(n.id,n.x,n.y-r-3);
    }
  }
}

let _gData=null,_gAnim=null,_gHover=null,_gDrag=null,_gW=0,_gH=0,_gCtx=null;

function initGraph(){
  const cvs=$('graph-canvas');if(!cvs)return;
  const par=cvs.parentElement;
  const dpr=Math.min(window.devicePixelRatio||1,2);
  _gW=par.clientWidth;_gH=par.clientHeight-cvs.offsetTop;
  cvs.style.width=_gW+'px';cvs.style.height=_gH+'px';
  cvs.width=_gW*dpr;cvs.height=_gH*dpr;
  _gCtx=cvs.getContext('2d');
  _gCtx.setTransform(dpr,0,0,dpr,0,0);

  if(!_gData){
    _gData=buildGraphData(ALL,35);
    _gData.nodes.forEach((n,i)=>{
      n.x=_gW/2+Math.cos(i*0.42)*(_gW*0.28)+(Math.random()-0.5)*50;
      n.y=_gH/2+Math.sin(i*0.42)*(_gH*0.28)+(Math.random()-0.5)*50;
    });
    // Interaction handlers
    const maxF=Math.max(..._gData.nodes.map(n=>n.freq));
    function hit(mx,my){
      for(const n of _gData.nodes){
        const r=5+(n.freq/maxF)*16;
        if(Math.hypot(mx-n.x,my-n.y)<=r+5)return n;
      }return null;
    }
    let dsx=0,dsy=0;
    cvs.addEventListener('mousemove',e=>{
      const r=cvs.getBoundingClientRect();
      const mx=e.clientX-r.left,my=e.clientY-r.top;
      if(_gDrag){_gDrag.x=mx;_gDrag.y=my;_gDrag.vx=0;_gDrag.vy=0}
      else{const h=hit(mx,my);_gHover=h?h.id:null;cvs.style.cursor=h?'pointer':'default'}
    });
    cvs.addEventListener('mousedown',e=>{
      const r=cvs.getBoundingClientRect();
      const mx=e.clientX-r.left,my=e.clientY-r.top;
      const h=hit(mx,my);
      if(h){_gDrag=h;h.dragging=true;dsx=mx;dsy=my;e.preventDefault()}
    });
    window.addEventListener('mouseup',()=>{
      if(_gDrag){
        _gDrag.dragging=false;
        if(Math.hypot(_gDrag.x-dsx,_gDrag.y-dsy)<5){
          const kw=_gDrag.id;
          go('feed');
          setTimeout(()=>searchForKeyword(kw),150);
        }
        _gDrag=null;
      }
    });
  }
  $('graph-sub').textContent=`${_gData.nodes.length} entities · ${_gData.edges.length} connections · ${ALL.length} stories`;
  // Start animation
  if(_gAnim)cancelAnimationFrame(_gAnim);
  function frame(){
    if(view!=='graph'){_gAnim=null;return}
    tickGraph(_gData.nodes,_gData.edges,_gW,_gH);
    drawGraph(_gCtx,_gData.nodes,_gData.edges,_gW,_gH,_gHover);
    _gAnim=requestAnimationFrame(frame);
  }
  frame();
}

/* ═══ EXPORT BRIEFING — Saved stories → downloadable Markdown file ═══ */
function exportBriefing(){
  if(!fs||fs.size===0){
    const t=$('toast');
    t.textContent='No saved stories to export';
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2000);
    return;
  }
  const saved=ALL.filter(s=>fs.has(s.id+''))
    .sort((a,b)=>(b.date||'').localeCompare(a.date||'')||b.id-a.id);
  const today=new Date().toISOString().slice(0,10);

  let md=`# ◧ Node Intelligence Briefing\n\n`;
  md+=`> Generated: **${today}** · ${saved.length} curated ${saved.length===1?'story':'stories'}\n\n`;
  md+=`---\n\n`;

  saved.forEach((s,i)=>{
    const arts=s.articles||[];
    const src=arts[0]?.source_name||'Unknown';
    const url=arts[0]?.url||'';
    const cat=(CAT_MAP[s.category]||{}).name_en||s.category||'';
    const kws=extractKeywords(s).map(k=>`\`#${k}\``).join(' ');
    const coverage=arts.length>1?` · ${arts.length} sources`:'';

    md+=`## ${i+1}. ${s.headline}\n\n`;
    md+=`**${s.date}** · ${src}${coverage} · *${cat}*\n\n`;

    if(s.summary){
      md+=`> ${s.summary}\n\n`;
    }

    // Include scraped full_text excerpt if available
    const ft=arts.find(a=>a.full_text&&a.full_text.length>200);
    if(ft){
      const excerpt=ft.full_text.substring(0,500).replace(/\n+/g,'\n>\n> ');
      md+=`**Original excerpt:**\n\n> ${excerpt}${ft.full_text.length>500?'...':''}\n\n`;
    }

    if(kws)md+=`Tags: ${kws}\n\n`;

    // Source links
    if(arts.length){
      md+=`**Sources:**\n`;
      for(const a of arts){
        if(a.url)md+=`- [${a.source_name||'Link'}](${a.url})\n`;
      }
      md+=`\n`;
    }

    md+=`---\n\n`;
  });

  md+=`*Exported from [◧ Node](https://github.com) — AI Intelligence Terminal*\n`;

  // Trigger download via Blob API
  const blob=new Blob([md],{type:'text/markdown;charset=utf-8'});
  const href=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=href;
  a.download=`Node_Briefing_${today}.md`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(href);

  // Success toast
  const t=$('toast');
  t.textContent=`Exported ${saved.length} stories as Markdown`;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function searchForKeyword(kw){
  // Jump from a Detail keyword pill → Search mode with that term preloaded.
  // Abandons any in-progress echo-exploration chain (topic-jump, not backtrack).
  historyStack.length=0;
  closeArt();
  setTimeout(()=>{
    toggleSearch(true);                           // open search bar
    $('search-input').value=kw;
    searchQ=kw;
    stackIdx=0;
    render();
    renderSearchPanel();
    saveSearchHistory(kw);                        // persist into recent
  },350);
}

function navigateToEcho(idx,from){
  // Called when user clicks an Echo card — push current article and descend.
  // IMPORTANT: push BEFORE closeArt (which nulls cur), then use nav='back' in openArt so it doesn't clear the stack.
  if(cur)historyStack.push({id:cur.id,from:_curFrom||'saved'});
  closeArt();
  setTimeout(()=>openArt(idx,from,'back'),350);
}

function goBack(){
  if(!historyStack.length)return;
  const prev=historyStack.pop();
  const idx=ALL.findIndex(s=>s.id===prev.id);
  if(idx<0){renderBreadcrumb();return}
  closeArt();
  setTimeout(()=>openArt(idx,prev.from,'back'),350);
}

function renderBreadcrumb(){
  const bc=$('art-breadcrumb');
  if(!bc)return;
  if(!historyStack.length){
    bc.style.display='none';
    bc.innerHTML='';
    return;
  }
  const prev=historyStack[historyStack.length-1];
  const prevStory=ALL.find(s=>s.id===prev.id);
  const prevTitle=prevStory?prevStory.headline:'previous story';
  const depth=historyStack.length;
  bc.style.display='block';
  bc.innerHTML=`
    <button class="art-breadcrumb-btn" onclick="goBack()" aria-label="Back to previous article">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      <span class="art-breadcrumb-label">Back to</span>
      <span class="art-breadcrumb-title">${esc(prevTitle)}</span>
      ${depth>1?`<span class="art-breadcrumb-depth">${depth}</span>`:''}
    </button>
  `;
}

/* ═══ ARTICLE DETAIL ═══ */
function openArt(idx,from,nav){
  const list=from==='saved'?ALL:flt();
  const s=list[idx];if(!s)return;
  // History stack management — 'back' means stack was already handled by caller.
  // Any other nav mode (fresh card tap, saved tap, etc.) clears the exploration chain.
  if(nav!=='back')historyStack.length=0;
  _curFrom=from;
  cur=s;
  rs.add(s.id+'');localStorage.setItem('ai_read',JSON.stringify([...rs]));

  const bg=CBGS[idx%3];
  const inner=$('art-inner');
  inner.style.background=bg;
  $('art-top').style.background=bg;

  const cat=CAT_MAP[s.category]||{};
  const ib=fs.has(s.id+'');
  const src=(s.articles&&s.articles[0])?s.articles[0].source_name:'';
  const follows=JSON.parse(localStorage.getItem('ai_follows')||'[]');
  const isFollowed=follows.includes(src);

  $('art-bk').innerHTML=starSvg(ib);
  $('art-bk').classList.toggle('on',ib);

  // Content priority (Slice A+B+AI-Valley-cleanup fix).
  //   1. full_text (scraped newsletter prose from Slice B, or cleaned archive from clean_ai_valley)
  //   2. per-article content_snippet (per-story LLM extraction)
  //   3. story.summary (story-level LLM aggregate — last resort)
  let fullText='';
  let isOriginal=false;
  const arts=s.articles||[];

  // 1. Any article with full_text? Use the longest one (threshold 100 chars to accept cleaned archives).
  const scraped=arts.filter(a=>a.full_text&&a.full_text.length>100)
    .sort((a,b)=>b.full_text.length-a.full_text.length);
  if(scraped.length){
    fullText=scraped[0].full_text;
    isOriginal=true;
  }else{
    // 2. Gather unique content_snippets, dedupe near-identical ones.
    const seen=new Set();
    const snippets=[];
    for(const a of arts){
      const t=(a.content_snippet||'').trim();
      if(!t||t.length<20)continue;
      const key=t.substring(0,80).toLowerCase();
      if(seen.has(key))continue;
      seen.add(key);
      snippets.push(t);
    }
    if(snippets.length){
      fullText=snippets.join('\n\n');
    }else{
      // 3. Last resort — story-level summary.
      fullText=s.summary||'';
    }
  }
  // Paragraph wrapping — split on blank lines, wrap each chunk in <p>, escape for safety.
  // Also scrub blockquote artifacts (" > " → " — ") left by BeautifulSoup HTML extraction.
  const bodyHtml=fullText.split(/\n\n+/).map(p=>{
    const clean=p.replace(/\n/g,' ')
                 .replace(/^\s*>\s*/,'')          // strip leading blockquote marker
                 .replace(/\s+>\s+/g,' — ')       // mid-paragraph markers → em-dash
                 .replace(/\s+/g,' ')
                 .trim();
    return clean?`<p>${esc(clean)}</p>`:'';
  }).filter(Boolean).join('');

  const links=(s.articles||[]).map(a=>{
    const fav=faviconUrl(a.url);
    return `
    <a class="art-link" href="${a.url||'#'}" target="_blank" rel="noopener">
      ${fav?`<img class="art-link-fav" src="${fav}" alt="" onerror="this.style.display='none'">`:`
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
      </svg>`}
      <div style="flex:1">
        <div>${esc(a.source_name)}</div>
        <div class="art-link-url">${esc((a.url||'').replace(/^https?:\/\//,'').substring(0,50))}</div>
      </div>
    </a>`;
  }).join('');

  // "Read original" — floats above detail; links to first article URL
  const primaryUrl=(s.articles||[])[0]?.url||'';
  const readOrig=primaryUrl?`
    <div class="read-orig-wrap">
      <a class="read-orig-btn" href="${primaryUrl}" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        Read original
      </a>
    </div>`:'';

  // Keyword pills — topic chips that jump from Detail → Search
  const pillKeywords=extractKeywords(s);
  const pillsBlock=pillKeywords.length?`
    <div class="art-pills">
      ${pillKeywords.map(kw=>{
        const safe=esc(kw).replace(/'/g,'&#39;');
        return `<button class="art-pill" onclick="searchForKeyword('${kw.replace(/[\\']/g,m=>'\\'+m)}')">${safe}</button>`;
      }).join('')}
    </div>`:'';

  // Story Echoes — thematically related coverage
  const echoes=findEchoes(s,6);
  const echoesBlock=echoes.length?`
    <div class="echoes-section">
      <div class="echoes-label">STORY ECHOES · ${echoes.length} related</div>
      <div class="echoes-strip">
        ${echoes.map(e=>{
          const gi=ALL.indexOf(e.story);
          const eFav=faviconUrl((e.story.articles||[])[0]?.url||'');
          const eSrc=(e.story.articles||[])[0]?.source_name||'';
          return `<div class="echo-card" onclick="event.stopPropagation();navigateToEcho(${gi},'saved')">
            <div class="echo-meta">
              ${eFav?`<img class="fav-icon" src="${eFav}" alt="" onerror="this.style.display='none'">`:''}
              <span>${esc(eSrc)}</span>
            </div>
            <div class="echo-title">${esc(e.story.headline)}</div>
            <div class="echo-spark">
              <svg viewBox="0 0 24 24"><path d="M13 3L4 14h7l-1 7 9-11h-7l1-7z"/></svg>
              ${e.matched.length} match${e.matched.length>1?'es':''}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`:'';

  // Apply highlight to the body HTML after it's been built (highlights search term inside each <p>)
  const bodyHtmlHi=searchQ
    ? bodyHtml.replace(/(<p[^>]*>)([\s\S]*?)(<\/p>)/g,(_,a,b,c)=>{
        const re=new RegExp('('+searchQ.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
        return a+b.replace(re,'<mark>$1</mark>')+c;
      })
    : bodyHtml;
  $('art-body').innerHTML=`
    <div class="art-cat">${cat.name_en||s.category}</div>
    <div class="art-title">${hi(s.headline,searchQ)}</div>
    <div class="art-info">${s.date} &middot; ${(s.articles||[]).length} source${(s.articles||[]).length>1?'s':''} &middot; ${readTime(fullText)} min read</div>
    <div class="art-source">
      <span class="art-sname">${esc(src)}</span>
      <button class="follow ${isFollowed?'following':''}" onclick="toggleFollow('${esc(src)}',this)">${isFollowed?'Following':'Follow'}</button>
    </div>
    ${pillsBlock}
    <div class="art-text">${bodyHtmlHi}</div>
    ${links?`<div class="art-divider"></div><div class="art-links-title">Sources</div>${links}`:''}
    ${echoesBlock}
    ${readOrig}
  `;

  $('art-overlay').classList.add('open');
  $('article').classList.add('open');
  $('nav').style.display='none';
  $('art-scroll').scrollTop=0;
  renderBreadcrumb();
  applyZenMode();
}

function closeArt(){
  $('art-overlay').classList.remove('open');
  $('article').classList.remove('open');
  $('nav').style.display='';
  cur=null;
  render();
}

/* ═══ NAV ═══ */
function go(v){
  view=v;
  if($('search-bar').classList.contains('open'))toggleSearch(false);
  $('body-feed').style.display=v==='feed'?'flex':'none';
  $('body-saved').style.display=v==='saved'?'block':'none';
  $('body-graph').style.display=v==='graph'?'flex':'none';
  $('header').style.display=v==='feed'?'':'none';
  $('pn-feed').classList.toggle('on',v==='feed');
  $('pn-saved').classList.toggle('on',v==='saved');
  $('pn-graph').classList.toggle('on',v==='graph');
  $('pn-search').classList.remove('on');
  if(v==='saved')renderSaved();
  if(v==='feed')render();
  if(v==='graph')initGraph();
}

function renderSearchPanel(){
  const el=$('search-panel');
  if(!el)return;
  if(searchQ&&searchQ.trim()){
    // Build timeline from the UNFILTERED search results (before timeline slice)
    const savedFilter=timelineFilter;
    timelineFilter=null;
    const allSearchResults=flt();
    timelineFilter=savedFilter;
    const slicedResults=savedFilter?allSearchResults.filter(x=>x.date===savedFilter):allSearchResults;
    const total=ALL.length;

    // Compute selected bar index
    let selIdx=-1;
    if(timelineFilter){
      const today=new Date(TODAY+'T00:00:00Z');
      const sel=new Date(timelineFilter+'T00:00:00Z');
      const dayDiff=Math.round((today-sel)/864e5);
      selIdx=29-dayDiff;
    }

    // Filter badge (shows the active date filter + clear button)
    const filterBadge=timelineFilter
      ? `<span class="timeline-filter-badge" onclick="timelineFilter=null;stackIdx=0;renderStack();renderSearchPanel()">
           Drilling: <strong>${timelineFilter}</strong> (${slicedResults.length} stories)
           <span class="close">&times;</span>
         </span>`
      : '';

    el.innerHTML=`<div class="search-counter">
      <div class="search-counter-text">
        Found <strong>${allSearchResults.length}</strong> match${allSearchResults.length===1?'':'es'} across
        headline, summary &amp; full text · searched ${total} total stories
        ${filterBadge}
      </div>
      <div class="timeline-wrap">
        <canvas id="timeline-sparkline" width="120" height="24"></canvas>
        <span class="timeline-label">LAST 30 DAYS</span>
      </div>
    </div>`;

    // Render sparkline + attach click handler
    requestAnimationFrame(()=>{
      const tlData=buildTimelineData(allSearchResults,30);
      renderSparkline('timeline-sparkline',tlData,selIdx);
      // Hit-testing click handler
      const cvs=document.getElementById('timeline-sparkline');
      if(cvs)cvs.onclick=(e)=>{
        const rect=cvs.getBoundingClientRect();
        const x=e.clientX-rect.left;
        const barIdx=Math.min(29,Math.max(0,Math.floor(x/(rect.width/30))));
        // Convert index to date
        const today=new Date(TODAY+'T00:00:00Z');
        const target=new Date(today);
        target.setUTCDate(target.getUTCDate()-(29-barIdx));
        const dateStr=target.toISOString().slice(0,10);
        // Toggle
        timelineFilter=(timelineFilter===dateStr)?null:dateStr;
        stackIdx=0;
        renderStack();
        renderSearchPanel();
      };
    });
  }else{
    const hist=getSearchHistory();
    if(!hist.length){
      el.innerHTML=`<div class="search-history">
        <span class="search-history-label">Try searching</span>
        ${['Nvidia','OpenAI','Anthropic','GPT-5','open source','funding']
          .map(w=>`<button class="search-chip" onclick="applySearch('${w}')">${w}</button>`).join('')}
      </div>`;
    }else{
      el.innerHTML=`<div class="search-history">
        <span class="search-history-label">Recent</span>
        ${hist.map(w=>`<button class="search-chip" onclick="applySearch('${w.replace(/'/g,"\\'")}')">${esc(w)}</button>`).join('')}
        <button class="search-chip clear" onclick="clearSearchHistory()">Clear</button>
      </div>`;
    }
  }
}
function applySearch(q){
  $('search-input').value=q;
  searchQ=q;
  stackIdx=0;
  render();
  renderSearchPanel();
}
function onSearchEnter(){
  if(searchQ&&searchQ.trim().length>=2)saveSearchHistory(searchQ.trim());
  renderSearchPanel();
}
function toggleSearch(forceOpen){
  const bar=$('search-bar');
  const open=forceOpen!==undefined?forceOpen:!bar.classList.contains('open');
  bar.classList.toggle('open',open);
  // Mutual exclusion: search open → deactivate other nav dots
  $('pn-search').classList.toggle('on',open);
  if(open){
    $('pn-feed').classList.remove('on');
    $('pn-saved').classList.remove('on');
    $('search-input').focus();
    renderSearchPanel();
  }else{
    // Restore the correct tab state when search closes
    $('pn-feed').classList.toggle('on',view==='feed');
    $('pn-saved').classList.toggle('on',view==='saved');
    $('search-input').value='';searchQ='';timelineFilter=null;stackIdx=0;render();
  }
}
function onSearch(v){searchQ=v;timelineFilter=null;stackIdx=0;renderStack();renderSearchPanel()}

/* ═══ ACTIONS ═══ */
function toggleFav(id){
  const sid=id+'';
  const wasBookmarked=fs.has(sid);
  if(wasBookmarked)fs.delete(sid);else fs.add(sid);
  localStorage.setItem('ai_fav',JSON.stringify([...fs]));
  // Affinity: bookmark = strong interest signal (+1 per keyword)
  if(!wasBookmarked){
    const story=ALL.find(s=>s.id+''===sid);
    if(story)bumpAffinity(story,1);
  }
  // In-place update on feed so the spring+glow animation isn't wiped by a re-render.
  if(view==='feed'){
    const btn=document.querySelector('.card-foot .bk-btn[data-id="'+sid+'"]');
    if(btn){
      const isNow=fs.has(sid);
      btn.classList.toggle('on',isNow);
      btn.innerHTML=starSvg(isNow);
    }
  }else{
    renderSaved();
  }
  // Sync the detail view's star if the currently-open article is this one
  if(cur&&cur.id+''===sid){
    $('art-bk').innerHTML=starSvg(fs.has(sid));
    $('art-bk').classList.toggle('on',fs.has(sid));
  }
}
function toggleStar(){if(cur)toggleFav(cur.id)}
function toggleFollow(name,btn){
  const follows=JSON.parse(localStorage.getItem('ai_follows')||'[]');
  const idx=follows.indexOf(name);
  if(idx>-1){follows.splice(idx,1);btn.textContent='Follow';btn.classList.remove('following')}
  else{follows.push(name);btn.textContent='Following';btn.classList.add('following')}
  localStorage.setItem('ai_follows',JSON.stringify(follows));
}
function copyArt(){
  if(!cur)return;
  const src=(cur.articles||[]).map(a=>a.url).filter(Boolean).join('\n');
  navigator.clipboard.writeText(`${cur.headline}\n\n${cur.summary||''}\n\nDate: ${cur.date}\n\nSources:\n${src}`);
  showToast('Copied to clipboard');
}
function showToast(msg){
  const t=$('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

/* ═══ KEYBOARD ═══ */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(cur){
      if(historyStack.length>0)goBack();           // climb one rung first
      else closeArt();                              // fully close when at root
    }else if($('search-bar').classList.contains('open'))toggleSearch(false);
  }
  if(!cur&&view==='feed'){
    const stories=flt();
    if(e.key==='ArrowLeft'&&stackIdx>0){stackIdx--;renderStack()}
    if(e.key==='ArrowRight'&&stackIdx<stories.length-1){stackIdx++;renderStack()}
    if(e.key==='Enter'&&stories.length)openArt(stackIdx);
  }
});

/* ═══ FETCH ═══ */
async function manualFetch(){
  const btn=$('refresh-btn');btn.classList.add('spinning');
  try{
    await fetch('/api/fetch');
    const r=await fetch('/api/stories');const d=await r.json();
    ALL=d.stories||[];CATS=d.categories||[];TODAY=d.today||'';
    CAT_MAP={};CATS.forEach(c=>CAT_MAP[c.id]=c);
    stackIdx=0;
    const tc=ALL.filter(s=>s.date===TODAY).length;
    const wc=ALL.filter(s=>isW(s.date)).length;
    filter.period=tc>0?'day':wc>0?'week':'month';
    render();
    showToast(`${ALL.filter(s=>isT(s.date)).length} stories today`);
  }catch(e){showToast('Fetch failed')}
  btn.classList.remove('spinning');
}

/* ═══ INIT ═══ */
async function loadData(){
  try{
    const r=await fetch('/api/stories');const d=await r.json();
    ALL=d.stories||[];CATS=d.categories||[];TODAY=d.today||'';
    CAT_MAP={};CATS.forEach(c=>CAT_MAP[c.id]=c);

    const tc=ALL.filter(s=>s.date===TODAY).length;
    if(tc===0){
      $('loading-text').textContent='Fetching today\'s news...';
      try{
        await fetch('/api/fetch');
        const r2=await fetch('/api/stories');const d2=await r2.json();
        ALL=d2.stories||[];CATS=d2.categories||[];TODAY=d2.today||'';
        CAT_MAP={};CATS.forEach(c=>CAT_MAP[c.id]=c);
      }catch(e2){}
    }

    const tc2=ALL.filter(s=>s.date===TODAY).length;
    const wc=ALL.filter(s=>isW(s.date)).length;
    filter.period=tc2>0?'day':wc>0?'week':'month';

    $('loading').classList.add('hide');
    setTimeout(()=>$('loading').style.display='none',300);
    render();
  }catch(e){
    $('loading-text').textContent='Failed to load. Retrying...';
    setTimeout(loadData,3000);
  }
}

loadData();
</script>
