name: Update Node digest

on:
  schedule:
    - cron: '0 6 * * *'    # Every day at 06:00 UTC (8:00 Paris summer / 7:00 winter)
    - cron: '0 16 * * *'   # Every day at 16:00 UTC (18:00 Paris summer / 17:00 winter)
  workflow_dispatch:         # Manual trigger from GitHub Actions tab

permissions:
  contents: write            # Required for git push

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore news.db from cache
        uses: actions/cache/restore@v4
        with:
          path: news.db
          key: news-db-${{ github.run_id }}
          restore-keys: news-db-

      - name: Run full pipeline
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          KTN_FEED_ID: ${{ secrets.KTN_FEED_ID }}
        run: python generate.py

      - name: WAL checkpoint before cache save
        run: python -c "import sqlite3; c=sqlite3.connect('news.db'); c.execute('PRAGMA wal_checkpoint(TRUNCATE)'); c.close()"

      - name: Save news.db to cache
        uses: actions/cache/save@v4
        with:
          path: news.db
          key: news-db-${{ github.run_id }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digest.html
          git diff --cached --quiet || git commit -m "auto: refresh digest $(date -u +%Y-%m-%d-%H%M)"
          git push
