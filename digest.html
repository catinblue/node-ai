/* ═══ BREADCRUMB / NAVIGATION HISTORY ═══
   historyStack holds previous article contexts so the user can climb back
   through an Echo exploration chain. Push on echo, pop on back, clear on fresh. */
let historyStack=[];
let _curFrom='saved';   // Tracks the 'from' context of the currently-open article

/* ═══ KNOWLEDGE GRAPH — force-directed keyword co-occurrence visualization ═══ */
const GRAPH_STOP=new Set([...ECHO_STOP,'neuron','every','alphasignal','valley','tinkerers',
  "ai's",'ai-powered','ai-driven','ai-based','ai-enabled','code']);
function normKw(kw){return kw.replace(/['']s$/,'')}

function buildGraphData(stories,topN){
  topN=topN||35;
  const freq={},cooc={};
  for(const s of stories){
    const raw=extractKeywords(s).map(normKw).filter(k=>!GRAPH_STOP.has(k.toLowerCase()));
    const unique=[...new Set(raw)];
    for(const kw of unique)freq[kw]=(freq[kw]||0)+1;
    for(let i=0;i<unique.length;i++)
      for(let j=i+1;j<unique.length;j++){
        const pair=[unique[i],unique[j]].sort().join('|');
        cooc[pair]=(cooc[pair]||0)+1;
      }
  }
  const topKws=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,topN).map(([k])=>k);
  const topSet=new Set(topKws);
  const nodes=topKws.map(kw=>({id:kw,freq:freq[kw],x:0,y:0,vx:0,vy:0,dragging:false}));
  const edges=[];
  for(const[pair,w]of Object.entries(cooc)){
    const[a,b]=pair.split('|');
    if(topSet.has(a)&&topSet.has(b)&&w>=2)edges.push({source:a,target:b,weight:w});
  }
  return{nodes,edges};
}

function tickGraph(nodes,edges,W,H){
  const nm={};nodes.forEach(n=>nm[n.id]=n);
  // Repulsion
  for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){
    const a=nodes[i],b=nodes[j];
    let dx=b.x-a.x,dy=b.y-a.y;
    const d=Math.max(1,Math.sqrt(dx*dx+dy*dy));
    const f=1400/(d*d);
    const fx=(dx/d)*f,fy=(dy/d)*f;
    a.vx-=fx;a.vy-=fy;b.vx+=fx;b.vy+=fy;
  }
  // Attraction along edges
  for(const e of edges){
    const a=nm[e.source],b=nm[e.target];
    if(!a||!b)continue;
    let dx=b.x-a.x,dy=b.y-a.y;
    const d=Math.max(1,Math.sqrt(dx*dx+dy*dy));
    const f=(d-90)*0.007*Math.min(e.weight,6);
    const fx=(dx/d)*f,fy=(dy/d)*f;
    a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;
  }
  // Center gravity
  for(const n of nodes){n.vx+=(W/2-n.x)*0.004;n.vy+=(H/2-n.y)*0.004}
  // Apply + damp + bound
  for(const n of nodes){
    if(n.dragging)continue;
    n.vx*=0.86;n.vy*=0.86;
    n.x+=n.vx;n.y+=n.vy;
    n.x=Math.max(35,Math.min(W-35,n.x));
    n.y=Math.max(35,Math.min(H-35,n.y));
  }
}

function drawGraph(ctx,nodes,edges,W,H,hover){
  ctx.clearRect(0,0,W,H);
  const nm={};nodes.forEach(n=>nm[n.id]=n);
  const maxF=Math.max(...nodes.map(n=>n.freq));
  // Edges
  for(const e of edges){
    const a=nm[e.source],b=nm[e.target];if(!a||!b)continue;
    const hot=hover&&(e.source===hover||e.target===hover);
    ctx.strokeStyle=hot?'rgba(245,158,11,0.50)':'rgba(255,255,255,0.05)';
    ctx.lineWidth=hot?Math.min(3,e.weight*0.6):Math.min(1.5,e.weight*0.3);
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
  }
  // Nodes
  for(const n of nodes){
    const r=5+(n.freq/maxF)*16;
    const isH=hover===n.id;
    const isN=hover&&edges.some(e=>(e.source===hover&&e.target===n.id)||(e.target===hover&&e.source===n.id));
    ctx.beginPath();ctx.arc(n.x,n.y,r,0,Math.PI*2);
    if(isH){ctx.fillStyle='#F59E0B';ctx.shadowColor='rgba(245,158,11,0.5)';ctx.shadowBlur=18}
    else if(isN){ctx.fillStyle='rgba(245,158,11,0.40)';ctx.shadowBlur=0}
    else if(hover){ctx.fillStyle='rgba(255,255,255,0.10)';ctx.shadowBlur=0}
    else{ctx.fillStyle='rgba(255,255,255,0.32)';ctx.shadowBlur=0}
    ctx.fill();ctx.shadowBlur=0;
    // Label
    if(r>=7||isH||isN){
      ctx.fillStyle=isH?'#FCD34D':isN?'rgba(252,211,77,0.70)':'rgba(255,255,255,0.42)';
      ctx.font=`${isH?700:500} ${Math.max(10,r*0.75)}px Outfit`;
      ctx.textAlign='center';ctx.textBaseline='bottom';
      ctx.fillText(n.id,n.x,n.y-r-3);
    }
  }
}

let _gData=null,_gAnim=null,_gHover=null,_gDrag=null,_gW=0,_gH=0,_gCtx=null;

function initGraph(){
  const cvs=$('graph-canvas');if(!cvs)return;
  const par=cvs.parentElement;
  const dpr=Math.min(window.devicePixelRatio||1,2);
  _gW=par.clientWidth;_gH=par.clientHeight-cvs.offsetTop;
  cvs.style.width=_gW+'px';cvs.style.height=_gH+'px';
  cvs.width=_gW*dpr;cvs.height=_gH*dpr;
  _gCtx=cvs.getContext('2d');
  _gCtx.setTransform(dpr,0,0,dpr,0,0);

  if(!_gData){
    _gData=buildGraphData(ALL,35);
    _gData.nodes.forEach((n,i)=>{
      n.x=_gW/2+Math.cos(i*0.42)*(_gW*0.28)+(Math.random()-0.5)*50;
      n.y=_gH/2+Math.sin(i*0.42)*(_gH*0.28)+(Math.random()-0.5)*50;
    });
    // Interaction handlers
    const maxF=Math.max(..._gData.nodes.map(n=>n.freq));
    function hit(mx,my){
      for(const n of _gData.nodes){
        const r=5+(n.freq/maxF)*16;
        if(Math.hypot(mx-n.x,my-n.y)<=r+5)return n;
      }return null;
    }
    let dsx=0,dsy=0;
    // Unified pointer handlers — same logic for mouse and touch.
    // Touch: pressing a node surfaces the hover highlight (neighbors light up)
    // so mobile users get the same visual feedback as desktop hover.
    function _gPtr(e){
      const r=cvs.getBoundingClientRect();
      const s=e.touches?e.touches[0]:e;
      return{x:s.clientX-r.left,y:s.clientY-r.top};
    }
    function _gMove(e){
      const{x:mx,y:my}=_gPtr(e);
      if(_gDrag){_gDrag.x=mx;_gDrag.y=my;_gDrag.vx=0;_gDrag.vy=0}
      else{const h=hit(mx,my);_gHover=h?h.id:null;cvs.style.cursor=h?'pointer':'default'}
    }
    function _gDown(e){
      const{x:mx,y:my}=_gPtr(e);
      const h=hit(mx,my);
      if(h){
        _gDrag=h;h.dragging=true;dsx=mx;dsy=my;
        if(e.touches)_gHover=h.id;
        if(e.cancelable)e.preventDefault();
      }
    }
    function _gUp(){
      if(_gDrag){
        _gDrag.dragging=false;
        if(Math.hypot(_gDrag.x-dsx,_gDrag.y-dsy)<5){
          const kw=_gDrag.id;
          go('feed');
          setTimeout(()=>searchForKeyword(kw),150);
        }
        _gDrag=null;
      }
    }
    cvs.addEventListener('mousemove',_gMove);
    cvs.addEventListener('mousedown',_gDown);
    window.addEventListener('mouseup',_gUp);
    cvs.addEventListener('touchstart',_gDown,{passive:false});
    cvs.addEventListener('touchmove',e=>{if(e.cancelable)e.preventDefault();_gMove(e)},{passive:false});
    cvs.addEventListener('touchend',_gUp);
    cvs.addEventListener('touchcancel',_gUp);
  }
  $('graph-sub').textContent=`${_gData.nodes.length} entities · ${_gData.edges.length} connections · ${ALL.length} stories`;
  // Start animation
  if(_gAnim)cancelAnimationFrame(_gAnim);
  function frame(){
    if(view!=='graph'){_gAnim=null;return}
    tickGraph(_gData.nodes,_gData.edges,_gW,_gH);
    drawGraph(_gCtx,_gData.nodes,_gData.edges,_gW,_gH,_gHover);
    _gAnim=requestAnimationFrame(frame);
  }
  frame();
}

/* ═══ EXPORT BRIEFING — Saved stories → downloadable Markdown file ═══ */
function exportBriefing(){
  if(!fs||fs.size===0){
    const t=$('toast');
    t.textContent='No saved stories to export';
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2000);
    return;
  }
  const saved=ALL.filter(s=>fs.has(s.id+''))
    .sort((a,b)=>(b.date||'').localeCompare(a.date||'')||b.id-a.id);
  const today=new Date().toISOString().slice(0,10);

  let md=`# ◧ Node Intelligence Briefing\n\n`;
  md+=`> Generated: **${today}** · ${saved.length} curated ${saved.length===1?'story':'stories'}\n\n`;
  md+=`---\n\n`;

  saved.forEach((s,i)=>{
    const arts=s.articles||[];
    const src=arts[0]?.source_name||'Unknown';
    const url=arts[0]?.url||'';
    const cat=(CAT_MAP[s.category]||{}).name_en||s.category||'';
    const kws=extractKeywords(s).map(k=>`\`#${k}\``).join(' ');
    const coverage=arts.length>1?` · ${arts.length} sources`:'';

    md+=`## ${i+1}. ${s.headline}\n\n`;
    md+=`**${s.date}** · ${src}${coverage} · *${cat}*\n\n`;

    if(s.summary){
      md+=`> ${s.summary}\n\n`;
    }

    // Include scraped full_text excerpt if available
    const ft=arts.find(a=>a.full_text&&a.full_text.length>200);
    if(ft){
      const excerpt=ft.full_text.substring(0,500).replace(/\n+/g,'\n>\n> ');
      md+=`**Original excerpt:**\n\n> ${excerpt}${ft.full_text.length>500?'...':''}\n\n`;
    }

    if(kws)md+=`Tags: ${kws}\n\n`;

    // Source links
    if(arts.length){
      md+=`**Sources:**\n`;
      for(const a of arts){
        if(a.url)md+=`- [${a.source_name||'Link'}](${a.url})\n`;
      }
      md+=`\n`;
    }

    md+=`---\n\n`;
  });

  md+=`*Exported from [◧ Node](https://github.com) — AI Intelligence Terminal*\n`;

  // Trigger download via Blob API
  const blob=new Blob([md],{type:'text/markdown;charset=utf-8'});
  const href=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=href;
  a.download=`Node_Briefing_${today}.md`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(href);

  // Success toast
  const t=$('toast');
  t.textContent=`Exported ${saved.length} stories as Markdown`;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function searchForKeyword(kw){
  // Jump from a Detail keyword pill → Search mode with that term preloaded.
  // Abandons any in-progress echo-exploration chain (topic-jump, not backtrack).
  historyStack.length=0;
  closeArt();
  setTimeout(()=>{
    toggleSearch(true);                           // open search bar
    $('search-input').value=kw;
    searchQ=kw;
    stackIdx=0;
    render();
    renderSearchPanel();
    saveSearchHistory(kw);                        // persist into recent
  },350);
}

function navigateToEcho(idx,from){
  // Called when user clicks an Echo card — push current article and descend.
  // IMPORTANT: push BEFORE closeArt (which nulls cur), then use nav='back' in openArt so it doesn't clear the stack.
  if(cur)historyStack.push({id:cur.id,from:_curFrom||'saved'});
  closeArt();
  setTimeout(()=>openArt(idx,from,'back'),350);
}

function goBack(){
  if(!historyStack.length)return;
  const prev=historyStack.pop();
  const idx=ALL.findIndex(s=>s.id===prev.id);
  if(idx<0){renderBreadcrumb();return}
  closeArt();
  setTimeout(()=>openArt(idx,prev.from,'back'),350);
}

function renderBreadcrumb(){
  const bc=$('art-breadcrumb');
  if(!bc)return;
  if(!historyStack.length){
    bc.style.display='none';
    bc.innerHTML='';
    return;
  }
  const prev=historyStack[historyStack.length-1];
  const prevStory=ALL.find(s=>s.id===prev.id);
  const prevTitle=prevStory?prevStory.headline:'previous story';
  const depth=historyStack.length;
  bc.style.display='block';
  bc.innerHTML=`
    <button class="art-breadcrumb-btn" onclick="goBack()" aria-label="Back to previous article">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      <span class="art-breadcrumb-label">Back to</span>
      <span class="art-breadcrumb-title">${esc(prevTitle)}</span>
      ${depth>1?`<span class="art-breadcrumb-depth">${depth}</span>`:''}
    </button>
  `;
}

/* ═══ ARTICLE DETAIL ═══ */
function openArt(idx,from,nav){
  const list=from==='saved'?ALL:flt();
  const s=list[idx];if(!s)return;
  // History stack management — 'back' means stack was already handled by caller.
  // Any other nav mode (fresh card tap, saved tap, etc.) clears the exploration chain.
  if(nav!=='back')historyStack.length=0;
  _curFrom=from;
  cur=s;
  rs.add(s.id+'');localStorage.setItem('ai_read',JSON.stringify([...rs]));

  const bg=CBGS[idx%3];
  const inner=$('art-inner');
  inner.style.background=bg;
  $('art-top').style.background=bg;

  const cat=CAT_MAP[s.category]||{};
  const ib=fs.has(s.id+'');
  const src=(s.articles&&s.articles[0])?s.articles[0].source_name:'';
  const follows=JSON.parse(localStorage.getItem('ai_follows')||'[]');
  const isFollowed=follows.includes(src);

  $('art-bk').innerHTML=starSvg(ib);
  $('art-bk').classList.toggle('on',ib);

  // Content priority (Slice A+B+AI-Valley-cleanup fix).
  //   1. full_text (scraped newsletter prose from Slice B, or cleaned archive from clean_ai_valley)
  //   2. per-article content_snippet (per-story LLM extraction)
  //   3. story.summary (story-level LLM aggregate — last resort)
  let fullText='';
  let isOriginal=false;
  const arts=s.articles||[];

  // 1. Any article with full_text? Use the longest one (threshold 100 chars to accept cleaned archives).
  const scraped=arts.filter(a=>a.full_text&&a.full_text.length>100)
    .sort((a,b)=>b.full_text.length-a.full_text.length);
  if(scraped.length){
    fullText=scraped[0].full_text;
    isOriginal=true;
  }else{
    // 2. Gather unique content_snippets, dedupe near-identical ones.
    const seen=new Set();
    const snippets=[];
    for(const a of arts){
      const t=(a.content_snippet||'').trim();
      if(!t||t.length<20)continue;
      const key=t.substring(0,80).toLowerCase();
      if(seen.has(key))continue;
      seen.add(key);
      snippets.push(t);
    }
    if(snippets.length){
      fullText=snippets.join('\n\n');
    }else{
      // 3. Last resort — story-level summary.
      fullText=s.summary||'';
    }
  }
  // Paragraph wrapping — split on blank lines, wrap each chunk in <p>, escape for safety.
  // Also scrub blockquote artifacts (" > " → " — ") left by BeautifulSoup HTML extraction.
  const bodyHtml=fullText.split(/\n\n+/).map(p=>{
    const clean=p.replace(/\n/g,' ')
                 .replace(/^\s*>\s*/,'')          // strip leading blockquote marker
                 .replace(/\s+>\s+/g,' — ')       // mid-paragraph markers → em-dash
                 .replace(/\s+/g,' ')
                 .trim();
    return clean?`<p>${esc(clean)}</p>`:'';
  }).filter(Boolean).join('');

  const links=(s.articles||[]).map(a=>{
    const fav=faviconUrl(a.url);
    return `
    <a class="art-link" href="${safeUrl(a.url)}" target="_blank" rel="noopener">
      ${fav?`<img class="art-link-fav" src="${fav}" alt="" onerror="this.style.display='none'">`:`
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
      </svg>`}
      <div style="flex:1">
        <div>${esc(a.source_name)}</div>
        <div class="art-link-url">${esc((a.url||'').replace(/^https?:\/\//,'').substring(0,50))}</div>
      </div>
    </a>`;
  }).join('');

  // "Read original" — floats above detail; links to first article URL
  const primaryUrl=(s.articles||[])[0]?.url||'';
  const readOrig=primaryUrl?`
    <div class="read-orig-wrap">
      <a class="read-orig-btn" href="${safeUrl(primaryUrl)}" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        Read original
      </a>
    </div>`:'';

  // Keyword pills — topic chips that jump from Detail → Search
  const pillKeywords=extractKeywords(s);
  const pillsBlock=pillKeywords.length?`
    <div class="art-pills">
      ${pillKeywords.map(kw=>{
        const safe=esc(kw).replace(/'/g,'&#39;');
        return `<button class="art-pill" onclick="searchForKeyword('${kw.replace(/[\\']/g,m=>'\\'+m)}')">${safe}</button>`;
      }).join('')}
    </div>`:'';

  // Story Echoes — thematically related coverage
  const echoes=findEchoes(s,6);
  const echoesBlock=echoes.length?`
    <div class="echoes-section">
      <div class="echoes-label">STORY ECHOES · ${echoes.length} related</div>
      <div class="echoes-strip">
        ${echoes.map(e=>{
          const gi=ALL.indexOf(e.story);
          const eFav=faviconUrl((e.story.articles||[])[0]?.url||'');
          const eSrc=(e.story.articles||[])[0]?.source_name||'';
          return `<div class="echo-card" onclick="event.stopPropagation();navigateToEcho(${gi},'saved')">
            <div class="echo-meta">
              ${eFav?`<img class="fav-icon" src="${eFav}" alt="" onerror="this.style.display='none'">`:''}
              <span>${esc(eSrc)}</span>
            </div>
            <div class="echo-title">${esc(e.story.headline)}</div>
            <div class="echo-spark">
              <svg viewBox="0 0 24 24"><path d="M13 3L4 14h7l-1 7 9-11h-7l1-7z"/></svg>
              ${e.matched.length} match${e.matched.length>1?'es':''}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`:'';

  // Apply highlight to the body HTML after it's been built (highlights search term inside each <p>)
  const bodyHtmlHi=searchQ
    ? bodyHtml.replace(/(<p[^>]*>)([\s\S]*?)(<\/p>)/g,(_,a,b,c)=>{
        const re=new RegExp('('+searchQ.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
        return a+b.replace(re,'<mark>$1</mark>')+c;
      })
    : bodyHtml;
  $('art-body').innerHTML=`
    <div class="art-cat">${cat.name_en||s.category}</div>
    <div class="art-title">${hi(s.headline,searchQ)}</div>
    <div class="art-info">${s.date} &middot; ${(s.articles||[]).length} source${(s.articles||[]).length>1?'s':''} &middot; ${readTime(fullText)} min read</div>
    <div class="art-source">
      <span class="art-sname">${esc(src)}</span>
      <button class="follow ${isFollowed?'following':''}" data-source="${esc(src)}" onclick="toggleFollow(this.dataset.source,this)">${isFollowed?'Following':'Follow'}</button>
    </div>
    ${pillsBlock}
    <div class="art-text">${bodyHtmlHi}</div>
    ${links?`<div class="art-divider"></div><div class="art-links-title">Sources</div>${links}`:''}
    ${echoesBlock}
    ${readOrig}
  `;

  $('art-overlay').classList.add('open');
  $('article').classList.add('open');
  $('nav').style.display='none';
  $('art-scroll').scrollTop=0;
  renderBreadcrumb();
  applyZenMode();

  // Deep-read tracking — 30s dwell OR scroll-to-bottom (92% tolerance) fires once.
  // Either signal wins; subsequent opens of the same story don't double-count
  // because markDeepRead() guards on storyId. The cleanup closure is stashed on
  // window so closeArt can tear it down without plumbing state through globals.
  const _drScroll=$('art-scroll');
  let _drFired=false;
  const _drFire=()=>{
    if(_drFired||!cur)return;
    _drFired=true;
    if(markDeepRead(cur.id))bumpAffinity(cur,0.7);
  };
  const _drTimer=setTimeout(_drFire,30000);
  const _drOnScroll=()=>{
    if(_drFired)return;
    const ratio=(_drScroll.scrollTop+_drScroll.clientHeight)/_drScroll.scrollHeight;
    if(ratio>=0.92)_drFire();                  // near-bottom tolerance — footer padding eats the last few px
  };
  _drScroll.addEventListener('scroll',_drOnScroll,{passive:true});
  window._drCleanup=()=>{
    clearTimeout(_drTimer);
    _drScroll.removeEventListener('scroll',_drOnScroll);
  };
}

function closeArt(){
  if(window._drCleanup){window._drCleanup();window._drCleanup=null;}
  $('art-overlay').classList.remove('open');
  $('article').classList.remove('open');
  $('nav').style.display='';
  cur=null;
  render();
}

/* ═══ NAV ═══ */
function go(v){
  view=v;
  if($('search-bar').classList.contains('open'))toggleSearch(false);
  $('body-feed').style.display=v==='feed'?'flex':'none';
  $('body-saved').style.display=v==='saved'?'block':'none';
  $('body-graph').style.display=v==='graph'?'flex':'none';
  $('header').style.display=v==='feed'?'':'none';
  $('pn-feed').classList.toggle('on',v==='feed');
  $('pn-saved').classList.toggle('on',v==='saved');
  $('pn-graph').classList.toggle('on',v==='graph');
  $('pn-search').classList.remove('on');
  if(v==='saved')renderSaved();
  if(v==='feed')render();
  if(v==='graph')initGraph();
}

function renderSearchPanel(){
  const el=$('search-panel');
  if(!el)return;
  if(searchQ&&searchQ.trim()){
    // Build timeline from the UNFILTERED search results (before timeline slice)
    const savedFilter=timelineFilter;
    timelineFilter=null;
    const allSearchResults=flt();
    timelineFilter=savedFilter;
    const slicedResults=savedFilter?allSearchResults.filter(x=>x.date===savedFilter):allSearchResults;
    const total=ALL.length;

    // Compute selected bar index
    let selIdx=-1;
    if(timelineFilter){
      const today=new Date(TODAY+'T00:00:00Z');
      const sel=new Date(timelineFilter+'T00:00:00Z');
      const dayDiff=Math.round((today-sel)/864e5);
      selIdx=29-dayDiff;
    }

    // Filter badge (shows the active date filter + clear button)
    const filterBadge=timelineFilter
      ? `<span class="timeline-filter-badge" onclick="timelineFilter=null;stackIdx=0;renderStack();renderSearchPanel()">
           Drilling: <strong>${timelineFilter}</strong> (${slicedResults.length} stories)
           <span class="close">&times;</span>
         </span>`
      : '';

    el.innerHTML=`<div class="search-counter">
      <div class="search-counter-text">
        Found <strong>${allSearchResults.length}</strong> match${allSearchResults.length===1?'':'es'} across
        headline, summary &amp; full text · searched ${total} total stories
        ${filterBadge}
      </div>
      <div class="timeline-wrap">
        <canvas id="timeline-sparkline" width="120" height="24"></canvas>
        <span class="timeline-label">LAST 30 DAYS</span>
      </div>
    </div>`;

    // Render sparkline + attach click handler
    requestAnimationFrame(()=>{
      const tlData=buildTimelineData(allSearchResults,30);
      renderSparkline('timeline-sparkline',tlData,selIdx);
      // Hit-testing click handler
      const cvs=document.getElementById('timeline-sparkline');
      if(cvs)cvs.onclick=(e)=>{
        const rect=cvs.getBoundingClientRect();
        const x=e.clientX-rect.left;
        const barIdx=Math.min(29,Math.max(0,Math.floor(x/(rect.width/30))));
        // Convert index to date
        const today=new Date(TODAY+'T00:00:00Z');
        const target=new Date(today);
        target.setUTCDate(target.getUTCDate()-(29-barIdx));
        const dateStr=target.toISOString().slice(0,10);
        // Toggle
        timelineFilter=(timelineFilter===dateStr)?null:dateStr;
        stackIdx=0;
        _surfaceSearchResults();
        renderStack();
        renderSearchPanel();
      };
    });
  }else{
    const hist=getSearchHistory();
    // Chips use data-q + this.dataset.q so we never embed user input
    // inside a JS string literal in an onclick — avoids backslash/quote
    // escaping traps. esc() still HTML-escapes the label + attribute value.
    if(!hist.length){
      el.innerHTML=`<div class="search-history">
        <span class="search-history-label">Try searching</span>
        ${['Nvidia','OpenAI','Anthropic','GPT-5','open source','funding']
          .map(w=>`<button class="search-chip" data-q="${esc(w)}" onclick="applySearch(this.dataset.q)">${esc(w)}</button>`).join('')}
      </div>`;
    }else{
      el.innerHTML=`<div class="search-history">
        <span class="search-history-label">Recent</span>
        ${hist.map(w=>`<button class="search-chip" data-q="${esc(w)}" onclick="applySearch(this.dataset.q)">${esc(w)}</button>`).join('')}
        <button class="search-chip clear" onclick="clearSearchHistory()">Clear</button>
      </div>`;
    }
  }
}
/* Silently surface the feed view so search-result cards (rendered into
   #stack inside #body-feed) become visible. Called by every search
   interaction that produces cards — doesn't touch nav dots (pn-search
   owns the indicator during active search) or the search bar itself. */
function _surfaceSearchResults(){
  if(view==='feed')return;
  view='feed';
  $('body-feed').style.display='flex';
  $('body-saved').style.display='none';
  $('body-graph').style.display='none';
  $('header').style.display='';
}

function applySearch(q){
  $('search-input').value=q;
  searchQ=q;
  stackIdx=0;
  _surfaceSearchResults();
  render();
  renderSearchPanel();
}
function onSearchEnter(){
  if(searchQ&&searchQ.trim().length>=2)saveSearchHistory(searchQ.trim());
  renderSearchPanel();
}
function toggleSearch(forceOpen){
  const bar=$('search-bar');
  const open=forceOpen!==undefined?forceOpen:!bar.classList.contains('open');

  // Bar is a sibling of #header in the DOM, so it can overlay any view
  // (Graph / Saved) without being hidden by go()'s display:none on header.
  // If you open search from Graph, live results won't render visually (the
  // feed stack is hidden), but you can still type and see the timeline
  // sparkline + search history inside the bar itself.

  bar.classList.toggle('open',open);
  // Mutual exclusion: search open → deactivate all other nav dots (full symmetry)
  $('pn-search').classList.toggle('on',open);
  if(open){
    $('pn-feed').classList.remove('on');
    $('pn-saved').classList.remove('on');
    $('pn-graph').classList.remove('on');
    $('search-input').focus();
    renderSearchPanel();
  }else{
    // Restore the correct tab state when search closes — symmetric across all 3 views
    $('pn-feed').classList.toggle('on',view==='feed');
    $('pn-saved').classList.toggle('on',view==='saved');
    $('pn-graph').classList.toggle('on',view==='graph');
    $('search-input').value='';searchQ='';timelineFilter=null;stackIdx=0;render();
  }
}
function onSearch(v){searchQ=v;timelineFilter=null;stackIdx=0;_surfaceSearchResults();renderStack();renderSearchPanel()}

/* ═══ ACTIONS ═══ */
function toggleFav(id){
  const sid=id+'';
  const wasBookmarked=fs.has(sid);
  if(wasBookmarked)fs.delete(sid);else fs.add(sid);
  localStorage.setItem('ai_fav',JSON.stringify([...fs]));
  // Affinity: bookmark = strong interest signal (+1 per keyword)
  if(!wasBookmarked){
    const story=ALL.find(s=>s.id+''===sid);
    if(story)bumpAffinity(story,1);
  }
  // In-place update on feed so the spring+glow animation isn't wiped by a re-render.
  if(view==='feed'){
    const btn=document.querySelector('.card-foot .bk-btn[data-id="'+sid+'"]');
    if(btn){
      const isNow=fs.has(sid);
      btn.classList.toggle('on',isNow);
      btn.innerHTML=starSvg(isNow);
    }
  }else{
    renderSaved();
  }
  // Sync the detail view's star if the currently-open article is this one
  if(cur&&cur.id+''===sid){
    $('art-bk').innerHTML=starSvg(fs.has(sid));
    $('art-bk').classList.toggle('on',fs.has(sid));
  }
}
function toggleStar(){if(cur)toggleFav(cur.id)}
function toggleFollow(name,btn){
  const follows=JSON.parse(localStorage.getItem('ai_follows')||'[]');
  const idx=follows.indexOf(name);
  if(idx>-1){follows.splice(idx,1);btn.textContent='Follow';btn.classList.remove('following')}
  else{follows.push(name);btn.textContent='Following';btn.classList.add('following')}
  localStorage.setItem('ai_follows',JSON.stringify(follows));
}
function copyArt(){
  if(!cur)return;
  const src=(cur.articles||[]).map(a=>a.url).filter(Boolean).join('\n');
  navigator.clipboard.writeText(`${cur.headline}\n\n${cur.summary||''}\n\nDate: ${cur.date}\n\nSources:\n${src}`);
  showToast('Copied to clipboard');
}
function showToast(msg){
  const t=$('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

/* ═══ KEYBOARD ═══ */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(cur){
      if(historyStack.length>0)goBack();           // climb one rung first
      else closeArt();                              // fully close when at root
    }else if($('search-bar').classList.contains('open'))toggleSearch(false);
  }
  if(!cur&&view==='feed'){
    const stories=flt();
    if(e.key==='ArrowLeft'&&stackIdx>0){stackIdx--;renderStack()}
    if(e.key==='ArrowRight'&&stackIdx<stories.length-1){stackIdx++;renderStack()}
    if(e.key==='Enter'&&stories.length)openArt(stackIdx);
  }
});

/* ═══ INIT ═══ */
let _loadRetries=0;
async function loadData(){
  try{
    const r=await fetch('/api/stories');
    if(!r.ok)throw new Error(`/api/stories ${r.status}`);
    const d=await r.json();
    ALL=d.stories||[];CATS=d.categories||[];TODAY=d.today||'';
    CAT_MAP={};CATS.forEach(c=>CAT_MAP[c.id]=c);

    const tc=ALL.filter(s=>s.date===TODAY).length;
    if(tc===0){
      $('loading-text').textContent='Fetching today\'s news...';
      try{
        const fr=await fetch('/api/fetch', {method:'POST'});
        if(!fr.ok)throw new Error(`/api/fetch ${fr.status}`);
        const r2=await fetch('/api/stories');
        if(!r2.ok)throw new Error(`/api/stories (post-fetch) ${r2.status}`);
        const d2=await r2.json();
        ALL=d2.stories||[];CATS=d2.categories||[];TODAY=d2.today||'';
        CAT_MAP={};CATS.forEach(c=>CAT_MAP[c.id]=c);
      }catch(e2){
        // Surface the failure — keep the base /api/stories data on screen
        // rather than silently pretending everything succeeded.
        console.warn('Auto-fetch failed:', e2);
      }
    }

    const tc2=ALL.filter(s=>s.date===TODAY).length;
    const wc=ALL.filter(s=>isW(s.date)).length;
    filter.period=tc2>0?'day':wc>0?'week':'month';

    $('loading').classList.add('hide');
    setTimeout(()=>$('loading').style.display='none',300);
    render();
  }catch(e){
    _loadRetries++;
    if(_loadRetries<=2){
      $('loading-text').textContent='Failed to load. Retrying...';
      setTimeout(loadData,3000);
    }else{
      // No /api/stories endpoint reachable — likely opened via a generic static server.
      // This template isn't meant to be served directly; point the user at the right entry points.
      $('loading-text').innerHTML=
        'Cannot reach <code>/api/stories</code>.<br>'+
        'Open <code>digest.html</code> (static build) or run <code>python serve.py</code> for dev mode.';
    }
  }
}

r-old bug in OpenBSD and a 17-year-old flaw in FreeBSD.", "full_text": "The warning didn't come out of nowhere. In April, Anthropic unveiled Claude Mythos Preview, a model so effective at finding software vulnerabilities that Anthropic refused to release it publicly. During testing, it found over 2,000 previously unknown flaws across major operating systems and browsers, including a 27-year-old bug in OpenBSD and a 17-year-old remote code execution flaw in FreeBSD. Over 99% of what it found remains unpatched today."}]}, {"id": 498, "date": "2026-05-04", "category": "research", "headline": "UK warns of 'patch wave' as AI uncovers unprecedented software flaws", "summary": "The UK’s National Cyber Security Centre warns AI tools are uncovering vulnerabilities at an unprecedented scale, threatening to overwhelm patching infrastructure and increase cybersecurity risks.", "created_at": "2026-05-04 17:27:56", "articles": [{"id": 1915, "title": "UK's NCSC warns of a 'patch wave' due to AI-discovered software flaws", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/mtjy6trstn3l33jsakxd.html#story-4", "source_name": "The Neuron", "published_at": "2026-05-04 11:34:46", "summary": null, "content_snippet": "The UK's National Cyber Security Centre warns that AI tools are uncovering software vulnerabilities at an unprecedented scale, threatening to overwhelm patching infrastructure and increase cybersecurity risks.", "full_text": null}]}, {"id": 499, "date": "2026-05-04", "category": "open_source", "headline": "Open-source deep research tool hits 95% accuracy, runs fully local", "summary": "An open-source deep research tool achieves 95% accuracy while operating entirely locally, offering a privacy-focused alternative to cloud-based research assistants for sensitive data.", "created_at": "2026-05-04 17:27:56", "articles": [{"id": 1907, "title": "Open-source deep research tool hits 95% accuracy and runs fully local", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/z9fh016bhidge78obcfe.html#story-5", "source_name": "AlphaSignal", "published_at": "2026-05-04 13:31:22", "summary": null, "content_snippet": "An open-source deep research tool achieves 95% accuracy while operating entirely locally, offering a privacy-focused alternative to cloud-based research assistants.", "full_text": null}]}, {"id": 500, "date": "2026-05-04", "category": "open_source", "headline": "New 9B open-source model ships without safety guardrails", "summary": "A 9-billion-parameter open-source AI model was released without any safety guardrails, highlighting the tension between rapid capability expansion and responsible AI deployment in the open-source community.", "created_at": "2026-05-04 17:27:56", "articles": [{"id": 1909, "title": "New 9B open-source model ships with all safety guardrails stripped out", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/z9fh016bhidge78obcfe.html#story-7", "source_name": "AlphaSignal", "published_at": "2026-05-04 13:31:22", "summary": null, "content_snippet": "A new 9-billion-parameter open-source AI model has been released without any safety guardrails, highlighting the tension between rapid capability expansion and responsible AI deployment.", "full_text": null}]}, {"id": 501, "date": "2026-05-04", "category": "open_source", "headline": "Scrapling bypasses Cloudflare, runs 784x faster than BeautifulSoup", "summary": "Scrapling is an open-source web scraping tool that evades Cloudflare protections and outperforms BeautifulSoup by 784x, enabling faster and more reliable data extraction from the web.", "created_at": "2026-05-04 17:27:56", "articles": [{"id": 1906, "title": "Scrapling open-source scraping tool bypasses Cloudflare and runs 784x faster than BeautifulSoup", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/z9fh016bhidge78obcfe.html#story-4", "source_name": "AlphaSignal", "published_at": "2026-05-04 13:31:22", "summary": null, "content_snippet": "Scrapling is an open-source web scraping tool that evades Cloudflare protections and outperforms BeautifulSoup by 784x, enabling faster and more reliable data extraction from the web.", "full_text": null}]}, {"id": 502, "date": "2026-05-04", "category": "sci_tech_trends", "headline": "Developer runs full transformer on FPGA, hits 50K tokens/sec without GPU", "summary": "The TALOS-V2 project demonstrates running a transformer model entirely in FPGA hardware, achieving 53,000 tokens per second on a credit-card-sized device without a GPU, showcasing a shift in AI hardware efficiency.", "created_at": "2026-05-04 17:27:56", "articles": [{"id": 1905, "title": "Developer burns a full transformer into FPGA hardware, hits 50,000 tokens/sec without a GPU", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/z9fh016bhidge78obcfe.html#story-3", "source_name": "AlphaSignal", "published_at": "2026-05-04 13:31:22", "summary": null, "content_snippet": "The TALOS-V2 project demonstrates running a transformer model entirely in FPGA hardware, achieving 53,000 tokens per second on a credit-card-sized device without a GPU, showcasing a shift from software-based to hardware-based inference.", "full_text": null}]}, {"id": 503, "date": "2026-05-04", "category": "products_tools", "headline": "Stripe’s AI agent autonomously spends $20 on HTTP design template", "summary": "Stripe’s internal AI agent autonomously spent $20 to purchase an HTTP design template, demonstrating the growing autonomy and decision-making capabilities of AI models in real-world business operations.", "created_at": "2026-05-04 17:27:56", "articles": [{"id": 1918, "title": "Stripe's internal AI agent spends $20 to buy an HTTP design template", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/mtjy6trstn3l33jsakxd.html#story-7", "source_name": "The Neuron", "published_at": "2026-05-04 11:34:46", "summary": null, "content_snippet": "Stripe's internal AI agent autonomously spent $20 to purchase an HTTP design template, demonstrating the growing autonomy and decision-making capabilities of AI models.", "full_text": "\"We're going to do it,\" Altman said. \"But it was a strange thing.\" Not to be outdone, Stripe CEO John Collison gave his company's internal AI agent $20 to spend freely online. It bought itself an HTTP design template. So yeah, the models are getting opinions. And apparently, taste."}]}, {"id": 458, "date": "2026-05-03", "category": "products_tools", "headline": "Parallel AI Agent Development system for rigorous agent feature builds", "summary": "Jamilton Alonso Quintero Osorio demonstrates an internal orchestration system for parallel AI-agent development with local-first pipelines and architect-led governance to audit AI outputs against a 'Definition of Done'.", "created_at": "2026-05-03 08:01:13", "articles": [{"id": 1216, "title": "Parallel AI Agent Development walkthrough shows how to run agent feature development without losing rigor", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/6p57gdki91oz9n4d69ag.html#story-4", "source_name": "Unknown", "published_at": "2026-04-27 19:15:19", "summary": null, "content_snippet": "The demo mapped methodology to real integration on an international-grade SaaS roadmap, recovering process after drifting into uncontrolled vibe coding.", "full_text": null}, {"id": 1222, "title": "Parallel AI Agent Development by Jamilton Alonso Quintero Osorio presents internal orchestration system for parallel AI-agent feature development", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/6p57gdki91oz9n4d69ag.html#story-10", "source_name": "Unknown", "published_at": "2026-04-27 19:15:19", "summary": null, "content_snippet": "The demo showed an internal orchestration system with a local-first pipeline per engineer, plus architect-led governance that audits AI-generated outputs using a practical ‘Definition of Done’ for shipping.", "full_text": null}]}, {"id": 459, "date": "2026-05-03", "category": "editorial", "headline": "FDA requires real-time streaming of cancer drug trial data from AstraZeneca and Amgen", "summary": "The FDA announced that two cancer drugs from AstraZeneca and Amgen will now stream trial data in real time, enabling faster response to patient outcomes like fever, liver enzyme changes, or tumor shrinkage.", "created_at": "2026-05-03 16:44:35", "articles": [{"id": 1799, "title": "FDA requires real-time streaming of cancer drug trial data from AstraZeneca and Amgen", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/wjwxzn682zqrkav8k3y6.html#story-11", "source_name": "Every", "published_at": "2026-05-03 11:55:31", "summary": null, "content_snippet": "The FDA announced that two cancer drugs from AstraZeneca and Amgen will now stream trial data in real time, enabling faster response to patient outcomes like fever, liver enzyme changes, or tumor shrinkage.", "full_text": "Downstream of speed. The Food and Drug Administration announced this week that two cancer drugs—one from AstraZeneca, one from Amgen—will stream their trial data to the agency in real time. Did a patient develop a fever? Did liver enzymes rise? Did the tumor shrink? Instead of waiting for clinicians to collect, clean, and submit these signals between phases, the FDA will see them as they happen. The agency’s chief AI officer estimates this could cut 20 to 40 percent off the time it takes to get a drug from the lab to the pharmacy shelf."}]}, {"id": 460, "date": "2026-05-03", "category": "editorial", "headline": "Monologue improves Apple Watch to iPhone handoff and meeting recording features", "summary": "Monologue now supports seamless recording handoff between Apple Watch and iPhone, auto-stop for meetings, more control over triggering apps, and Webex support alongside Zoom and Teams.", "created_at": "2026-05-03 16:44:35", "articles": [{"id": 1798, "title": "Monologue improves Apple Watch to iPhone handoff and meeting recording features", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/wjwxzn682zqrkav8k3y6.html#story-10", "source_name": "Every", "published_at": "2026-05-03 11:55:31", "summary": null, "content_snippet": "Monologue now supports seamless recording handoff between Apple Watch and iPhone, auto-stop for meetings, more control over triggering apps, and Webex support alongside Zoom and Teams.", "full_text": "Monologue can start a recording on your Apple Watch and keep it going on your iPhone without interruption. The Mac app also got better at meetings, with auto-stop when a meeting ends, more control over which apps trigger recording, and Webex joining Zoom and Teams as a supported platform."}]}, {"id": 461, "date": "2026-05-03", "category": "editorial", "headline": "Kieran Klaassen seeks alpha testers for Cora’s inbox", "summary": "Kieran Klaassen is recruiting a small group of alpha testers to help pressure-test the full Cora inbox; interested parties can contact him at kieran@every.to.", "created_at": "2026-05-03 16:44:35", "articles": [{"id": 1797, "title": "Kieran Klaassen seeks alpha testers for Cora’s inbox", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/wjwxzn682zqrkav8k3y6.html#story-9", "source_name": "Every", "published_at": "2026-05-03 11:55:31", "summary": null, "content_snippet": "Kieran Klaassen is recruiting a small group of alpha testers to help pressure-test the full Cora inbox; interested parties can contact him at kieran@every.to.", "full_text": "Compound Engineering Camp : Cora general manager Kieran Klaassen and product leader Trevin Chow walked through what’s new, went deeper on the brainstorm and ideate steps, and shared examples of using the compound engineering plugin in product-focused workflows. Watch the recording ."}]}, {"id": 462, "date": "2026-05-03", "category": "editorial", "headline": "Cora’s inbox gets usability upgrades including stars, voice dictation, and smoother compose box", "summary": "Cora’s inbox now features a starred view for important threads, typed snooze durations, voice dictation, and a smoother compose experience, alongside backend performance improvements.", "created_at": "2026-05-03 16:44:35", "articles": [{"id": 1796, "title": "Cora’s inbox gets usability upgrades including stars, voice dictation, and smoother compose box", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/wjwxzn682zqrkav8k3y6.html#story-8", "source_name": "Every", "published_at": "2026-05-03 11:55:31", "summary": null, "content_snippet": "Cora’s inbox now features a starred view for important threads, typed snooze durations, voice dictation, and a smoother compose experience, alongside backend performance improvements.", "full_text": "Cora’s inbox got a round of usability upgrades: a starred view for important threads, typed snooze durations, voice dictation, and a smoother compose experience. The app is also faster behind the scenes. Kieran is looking for a small group of alpha testers to help pressure-test the full inbox—if you’re interested, reach out to him at kieran@every.to ."}]}, {"id": 463, "date": "2026-05-03", "category": "editorial", "headline": "Spiral adds version history and API endpoints for draft management", "summary": "Spiral introduced version history to track draft evolution and roll back changes, along with lightweight API endpoints for quick rewrites and a smoother onboarding flow.", "created_at": "2026-05-03 16:44:35", "articles": [{"id": 1795, "title": "Spiral adds version history and API endpoints for draft management", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/wjwxzn682zqrkav8k3y6.html#story-7", "source_name": "Every", "published_at": "2026-05-03 11:55:31", "summary": null, "content_snippet": "Spiral introduced version history to track draft evolution and roll back changes, along with lightweight API endpoints for quick rewrites and a smoother onboarding flow.", "full_text": "Spiral added version history—you can now see how a draft evolved and roll back to an earlier version with one click. It also shipped two lightweight API endpoints for quick rewrites and made the onboarding flow noticeably smoother."}]}, {"id": 464, "date": "2026-05-03", "category": "editorial", "headline": "Every hosts 'Compound Engineering Camp' with Kieran Klaassen and Trevin Chow", "summary": "Every’s camp focused on new compound engineering developments, including deeper exploration of brainstorming and ideation steps, and product-focused workflows using the compound engineering plugin.", "created_at": "2026-05-03 16:44:35", "articles": [{"id": 1794, "title": "Every hosts 'Compound Engineering Camp' with Kieran Klaassen and Trevin Chow", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/wjwxzn682zqrkav8k3y6.html#story-6", "source_name": "Every", "published_at": "2026-05-03 11:55:31", "summary": null, "content_snippet": "Every’s camp focused on new compound engineering developments, including deeper exploration of brainstorming and ideation steps, and product-focused workflows using the compound engineering plugin.", "full_text": null}]}, {"id": 465, "date": "2026-05-03", "category": "editorial", "headline": "Every hosts 'Codex for Knowledge Work Camp' with Dan and Austin", "summary": "Every hosted a camp demonstrating how to use OpenAI’s Codex for drafting, research, summarizing, parallel task execution, and building small automation tools for knowledge work.", "created_at": "2026-05-03 16:44:35", "articles": [{"id": 1793, "title": "Every hosts 'Codex for Knowledge Work Camp' with Dan and Austin", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/wjwxzn682zqrkav8k3y6.html#story-5", "source_name": "Every", "published_at": "2026-05-03 11:55:31", "summary": null, "content_snippet": "Every hosted a camp demonstrating how to use OpenAI’s Codex for drafting, research, summarizing, parallel task execution, and building small automation tools for knowledge work.", "full_text": null}]}, {"id": 466, "date": "2026-05-03", "category": "editorial", "headline": "Laura Entis examines GPT-5.5 adoption and agent workflows in 'Who Isn’t Using GPT 5.5'", "summary": "Laura Entis reports on Every team’s use of GPT-5.5 and Claude Code, including a head-to-head proposal test, agent-driven pull requests, and insights from six unicorn CTOs transitioning to Anthropic IC roles.", "created_at": "2026-05-03 16:44:35", "articles": [{"id": 1792, "title": "Laura Entis examines GPT-5.5 adoption and agent workflows in 'Who Isn’t Using GPT 5.5'", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/wjwxzn682zqrkav8k3y6.html#story-4", "source_name": "Every", "published_at": "2026-05-03 11:55:31", "summary": null, "content_snippet": "Laura Entis reports on Every team’s use of GPT-5.5 and Claude Code, including a head-to-head proposal test, agent-driven pull requests, and insights from six unicorn CTOs transitioning to Anthropic IC roles.", "full_text": "“Who Isn’t Using GPT 5.5” by Laura Entis /Context Window: One week after GPT-5.5’s release, the Every team checks in: Kieran is now splitting his time evenly between Codex and Claude Code, but Natalia Quintero ran a head-to-head proposal test and her Claude agent won. Plus: why six unicorn CTOs have stepped down to become Anthropic ICs; how Kieran hit 24 pull requests in a single day by having agents watch user complaint videos overnight; and Willie Williams on why AI has turned coding into a slot machine—and how to know when to walk away."}]}, {"id": 467, "date": "2026-05-03", "category": "editorial", "headline": "Laura Entis reports on Stripe’s AI and economic agent trends in 'Compute Is the New Cash'", "summary": "Laura Entis discusses how agents are becoming economic participants, the shift to usage-based pricing by GitHub and Anthropic, and contrasting views on interacting with agents versus letting them work autonomously.", "created_at": "2026-05-03 16:44:35", "articles": [{"id": 1791, "title": "Laura Entis reports on Stripe’s AI and economic agent trends in 'Compute Is the New Cash'", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/wjwxzn682zqrkav8k3y6.html#story-3", "source_name": "Every", "published_at": "2026-05-03 11:55:31", "summary": null, "content_snippet": "Laura Entis discusses how agents are becoming economic participants, the shift to usage-based pricing by GitHub and Anthropic, and contrasting views on interacting with agents versus letting them work autonomously.", "full_text": "“Compute Is the New Cash” by Laura Entis /Context Window: On AI & I , Emily Glassberg Sands , head of data and AI at Stripe, talks to Dan Shipper about how agents are becoming economic participants—and why fraud is now a full-funnel problem, not just a checkout one. Plus: GitHub and Anthropic are both moving to usage-based pricing as flat-rate subscriptions break down under agentic workloads; Dan and Kieran Klaassen offer contrasting takes on whether you should talk to your agents or just let them work; and Naveen Naidu ‘s three-step workflow for turning post-launch customer feedback into a product queue. 🎧 🖥 Listen on Spotify or Apple Podcasts , or watch on X or YouTube ."}]}, {"id": 468, "date": "2026-05-03", "category": "editorial", "headline": "Katie Parrott explores Codex as a tool for knowledge work in 'One App to Rule All Knowledge Work'", "summary": "Katie Parrott highlights how Austin Tedesco uses Codex for 80% of his daily workflow, including reviewing agent outputs in their destination apps and using Every’s compound knowledge plugin to catch errors before execution.", "created_at": "2026-05-03 16:44:35", "articles": [{"id": 1790, "title": "Katie Parrott explores Codex as a tool for knowledge work in 'One App to Rule All Knowledge Work'", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/wjwxzn682zqrkav8k3y6.html#story-2", "source_name": "Every", "published_at": "2026-05-03 11:55:31", "summary": null, "content_snippet": "Katie Parrott highlights how Austin Tedesco uses Codex for 80% of his daily workflow, including reviewing agent outputs in their destination apps and using Every’s compound knowledge plugin to catch errors before execution.", "full_text": "“One App to Rule All Knowledge Work” by Katie Parrott /Context Window: Austin Tedesco now runs 80 percent of his daily workflow through Codex, a tool he called “trash” for non-engineers just months ago. Plus: why Austin reviews every agent output in its destination app, a prompt for letting agents design their own automations, and how to use Every’s compound knowledge plugin to catch confidently wrong data before a plan gets enacted."}]}, {"id": 469, "date": "2026-05-03", "category": "editorial", "headline": "Mike Taylor introduces 'incremental determinism' for AI cost discipline", "summary": "Mike Taylor proposes a four-level framework to help teams decide when to use expensive frontier models versus cheaper alternatives, emphasizing that the real cost of AI is often human attention rather than token usage.", "created_at": "2026-05-03 16:44:35", "articles": [{"id": 1789, "title": "Mike Taylor introduces 'incremental determinism' for AI cost discipline", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/wjwxzn682zqrkav8k3y6.html#story-1", "source_name": "Every", "published_at": "2026-05-03 11:55:31", "summary": null, "content_snippet": "Mike Taylor proposes a four-level framework to help teams decide when to use expensive frontier models versus cheaper alternatives, emphasizing that the real cost of AI is often human attention rather than token usage.", "full_text": "“You Are the Most Expensive Model” by Mike Taylor /Also True for Humans: Most teams are routing entire workflows through frontier models when cheaper, faster alternatives would do the job just as well. The real cost isn’t the tokens—it’s your attention. Mike Taylor introduces incremental determinism: a four-level framework for deciding which tasks deserve Opus and which can be handed to Haiku, a script, or no model at all. Read this to know exactly which lever to pull when your AI costs start to add up."}]}, {"id": 470, "date": "2026-05-03", "category": "editorial", "headline": "Every Staff releases 'A Guide to Agent-native Product Management' by Marcus Moretti", "summary": "Marcus Moretti shares a guide on agent-native product management, introducing two new compound engineering skills (/ce:strategy and /ce:product-pulse) that automate strategy and analytics tasks, and explains how they integrate into the plan-ship-review loop.", "created_at": "2026-05-03 16:44:35", "articles": [{"id": 1788, "title": "Every Staff releases 'A Guide to Agent-native Product Management' by Marcus Moretti", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/wjwxzn682zqrkav8k3y6.html#story-0", "source_name": "Every", "published_at": "2026-05-03 11:55:31", "summary": null, "content_snippet": "Marcus Moretti shares a guide on agent-native product management, introducing two new compound engineering skills (/ce:strategy and /ce:product-pulse) that automate strategy and analytics tasks, and explains how they integrate into the plan-ship-review loop.", "full_text": "“A Guide to Agent-native Product Management” by Marcus Moretti /Guides : Marcus Moretti runs Spiral as a one-person team. This guide walks through the two new compound engineering skills that make it possible: /ce:strategy, which interviews you to produce a strategy document, and /ce:product-pulse, which replaces your analytics tools with a founder-style analyst briefing that saves to a folder as your product’s running memory. Read this to set up both commands for your own product and understand how they plug into the broader plan-ship-review loop. Plus: The one thing Marcus still writes himself is the roadmap. Read the accompanying essay for his full workflow, plus his two-part test for which SaaS products will survive the agent era."}]}, {"id": 471, "date": "2026-05-03", "category": "research", "headline": "Multi-agent AI systems amplify errors 17x, Stanford study finds", "summary": "Research from Google, MIT, and Stanford reveals multi-agent AI systems can amplify baseline errors by 17.2x, with tool-heavy tasks suffering most. Benchmarks often overstate performance due to excessive compute, masking inefficiencies.", "created_at": "2026-05-03 16:44:38", "articles": [{"id": 1786, "title": "Stanford study reveals hidden costs of multi-agent AI systems in benchmarking", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/jf9ufli18ltf51ncbu52.html#story-2", "source_name": "AlphaSignal", "published_at": "2026-05-03 15:11:19", "summary": null, "content_snippet": "A Stanford University study found that multi-agent benchmarks often appear impressive due to excessive compute usage, but when controlled for 'thinking budget,' single-agent systems consistently match or outperform multi-agent variants on complex reasoning tasks.", "full_text": null}, {"id": 1787, "title": "Google and MIT research shows multi-agent AI systems amplify errors by up to 17.2x", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/jf9ufli18ltf51ncbu52.html#story-3", "source_name": "AlphaSignal", "published_at": "2026-05-03 15:11:19", "summary": null, "content_snippet": "Research from Google and MIT demonstrates that multi-agent systems can amplify baseline errors by 17.2x, with tool-heavy tasks suffering disproportionately from coordination overhead, leading to 2x to 6x efficiency penalties compared to single agents.", "full_text": null}]}, {"id": 472, "date": "2026-05-03", "category": "model_releases", "headline": "Lambda benchmarks Llama 3.1 efficiency on NVIDIA Blackwell GPUs", "summary": "Lambda’s engineers demonstrated Llama 3.1 models (8B-405B) on NVIDIA Blackwell GPUs, identifying training inefficiencies and cutting compute costs with a new framework.", "created_at": "2026-05-03 16:44:38", "articles": [{"id": 1785, "title": "Lambda demonstrates Llama 3.1 training efficiency gains on NVIDIA Blackwell GPUs", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/jf9ufli18ltf51ncbu52.html#story-1", "source_name": "AlphaSignal", "published_at": "2026-05-03 15:11:19", "summary": null, "content_snippet": "Lambda's engineers benchmarked Llama 3.1 models (8B-405B) on NVIDIA Blackwell GPUs, identifying root causes of efficiency loss in large-scale training runs and developing a framework that cuts training costs by 25% or more without model changes.", "full_text": null}]}, {"id": 473, "date": "2026-05-03", "category": "products_tools", "headline": "AlphaSignal launches Harness Engineering workshop for AI agents", "summary": "AlphaSignal introduces its first workshop on Harness Engineering, teaching developers to build reliable AI agents for production environments.", "created_at": "2026-05-03 16:44:38", "articles": [{"id": 1784, "title": "AlphaSignal launches first-ever workshop on Harness Engineering for AI agents", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/jf9ufli18ltf51ncbu52.html#story-0", "source_name": "AlphaSignal", "published_at": "2026-05-03 15:11:19", "summary": null, "content_snippet": "AlphaSignal is launching its first workshop focused on Harness Engineering, a discipline critical for building AI agents that work reliably in production. The session, led by AJ Joobandi, aims to teach participants how to design robust agent systems and avoid common pitfalls.", "full_text": "AlphaSignal Announcement Alex from AlphaSignal here. We’re launching our first-ever workshop… and we have a lot more planned. If there’s a topic you’d love us to cover, hit reply. First up: Harness Engineering: the discipline behind AI agents that actually work in production. May 14th, 11am PT, taught by AJ Joobandi (creator of TechFren, Technical Content Lead at Augment Code). Limited to 20 seats at $150. Here’s what you’ll walk away with: - Why most agents break in production and the environment patterns that fix it - How to write instruction files, stopping rules, and success metrics for any agent loop - A framework for designing constraints that let agents iterate without babysitting - A working harness file you can plug into your own stack today → Grab your seat: https://lu.ma/t24o902x - Alex"}]}, {"id": 474, "date": "2026-05-03", "category": "editorial", "headline": "Chip Huyen releases free resources for 2025 AI Engineering book", "summary": "Chip Huyen published free supplementary materials to accompany her upcoming 2025 AI Engineering book, offering additional learning resources for developers.", "created_at": "2026-05-03 16:44:38", "articles": [{"id": 1808, "title": "Chip Huyen releases free resources alongside her 2025 AI Engineering book", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/t8cdlaxmf4i1t9si5ws7.html#story-7", "source_name": "AlphaSignal", "published_at": "2026-05-01 13:12:33", "summary": null, "content_snippet": "Chip Huyen published free supplementary resources to accompany her upcoming 2025 AI Engineering book, providing additional learning materials for developers and engineers in the AI field.", "full_text": null}]}, {"id": 441, "date": "2026-05-02", "category": "editorial", "headline": "Convex offers infrastructure for AI agents with immediate feedback and local reasoning", "summary": "Convex provides a platform enabling AI agents to write cleaner code by offering immediate feedback, local reasoning, and a minimal meta layer, addressing common infrastructure gaps.", "created_at": "2026-05-02 07:44:04", "articles": [{"id": 1675, "title": "Convex offers infrastructure for AI agents with immediate feedback and local reasoning", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/icplwbkcy46egsr6avwh.html#story-3", "source_name": "Every", "published_at": "2026-05-01 14:55:45", "summary": null, "content_snippet": "Convex provides a platform enabling AI agents to write cleaner code by offering immediate feedback, local reasoning, and a minimal meta layer, addressing common infrastructure gaps.", "full_text": null}]}, {"id": 442, "date": "2026-05-02", "category": "products_tools", "headline": "OpenAI releases GPT-5.5 with improved performance but more hallucinations", "summary": "OpenAI's GPT-5.5 sets new benchmarks in knowledge and agentic tasks but suffers from increased hallucinations, ranking third in factual accuracy. The model's trade-offs highlight ongoing challenges in balancing capability and reliability.", "created_at": "2026-05-02 07:44:11", "articles": [{"id": 1640, "title": "OpenAI releases GPT-5.5 with improved performance but increased hallucinations", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/09k9ihwgc1wng7qx208v.html#story-0", "source_name": "Unknown", "published_at": "2026-05-01 10:00:40", "summary": null, "content_snippet": "OpenAI's latest flagship model, GPT-5.5, sets new benchmarks in knowledge and agentic tasks but struggles with confidently delivering incorrect outputs, ranking third in factual accuracy and ignorance acknowledgment tests.", "full_text": null}]}, {"id": 443, "date": "2026-05-02", "category": "research", "headline": "Study reveals strategic thinking differences between LLMs and humans", "summary": "New research shows large language models approach strategic decision-making differently from humans, with implications for AI alignment and real-world applications. The findings challenge assumptions about AI's problem-solving parallels to human cognition.", "created_at": "2026-05-02 07:44:11", "articles": [{"id": 1643, "title": "Study reveals strategic thinking differences between LLMs and humans", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/09k9ihwgc1wng7qx208v.html#story-3", "source_name": "Unknown", "published_at": "2026-05-01 10:00:40", "summary": null, "content_snippet": "New research highlights how large language models approach strategic decision-making differently from humans, with implications for AI alignment and real-world applications.", "full_text": null}]}, {"id": 444, "date": "2026-05-02", "category": "industry_business", "headline": "AI industry's climate pledges strain under growing energy demands", "summary": "The rapid expansion of AI models is testing sustainability commitments as energy-intensive training and deployment practices clash with climate goals. The strain underscores the urgent need for greener AI infrastructure.", "created_at": "2026-05-02 07:44:11", "articles": [{"id": 1642, "title": "AI industry's climate pledges strain under growing energy demands", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/09k9ihwgc1wng7qx208v.html#story-2", "source_name": "Unknown", "published_at": "2026-05-01 10:00:40", "summary": null, "content_snippet": "The rapid expansion of AI models is putting significant pressure on climate commitments, as energy-intensive training and deployment practices challenge sustainability goals.", "full_text": "Behind the news: In the years following the 2015 Paris Climate Agreement, which commits governments to limiting global warming by 2 degrees Celsius above pre-industrial levels, many companies signed corporate pledges to meet goals intended to slow climate change. For instance, over 600 companies signed The Climate Pledge co-founded by Amazon and Global Optimism in 2019, which commits companies to reaching net-zero emissions of greenhouse gases by 2040. The Science-Based Targets initiative, which launched in 2015, is another corporate agreement that requires companies to set climate targets that align with the Paris Agreement. The top AI companies have embraced these principles and publish annual reports that document efforts to meet their commitments."}]}, {"id": 445, "date": "2026-05-02", "category": "model_releases", "headline": "Kimi K2.6 leads open-source large language models", "summary": "Kimi K2.6 has emerged as the top-performing open-source LLM, outperforming competitors in key benchmarks and setting a new standard for open models. Its success signals a shift in the open-source AI landscape.", "created_at": "2026-05-02 07:44:11", "articles": [{"id": 1641, "title": "Kimi K2.6 leads open-source large language models", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/09k9ihwgc1wng7qx208v.html#story-1", "source_name": "Unknown", "published_at": "2026-05-01 10:00:40", "summary": null, "content_snippet": "Kimi K2.6 has emerged as the top-performing open-source LLM, outperforming competitors in key benchmarks and setting a new standard for open models.", "full_text": "What’s new: Kimi K2.6 is a 1 trillion-parameter vision-language model that performs neck and neck with Qwen3.6 Max Preview and the newly released DeepSeek V4 and falls just behind top closed models. It’s designed to generate code in a plan-write-test-debug loop that can last for days, and it can instantiate hundreds of agents that collaborate on a single task. It also produces fewer hallucinations than its predecessor."}]}, {"id": 446, "date": "2026-05-02", "category": "products_tools", "headline": "New tandem voice model reduces latency without sacrificing accuracy", "summary": "A tandem voice model architecture enables real-time speech generation while processing input, cutting latency compared to sequential models. The innovation maintains accuracy while improving responsiveness.", "created_at": "2026-05-02 07:44:11", "articles": [{"id": 1628, "title": "New tandem voice model speaks while thinking, cutting latency without losing accuracy", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/t8cdlaxmf4i1t9si5ws7.html#story-5", "source_name": "AlphaSignal", "published_at": "2026-05-01 13:12:33", "summary": null, "content_snippet": "A new tandem voice model architecture enables real-time speech generation while still processing input, reducing latency compared to traditional sequential models. This maintains accuracy while improving responsiveness in voice interactions.", "full_text": null}]}, {"id": 447, "date": "2026-05-02", "category": "industry_business", "headline": "AI agent complexity creates 'vibe slop' in software, warns Pi creator", "summary": "Mario Zechner, creator of the Pi coding agent, argues that unchecked AI agent complexity leads to unmaintainable 'vibe slop,' degrading software quality across industries. The warning highlights risks in autonomous coding tools.", "created_at": "2026-05-02 07:44:11", "articles": [{"id": 1638, "title": "Mario Zechner argues AI agent complexity creates unmaintainable 'vibe slop' in software", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/vxrlnxz4bify20kfwa7o.html#story-8", "source_name": "The Neuron", "published_at": "2026-05-01 11:07:49", "summary": null, "content_snippet": "Mario Zechner, creator of the Pi coding agent, warns that AI agents generating excessive, unmaintainable code without human oversight leads to 'vibe slop,' degrading software quality across the industry.", "full_text": null}]}, {"id": 448, "date": "2026-05-02", "category": "products_tools", "headline": "OpenClaw runs on tiny 4-tool AI coding agent Pi", "summary": "OpenClaw, a WhatsApp-based AI assistant, leverages an open-source coding agent called Pi, which uses only four built-in tools. Users can expand functionality by modifying Pi itself, offering a lightweight yet flexible approach.", "created_at": "2026-05-02 07:44:11", "articles": [{"id": 1630, "title": "OpenClaw is powered by a tiny 4-tool AI coding agent named Pi", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/vxrlnxz4bify20kfwa7o.html#story-0", "source_name": "The Neuron", "published_at": "2026-05-01 11:07:49", "summary": null, "content_snippet": "OpenClaw, a WhatsApp-based AI assistant, runs on an open-source coding agent called Pi, which uses only four built-in tools and lets users expand functionality by modifying Pi itself. This approach contrasts with bloated AI tools, emphasizing simplicity and user-driven customization.", "full_text": null}]}, {"id": 449, "date": "2026-05-02", "category": "products_tools", "headline": "Best Value AI 2026 ranks 37 LLMs by cost efficiency", "summary": "The 'Best Value AI 2026' report evaluates 37 large language models based on cost efficiency, identifying which models deliver the best performance per dollar. The rankings provide actionable insights for budget-conscious AI adopters.", "created_at": "2026-05-02 07:44:11", "articles": [{"id": 1633, "title": "Best Value AI 2026 ranks 37 LLMs by per-dollar performance", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/vxrlnxz4bify20kfwa7o.html#story-3", "source_name": "The Neuron", "published_at": "2026-05-01 11:07:49", "summary": null, "content_snippet": "The 'Best Value AI 2026' report evaluates 37 large language models based on cost efficiency, providing insights into which models offer the best performance per dollar spent.", "full_text": null}]}, {"id": 450, "date": "2026-05-02", "category": "products_tools", "headline": "xAI building social network for AI-generated art", "summary": "xAI is reportedly developing a social network platform dedicated to AI-generated art, expanding beyond its AI models into creative community spaces. The move signals a push into new user engagement models.", "created_at": "2026-05-02 07:44:11", "articles": [{"id": 1354, "title": "xAI quietly building a social network for AI-generated art", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/15ymclufy255qnthekq9.html#story-8", "source_name": "Unknown", "published_at": "2026-04-29 14:43:27", "summary": null, "content_snippet": "xAI is reportedly developing a socia oducts_tools", "headline": "OpenAI's Codex system prompt reveals contradictory AI behavior guidelines", "summary": "OpenAI's Codex system prompt includes contradictory instructions, such as encouraging a 'vivid inner life' while banning animal references like pigeons. The inconsistencies underscore challenges in defining AI behavior rules.", "created_at": "2026-05-02 07:44:11", "articles": [{"id": 1485, "title": "OpenAI's Codex system prompt reveals contradictions in AI behavior guidelines", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/3x7u7pfczbbke7zgwsyq.html#story-0", "source_name": "The Neuron", "published_at": "2026-04-30 11:10:39", "summary": null, "content_snippet": "OpenAI's Codex system prompt includes contradictory instructions, such as encouraging a 'vivid inner life' while explicitly banning references to animals like pigeons, highlighting the challenges in defining AI behavior.", "full_text": null}]}, {"id": 456, "date": "2026-05-02", "category": "editorial", "headline": "Convex provides infrastructure for AI agents to write cleaner, more efficient code", "summary": "Convex offers infrastructure that enables AI agents to write better code by providing immediate feedback, local reasoning, and a minimal meta layer, addressing common issues in AI-generated code.", "created_at": "2026-05-02 16:42:04", "articles": [{"id": 1732, "title": "Convex provides infrastructure for AI agents to write cleaner, more efficient code", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/icplwbkcy46egsr6avwh.html#story-4", "source_name": "Every", "published_at": "2026-05-01 14:55:45", "summary": null, "content_snippet": "Convex offers infrastructure that enables AI agents to write better code by providing immediate feedback, local reasoning, and a minimal meta layer, addressing common issues in AI-generated code.", "full_text": null}]}, {"id": 457, "date": "2026-05-02", "category": "products_tools", "headline": "WorkOS si pment queue, highlighting practical applications of AI in product management.", "created_at": "2026-05-01 08:11:52", "articles": [{"id": 1594, "title": "Monologue's general manager Naveen Naidu shares workflow for turning customer feedback into a product queue", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/bkjupwjntra81skedab0.html#story-9", "source_name": "Every", "published_at": "2026-04-29 15:46:41", "summary": null, "content_snippet": "Naveen Naidu outlines a method for transforming customer feedback into a structured product development queue, highlighting practical applications of AI in product management.", "full_text": null}]}, {"id": 410, "date": "2026-05-01", "category": "editorial", "headline": "Dan Shipper and Kieran Klaassen discuss their differing views on AI agent usage", "summary": "Dan Shipper and Cora's general manager Kieran Klaassen share contrasting perspectives on how they use AI agents in their daily workflows.", "created_at": "2026-05-01 08:11:52", "articles": [{"id": 1593, "title": "Dan Shipper and Kieran Klaassen discuss their differing views on AI agent usage", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/bkjupwjntra81skedab0.html#story-8", "source_name": "Every", "published_at": "2026-04-29 15:46:41", "summary": null, "content_snippet": "Dan Shipper and Cora's general manager Kieran Klaassen share contrasting perspectives on how they use AI agents in their daily workflows.", "full_text": "A new episode of AI & I is here. Dan Shipper sits down with Emily Glassberg Sands , head of data and AI at Stripe, to discuss how AI is reshaping online commerce. Dan and Emily discuss how compute is the new cash, fraud has moved beyond the checkout, and agents are starting to act as economic participants on the internet."}]}, {"id": 411, "date": "2026-05-01", "category": "products_tools", "headline": "Microsoft open-sources TRELLIS.2 for instant 3D asset creation", "summary": "Microsoft release opic’s Claude and OpenAI’s Codex, streamlining collaborative document creation and editing workflows.", "created_at": "2026-04-30 08:22:49", "articles": [{"id": 1365, "title": "Proof enables live co-writing between Claude and Codex for documents", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/tu2q6bffk8axu5jn631w.html#story-8", "source_name": "The Neuron", "published_at": "2026-04-29 11:06:45", "summary": null, "content_snippet": "Proof introduced a feature allowing Claude and Codex to co-write documents in real-time, streamlining collaborative writing and editing processes.", "full_text": null}]}, {"id": 391, "date": "2026-04-30", "category": "sci_tech_trends", "headline": "35% of new websites since ChatGPT are AI-generated", "summary": "A study found that 35% of websites published since ChatGPT’s launch are AI-generated, highlighting the rapid adoption and impact of generative AI on web content creation.", "created_at": "2026-04-30 08:22:49", "articles": [{"id": 1353, "title": "Study finds 35% of newly published websites since ChatGPT launch are AI-generated", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/15ymclufy255qnthekq9.html#story-7", "source_name": "Unknown", "published_at": "2026-04-29 14:43:27", "summary": null, "content_snippet": "A study reveals that 35% of websites published since ChatGPT's launch are AI-generated, underscoring the rapid adoption and impact of generative AI on web content creation.", "full_text": null}]}, {"id": 392, "date": "2026-04-30", "category": "editorial", "headline": "Kieran Klaassen Achieves Personal Record of Pull Requests in One Day Using AI Tools", "summary": "Kieran Klaassen, general manager at Cora, set a personal record for pull requests in a single day, highlighting how AI tools can supercharge productivity when used effectively.", "created_at": "2026-04-30 17:17:50", "articles": [{"id": 1473, "title": "Kieran Klaassen Achieves Personal Record of Pull Requests in One Day Using AI Tools", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/aq98kld8i4zjg8v57mkt.html#story-3", "source_name": "Every", "published_at": "2026-04-30 14:55:25", "summary": null, "content_snippet": "Kieran Klaassen, general manager at Cora, set a personal record for pull requests in a single day, highlighting how AI tools can supercharge productivity when used effectively.", "full_text": null}]}, {"id": 393, "date": "2026-04-30", "category": "editorial", "headline": "OpenAI Releases GPT-5.5, Touted as Faster and More Reliable for Professional Work", "summary": "OpenAI's GPT-5.5, released a week prior, is praised for being faster, steadier, and more trustworthy for everyday professional tasks compared to Opus 4.7, though switching from Claude-specific workflows remains a hurdle.", "created_at": "2026-04-30 17:17:50", "articles": [{"id": 1472, "title": "OpenAI Releases GPT-5.5, Touted as Faster and More Reliable for Professional Work", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/aq98kld8i4zjg8v57mkt.html#story-2", "source_name": "Every", "published_at": "2026-04-30 14:55:25", "summary": null, "content_snippet": "OpenAI's GPT-5.5, released a week prior, is praised for being faster, steadier, and more trustworthy for everyday professional tasks compared to Opus 4.7, though switching from Claude-specific workflows remains a hurdle.", "full_text": null}]}, {"id": 394, "date": "2026-04-30", "category": "editorial", "headline": "Anthropic and Other Companies Recruit Ex-Founders as Individual Contributors", "summary": "Anthropic, PostHog, and Ramp are attracting former founders and high-profile managers to join as individual contributors, signaling a trend where AI expertise makes traditional career ladders less relevant.", "created_at": "2026-04-30 17:17:50", "articles": [{"id": 1471, "title": "Anthropic and Other Companies Recruit Ex-Founders as Individual Contributors", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/aq98kld8i4zjg8v57mkt.html#story-1", "source_name": "Every", "published_at": "2026-04-30 14:55:25", "summary": null, "content_snippet": "Anthropic, PostHog, and Ramp are attracting former founders and high-profile managers to join as individual contributors, signaling a trend where AI expertise makes traditional career ladders less relevant.", "full_text": null}]}, {"id": 395, "date": "2026-04-30", "category": "editorial", "headline": "Six Unicorn CTOs Quit to Become Individual Contributors at Anthropic", "summary": "Six former CTOs from companies valued over $1 billion, including Instagram, Workday, and Box, have quit their executive roles to become individual contributors at Anthropic, reflecting a shift in tech career paths driven by AI's impact on engineering workflows.", "created_at": "2026-04-30 17:17:50", "articles": [{"id": 1470, "title": "Six Unicorn CTOs Quit to Become Individual Contributors at Anthropic", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/aq98kld8i4zjg8v57mkt.html#story-0", "source_name": "Every", "published_at": "2026-04-30 14:55:25", "summary": null, "content_snippet": "Six former CTOs from companies valued over $1 billion, including Instagram, Workday, and Box, have quit their executive roles to become individual contributors at Anthropic, reflecting a shift in tech career paths driven by AI's impact on engineering workflows.", "full_text": "What happened: Six former CTOs at companies valued north of $1 billion—including Instagram , Workday, and Box—have made that exact career move , according to one of those CTOs on X. And the leadership-back-to-IC trajectory isn’t unique to Anthropic: PostHog is recruiting technical ex-founders , and Ramp says it has attracted 70 ex-founders by looking for “super ICs.”"}]}, {"id": 396, "date": "2026-04-30", "category": "industry_business", "headline": "Hyperscalers spend $130B on AI infra as demand outstrips supply", "summary": "Microso
