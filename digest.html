it—purging screenshots, installer packages, and other digital junk first, then building a file structure around what’s worth keeping. It’s available now to all paid Every subscribers."}]}, {"id": 2, "date": "2026-04-14", "category": "editorial", "headline": "Every's Kieran Klaassen runs 44 AI agents as project folders across multiple projects", "summary": "Kieran Klaassen now manages 44 AI agents by pointing models at specialized project folders containing context like CLAUDE.md files, replacing complex agent swarms with simpler folder-based agents.", "created_at": "2026-04-14 17:03:19", "articles": [{"id": 27, "title": "Every's Kieran Klaassen runs 44 AI agents as project folders across multiple projects", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/lw6kg75vqatepu8by40a.html#story-2", "source_name": "Every", "published_at": "2026-04-13 14:55:18", "summary": null, "content_snippet": "Kieran Klaassen now manages 44 AI agents by pointing models at specialized project folders containing context like CLAUDE.md files, replacing complex agent swarms with simpler folder-based agents.", "full_text": null}]}, {"id": 3, "date": "2026-04-14", "category": "editorial", "headline": "Every's Kieran Klaassen explains why agent swarms didn't work for Cora's AI email assistant", "summary": "After three months of experimenting with agent swarms, Kieran Klaassen found that more agents didn't make him faster, leading him to pivot to using project folders as specialized AI agents instead.", "created_at": "2026-04-14 17:03:19", "articles": [{"id": 26, "title": "Every's Kieran Klaassen explains why agent swarms didn't work for Cora's AI email assistant", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/lw6kg75vqatepu8by40a.html#story-1", "source_name": "Every", "published_at": "2026-04-13 14:55:18", "summary": null, "content_snippet": "After three months of experimenting with agent swarms, Kieran Klaassen found that more agents didn't make him faster, leading him to pivot to using project folders as specialized AI agents instead.", "full_text": "On Friday, April 17, Cora general manager Kieran Klaassen will lead a camp for Every paid subscribers on compound engineering, the AI-native engineering philosophy that he built and that has more than 14,000 stars on GitHub. Since the last camp, Kieran and product leader Trevin Chow have built out product-focused workflows to make the methodology as valuable for product managers and founders as it is for engineers. In this camp, they’ll walk you through what’s new, go deeper on the brainstorm and ideate steps, and share examples of using compound engineering beyond engineering work. Read the full compound engineering guide , install the plugin , and join us for the camp .— Kate Lee"}]}, {"id": 4, "date": "2026-04-14", "category": "editorial", "headline": "Every's Cora general manager Kieran Klaassen to lead compound engineering camp for paid subscribers", "summary": "Kieran Klaassen will host a camp on April 17 for Every's paid subscribers to teach compound engineering, an AI-native engineering philosophy with over 14,000 GitHub stars, including new product-focused workflows for managers and founders.", "created_at": "2026-04-14 17:03:19", "articles": [{"id": 25, "title": "Every's Cora general manager Kieran Klaassen to lead compound engineering camp for paid subscribers", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/lw6kg75vqatepu8by40a.html#story-0", "source_name": "Every", "published_at": "2026-04-13 14:55:18", "summary": null, "content_snippet": "Kieran Klaassen will host a camp on April 17 for Every's paid subscribers to teach compound engineering, an AI-native engineering philosophy with over 14,000 GitHub stars, including new product-focused workflows for managers and founders.", "full_text": "On Friday, April 17, Cora general manager Kieran Klaassen will lead a camp for Every paid subscribers on compound engineering ill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/2z9zfr58kc8qmw0b67ul.html#story-5", "source_name": "The Neuron", "published_at": "2026-04-13 09:35:46", "summary": null, "content_snippet": "Google connects NotebookLM notebooks to Gemini, enabling organized, evolving workspaces for projects, studies, or hobbies with AI-powered context retention.", "full_text": "But instead of giving us folders or projects similar to ChatGPT and Claude, Google made it even better by connecting NotebookLM. In this setup, think of a notebook as a dedicated workspace for a specific topic, project, or subject. You create one, give Gemini custom instructions, dump in your files and sources, and every chat you have inside that notebook stays organized there. No more losing conversations in a sea of random chats."}]}, {"id": 7, "date": "2026-04-14", "category": "products_tools", "headline": "Anthropic expands Claude Cowork with enterprise controls and analytics", "summary": "Anthropic's Claude Cowork now includes enterprise-grade features like analytics and controls to manage AI workflows in professional environments. This strengthens its position in the enterprise AI market.", "created_at": "2026-04-14 17:03:26", "articles": [{"id": 20, "title": "Anthropic expands Claude Cowork with enterprise controls and analytics", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/budpqgig9nr9qj9nfz7u.html#story-5", "source_name": "AlphaSignal", "published_at": "2026-04-13 17:15:38", "summary": null, "content_snippet": "Claude Cowork now includes enterprise-grade features like analytics and controls to manage AI workflows in professional environments.", "full_text": null}]}, {"id": 8, "date": "2026-04-14", "category": "model_releases", "headline": "MiniMax releases M2.7 open-weight model with high SWE-Pro scores", "summary": "MiniMax's M2.7 model achieves strong performance on the SWE-Pro benchmark, offering an open-weight alternative for software engineering tasks. This
