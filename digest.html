ft, Google, Meta, and Amazon collectively spent $130B on AI infrastructure in Q1 2026, but supply shortages continue to constrain growth. Google Cloud's revenue was limited by insufficient AI capacity, while Microsoft's AI business hit a $37B annual run rate.", "created_at": "2026-04-30 17:17:58", "articles": [{"id": 1476, "title": "Microsoft, Alphabet, Amazon, and Meta report $130B AI spending with supply shortages", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/i54hho89z41se45k2on6.html#story-2", "source_name": "Unknown", "published_at": "2026-04-30 14:51:19", "summary": null, "content_snippet": "The four tech giants spent around $130 billion on AI infrastructure in a single quarter, but demand still outstrips supply. This underscores the competitive advantage of rapid compute deployment over model innovation.", "full_text": null}, {"id": 1487, "title": "Microsoft, Google, Meta, and Amazon spend $130B on AI infrastructure in Q1 2026", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/3x7u7pfczbbke7zgwsyq.html#story-2", "source_name": "The Neuron", "published_at": "2026-04-30 11:10:39", "summary": null, "content_snippet": "The four hyperscalers reported massive AI infrastructure spending in Q1 2026, totaling $130B, driven by insatiable demand for AI services that outpaced their capacity to build.", "full_text": "Microsoft , Google , Meta , and Amazon all reported Q1 2026 earnings on the same Wednesday, and the headlines sounded suspiciously similar. AI sold faster than they could build for it, so they're spending an absurd amount on infrastructure. Then Sundar Pichai said the quiet part out loud: Google Cloud's revenue would have been higher if Google could have built fast enough to meet demand."}, {"id": 1488, "title": "Google Cloud revenue constrained by insufficient AI infrastructure capacity", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/3x7u7pfczbbke7zgwsyq.html#story-3", "source_name": "The Neuron", "published_at": "2026-04-30 11:10:39", "summary": null, "content_snippet": "Google Cloud's revenue growth was limited by its inability to build AI infrastructure fast enough to meet demand, as revealed by Sundar Pichai during Q1 2026 earnings.", "full_text": null}, {"id": 1494, "title": "Microsoft's $627B RPO and Google's $462B cloud backlog signal over $1 trillion in unfulfilled enterprise AI commitments", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/3x7u7pfczbbke7zgwsyq.html#story-9", "source_name": "The Neuron", "published_at": "2026-04-30 11:10:39", "summary": null, "content_snippet": "Microsoft's $627B in remaining performance obligations and Google's $462B cloud backlog indicate over $1 trillion in signed enterprise AI commitments that hyperscalers cannot yet deliver.", "full_text": "Why this matters: Q1 capex across the four hyperscalers totaled roughly $130B in a single quarter , nearly 2x that of Q1 2025. Google raised 2026 capex guidance to up to $190B and said it'll \"significantly increase\" again in 2027. Add Microsoft's $627B RPO (signed commercial contracts not yet billed) and Google's $462B cloud backlog, and you get over a trillion dollars in signed enterprise commitments the hyperscalers can’t yet deliver."}]}, {"id": 397, "date": "2026-04-30", "category": "products_tools", "headline": "AWS AgentCore launches for secure AI agent deployment at scale", "summary": "AWS released AgentCore, a platform for securely deploying AI agents at enterprise scale. The tool provides infrastructure for agent workflows, addressing growing enterprise demand for AI automation.", "created_at": "2026-04-30 17:17:58", "articles": [{"id": 1484, "title": "AWS releases AgentCore to deploy AI agents securely at any scale", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/b6m0zkhlhw2hzwa9cpxu.html#story-7", "source_name": "AlphaSignal", "published_at": "2026-04-30 13:37:12", "summary": null, "content_snippet": "AWS launched AgentCore, a platform for securely deploying AI agents at scale, providing infrastructure for enterprise-grade agent workflows.", "full_text": null}]}, {"id": 398, "date": "2026-04-30", "category": "model_releases", "headline": "Mistral ships Medium 3.5, a 128B-parameter dense model", "summary": "Mistral released Medium 3.5, a dense 128-billion-parameter model, expanding its lineup with a focus on performance and scalability. The model joins a growing ecosystem of mid-sized AI models.", "created_at": "2026-04-30 17:17:58", "articles": [{"id": 1480, "title": "Mistral ships Medium 3.5, a dense 128B model", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/b6m0zkhlhw2hzwa9cpxu.html#story-3", "source_name": "AlphaSignal", "published_at": "2026-04-30 13:37:12", "summary": null, "content_snippet": "Mistral released Medium 3.5, a dense 128-billion-parameter model, expanding its model lineup with a focus on performance and scalability.", "full_text": null}]}, {"id": 399, "date": "2026-04-30", "category": "open_source", "headline": "Xiaomi unveils open-source 1T-parameter reasoning model MiMo-V2.5-Pro", "summary": "Xiaomi released MiMo-V2.5-Pro, an open-source reasoning model with 1 trillion parameters, setting a new benchmark for large-scale open models. The model is designed for high-complexity reasoning tasks.", "created_at": "2026-04-30 17:17:58", "articles": [{"id": 1483, "title": "Xiaomi releases MiMo-V2.5-Pro, an open-source 1T parameter reasoning model", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/b6m0zkhlhw2hzwa9cpxu.html#story-6", "source_name": "AlphaSignal", "published_at": "2026-04-30 13:37:12", "summary": null, "content_snippet": "Xiaomi unveiled MiMo-V2.5-Pro, an open-source reasoning model with 1 trillion parameters, setting a new benchmark for large-scale open models.", "full_text": null}]}, {"id": 400, "date": "2026-04-30", "category": "open_source", "headline": "Poolside launches 33B open-weight coding model for single-GPU deployment", "summary": "Poolside introduced its first open-weight coding model with 33 billion parameters, optimized to run efficiently on a single GPU. This lowers deployment barriers for developers and small teams.", "created_at": "2026-04-30 17:17:58", "articles": [{"id": 1482, "title": "Poolside releases its first open-weight 33B coding model that runs on a single GPU", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/b6m0zkhlhw2hzwa9cpxu.html#story-5", "source_name": "AlphaSignal", "published_at": "2026-04-30 13:37:12", "summary": null, "content_snippet": "Poolside introduced its first open-weight coding model with 33 billion parameters, optimized to run efficiently on a single GPU, lowering deployment barriers.", "full_text": null}]}, {"id": 401, "date": "2026-04-30", "category": "open_source", "headline": "Cursor open-sources SDK for building and deploying coding agents", "summary": "Cursor launched an open-source SDK allowing coding agents to run outside the editor. The tool enables automated bug fixes, CI pipeline integrations, and data queries with token-based billing.", "created_at": "2026-04-30 17:17:58", "articles": [{"id": 1478, "title": "Cursor releases open-source SDK to build and deploy coding agents anywhere", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/b6m0zkhlhw2hzwa9cpxu.html#story-1", "source_name": "AlphaSignal", "published_at": "2026-04-30 13:37:12", "summary": null, "content_snippet": "Cursor launched an open-source SDK allowing coding agents to run outside the editor, enabling automated bug fixes, CI pipeline integrations, and data queries with token-based billing.", "full_text": null}, {"id": 1497, "title": "Cursor launches TypeScript SDK for building custom AI agents", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/3x7u7pfczbbke7zgwsyq.html#story-12", "source_name": "The Neuron", "published_at": "2026-04-30 11:10:39", "summary": null, "content_snippet": "Cursor introduced a TypeScript SDK that enables developers to build and deploy custom AI agents, expanding its tooling ecosystem for AI-driven development.", "full_text": "Cursor shipped a TypeScript SDK so you can build, steer, and compose custom programmatic coding agents using the same harness as Cursor itself, with repo context, MCP tools, and auto-PR workflows ( cookbook here ) —free with Cursor."}]}, {"id": 402, "date": "2026-04-30", "category": "sci_tech_trends", "headline": "Figure AI scales humanoid robot production to 50K units annually", "summary": "Figure AI has scaled production of its humanoid robots from one per day to one per hour in under 120 days, with plans to produce up to 50,000 annually. This shift highlights the growing focus on reliable robotics deployment.", "created_at": "2026-04-30 17:17:58", "articles": [{"id": 1474, "title": "Figure AI moves humanoid robots from prototype to production", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/i54hho89z41se45k2on6.html#story-0", "source_name": "Unknown", "published_at": "2026-04-30 14:51:19", "summary": null, "content_snippet": "Figure AI has scaled production of its humanoid robots from one per day to one per hour in under 120 days, with plans to produce up to 50,000 annually. This shift highlights the growing focus on reliability and real-world deployment in robotics.", "full_text": null}]}, {"id": 403, "date": "2026-04-30", "category": "research", "headline": "New method cuts LLM reasoning tokens by 11x using abstract chains", "summary": "Researchers introduced Abstract Chain-of-Thought, reducing LLM reasoning tokens by 11.6x by using abstract tokens instead of plain English. This lowers costs and speeds up responses without sacrificing accuracy.", "created_at": "2026-04-30 17:17:58", "articles": [{"id": 1479, "title": "New training method cuts LLM reasoning tokens by 11x using abstract token chains", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/b6m0zkhlhw2hzwa9cpxu.html#story-2", "source_name": "AlphaSignal", "published_at": "2026-04-30 13:37:12", "summary": null, "content_snippet": "Researchers introduced Abstract Chain-of-Thought, a method reducing LLM reasoning tokens by 11.6x by using abstract tokens instead of plain English, lowering costs and speeding up responses without sacrificing accuracy.", "full_text": null}]}, {"id": 404, "date": "2026-04-30", "category": "model_releases", "headline": "Mayo Clinic's REDMOD AI detects pancreatic cancer years early", "summary": "The Mayo Clinic's REDMOD AI model identified early signs of pancreatic cancer in 73% of cases up to three years before diagnosis, outperforming radiologists at the two-year mark.", "created_at": "2026-04-30 17:17:58", "articles": [{"id": 1475, "title": "Mayo Clinic AI model REDMOD detects pancreatic cancer years before diagnosis", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/i54hho89z41se45k2on6.html#story-1", "source_name": "Unknown", "published_at": "2026-04-30 14:51:19", "summary": null, "content_snippet": "The Mayo Clinic's REDMOD AI model identified early signs of pancreatic cancer in 73% of cases up to three years before diagnosis, outperforming radiologists at the two-year mark. This approach leverages existing CT scans to improve early detection without additional screening.", "full_text": null}]}, {"id": 405, "date": "2026-04-30", "category": "products_tools", "headline": "Dell and NVIDIA launch AI Factory for enterprise agentic AI deployment", "summary": "Dell's AI Factory, powered by NVIDIA, provides a validated AI infrastructure stack for deploying agentic AI systems at scale. The solution aims to deliver high ROI and faster deployment for enterprises.", "created_at": "2026-04-30 17:17:58", "articles": [{"id": 1500, "title": "Dell AI Factory with NVIDIA delivers validated end-to-end AI stack for operationalizing agentic AI", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/3x7u7pfczbbke7zgwsyq.html#story-15", "source_name": "The Neuron", "published_at": "2026-04-30 11:10:39", "summary": null, "content_snippet": "Dell's AI Factory, powered by NVIDIA, provides a validated AI infrastructure stack designed to help enterprises deploy agentic AI systems at scale with high ROI and faster deployment.", "full_text": null}]}, {"id": 406, "date": "2026-04-30", "category": "open_source", "headline": "AI4Finance releases open-source RL toolkit for stock trading", "summary": "The AI4Finance Foundation launched an open-source reinforcement learning toolkit designed for stock trading. The toolkit enables developers to build and test trading strategies using RL techniques.", "created_at": "2026-04-30 17:17:58", "articles": [{"id": 1481, "title": "AI4Finance Foundation releases open-source reinforcement learning toolkit for stock trading", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/b6m0zkhlhw2hzwa9cpxu.html#story-4", "source_name": "AlphaSignal", "published_at": "2026-04-30 13:37:12", "summary": null, "content_snippet": "The AI4Finance Foundation launched an open-source reinforcement learning toolkit designed for stock trading, enabling developers to build and test trading strategies.", "full_text": null}]}, {"id": 407, "date": "2026-04-30", "category": "industry_business", "headline": "Google raises 2026 capex guidance to $190B amid AI demand surge", "summary": "Google significantly increased its 2026 capital expenditure guidance to up to $190B due to insatiable AI demand. The company plans further increases in 2027 to meet enterprise commitments.", "created_at": "2026-04-30 17:17:58", "articles": [{"id": 1493, "title": "Google raises 2026 capex guidance to up to $190B, plans further increases in 2027", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/3x7u7pfczbbke7zgwsyq.html#story-8", "source_name": "The Neuron", "published_at": "2026-04-30 11:10:39", "summary": null, "content_snippet": "Google significantly increased its 2026 capital expenditure guidance to up to $190B and plans to 'significantly increase' spending again in 2027 due to AI demand.", "full_text": null}]}, {"id": 347, "date": "2026-04-29", "category": "products_tools", "headline": "Adobe Firefly AI Assistant enters public beta", "summary": "Adobe launched a public beta of its Firefly AI Assistant, enabling Creative Cloud users to automate multi-step creative workflows with natural language commands.", "created_at": "2026-04-29 08:18:06", "articles": [{"id": 1331, "title": "Adobe Firefly AI Assistant enters public beta for Creative Cloud users", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/0vamxnduk6omsg7d8p5e.html#story-11", "source_name": "The Neuron", "published_at": "2026-04-28 11:07:39", "summary": null, "content_snippet": "Adobe launched a public beta of its Firefly AI Assistant, enabling users to describe creative tasks in natural language and have the assistant automate multi-step workflows across Adobe's creative apps.", "full_text": "Users now have access of public beta of Firefly AI Assistant – powered by our creative agent. What does that actually mean in practice? Instead of navigating tools or jumping between our creative apps, you direct the outcome while the assistant handles the workflows—using the right tools at the right time."}]}, {"id": 348, "date": "2026-04-29", "category": "products_tools", "headline": "Claude integrates with 9 creative tools via MCP connectors", "summary": "Claude now connects to Blender, Adobe Creative Cloud, Canva, Ableton, and five other creative apps, allowing natural-language control and reducing app-switching overhead.", "created_at": "2026-04-29 08:18:06", "articles": [{"id": 1298, "title": "Claude now connects to Blender, Adobe, Canva, Ableton, and more creative tools", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/wzlmt7m5ddmw9rd6arzl.html#story-0", "source_name": "AlphaSignal", "published_at": "2026-04-28 18:04:37", "summary": null, "content_snippet": "Claude integrates with 9 creative tools via MCP connectors, enabling natural-language control of apps like Blender, Adobe Creative Cloud, and Ableton, reducing the need to switch between applications.", "full_text": "The idea is simple: instead of switching between apps, you stay in Claude and talk to your tools directly. The Blender connector gives you a natural-language interface to its Python API, meaning you describe what you want instead of writing scripts from scratch. You can analyze and debug entire Blender scenes, build custom scripts to batch-apply changes to objects, and add new tools directly to Blender's interface."}]}, {"id": 349, "date": "2026-04-29", "category": "products_tools", "headline": "Microsoft turns a single photo into a 3D model in seconds", "summary": "Microsoft released a free tool that converts a 2D photo into a 3D model in seconds, democratizing 3D content creation for non-experts.", "created_at": "2026-04-29 08:18:06", "articles": [{"id": 1303, "title": "Microsoft releases free tool that turns a single photo into a 3D model in seconds", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/wzlmt7m5ddmw9rd6arzl.html#story-5", "source_name": "AlphaSignal", "published_at": "2026-04-28 18:04:37", "summary": null, "content_snippet": "Microsoft launches a free tool that converts a single 2D photo into a 3D model quickly, expanding accessibility for 3D content creation.", "full_text": null}]}, {"id": 350, "date": "2026-04-29", "category": "model_releases", "headline": "Qwen3 35B MoE distilled from Claude Opus ships as free GGUF", "summary": "Qwen3 35B Mixture-of-Experts model, distilled from Claude Opus, is now available as a free quantized GGUF for local deployment, lowering barriers to high-performance AI.", "created_at": "2026-04-29 08:18:06", "articles": [{"id": 1306, "title": "Qwen3 35B MoE distilled from Claude Opus ships as free quantized GGUF", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/wzlmt7m5ddmw9rd6arzl.html#story-8", "source_name": "AlphaSignal", "published_at": "2026-04-28 18:04:37", "summary": null, "content_snippet": "Qwen3 35B Mixture-of-Experts model, distilled from Claude Opus, is released as a free quantized GGUF, making it accessible for local deployment.", "full_text": null}]}, {"id": 351, "date": "2026-04-29", "category": "products_tools", "headline": "Google Gemma 4 powers fully local browser agent with WebGPU", "summary": "Google’s Gemma 4 E2B model enables a browser-based AI agent that runs entirely locally using WebGPU, ensuring on-device privacy for autonomous workflows.", "created_at": "2026-04-29 08:18:06", "articles": [{"id": 1302, "title": "Google Gemma 4 powers a fully local browser agent that needs no server", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/wzlmt7m5ddmw9rd6arzl.html#story-4", "source_name": "AlphaSignal", "published_at": "2026-04-28 18:04:37", "summary": null, "content_snippet": "Google's Gemma 4 E2B model enables a browser-based AI agent that runs entirely locally using WebGPU, ensuring privacy by keeping data on-device.", "full_text": "It runs on Gemma 4 E2B , a small but capable AI model converted to run natively in Chrome using WebGPU (your graphics card doing AI math). Transformers.js handles the heavy lifting so the model never leaves your machine."}]}, {"id": 352, "date": "2026-04-29", "category": "products_tools", "headline": "OpenAI ships open-source voice app built on gpt-realtime-1.5", "summary": "OpenAI released realtime-voice-component, an open-source React package enabling real-time voice control of apps, reducing manual interaction overhead.", "created_at": "2026-04-29 08:18:06", "articles": [{"id": 1300, "title": "OpenAI ships open-source voice app built on gpt-realtime-1.5", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/wzlmt7m5ddmw9rd6arzl.html#story-2", "source_name": "AlphaSignal", "published_at": "2026-04-28 18:04:37", "summary": null, "content_snippet": "OpenAI releases realtime-voice-component, an open-source React package that enables real-time voice control of apps, reducing the need for manual interactions.", "full_text": null}]}, {"id": 353, "date": "2026-04-29", "category": "products_tools", "headline": "GitHub Copilot switches to pay-per-use billing June 1st", "summary": "GitHub Copilot is transitioning to token-based billing starting June 1st, reflecting rising compute costs for agentic AI sessions and shifting from subscription models.", "created_at": "2026-04-29 08:18:06", "articles": [{"id": 1307, "title": "GitHub Copilot switches to pay-per-use billing starting June 1st", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/wzlmt7m5ddmw9rd6arzl.html#story-9", "source_name": "AlphaSignal", "published_at": "2026-04-28 18:04:37", "summary": null, "content_snippet": "GitHub Copilot transitions to token-based billing, reflecting the increased compute costs of agentic AI sessions and shifting from subscription models.", "full_text": null}]}, {"id": 354, "date": "2026-04-29", "category": "products_tools", "headline": "CorridorKey’s neural network extracts perfect green screen keys", "summary": "CorridorKey introduces a neural network that accurately extracts green screen keys from every pixel, improving video editing and compositing precision.", "created_at": "2026-04-29 08:18:06", "articles": [{"id": 1304, "title": "CorridorKey's neural network pulls perfect green screen keys from every pixel", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/wzlmt7m5ddmw9rd6arzl.html#story-6", "source_name": "AlphaSignal", "published_at": "2026-04-28 18:04:37", "summary": null, "content_snippet": "CorridorKey introduces a neural network that accurately extracts green screen keys from every pixel, improving video editing and compositing workflows.", "full_text": null}]}, {"id": 355, "date": "2026-04-29", "category": "research", "headline": "MIT finds all major AI models converge on same internal reality map", "summary": "MIT’s Platonic Representation Hypothesis suggests diverse AI models are converging on similar internal representations of reality despite varied training data.", "created_at": "2026-04-29 08:18:06", "articles": [{"id": 1305, "title": "MIT finds all major AI models secretly converge on the same internal reality map", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/wzlmt7m5ddmw9rd6arzl.html#story-7", "source_name": "AlphaSignal", "published_at": "2026-04-28 18:04:37", "summary": null, "content_snippet": "MIT's Platonic Representation Hypothesis suggests that different AI models, despite varied training data, are converging on similar internal representations of reality.", "full_text": null}]}, {"id": 356, "date": "2026-04-29", "category": "products_tools", "headline": "AgentField introduces harness primitive for AI agent composition", "summary": "AgentField’s harness primitive lets developers compose existing AI agent systems into complex autonomous workflows, with pre-built solutions like SWE-AF and cloud-security agents.", "created_at": "2026-04-29 08:18:06", "articles": [{"id": 1301, "title": "AgentField introduces the next primitive for AI agents", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/wzlmt7m5ddmw9rd6arzl.html#story-3", "source_name": "AlphaSignal", "published_at": "2026-04-28 18:04:37", "summary": null, "content_snippet": "AgentField's harness primitive allows composing existing AI agent systems into complex autonomous software, offering pre-built solutions like SWE-AF and cloud-security agents.", "full_text": null}]}, {"id": 357, "date": "2026-04-29", "category": "funding_acquisitions", "headline": "OpenAI acquires io for $6.4B to build AI-powered smartphone", "summary": "OpenAI acquired io, a smartphone-focused company, for $6.4 billion to lay the groundwork for its own AI-powered device, signaling a major hardware push.", "created_at": "2026-04-29 08:18:06", "articles": [{"id": 1330, "title": "OpenAI acquires io for $6.4B to build its own smartphone", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/0vamxnduk6omsg7d8p5e.html#story-10", "source_name": "The Neuron", "published_at": "2026-04-28 11:07:39", "summary": null, "content_snippet": "OpenAI acquired io, a company focused on smartphone technology, for $6.4 billion, laying the groundwork for its own AI-powered smartphone device.", "full_text": null}]}, {"id": 358, "date": "2026-04-29", "category": "editorial", "headline": "Every newsletter discusses end of AI pricing subsidy era", "summary": "The AI industry's era of subsidized pricing is ending, with companies facing higher costs and users potentially seeing increased bills, marking a shift from venture capital-funded growth to sustainable economics.", "created_at": "2026-04-29 17:25:53", "articles": [{"id": 1345, "title": "Every newsletter discusses end of AI pricing subsidy era", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/bkjupwjntra81skedab0.html#story-5", "source_name": "Every", "published_at": "2026-04-29 15:46:41", "summary": null, "content_snippet": "The AI industry's era of subsidized pricing is ending, with companies facing higher costs and users potentially seeing increased bills, marking a shift from venture capital-funded growth to sustainable economics.", "full_text": "The internet needs to evolve: Stripe was built for an internet where people browsed, filled out forms, and clicked checkout buttons. Now, humans act through AI interfaces, agents act for them, and software increasingly interacts directly with other software. Every layer of the stack has to adapt to these new behaviors."}]}, {"id": 359, "date": "2026-04-29", "category": "editorial", "headline": "Ghost launches first Postgres database designed for AI agents", "summary": "Ghost introduces an ephemeral Postgres database solution with native MCP support, allowing AI agents to manage database lifecycles, authenticate, and run queries without manual intervention, with usage-based pricing.", "created_at": "2026-04-29 17:25:53", "articles": [{"id": 1344, "title": "Ghost launches first Postgres database designed for AI agents", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/bkjupwjntra81skedab0.html#story-4", "source_name": "Every", "published_at": "2026-04-29 15:46:41", "summary": null, "content_snippet": "Ghost introduces an ephemeral Postgres database solution with native MCP support, allowing AI agents to manage database lifecycles, authenticate, and run queries without manual intervention, with usage-based pricing.", "full_text": null}]}, {"id": 360, "date": "2026-04-29", "category": "editorial", "headline": "Stripe observes agentic commerce focusing on low-stakes purchases", "summary": "AI agents are increasingly handling small, easily comparable purchases like Halloween costumes or school supplies, but users remain hesitant to let agents make higher-stakes decisions like booking trips or buying furniture.", "created_at": "2026-04-29 17:25:53", "articles": [{"id": 1343, "title": "Stripe observes agentic commerce focusing on low-stakes purchases", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/bkjupwjntra81skedab0.html#story-3", "source_name": "Every", "published_at": "2026-04-29 15:46:41", "summary": null, "content_snippet": "AI agents are increasingly handling small, easily comparable purchases like Halloween costumes or school supplies, but users remain hesitant to let agents make higher-stakes decisions like booking trips or buying furniture.", "full_text": null}]}, {"id": 361, "date": "2026-04-29", "category": "editorial", "headline": "Stripe notes AI growth is largely net new spending, not cannibalized budgets", "summary": "Top AI companies on Stripe are reaching $30M in annual recurring revenue 3x faster than SaaS companies from 2018, with growth driven by new spending rather than redirected software budgets.", "created_at": "2026-04-29 17:25:53", "articles": [{"id": 1342, "title": "Stripe notes AI growth is largely net new spending, not cannibalized budgets", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/bkjupwjntra81skedab0.html#story-2", "source_name": "Every", "published_at": "2026-04-29 15:46:41", "summary": null, "content_snippet": "Top AI companies on Stripe are reaching $30M in annual recurring revenue 3x faster than SaaS companies from 2018, with growth driven by new spending rather than redirected software budgets.", "full_text": null}]}, {"id": 362, "date": "2026-04-29", "category": "editorial", "headline": "Stripe highlights expanding definition of fraud in AI era", "summary": "Fraud now extends beyond payments to include stolen tokens, free trial credits, and unpaid compute bills, requiring AI companies to adapt their defenses as AI tools both enable and detect fraud more effectively.", "created_at": "2026-04-29 17:25:53", "articles": [{"id": 1341, "title": "Stripe highlights expanding definition of fraud in AI era", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/bkjupwjntra81skedab0.html#story-1", "source_name": "Every", "published_at": "2026-04-29 15:46:41", "summary": null, "content_snippet": "Fraud now extends beyond payments to include stolen tokens, free trial credits, and unpaid compute bills, requiring AI companies to adapt their defenses as AI tools both enable and detect fraud more effectively.", "full_text": null}]}, {"id": 363, "date": "2026-04-29", "category": "editorial", "headline": "Stripe's Emily Glassberg Sands discusses AI reshaping online commerce on AI & I podcast", "summary": "Stripe's head of data and AI, Emily Glassberg Sands, explains how AI is transforming online commerce, including the rise of agent-native interactions, evolving fraud challenges, and the economic role of agents in transactions.", "created_at": "2026-04-29 17:25:53", "articles": [{"id": 1340, "title": "Stripe's Emily Glassberg Sands discusses AI reshaping online commerce on AI & I podcast", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/bkjupwjntra81skedab0.html#story-0", "source_name": "Every", "published_at": "2026-04-29 15:46:41", "summary": null, "content_snippet": "Stripe's head of data and AI, Emily Glassberg Sands, explains how AI is transforming online commerce, including the rise of agent-native interactions, evolving fraud challenges, and the economic role of agents in transactions.", "full_text": "A new episode of AI & I is here. Dan Shipper sits down with Emily Glassberg Sands , head of data and AI at Stripe, to discuss how AI is reshaping online commerce. Dan and Emily discuss how compute is the new cash, fraud has moved beyond the checkout, and agents are starting to act as economic participants on the internet."}]}, {"id": 364, "date": "2026-04-29", "category": "editorial", "headline": "Every shares workflow for letting AI suggest automations based on tool usage", "summary": "Every recommends using AI tools like Codex to analyze connected tools (e.g., Notion, Slack, Gmail) and suggest automations, such as drafting replies or triaging inboxes, to save time and reduce friction.", "created_at": "2026-04-29 17:25:53", "articles": [{"id": 1390, "title": "Every shares workflow for letting AI suggest automations based on tool usage", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/1qo4s011h0aj6jrvad9z.html#story-9", "source_name": "Every", "published_at": "2026-04-28 17:25:42", "summary": null, "content_snippet": "Every recommends using AI tools like Codex to analyze connected tools (e.g., Notion, Slack, Gmail) and suggest automations, such as drafting replies or triaging inboxes, to save time and reduce friction.", "full_text": null}]}, {"id": 365, "date": "2026-04-29", "category": "editorial", "headline": "Every deprecates the pretense of human-written documents in agent-native workflows", "summary": "Every argues that the expectation for agent-written documents to mimic human writing is outdated, especially in environments where other agents are also reading and reviewing the content.", "created_at": "2026-04-29 17:25:53", "articles": [{"id": 1389, "title": "Every deprecates the pretense of human-written documents in agent-native workflows", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/1qo4s011h0aj6jrvad9z.html#story-8", "source_name": "Every", "published_at": "2026-04-28 17:25:42", "summary": null, "content_snippet": "Every argues that the expectation for agent-written documents to mimic human writing is outdated, especially in environments where other agents are also reading and reviewing the content.", "full_text": "Hello, and happy Tuesday! Two months ago, Every’s head of growth Austin Tedesco tried Codex and found it more frustrating than any other AI tool he’d used. Last Thursday, at our Codex Knowledge Work Camp , he and CEO Dan Shipper showed more than 250 paid subscribers how OpenAI’s Codex desktop app has since become Austin’s daily driver —handling everything from email triage and go-to-market planning to KPI tracking and recruiting. Read to the end for how to review business documents with Austin’s compound knowledge plugin .— Kate Lee"}]}, {"id": 366, "date": "2026-04-29", "category": "industry_business", "headline": "Anthropic hits $1T valuation, surpasses OpenAI in ARR", "summary": "Anthropic achieved a $1 trillion valuation and ~$30B in annual recurring revenue, overtaking OpenAI amid OpenAI's missed projections and legal challenges. The shift underscores Anthropic's enterprise dominance and OpenAI's strategic struggles.", "created_at": "2026-04-29 17:25:58", "articles": [{"id": 1350, "title": "Anthropic surpasses OpenAI in annual recurring revenue (ARR)", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/15ymclufy255qnthekq9.html#story-4", "source_name": "Unknown", "published_at": "2026-04-29 14:43:27", "summary": null, "content_snippet": "Anthropic has reportedly reached ~$30B in ARR, surpassing OpenAI's ~$24B, driven by enterprise adoption, while OpenAI focuses on a broader user base with higher infrastructure costs.", "full_text": "Anthropic has reportedly reached ~$30B ARR , ahead of OpenAI’s ~$24B, after scaling from ~$1B in about 15 months. The growth is driven by enterprise, not consumers, with 1,000+ companies spending over $1M annually on Claude. OpenAI, meanwhile, serves a massive user base but carries higher infrastructure and training costs."}, {"id": 1357, "title": "Anthropic achieves $1 trillion valuation surpassing OpenAI", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/tu2q6bffk8axu5jn631w.html#story-0", "source_name": "The Neuron", "published_at": "2026-04-29 11:06:45", "summary": null, "content_snippet": "Anthropic crossed a $1 trillion valuation, becoming the most valuable AI company, while OpenAI missed revenue projections and faced legal scrutiny, highlighting a shift in the AI industry landscape.", "full_text": null}, {"id": 1360, "title": "OpenAI featured in The Atlantic as 'Anthropic's Little Brother'", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/tu2q6bffk8axu5jn631w.html#story-3", "source_name": "The Neuron", "published_at": "2026-04-29 11:06:45", "summary": null, "content_snippet": "OpenAI was described in The Atlantic as 'Anthropic's Little Brother,' reflecting a narrative shift in the AI industry where Anthropic is seen as the dominant player.", "full_text": "The natural endgame? The one Apple and Microsoft already settled into. Sell the hardware . OpenAI is reportedly building a phone . Anthropic's creative-tool plays are workflow-deep but compute-light, the kind of thing that makes way more sense if Claude eventually lives on your Mac, not a data center. For this reason, we think Anthropic should eventually make computers too."}]}, {"id": 367, "date": "2026-04-29", "category": "products_tools", "headline": "Adobe launches Firefly AI Assistant for creative workflows", "summary": "Adobe introduced a Firefly AI Assistant that automates multi-step creative workflows across Photoshop, Premiere, and Illustrator, enhancing productivity for professional creators.", "created_at": "2026-04-29 17:25:58", "articles": [{"id": 1351, "title": "Adobe launches Firefly AI Assistant for multi-app creative workflows", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/15ymclufy255qnthekq9.html#story-5", "source_name": "Unknown", "published_at": "2026-04-29 14:43:27", "summary": null, "content_snippet": "Adobe introduced a new Firefly AI Assistant that automates multi-step creative workflows across Photoshop, Premiere, and Illustrator, enhancing productivity for professional creators.", "full_text": "Now live in the app, Adobe just turned Firefly into a true all-in-one creative AI studio with its new Firefly AI Assistant. It works like an agent. You describe the outcome, and it plans and executes multi-step workflows across apps like Photoshop, Premiere, Illustrator, and more, while you stay in control of the creative direction."}, {"id": 1362, "title": "Adobe ships Adobe for Creativity Claude connector for 50+ pro tools", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/tu2q6bffk8axu5jn631w.html#story-5", "source_name": "The Neuron", "published_at": "2026-04-29 11:06:45", "summary": null, "content_snippet": "Adobe launched a connector for Claude, providing live access to over 50 professional tools across Photoshop, Premiere, Firefly, and InDesign, enhancing AI-driven creative workflows.", "full_text": "Adobe simultaneously shipped its own Adobe for creativity Claude connector , giving Claude live access to 50+ pro tools across Photoshop, Premiere, Firefly, and InDesign. Anthropic also joined the Blender Development Fund as Corporate Patron. In one day, Anthropic became the AI you'd actually plug into the apps you already pay for."}]}, {"id": 368, "date": "2026-04-29", "category": "products_tools", "headline": "ElevenLabs launches 50 templates for voice AI virtual employees", "summary": "ElevenLabs unveiled 50 templates to deploy its voice AI as virtual employees, expanding practical applications for conversational AI in business settings.", "created_at": "2026-04-29 17:25:58", "articles": [{"id": 1352, "title": "ElevenLabs launches 50 templates to turn voice AI into virtual employees", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/15ymclufy255qnthekq9.html#story-6", "source_name": "Unknown", "published_at": "2026-04-29 14:43:27", "summary": null, "content_snippet": "ElevenLabs unveiled 50 templates to streamline the deployment of its voice AI as virtual employees, expanding practical applications for conversational AI in business settings.", "full_text": null}]}, {"id": 369, "date": "2026-04-29", "category": "sci_tech_trends", "headline": "Japan Airlines to test humanoid robots for baggage handling", "summary": "Japan Airlines will begin testing humanoid robots at Haneda Airport for baggage handling and aircraft cleaning, addressing labor shortages and rising travel demand.", "created_at": "2026-04-29 17:25:58", "articles": [{"id": 1348, "title": "RobotEra deploys thousands of humanoid robots in real warehouses", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/15ymclufy255qnthekq9.html#story-2", "source_name": "Unknown", "published_at": "2026-04-29 14:43:27", "summary": null, "content_snippet": "RobotEra is deploying humanoid robots in 10+ logistics hubs, achieving ~85% human efficiency in tasks like sorting and package movement, signaling growing adoption of humanoid robots in labor-intensive industries.", "full_text": "RobotEra is deploying humanoid robots in 10 logistics hubs , handling sorting and package movement in real operations. The company has raised $400M+ and is already running across 10+ facilities, with robots reaching ~85% of human efficiency while operating continuously. Japan Airlines is also testing humanoids for baggage handling and aircraft cleaning at Haneda Airport starting in May, pointing to growing adoption driven by labor shortages and rising travel demand."}, {"id": 1349, "title": "Japan Airlines to test humanoid robots for baggage handling and aircraft cleaning", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/15ymclufy255qnthekq9.html#story-3", "source_name": "Unknown", "published_at": "2026-04-29 14:43:27", "summary": null, "content_snippet": "Japan Airlines will begin testing humanoid robots at Haneda Airport in May for baggage handling and aircraft cleaning, highlighting the aviation industry's response to labor shortages and rising travel demand.", "full_text": null}]}, {"id": 370, "date": "2026-04-29", "category": "industry_business", "headline": "Elon Musk sues OpenAI over nonprofit-to-profit shift", "summary": "Elon Musk filed a lawsuit against OpenAI, accusing it of abandoning its nonprofit mission for private gain, which could set a precedent for AI governance.", "created_at": "2026-04-29 17:25:58", "articles": [{"id": 1346, "title": "Elon Musk sues OpenAI over shift from nonprofit to for-profit model", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/15ymclufy255qnthekq9.html#story-0", "source_name": "Unknown", "published_at": "2026-04-29 14:43:27", "summary": null, "content_snippet": "Elon Musk filed a lawsuit against OpenAI, accusing it of abandoning its original nonprofit mission for private gain, which could set a precedent for how AI labs balance public missions with investor interests.", "full_text": "Elon Musk says he’s suing OpenAI over its shift from nonprofit to for-profit , arguing it turned a public mission into private gain. He claims his early funding and reputation helped build the company, only for it to abandon its original principles. Musk warned this could set a precedent for “looting every charity in America,” while OpenAI argues the lawsuit is just an attempt to weaken a competitor."}, {"id": 1358, "title": "OpenAI misses revenue projections and faces legal challenges", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/tu2q6bffk8axu5jn631w.html#story-1", "source_name": "The Neuron", "published_at": "2026-04-29 11:06:45", "summary": null, "content_snippet": "OpenAI missed its own revenue projections, saw Oracle and chip stocks fall, and was sued by Elon Musk's lawyer over allegations of 'stealing a charity,' marking a turbulent day for the company.", "full_text": null}]}, {"id": 371, "date": "2026-04-29", "category": "industry_business", "headline": "OpenAI reportedly developing its own smartphone", "summary": "OpenAI is rumored to be building a smartphone to support its AI agent ecosystem and reduce reliance on cloud compute, signaling a hardware push.", "created_at": "2026-04-29 17:25:58", "articles": [{"id": 1359, "title": "OpenAI pivots to AWS Bedrock after dropping Microsoft exclusivity", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/tu2q6bffk8axu5jn631w.html#story-2", "source_name": "The Neuron", "published_at": "2026-04-29 11:06:45", "summary": null, "content_snippet": "OpenAI shifted its partnership to AWS Bedrock just one day after ending its exclusivity deal with Microsoft, signaling a strategic realignment in its cloud and AI infrastructure.", "full_text": null}, {"id": 1367, "title": "OpenAI reportedly developing its own smartphone", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/tu2q6bffk8axu5jn631w.html#story-10", "source_name": "The Neuron", "published_at": "2026-04-29 11:06:45", "summary": null, "content_snippet": "OpenAI is rumored to be building a smartphone, suggesting a strategic move into hardware to support its AI agent ecosystem and reduce reliance on cloud compute.", "full_text": null}]}, {"id": 372, "date": "2026-04-29", "category": "research", "headline": "AI model Talkie trained on 1930s-era data still writes Python code", "summary": "Researchers trained Talkie, a 13B parameter model, exclusively on pre-1931 data, demonstrating how older linguistic patterns can produce functional modern outputs like Python code.", "created_at": "2026-04-29 17:25:58", "articles": [{"id": 1347, "title": "Researchers train AI model Talkie using only 1930s-era data", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/15ymclufy255qnthekq9.html#story-1", "source_name": "Unknown", "published_at": "2026-04-29 14:43:27", "summary": null, "content_snippet": "A 13B parameter AI model, Talkie, was trained exclusively on pre-1931 data, demonstrating how older linguistic patterns can still produce functional modern outputs like Python code, though with reliability limitations.", "full_text": "Researchers trained a 13B model, Talkie , only on data from before 1931, using books, newspapers, and public domain records. To make it conversational, they used old etiquette guides and cookbooks. Despite never seeing modern code, it can still write working Python by adapting patterns."}]}, {"id": 373, "date": "2026-04-29", "category": "industry_business", "headline": "AI infrastructure costs now exceed employee costs at most companies", "summary": "An Nvidia executive stated that AI compute costs have surpassed employee costs at most companies, highlighting the financial strain of AI infrastructure.", "created_at": "2026-04-29 17:25:58", "articles": [{"id": 1366, "title": "AI infrastructure costs surpass employee costs at most companies", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/tu2q6bffk8axu5jn631w.html#story-9", "source_name": "The Neuron", "published_at": "2026-04-29 11:06:45", "summary": null, "content_snippet": "An Nvidia executive stated that the cost of AI compute has now exceeded the cost of employees at most companies, highlighting the financial strain of AI infrastructure.", "full_text": "Our take: This is why I now believe OpenAI & Anthropic will have to become Microsoft and Apple. Cloud tokens are an insanely expensive business right now. An Nvidia exec said yesterday the cost of AI compute has now passed the cost of employees at most companies. Neither lab can subsidize that forever."}]}, {"id": 374, "date": "2026-04-29", "category": "industry_business", "headline": "Taylor Swift files to protect voice and likeness from AI misuse", "summary": "Taylor Swift has filed legal documents to protect her voice and likeness from unauthorized AI-generated content, highlighting growing concerns over intellectual property rights.", "created_at": "2026-04-29 17:25:58", "articles": [{"id": 1356, "title": "Taylor Swift files to protect voice and likeness from unauthorized AI use", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/15ymclufy255qnthekq9.html#story-10", "source_name": "Unknown", "published_at": "2026-04-29 14:43:27", "summary": null, "content_snippet": "Taylor Swift has filed legal documents to protect her voice and likeness from unauthorized AI-generated content, highlighting growing concerns over intellectual property rights in the age of generative AI.", "full_text": null}]}, {"id": 375, "date": "2026-04-29", "category": "products_tools", "headline": "Anthropic launches Claude for Creative Work with app connectors", "summary": "Anthropic introduced Claude for Creative Work, integrating natively with tools like Blender, Adobe Creative Cloud, and Canva to enable advanced workflow automation.", "created_at": "2026-04-29 17:25:58", "articles": [{"id": 1361, "title": "Anthropic launches Claude for Creative Work with native app connectors", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/tu2q6bffk8axu5jn631w.html#story-4", "source_name": "The Neuron", "published_at": "2026-04-29 11:06:45", "summary": null, "content_snippet": "Anthropic introduced Claude for Creative Work, integrating natively with tools like Blender, Adobe Creative Cloud, Autodesk Fusion, and Canva, enabling advanced workflow automation for creative tasks.", "full_text": "While OpenAI was getting sued, Anthropic launched Claude for Creative Work with native connectors for Blender, Adobe Creative Cloud, Autodesk Fusion, Ableton, Splice, SketchUp, Resolume, and Canva. Claude can now debug a 3D scene, batch-edit Photoshop assets, or pull stems out of Splice for you."}]}, {"id": 315, "date": "2026-04-28", "category": "editorial", "headline": "McDonald's CEO burger grill cost comparison highlights AI model inefficiency", "summary": "The newsletter uses McDonald's hypothetical scenario of CEO manning the grill ($9,230.77/hour) to illustrate the inefficiency of using high-cost AI models (e.g., $1,095/month for Claude Opus) for simple tasks.", "created_at": "2026-04-28 08:25:33", "articles": [{"id": 1226, "title": "McDonald's CEO burger grill cost comparison highlights AI model inefficiency", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/ilbzxzbr163gc3h8pudr.html#story-1", "source_name": "Every", "published_at": "2026-04-27 14:55:17", "summary": null, "content_snippet": "The newsletter uses McDonald's hypothetical scenario of CEO manning the grill ($9,230.77/hour) to illustrate the inefficiency of using high-cost AI models (e.g., $1,095/month for Claude Opus) for simple tasks.", "full_text": "There is a reason McDonald’s would never ask its CEO to man the burger grill: It would cost the company $9,230.77 an hour . It’s the same as using frontier AI models to do every task—you don’t need to pay 75 cents every half hour ($1,095 per month!) for Claude Opus to check your to-do list in OpenClaw ."}]}, {"id": 316, "date": "2026-04-28", "category": "editorial", "headline": "Anthropic releases plugins and skill-creator skill for Claude", "summary": "Anthropic has introduced plugins (collections of skills) for various industries and a 'skill-creator' skill that guides users in creating custom skills for tasks, enabling more efficient AI workflows.", "created_at": "2026-04-28 08:25:33", "articles": [{"id": 1225, "title": "Anthropic releases plugins and skill-creator skill for Claude", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/ilbzxzbr163gc3h8pudr.html#story-0", "source_name": "Every", "published_at": "2026-04-27 14:55:17", "summary": null, "content_snippet": "Anthropic has introduced plugins (collections of skills) for various industries and a 'skill-creator' skill that guides users in creating custom skills for tasks, enabling more efficient AI workflows.", "full_text": "Once you’re done with the normal back and forth of giving the AI the necessary data and context for the presentation, ask it, “What information would have been useful to know at the start of this task that would have eliminated several steps or mistakes?” Claude knows what it is capable of, so you can ask it to turn its response into a PowerPoint deck creation skill to use next time. Anthropic has been releasing plugins (collections of skills) for various industries to serve as a starting point. They even provide a “skill-creator” skill that teaches Claude how to guide you through making one when you ask."}]}, {"id": 317, "date": "2026-04-28", "category": "products_tools", "headline": "hiveWiki launches Collaborative Agent Wiki for MCP-based coordination", "summary": "hiveWiki introduces a wiki-based collaboration layer enabling independent agents, Claude Chat, and humans to share a unified 'wiki artifact' for transparent coordination and agent memory via MCP. This addresses brittleness in multi-agent workflows with a practical, local-first approach.", "created_at": "2026-04-28 08:25:40", "articles": [{"id": 1217, "title": "hiveWiki.ai launches Collaborative Agent Wiki for transparent coordination via MCP", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/6p57gdki91oz9n4d69ag.html#story-5", "source_name": "Unknown", "published_at": "2026-04-27 19:15:19", "summary": null, "content_snippet": "This wiki-based collaboration layer lets independent agents, Claude Chat, and a human share the same usable ‘wiki artifact’ for agent memory and human-in-the-loop clarity without brittleness.", "full_text": null}, {"id": 1219, "title": "hiveWiki: Collaborative Agent Wiki by Jason Gardner presents wiki-based collaboration for agents", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/6p57gdki91oz9n4d69ag.html#story-7", "source_name": "Unknown", "published_at": "2026-04-27 19:15:19", "summary": null, "content_snippet": "Agents could draft, critique, and deploy a feature while keeping the context consistent and reviewable, offering a practical path to agent memory and human-in-the-loop clarity.", "full_text": null}, {"id": 1223, "title": "hiveWiki: Collaborative Agent Wiki by Jason Gardner presents wiki-based collaboration layer for agents", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/6p57gdki91oz9n4d69ag.html#story-11", "source_name": "Unknown", "published_at": "2026-04-27 19:15:19", "summary": null, "content_snippet": "Independent agents, Claude Chat, and a human share the same usable ‘wiki artifact’ for transparent coordination via MCP, offering a practical path to agent memory and human-in-the-loop clarity without brittleness.", "full_text": null}]}, {"id": 318, "date": "2026-04-28", "category": "products_tools", "headline": "GitKB launches Distributed Knowledge Graph Protocol for agents", "summary": "GitKB introduces a git-like distributed knowledge base protocol allowing agents to work on documents without losing context or collaboration speed. Designed for local-first workflows, it boosts agent coding velocity with a simple three-command setup.", "created_at": "2026-04-28 08:25:40", "articles": [{"id": 1214, "title": "GitKB launches Distributed Knowledge Graph Protocol for collaborative coding", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/6p57gdki91oz9n4d69ag.html#story-2", "source_name": "Unknown", "published_at": "2026-04-27 19:15:19", "summary": null, "content_snippet": "GitKB lets agents ‘work on a few documents at a time’ without losing context or collaboration speed, boosting agent coding velocity with a fast, three-command setup.", "full_text": null}, {"id": 1220, "title": "GitKB: Distributed Knowledge Graph Protocol by Matt Walters presents git-like distributed knowledge base for agents", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/6p57gdki91oz9n4d69ag.html#story-8", "source_name": "Unknown", "published_at": "2026-04-27 19:15:19", "summary": null, "content_snippet": "GitKB works local-first and 100% free, designed to let agents ‘work on a few documents at a time’ without losing context or collaboration speed, fitting the current shift toward efficient agent workflows.", "full_text": null}]}, {"id": 319, "date": "2026-04-28", "category": "products_tools", "headline": "Harness Engineering unveils Deterministic Agent Pipelines", "summary": "Harness Engineering's new TypeScript harness turns chaotic prompt-driven workflows into reliable engineering pipelines. It simulates PM/architect steps upfront, enforces empirical validation via Playwright, and optimizes agentic systems for consistent throughput.", "created_at": "2026-04-28 08:25:40", "articles": [{"id": 1215, "title": "Harness Engineering presents Deterministic Agent Pipelines to stop waiting on AI", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/6p57gdki91oz9n4d69ag.html#story-3", "source_name": "Unknown", "published_at": "2026-04-27 19:15:19", "summary": null, "content_snippet": "This deterministic TypeScript harness turns messy prompt-driven workflows into reliable engineering throughput, optimizing agentic systems while you sleep.", "full_text": null}, {"id": 1221, "title": "Harness Engineering: Deterministic Agent Pipelines by Kerry Ritter presents deterministic TypeScript harness for multi-agent development", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/6p57gdki91oz9n4d69ag.html#story-9", "source_name": "Unknown", "published_at": "2026-04-27 19:15:19", "summary": null, "content_snippet": "The harness simulates PM and architect steps up front, forces empirical validation via Playwright-driven browser automation, and turns a messy prompt-driven workflow into reliable engineering throughput.", "full_text": null}]}, {"id": 320, "date": "2026-04-28", "category": "products_tools", "headline": "MCP gains Adaptive Tool Orchestration for controllable agent workflows", "summary": "MCP's new Adaptive Tool Orchestration demo enhances system continuity by dynamically orchestrating tools for agent workflows. This fits the trend toward controllable, long-horizon agent systems with practical, adaptive approaches.", "created_at": "2026-04-28 08:25:40", "articles": [{"id": 1218, "title": "MCP: Adaptive Tool Orchestration by Thang Chung enhances system continuity", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/6p57gdki91oz9n4d69ag.html#story-6", "source_name": "Unknown", "published_at": "2026-04-27 19:15:19", "summary": null, "content_snippet": "This demo showed how systems could enhance continuity with adaptive tool orchestration, fitting the current trend toward controllable agent workflows.", "full_text": null}, {"id": 1224, "title": "MCP: Adaptive Tool Orchestration by Thang Chung presents adaptive tool orchestration for agent systems", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/6p57gdki91oz9n4d69ag.html#story-12", "source_name": "Unknown", "published_at": "2026-04-27 19:15:19", "summary": null, "content_snippet": "This demo showed how systems could enhance continuity with adaptive tool orchestration, fitting the current trend toward controllable agent workflows with a practical approach.", "full_text": null}]}, {"id": 321, "date": "2026-04-28", "category": "products_tools", "headline": "Wisdom Layer introduces Agent Cognitive Architecture with persistent memory", "summary": "Wisdom Layer's new architecture adds persistent memory and reflection to agents, enabling cheap models to achieve frontier-like behavior. Builders can reuse scaffolding immediately for more reliable agent systems.", "created_at": "2026-04-28 08:25:40", "articles": [{"id": 1213, "title": "Wisdom Layer’s Agent Cognitive Architecture introduces persistent memory and reflection for agents", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/6p57gdki91oz9n4d69ag.html#story-1", "source_name": "Unknown", "published_at": "2026-04-27 19:15:19", "summary": null, "content_snippet": "Builders can reuse the same scaffolding immediately, and cheap models could hit frontier-like behavior with a reusable ‘agent reliability layer’.", "full_text": "This week, builders are diving deep into agent orchestration, developer tooling, and system memory. We saw Kerry Ritter’s Harness Engineering tackle deterministic agent pipelines, while Jeff Rhatigan’s Wisdom Layer introduced an architecture for persistent memory and reflection."}]}, {"id": 322, "date": "2026-04-28", "category": "products_tools", "headline": "Karpathy's CLAUDE.md config tops GitHub with 82K stars", "summary": "Andrej Karpathy's CLAUDE.md—a single configuration file enforcing structured, goal-driven AI coding—became a GitHub sensation with 82K stars. It offers actionable guidelines to improve AI coding accuracy and efficiency.", "created_at": "2026-04-28 08:25:40", "articles": [{"id": 1166, "title": "Karpathy's Claude coding rules hit 82K GitHub stars with one config file", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/flze0zxy4xeu9pl7u831.html#story-7", "source_name": "AlphaSignal", "published_at": "2026-04-27 13:34:54", "summary": null, "content_snippet": "Andrej Karpathy's CLAUDE.md file, a single configuration rule set for AI coding assistants, became a top GitHub trend with 82K stars, offering structured guidelines to improve AI coding accuracy and efficiency.", "full_text": null}, {"id": 1239, "title": "Karpathy's Claude coding rules hit 82K GitHub stars with one config file", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/flze0zxy4xeu9pl7u831.html#story-8", "source_name": "AlphaSignal", "published_at": "2026-04-27 13:34:54", "summary": null, "content_snippet": "A single CLAUDE.md configuration file, based on Andrej Karpathy's coding principles, gained 82K GitHub stars by enforcing structured, goal-driven AI coding practices.", "full_text": "A single CLAUDE.md file just hit #1 on GitHub trending with 91k stars . It's based on Andrej Karpathy's observations about where AI coding tools go wrong. You drop it into your project, and Claude Code reads it as instructions before touching anything."}]}, {"id": 323, "date": "2026-04-28", "category": "industry_business", "headline": "OpenAI apologizes for failing to alert authorities about shooter's ChatGPT use", "summary": "OpenAI publicly apologized to Tumbler Ridge, BC, for not alerting law enforcement about a shooter's flagged ChatGPT interactions. This highlights gaps in external accountability despite new safety principles.", "created_at": "2026-04-28 08:25:40", "articles": [{"id": 1170, "title": "OpenAI apologizes for failing to alert authorities about Tumbler Ridge shooter's ChatGPT interactions", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/qzj75u4u8s0vxi94rjuo.html#story-3", "source_name": "The Neuron", "published_at": "2026-04-27 11:32:20", "summary": null, "content_snippet": "OpenAI issued an apology to Tumbler Ridge, BC, for not alerting law enforcement about a shooter's flagged ChatGPT conversations, highlighting gaps in external accountability despite new principles.", "full_text": "The day before the principles post, Altman issued a formal apology to the community of Tumbler Ridge, BC. In February, a gunman carried out a mass shooting there. Months before the attack, the shooter's conversations with ChatGPT had been flagged internally at OpenAI, and the account was banned."}]}, {"id": 324, "date": "2026-04-28", "category": "industry_business", "headline": "New Yorker exposes OpenAI's internal safety failures and leadership missteps", "summary": "A New Yorker investigation revealed OpenAI's internal safety protocols were misrepresented, its superalignment team dissolved, and existential safety efforts under-resourced. This contradicts prior public claims.", "created_at": "2026-04-28 08:25:40", "articles": [{"id": 1169, "title": "New Yorker investigation reveals OpenAI's internal safety failures and leadership missteps", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/qzj75u4u8s0vxi94rjuo.html#story-2", "source_name": "The Neuron", "published_at": "2026-04-27 11:32:20", "summary": null, "content_snippet": "An investigation by The New Yorker found OpenAI's internal safety protocols were misrepresented, its superalignment team was dissolved, and existential safety efforts were under-resourced, contradicting stated principles.", "full_text": null}]}, {"id": 325, "date": "2026-04-28", "category": "industry_business", "headline": "OpenAI updates Preparedness Framework for AI risk management", "summary": "OpenAI released an updated Preparedness Framework detailing processes for tracking risks like biological threats, cybersecurity, and AI self-improvement. It aligns with the Resilience principle but raises questions about enforcement.", "created_at": "2026-04-28 08:25:40", "articles": [{"id": 1168, "title": "OpenAI updates Preparedness Framework for AI risk management", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/qzj75u4u8s0vxi94rjuo.html#story-1", "source_name": "The Neuron", "published_at": "2026-04-27 11:32:20", "summary": null, "content_snippet": "OpenAI released an updated Preparedness Framework detailing processes for tracking risks like biological threats, cybersecurity, and AI self-improvement, aligning with its Resilience principle but raising questions about internal culture.", "full_text": null}]}, {"id": 326, "date": "2026-04-28", "category": "industry_business", "headline": "OpenAI publishes five guiding principles on democratization and accountability", "summary": "Sam Altman published OpenAI's five guiding principles—Democratization, Empowerment, Universal Prosperity, Resilience, and Adaptability—emphasizing broad AI distribution and democratic decision-making.", "created_at": "2026-04-28 08:25:40", "articles": [{"id": 1167, "title": "OpenAI publishes guiding principles on democratization and accountability", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/qzj75u4u8s0vxi94rjuo.html#story-0", "source_name": "The Neuron", "published_at": "2026-04-27 11:32:20", "summary": null, "content_snippet": "Sam Altman published OpenAI's five guiding principles—Democratization, Empowerment, Universal Prosperity, Resilience, and Adaptability—emphasizing broad AI distribution, democratic decision-making, and public accountability, setting a standard for future evaluations.", "full_text": null}]}, {"id": 327, "date": "2026-04-28", "category": "industry_business", "headline": "Anguilla profits from .ai domain boom amid AI startup surge", "summary": "The Caribbean island of Anguilla, which controls the .ai domain, saw registrations surge from 60,000 to over 1 million due to the AI startup boom. Domain revenue now reportedly makes up nearly half of its budget.", "created_at": "2026-04-28 08:25:40", "articles": [{"id": 1157, "title": "Anguilla earns millions from .ai domain boom", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/l0iwuaabvhxppwz7pefe.html#story-2", "source_name": "Unknown", "published_at": "2026-04-27 14:39:01", "summary": null, "content_snippet": "The Caribbean island of Anguilla, which controls the .ai domain, has seen registrations surge from 60,000 to over 1 million due to the AI startup boom. Domain revenue now reportedly makes up nearly half of the island’s national budget, funding tax cuts, healthcare, and infrastructure.", "full_text": "Every time a startup buys a .ai domain , part of that money goes to Anguilla, the small Caribbean island that controls the extension. It was assigned .ai in the 1990s as part of the global domain system, years before artificial intelligence became a major industry. After ChatGPT triggered a startup wave, founders began using .ai as a badge of modern tech, pushing registrations from around 60,000 to more than 1 million. The boom has become so large that domain revenue now reportedly makes up nearly half of Anguilla’s national budget, helping pay for tax cuts, healthcare, and a new airport."}]}, {"id": 328, "date": "2026-04-28", "category": "sci_tech_trends", "headline": "SemiAnalysis outlines three-part AI leverage rule for organizations", "summary": "Dylan Patel of SemiAnalysis emphasizes three rules for AI leverage: use more tokens, generate outsized value, and capture that value before organizational restructuring occurs. This provides a tactical framework for AI adoption.", "created_at": "2026-04-28 08:25:40", "articles": [{"id": 1108, "title": "SemiAnalysis' Dylan Patel outlines three-part AI leverage rule", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/y67yurrwg39wnw2qjn58.html#story-9", "source_name": "The Neuron", "published_at": "2026-04-26 18:34:04", "summary": null, "content_snippet": "Dylan Patel of SemiAnalysis emphasizes three rules for AI leverage: use more tokens, generate outsized value, and capture that value before organizational restructuring occurs.", "full_text": "On Patrick O'Shaughnessy's podcast this week, SemiAnalysis' Dylan Patel told a story about \"Jeremy,\" an energy analyst on his team who spent $6,000 a day on Claude tokens for three weeks. Jeremy singlehandedly rebuilt a product that a 100-person data-services team at an incumbent had been working on for a decade."}]}, {"id": 329, "date": "2026-04-28", "category": "editorial", "headline": "Every’s workflow suggests letting AI agents identify automation opportunities in daily tasks", "summary": "Every recommends using AI agents to analyze tool usage and suggest automations, such as drafting replies to unanswered messages or creating morning briefings based on calendars. This approach helps users discover practical use cases for AI.", "created_at": "2026-04-28 17:45:06", "articles": [{"id": 1263, "title": "Every’s workflow suggests letting AI agents identify automation opportunities in daily tasks", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/1qo4s011h0aj6jrvad9z.html#story-7", "source_name": "Every", "published_at": "2026-04-28 17:25:42", "summary": null, "content_snippet": "Every recommends using AI agents to analyze tool usage and suggest automations, such as drafting replies to unanswered messages or creating morning briefings based on calendars. This approach helps users discover practical use cases for AI.", "full_text": null}]}, {"id": 330, "date": "2026-04-28", "category": "editorial", "headline": "Every deprecates the pretense that agent-written documents must sound human", "summary": "Every argues that the requirement for agent-written documents to mimic human writing is outdated, especially in contexts where other agents are the primary readers. Provenance matters less if the document has been reviewed and endorsed.", "created_at": "2026-04-28 17:45:06", "articles": [{"id": 1262, "title": "Every deprecates the pretense that agent-written documents must sound human", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/1qo4s011h0aj6jrvad9z.html#story-6", "source_name": "Every", "published_at": "2026-04-28 17:25:42", "summary": null, "content_snippet": "Every argues that the requirement for agent-written documents to mimic human writing is outdated, especially in contexts where other agents are the primary readers. Provenance matters less if the document has been reviewed and endorsed.", "full_text": null}]}, {"id": 331, "date": "2026-04-28", "category": "editorial", "headline": "Every’s Proof document editor introduces agentic loops for real-time AI-human collaboration", "summary": "Proof, Every’s document editor, now supports agentic loops where AI continuously monitors documents, suggests edits, and comments without interrupting the user’s workflow, creating a dynamic writing experience.", "created_at": "2026-04-28 17:45:06", "articles": [{"id": 1261, "title": "Every’s Proof document editor introduces agentic loops for real-time AI-human collaboration", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/1qo4s011h0aj6jrvad9z.html#story-5", "source_name": "Every", "published_at": "2026-04-28 17:25:42", "summary": null, "content_snippet": "Proof, Every’s document editor, now supports agentic loops where AI continuously monitors documents, suggests edits, and comments without interrupting the user’s workflow, creating a dynamic writing experience.", "full_text": "Next: Documents that write back. The latest internal version of Proof , our document editor for AI-human collaboration, supports agentic loops: The agent continuously monitors the document for changes and comments and suggests edits without you needing to interrupt your writing flow. The document seems to come alive , growing around your words in real time."}]}, {"id": 332, "date": "2026-04-28", "category": "editorial", "headline": "Every’s guides on compound engineering and agent-native architectures highlight hybrid documents for humans and AI", "summary": "Every’s guides emphasize the need for documents that serve both human readers and AI agents, marking a shift from traditional polished prose or structured data to hybrid formats that accommodate both.", "created_at": "2026-04-28 17:45:06", "articles": [{"id": 1260, "title": "Every’s guides on compound engineering and agent-native architectures highlight hybrid documents for humans and AI", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/1qo4s011h0aj6jrvad9z.html#story-4", "source_name": "Every", "published_at": "2026-04-28 17:25:42", "summary": null, "content_snippet": "Every’s guides emphasize the need for documents that serve both human readers and AI agents, marking a shift from traditional polished prose or structured data to hybrid formats that accommodate both.", "full_text": null}]}, {"id": 333, "date": "2026-04-28", "category": "editorial", "headline": "Every introduces compound knowledge plugin for reviewing business documents with AI", "summary": "Every’s compound knowledge plugin enables users to review business documents with AI assistance, leveraging Austin Tedesco’s workflow to enhance document analysis and understanding.", "created_at": "2026-04-28 17:45:06", "articles": [{"id": 1259, "title": "Every introduces compound knowledge plugin for reviewing business documents with AI", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/1qo4s011h0aj6jrvad9z.html#story-3", "source_name": "Every", "published_at": "2026-04-28 17:25:42", "summary": null, "content_snippet": "Every’s compound knowledge plugin enables users to review business documents with AI assistance, leveraging Austin Tedesco’s workflow to enhance document analysis and understanding.", "full_text": null}]}, {"id": 334, "date": "2026-04-28", "category": "editorial", "headline": "Monologue launches to help users write at the speed of thought with AI-powered dictation", "summary": "Monologue allows users to speak naturally and generate perfect text three times faster while preserving tone, vocabulary, and style. It auto-learns proper nouns and handles multilingual code-switching, offering 1,000 free words to start.", "created_at": "2026-04-28 17:45:06", "articles": [{"id": 1258, "title": "Monologue launches to help users write at the speed of thought with AI-powered dictation", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/1qo4s011h0aj6jrvad9z.html#story-2", "source_name": "Every", "published_at": "2026-04-28 17:25:42", "summary": null, "content_snippet": "Monologue allows users to speak naturally and generate perfect text three times faster while preserving tone, vocabulary, and style. It auto-learns proper nouns and handles multilingual code-switching, offering 1,000 free words to start.", "full_text": null}]}, {"id": 335, "date": "2026-04-28", "category": "editorial", "headline": "Coding apps like Codex and Claude Code emerging as new operating systems for knowledge work", "summary": "OpenAI, Anthropic, and Cursor are converging on a unified standard for knowledge work, combining agentic terminals, project sidebars, and integrations with tools like Gmail, Slack, Notion, and Stripe. This trend may redefine office software over the next decade.", "created_at": "2026-04-28 17:45:06", "articles": [{"id": 1257, "title": "Coding apps like Codex and Claude Code emerging as new operating systems for knowledge work", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/1qo4s011h0aj6jrvad9z.html#story-1", "source_name": "Every", "published_at": "2026-04-28 17:25:42", "summary": null, "content_snippet": "OpenAI, Anthropic, and Cursor are converging on a unified standard for knowledge work, combining agentic terminals, project sidebars, and integrations with tools like Gmail, Slack, Notion, and Stripe. This trend may redefine office software over the next decade.", "full_text": "What it means: Switching between ChatGPT and Claude based on the models’ personality differences might become a less-common occurrence. Instead, your desktop AI app has your API keys, your project files, and your daily workflows. Businesses, especially, with custom skills and plugins and months of company data in Codex won’t casually swap to Claude Code or Cowork next quarter—and vice versa."}]}, {"id": 336, "date": "2026-04-28", "category": "editorial", "headline": "OpenAI’s Codex desktop app becomes daily driver for non-engineer knowledge work", "summary": "OpenAI’s Codex desktop app, initially designed for engineers, has become a daily driver for non-engineer knowledge work, handling tasks like email triage, go-to-market planning, KPI tracking, and recruiting. This shift highlights the app's evolution into a unified tool for knowledge workers.", "created_at": "2026-04-28 17:45:06", "articles": [{"id": 1256, "title": "OpenAI’s Codex desktop app becomes daily driver for non-engineer knowledge work", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/1qo4s011h0aj6jrvad9z.html#story-0", "source_name": "Every", "published_at": "2026-04-28 17:25:42", "summary": null, "content_snippet": "OpenAI’s Codex desktop app, initially designed for engineers, has become a daily driver for non-engineer knowledge work, handling tasks like email triage, go-to-market planning, KPI tracking, and recruiting. This shift highlights the app's evolution into a unified tool for knowledge workers.", "full_text": "Hello, and happy Tuesday! Two months ago, Every’s head of growth Austin Tedesco tried Codex and found it more frustrating than any other AI tool he’d used. Last Thursday, at our Codex Knowledge Work Camp , he and CEO Dan Shipper showed more than 250 paid subscribers how OpenAI’s Codex desktop app has since become Austin’s daily driver —handling everything from email triage and go-to-market planning to KPI tracking and recruiting. Read to the end for how to review business documents with Austin’s compound knowledge plugin .— Kate Lee"}]}, {"id": 337, "date": "2026-04-28", "category": "industry_business", "headline": "OpenAI ends Microsoft exclusivity, partners with AWS for $38B", "summary": "OpenAI restructured its Microsoft partnership, ending Azure exclusivity and signing a $38B AWS deal. The agreement removes AGI definitions and reduces Microsoft's revenue share, signaling a strategic shift toward owning its cloud and device stack.", "created_at": "2026-04-28 17:45:11", "articles": [{"id": 1265, "title": "OpenAI restructures Microsoft partnership, ending Azure exclusivity over its models", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/skda29h4ahnt9ma9umks.html#story-1", "source_name": "Unknown", "published_at": "2026-04-28 14:44:57", "summary": null, "content_snippet": "OpenAI and Microsoft have restructured their partnership, ending Azure's exclusivity over OpenAI's models. Microsoft retains early access and primary cloud partnership but OpenAI can now distribute across other providers like Google and Amazon.", "full_text": "OpenAI and Microsoft have restructured their partnership, ending Azure’s exclusivity over OpenAI models. Microsoft remains the primary cloud partner with early access, but OpenAI can now distribute across other providers, including Google and Amazon. Microsoft’s licensing rights extend through 2032, though no longer on an exclusive basis. The financial terms are shifting too. OpenAI will continue revenue-sharing payments until 2030, but Microsoft is no longer sharing revenue back."}, {"id": 1269, "title": "OpenAI cuts out Microsoft and Apple/Google in cloud and device partnerships", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/0vamxnduk6omsg7d8p5e.html#story-1", "source_name": "The Neuron", "published_at": "2026-04-28 11:07:39", "summary": null, "content_snippet": "OpenAI announced amendments to its partnership with Microsoft, making their collaboration non-exclusive and signing a $38B AWS deal, sign
