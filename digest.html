Code from its $20 Claude Pro plan, leading to user outcry and public criticism from OpenAI executives. The move sparked a debate between Every's team members about product pricing, model performance, and infrastructure efficiency.", "full_text": null}]}, {"id": 244, "date": "2026-04-24", "category": "editorial", "headline": "OpenAI releases GPT-5.5 with improved speed, collaboration, and engineering capabilities", "summary": "OpenAI launched GPT-5.5, a faster, more personable, and assertive model designed for constant use, collaboration, and serious engineering tasks. The model's performance and pricing are detailed in Every's review, benchmark results, and a livestream Q&A with OpenAI executives.", "created_at": "2026-04-24 16:52:52", "articles": [{"id": 838, "title": "OpenAI releases GPT-5.5 with improved speed, collaboration, and engineering capabilities", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/ac2synpnwl24tvra1tvo.html#story-0", "source_name": "Every", "published_at": "2026-04-24 15:03:10", "summary": null, "content_snippet": "OpenAI launched GPT-5.5, a faster, more personable, and assertive model designed for constant use, collaboration, and serious engineering tasks. The model's performance and pricing are detailed in Every's review, benchmark results, and a livestream Q&A with OpenAI executives.", "full_text": "GPT 5.5 is here, and OpenAI’s latest model has it all. It’s fast enough to use constantly, personable enough to collaborate with, and assertive enough to carry a plan through serious engineering work. If you didn’t catch our full review, including benchmark results, Reach Test ratings, pricing, screenshots, and advice on when to reach for GPT-5.5 versus Opus 4.7 , read our Vibe Check or rewatch the livestream , where we grilled OpenAI’s Dominik Kundel and Romain Huet on how they’re using the model."}]}, {"id": 245, "date": "2026-04-24", "category": "editorial", "headline": "Every's Codex for Knowledge Work camp scheduled for April 24", "summary": "Every is hosting a camp on April 24 at 12 p.m. ET to demonstrate how to use Codex for knowledge work, including drafting, researching, and automating tasks. The event is exclusive to paid subscribers and offers a bonus of free Pro Lite access for 250 attendees.", "created_at": "2026-04-24 16:52:52", "articles": [{"id": 861, "title": "Every's Codex for Knowledge Work camp scheduled for April 24", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/8irul5jawq11yn3lrkh5.html#story-0", "source_name": "Every", "published_at": "2026-04-23 19:37:02", "summary": null, "content_snippet": "Every is hosting a camp on April 24 at 12 p.m. ET to demonstrate how to use Codex for knowledge work, including drafting, researching, and automating tasks. The event is exclusive to paid subscribers and offers a bonus of free Pro Lite access for 250 attendees.", "full_text": "CEO Dan Shipper and Austin Tedesco , Every's head of growth, will show you how to use Codex for knowledge work: drafting, researching, summarizing, running tasks in parallel, and building tools that automate routine tasks. You’ll leave with a clearer idea of when to use Codex, how to use it well, and a set of workflows you can start using right away."}]}, {"id": 246, "date": "2026-04-24", "category": "model_releases", "headline": "DeepSeek launches V4 Flash and V4 Pro, its most powerful open models yet", "summary": "DeepSeek released V4 Flash and V4 Pro, open-source AI systems with major gains in coding, reasoning, and agentic tasks. The models use a Hybrid Attention Architecture and support 1M token contexts, setting new benchmarks for open models.", "created_at": "2026-04-24 16:52:57", "articles": [{"id": 844, "title": "DeepSeek unveils flagship AI model V4 Flash and V4 Pro", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/e49i1q3dhel04h6p24rm.html#story-1", "source_name": "Unknown", "published_at": "2026-04-24 14:43:26", "summary": null, "content_snippet": "DeepSeek released V4 Flash and V4 Pro, its most powerful open-source AI systems yet, with major gains in coding, reasoning, and agentic tasks, a Hybrid Attention Architecture, and a 1 million token context length.", "full_text": "A year after shaking the AI industry, DeepSeek is back with a new challenge to OpenAI, Anthropic, and Google. The company has released preview versions of V4 Flash and V4 Pro , calling them its most powerful open-source AI systems yet. DeepSeek says V4 delivers major gains in coding, reasoning, and agentic tasks while introducing a Hybrid Attention Architecture designed to better remember context across long conversations. It also expands context length to 1 million tokens, allowing users to input entire codebases or long documents in a single prompt."}]}, {"id": 247, "date": "2026-04-24", "category": "model_releases", "headline": "OpenAI debuts GPT-5.5, powering its AI superapp with advanced capabilities", "summary": "OpenAI unveiled GPT-5.5, its newest flagship model and engine behind its AI superapp. It features improved coding, research, and agentic capabilities, developed with recursive self-improvement, and outperforms Anthropic's Opus 4.7 on key benchmarks.", "created_at": "2026-04-24 16:52:57", "articles": [{"id": 843, "title": "OpenAI launches GPT-5.5 to power its AI superapp", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/e49i1q3dhel04h6p24rm.html#story-0", "source_name": "Unknown", "published_at": "2026-04-24 14:43:26", "summary": null, "content_snippet": "OpenAI unveiled GPT-5.5, its newest flagship model and the engine behind its AI superapp, featuring improved coding, research, and agentic capabilities. The model was developed with recursive self-improvement and will roll out to Plus, Pro, Business, and Enterprise users.", "full_text": "OpenAI has unveiled GPT-5.5 , its newest flagship model and the engine behind the company’s long-awaited AI superapp. The launch comes just seven weeks after GPT-5.4, highlighting an aggressive release pace as competition intensifies. OpenAI says GPT-5.5 and its coding agent Codex helped build the model itself through recursive self-improvement, where AI systems assist in creating stronger successors."}, {"id": 846, "title": "OpenAI releases GPT-5.5 one week after Anthropic's Opus 4.7", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/tlq89n1qhvy9r20wllbr.html#story-0", "source_name": "The Neuron", "published_at": "2026-04-24 11:07:56", "summary": null, "content_snippet": "OpenAI launched GPT-5.5, a 'worker-class' model optimized for task completion, outperforming Opus 4.7 on key benchmarks like Terminal-Bench 2.0 and GDPval, while also achieving notable advancements in mathematical proofs and cyber capabilities.", "full_text": null}, {"id": 851, "title": "OpenAI's GPT-5.5 outperforms Anthropic's Opus 4.7 on Terminal-Bench 2.0", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/tlq89n1qhvy9r20wllbr.html#story-5", "source_name": "The Neuron", "published_at": "2026-04-24 11:07:56", "summary": null, "content_snippet": "GPT-5.5 achieved an 82.7% score on Terminal-Bench 2.0, significantly surpassing Opus 4.7's 69.4%, highlighting its superior task-execution capabilities.", "full_text": "It wins Terminal-Bench 2.0 (82.7% vs Opus 4.7's 69.4%) and ties or beats industry pros on 84.9% of GDPval tasks across 44 jobs. It loses SWE-Bench Pro (58.6% vs 64.3%) with an asterisk citing Anthropic's own flagged \" signs of memorization \" on that eval."}, {"id": 852, "title": "GPT-5.5 ties or beats industry professionals on 84.9% of GDPval tasks", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/tlq89n1qhvy9r20wllbr.html#story-6", "source_name": "The Neuron", "published_at": "2026-04-24 11:07:56", "summary": null, "content_snippet": "GPT-5.5 demonstrated strong performance across 44 jobs, matching or exceeding industry experts on 84.9% of GDPval tasks, underscoring its practical utility.", "full_text": "Anyway, the rest of the AI world spent the week trying to figure out why Opus 4.7 suddenly feels like a GPT model and GPT-5.5 feels like Claude. Uno reverse day. Opposite universe. Parallel dimension. Let's get into it."}, {"id": 854, "title": "GPT-5.5 advances FrontierMath Tier 4 and helps discover new mathematical proof", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/tlq89n1qhvy9r20wllbr.html#story-8", "source_name": "The Neuron", "published_at": "2026-04-24 11:07:56", "summary": null, "content_snippet": "GPT-5.5 improved its FrontierMath Tier 4 score from 27.1% to 35.4% and contributed to the discovery of a new proof about off-diagonal Ramsey numbers, later verified in Lean.", "full_text": null}, {"id": 855, "title": "OpenAI rates GPT-5.5 'High' on bio/chem and cyber capabilities", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/tlq89n1qhvy9r20wllbr.html#story-9", "source_name": "The Neuron", "published_at": "2026-04-24 11:07:56", "summary": null, "content_snippet": "GPT-5.5 received a 'High' rating for both biological/chemical and cyber capabilities, indicating strong performance in specialized domains.", "full_text": null}]}, {"id": 248, "date": "2026-04-24", "category": "products_tools", "headline": "Spotify integrates with Anthropic's Claude for AI-powered music recs", "summary": "Spotify now operates within Anthropic's Claude AI assistant, enabling users to receive personalized music recommendations directly through the chat interface, expanding AI-driven user experiences.", "created_at": "2026-04-24 16:52:57", "articles": [{"id": 850, "title": "Spotify integrates with Claude for personalized music recommendations", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/tlq89n1qhvy9r20wllbr.html#story-4", "source_name": "The Neuron", "published_at": "2026-04-24 11:07:56", "summary": null, "content_snippet": "Spotify now operates within Claude, enabling users to receive personalized music recommendations directly through the AI assistant.", "full_text": null}]}, {"id": 249, "date": "2026-04-24", "category": "industry_business", "headline": "Anthropic hits $1T valuation, surpassing OpenAI", "summary": "Anthropic quietly reached a $1 trillion valuation, marking a major milestone and positioning it ahead of OpenAI in terms of valuation, reflecting rapid growth in the AI sector.", "created_at": "2026-04-24 16:52:57", "articles": [{"id": 849, "title": "Anthropic achieves $1 trillion valuation, surpassing OpenAI", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/tlq89n1qhvy9r20wllbr.html#story-3", "source_name": "The Neuron", "published_at": "2026-04-24 11:07:56", "summary": null, "content_snippet": "Anthropic quietly reached a $1 trillion valuation, marking a major milestone in its growth and positioning it ahead of OpenAI in terms of valuation.", "full_text": null}]}, {"id": 250, "date": "2026-04-24", "category": "industry_business", "headline": "Meta cuts 8,000 jobs (10% of staff) to fund AI initiatives", "summary": "Meta announced a significant workforce reduction to reallocate resources toward AI development, signaling a strategic shift in priorities and highlighting the industry's focus on AI over other ventures.", "created_at": "2026-04-24 16:52:57", "articles": [{"id": 848, "title": "Meta cuts 8,000 jobs (10% of staff) to fund AI initiatives", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/tlq89n1qhvy9r20wllbr.html#story-2", "source_name": "The Neuron", "published_at": "2026-04-24 11:07:56", "summary": null, "content_snippet": "Meta announced a significant workforce reduction to reallocate resources toward its AI development efforts, signaling a strategic shift in priorities.", "full_text": null}]}, {"id": 251, "date": "2026-04-24", "category": "model_releases", "headline": "Z.ai releases GLM-5.1 with autonomous long-running task capabilities", "summary": "Z.ai updated its open-weights model GLM-5.1 to autonomously work on single tasks for up to eight hours, improving complex coding and agentic tasks through iterative improvements.", "created_at": "2026-04-24 16:52:57", "articles": [{"id": 860, "title": "Z.ai releases GLM-5.1 with autonomous long-running task capabilities", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/z95grcfhmmuih4s9v0bb.html#story-0", "source_name": "Unknown", "published_at": "2026-04-24 10:05:42", "summary": null, "content_snippet": "Z.ai updated its open-weights large language model GLM-5.1 to autonomously work on single tasks for up to eight hours, improving its ability to handle complex coding and agentic tasks through iterative problem-solving.", "full_text": null}]}, {"id": 252, "date": "2026-04-24", "category": "products_tools", "headline": "World ID 4.0 launches with iris-scanning for AI-resistant digital identity", "summary": "World introduced World ID 4.0, a proof-of-human system using iris-scanning to verify real people amid AI-generated content. It now has over 18 million users and partnerships with Tinder, Zoom, and DocuSign.", "created_at": "2026-04-24 16:52:57", "articles": [{"id": 845, "title": "World unveils World ID 4.0 for digital identity verification", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/e49i1q3dhel04h6p24rm.html#story-2", "source_name": "Unknown", "published_at": "2026-04-24 14:43:26", "summary": null, "content_snippet": "World introduced World ID 4.0, a proof-of-human system using iris-scanning to verify real people amid AI-generated content, with over 18 million users and new partners like Tinder, Zoom, and DocuSign.", "full_text": "World has unveiled World ID 4.0 , a new version of its proof-of-human system designed to verify real people as AI-generated content floods the internet. The platform uses an iris-scanning device called the Orb to create a unique cryptographic identity. The company says more than 18 million users across 160 countries have already enrolled."}]}, {"id": 253, "date": "2026-04-24", "category": "sci_tech_trends", "headline": "Weyerhaeuser uses AI to digitize forests and pursue autonomous logging", "summary": "America's largest landowner is leveraging AI to automate forest inventory and develop autonomous logging equipment, aiming to double profits by 2030 without relying on lumber price increases.", "created_at": "2026-04-24 16:52:57", "articles": [{"id": 847, "title": "Weyerhaeuser uses AI to digitize forest inventory and pursue autonomous logging", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/tlq89n1qhvy9r20wllbr.html#story-1", "source_name": "The Neuron", "published_at": "2026-04-24 11:07:56", "summary": null, "content_snippet": "America's largest landowner is leveraging AI to automate forest inventory and develop autonomous logging equipment, aiming to double profits by 2030 without relying on lumber price increases.", "full_text": "Weyerhaeuser, America's largest landowner , is using AI to digitize its entire forest inventory and pursue autonomous logging equipment, aiming to double profits by 2030 without needing lumber prices to lift a finger. If a tree falls in the woods and only a neural net is there to hear it, does it make a sound?"}]}, {"id": 203, "date": "2026-04-23", "category": "editorial", "headline": "Every’s Claudie AI agent’s trust battery concept introduced by Shopify CEO Tobi", "summary": "Every’s AI project manager Claudie introduced the concept of a 'trust battery,' popularized by Shopify CEO Tobi, to measure trust levels between humans and AI employees, with Claudie’s trust battery dropping slightly in a recent interaction.", "created_at": "2026-04-23 07:52:59", "articles": [{"id": 710, "title": "Every’s Claudie AI agent’s trust battery concept introduced by Shopify CEO Tobi", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/5ru7a3g14vvgxg6tv1bc.html#story-4", "source_name": "Every", "published_at": "2026-04-22 19:56:06", "summary": null, "content_snippet": "Every’s AI project manager Claudie introduced the concept of a 'trust battery,' popularized by Shopify CEO Tobi, to measure trust levels between humans and AI employees, with Claudie’s trust battery dropping slightly in a recent interaction.", "full_text": null}]}, {"id": 204, "date": "2026-04-23", "category": "editorial", "headline": "Dan Shipper predicts two organizational AI agent architectures will emerge", "summary": "Dan Shipper outlines two future models for AI agent deployment: personalized assistants for each worker or a single super-agent with department-specific plugins, each with distinct trade-offs in customization and maintenance.", "created_at": "2026-04-23 07:52:59", "articles": [{"id": 709, "title": "Dan Shipper predicts two organizational AI agent architectures will emerge", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/5ru7a3g14vvgxg6tv1bc.html#story-3", "source_name": "Every", "published_at": "2026-04-22 19:56:06", "summary": null, "content_snippet": "Dan Shipper outlines two future models for AI agent deployment: personalized assistants for each worker or a single super-agent with department-specific plugins, each with distinct trade-offs in customization and maintenance.", "full_text": null}]}, {"id": 205, "date": "2026-04-23", "category": "editorial", "headline": "Every’s Claudie AI agent evolves from project manager to multi-functional assistant", "summary": "Every’s Claudie, initially built as an AI project manager, expanded into a multi-functional assistant handling client updates, sales pipelines, and slide deck creation, leading to the consolidation of planned separate agents into plugins within Claudie.", "created_at": "2026-04-23 07:52:59", "articles": [{"id": 708, "title": "Every’s Claudie AI agent evolves from project manager to multi-functional assistant", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/5ru7a3g14vvgxg6tv1bc.html#story-2", "source_name": "Every", "published_at": "2026-04-22 19:56:06", "summary": null, "content_snippet": "Every’s Claudie, initially built as an AI project manager, expanded into a multi-functional assistant handling client updates, sales pipelines, and slide deck creation, leading to the consolidation of planned separate agents into plugins within Claudie.", "full_text": null}]}, {"id": 206, "date": "2026-04-23", "category": "editorial", "headline": "Every launches Viktor, an AI coworker integrated with Slack and 3,000 tools", "summary": "Every introduced Viktor, an AI assistant integrated with Slack and thousands of business tools, capable of performing tasks like building dashboards, reconciling invoices, and drafting campaign briefs, with nearly 9,000 teams using it.", "created_at": "2026-04-23 07:52:59", "articles": [{"id": 707, "title": "Every launches Viktor, an AI coworker integrated with Slack and 3,000 tools", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/5ru7a3g14vvgxg6tv1bc.html#story-1", "source_name": "Every", "published_at": "2026-04-22 19:56:06", "summary": null, "content_snippet": "Every introduced Viktor, an AI assistant integrated with Slack and thousands of business tools, capable of performing tasks like building dashboards, reconciling invoices, and drafting campaign briefs, with nearly 9,000 teams using it.", "full_text": null}]}, {"id": 207, "date": "2026-04-23", "category": "editorial", "headline": "Every releases new episode of AI & I podcast featuring Kieran Klaassen on compound engineering", "summary": "Every released a new episode of their AI & I podcast where Dan Shipper interviews Kieran Klaassen, GM of Cora, about the role of humans in AI workflows and the compound engineering framework that divides tasks between AI and human engineers.", "created_at": "2026-04-23 07:52:59", "articles": [{"id": 706, "title": "Every releases new episode of AI & I podcast featuring Kieran Klaassen on compound engineering", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/5ru7a3g14vvgxg6tv1bc.html#story-0", "source_name": "Every", "published_at": "2026-04-22 19:56:06", "summary": null, "content_snippet": "Every released a new episode of their AI & I podcast where Dan Shipper interviews Kieran Klaassen, GM of Cora, about the role of humans in AI workflows and the compound engineering framework that divides tasks between AI and human engineers.", "full_text": "Today, we’re releasing a new episode of our podcast AI & I . Dan Shipper sits down with Kieran Klaassen , GM of Cora and creator of Every’s AI-native engineering methodology, compound engineering . Dan and Kieran discuss where humans fit now that AI can generate high-quality code, copy, strategy, and design. If the execution layer is largely solved, do engineers still have a role in the workplace?"}]}, {"id": 208, "date": "2026-04-23", "category": "industry_business", "headline": "Anthropic’s Project Glasswing patches web vulnerabilities with AI", "summary": "Anthropic’s Project Glasswing uses AI to proactively identify and patch security flaws across major software systems, aiming to mitigate risks as AI-driven hacking tools become more accessible. This initiative highlights the urgent need for AI-powered cybersecurity amid rising threats.", "created_at": "2026-04-23 07:53:04", "articles": [{"id": 676, "title": "Anthropic's Project Glasswing races to patch internet vulnerabilities before AI-powered hacking becomes widespread", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/t457wd1waefvycd75h8b.html#story-5", "source_name": "The Neuron", "published_at": "2026-04-22 11:34:38", "summary": null, "content_snippet": "Anthropic's Project Glasswing uses AI to proactively identify and patch security flaws across major software systems, aiming to mitigate risks as AI-driven hacking tools become more accessible.", "full_text": "Firefox 150 released this week patches for 271 vulnerabilities found using Anthropic's Claude Mythos Preview, a powerful new AI model that Anthropic has quietly been giving to a small group of companies to hunt down security flaws before the bad guys do. The project is called Project Glasswing , and it's essentially a coordinated race to patch the internet before AI-powered hacking becomes cheap and accessible."}]}, {"id": 209, "date": "2026-04-23", "category": "industry_business", "headline": "Law firm apologizes after AI hallucinated fake legal citations", "summary": "Sullivan & Cromwell issued an apology after its AI system generated and submitted fake legal citations in court filings, underscoring the critical risks of AI hallucinations in high-stakes professional settings.", "created_at": "2026-04-23 07:53:04", "articles": [{"id": 675, "title": "Sullivan & Cromwell apologizes to judge after AI hallucinated fake case citations", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/t457wd1waefvycd75h8b.html#story-4", "source_name": "The Neuron", "published_at": "2026-04-22 11:34:38", "summary": null, "content_snippet": "Law firm Sullivan & Cromwell issued an apology after its AI system generated and submitted fake legal citations in court filings, highlighting risks of AI hallucinations in professional settings.", "full_text": null}]}, {"id": 210, "date": "2026-04-23", "category": "products_tools", "headline": "Spoki launches AI-powered Customer Engagement platform", "summary": "Spoki introduced a CEM platform that automates marketing campaigns across WhatsApp, SMS, and voice, handling chats and calls 24/7, qualifying leads, and driving sales with simple instructions.", "created_at": "2026-04-23 07:53:04", "articles": [{"id": 551, "title": "Spoki launches AI-powered Customer Engagement Management platform", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/gu7lg6woxv23quesylps.html#story-2", "source_name": knowledge and AI training over time.", "full_text": null}]}, {"id": 217, "date": "2026-04-23", "category": "sci_tech_trends", "headline": "Peter Steinberger presents OpenClaw AI agent breakthrough", "summary": "Peter Steinberger detailed the development of OpenClaw, an innovative AI agent, in a TED-style talk, highlighting its implications for future AI-driven solutions.", "created_at": "2026-04-23 07:53:04", "articles": [{"id": 553, "title": "Peter Steinberger shares how he created OpenClaw, a breakthrough AI agent", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/gu7lg6woxv23quesylps.html#story-4", "source_name": "Unknown", "published_at": "2026-04-20 15:08:43", "summary": null, "content_snippet": "Peter Steinberger presented a TED-style talk on OpenClaw, detailing the development of this innovative AI agent and its implications for the future of AI-driven solutions.", "full_text": null}]}, {"id": 218, "date": "2026-04-23", "category": "products_tools", "headline": "OpenAI launches 24/7 workspace agents inside ChatGPT", "summary": "OpenAI introduced always-on AI agents in ChatGPT for shared business tasks like software triage and lead outreach. These agents can run on servers, enabling continuous workflow automation for teams.", "created_at": "2026-04-23 17:17:40", "articles": [{"id": 751, "title": "OpenAI launches 24/7 workspace agents inside ChatGPT", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/ljr1jtczy3k4xyewx9mf.html#story-1", "source_name": "Unknown", "published_at": "2026-04-23 14:54:25", "summary": null, "content_snippet": "OpenAI introduced workspace agents in ChatGPT, enabling companies to deploy always-on AI workers for shared business tasks like software triage, reporting, and lead outreach. These agents can run on schedules, integrate with tools like Slack and Google Drive, and use compliance controls for sensitive actions.", "full_text": null}]}, {"id": 219, "date": "2026-04-23", "category": "model_releases", "headline": "Moonshot AI launches Kimi K2.6 Agent Swarm and open-source K2.6", "summary": "Moonshot AI unveiled Kimi K2.6 Agent Swarm, splitting tasks across 300 parallel agents to generate reports and files. It also released K2.6 as an open-source coding model handling long engineering tasks.", "created_at": "2026-04-23 17:17:40", "articles": [{"id": 752, "title": "Moonshot AI launches Kimi K2.6 Agent Swarm", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/ljr1jtczy3k4xyewx9mf.html#story-2", "source_name": "Unknown", "published_at": "2026-04-23 14:54:25", "summary": null, "content_snippet": "Moonshot AI unveiled Kimi K2.6 Agent Swarm, a major upgrade that splits large tasks across up to 300 parallel AI agents. The system can generate deliverables like 100+ files, 100,000-word reports, or 20,000-row datasets in a single session, signaling a shift from chatbot answers to AI systems functioning like digital teams.", "full_text": "Moonshot AI has launched Kimi K2.6 Agent Swarm , a major upgrade built to tackle large tasks by splitting work across hundreds of parallel AI agents. The system can run up to 300 sub-agents with 4,000 steps per session, sharply higher than the 100 agents and 1,500 steps offered in K2.5. Instead of returning simple chat responses, K2.6 can generate full deliverables such as 100+ files in one run, 100,000-word research reports, or datasets with 20,000 rows. Different agents can handle search, coding, analysis, writing, and image generation at the same time, signaling a shift from chatbot answers toward AI systems that operate more like digital teams."}, {"id": 796, "title": "Moonshot AI releases Kimi K2.6, an open-source coding model handling long engineering tasks", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/t457wd1waefvycd75h8b.html#story-9", "source_name": "The Neuron", "published_at": "2026-04-22 11:34:38", "summary": null, "content_snippet": "Moonshot AI launched Kimi K2.6, an open-source coding model capable of handling complex, long-duration engineering tasks, such as a 13-hour test that boosted a financial engine's throughput by 185%.", "full_text": null}]}, {"id": 220, "date": "2026-04-23", "category": "products_tools", "headline": "X adds Grok-powered Custom Timelines for Premium users", "summary": "X introduced Grok-powered Custom Timelines, letting Premium users pin curated feeds across 75+ topics to their home tab. The AI personalizes feeds based on user interests and past interactions.", "created_at": "2026-04-23 17:17:40", "articles": [{"id": 753, "title": "X launches Grok-powered Custom Timelines for Premium users", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/ljr1jtczy3k4xyewx9mf.html#story-3", "source_name": "Unknown", "published_at": "2026-04-23 14:54:25", "summary": null, "content_snippet": "X introduced Grok-powered Custom Timelines, allowing Premium users to pin curated feeds across over 75 topics to their home tab. The feature uses AI to personalize feeds based on user interests and past engagement, replacing older social features and creating new ad inventory opportunities.", "full_text": "X has launched Grok-powered Custom Timelines , a feature that lets Premium users pin curated feeds across more than 75 topics directly to the home tab. Instead of relying on hashtags or keywords, X says Grok reads posts, understands the content, and labels them by topic before personalizing feeds based on a user’s interests and past engagement. The rollout deepens ties between X and xAI while arriving just as Communities shuts down, suggesting the company is replacing older social features with AI-driven discovery tools. It also creates fresh ad inventory, with ads reportedly appearing near the top of feeds, giving X another path to revive its advertising business."}]}, {"id": 221, "date": "2026-04-23", "category": "model_releases", "headline": "OpenAI teases SPUD, likely GPT-5.5, for Thursday release", "summary": "OpenAI posted a teaser for SPUD, an internal codename linked to GPT-5.5, with expectations of a Thursday release. If confirmed, this would mark OpenAI's next major model upgrade.", "created_at": "2026-04-23 17:17:40", "articles": [{"id": 750, "title": "OpenAI teases SPUD, widely speculated to be GPT-5.5", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/ljr1jtczy3k4xyewx9mf.html#story-0", "source_name": "Unknown", "published_at": "2026-04-23 14:54:25", "summary": null, "content_snippet": "OpenAI has posted a teaser hinting at SPUD, an internal codename linked to GPT-5.5, with expectations of a Thursday release. If confirmed, this could mark OpenAI's next major model upgrade, intensifying the AI industry's race for smarter, faster, and more cost-effective systems.", "full_text": "OpenAI has posted a new teaser that many users believe points to SPUD, the internal codename widely linked to GPT-5.5, with expectations building for a Thursday release. The hint follows earlier sightings of unreleased model names that briefly appeared inside Codex, suggesting launch preparations were already underway. Earlier this week, OpenAI used a similar teaser format before unveiling ChatGPT Agents, adding weight to speculation that another drop is close. If SPUD is GPT-5.5, it could become OpenAI’s next major model upgrade as AI labs race to make systems smarter, faster, and cheaper to run."}]}, {"id": 222, "date": "2026-04-23", "category": "industry_business", "headline": "Anthropic removes Claude Code from $20/month Pro plan", "summary": "Anthropic briefly removed Claude Code from its $20/month Pro plan, pushing users to the $100/month Max tier. The move sparked backlash over transparency and pricing changes.", "created_at": "2026-04-23 17:17:40", "articles": [{"id": 762, "title": "Anthropic removes Claude Code from $20/month Pro plan, pushing users to $100/month Max tier", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfo
