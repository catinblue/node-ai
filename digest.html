aling a strategic shift toward owning its own cloud and device stack.", "full_text": null}, {"id": 1270, "title": "OpenAI and Microsoft rewrite partnership contract to remove exclusivity and AGI definition", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/0vamxnduk6omsg7d8p5e.html#story-2", "source_name": "The Neuron", "published_at": "2026-04-28 11:07:39", "summary": null, "content_snippet": "OpenAI and Microsoft amended their partnership to make Microsoft's exclusive license non-exclusive, removed the contractual definition of AGI, and adjusted revenue-sharing terms, reducing Microsoft's financial ties to OpenAI.", "full_text": "After months of leaked drafts and lawyer drama, OpenAI and Microsoft made it official : their five-year-old, multi-hundred-billion-dollar partnership is getting amended, and the new terms read like a divorce mediation written by sci-fi screenwriters. Most couples fight about the dishes… these two were fighting about \"what if one of us invents God?\""}]}, {"id": 338, "date": "2026-04-28", "category": "industry_business", "headline": "Anthropic hits $1 trillion valuation in secondary trading", "summary": "Anthropic's valuation surged to nearly $1 trillion in secondary market trades, up from $380 billion months ago. This reflects strong demand for AI infrastructure and investor confidence in the sector's growth.", "created_at": "2026-04-28 17:45:11", "articles": [{"id": 1266, "title": "Anthropic reaches $1 trillion valuation in secondary market trading", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/skda29h4ahnt9ma9umks.html#story-2", "source_name": "Unknown", "published_at": "2026-04-28 14:44:57", "summary": null, "content_snippet": "Anthropic's valuation has surged to nearly $1 trillion in secondary market trades, up from $380 billion just months ago. This rapid increase reflects strong demand for AI infrastructure and sentiment-driven investment, positioning Anthropic near or above OpenAI in private market valuations.", "full_text": "Anthropic is reportedly trading at valuations approaching $1 trillion on secondary markets, up sharply from its $380 billion round just months ago. That puts it near or even above OpenAI in some private trades, where pricing has hovered around the high-$800B range. Demand appears overheated. Shares are scarce, and secondary buyers are bidding aggressively to get exposure. Part of the momentum comes from strong growth and products like Claude Code. But a large part of the surge looks sentiment-driven, where access itself is becoming the asset."}]}, {"id": 339, "date": "2026-04-28", "category": "products_tools", "headline": "Adobe launches Firefly AI Assistant in public beta", "summary": "Adobe introduced Firefly AI Assistant in public beta, enabling users to describe creative tasks in natural language. The AI orchestrates multi-step workflows across Creative Cloud apps, streamlining complex creative processes.", "created_at": "2026-04-28 17:45:11", "articles": [{"id": 1277, "title": "Adobe launches Firefly AI Assistant in public beta for Creative Cloud users", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/0vamxnduk6omsg7d8p5e.html#story-9", "source_name": "The Neuron", "published_at": "2026-04-28 11:07:39", "summary": null, "content_snippet": "Adobe introduced Firefly AI Assistant in public beta, allowing users to describe creative tasks in natural language and have the AI orchestrate multi-step workflows across Creative Cloud apps.", "full_text": "Users now have access of public beta of Firefly AI Assistant – powered by our creative agent. What does that actually mean in practice? Instead of navigating tools or jumping between our creative apps, you direct the outcome while the assistant handles the workflows—using the right tools at the right time."}]}, {"id": 340, "date": "2026-04-28", "category": "model_releases", "headline": "OpenAI open-sources Symphony multi-agent framework", "summary": "OpenAI released Symphony, an open-source multi-agent orchestration framework for Codex. It enables more complex and coordinated AI workflows, expanding the toolkit for developers building agentic systems.", "created_at": "2026-04-28 17:45:11", "articles": [{"id": 1275, "title": "OpenAI open-sources Symphony, a multi-agent orchestration framework for Codex", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/0vamxnduk6omsg7d8p5e.html#story-7", "source_name": "The Neuron", "published_at": "2026-04-28 11:07:39", "summary": null, "content_snippet": "OpenAI released Symphony, an open-source multi-agent orchestration framework for Codex, enabling more complex and coordinated AI workflows.", "full_text": null}]}, {"id": 341, "date": "2026-04-28", "category": "products_tools", "headline": "OpenAI developing AI-first smartphone with Qualcomm, MediaTek", "summary": "OpenAI is reportedly developing an AI-first smartphone with custom chips from Qualcomm and MediaTek, targeting mass production around 2028. The device will prioritize AI agents over traditional apps.", "created_at": "2026-04-28 17:45:11", "articles": [{"id": 1264, "title": "OpenAI building an AI-first smartphone with custom chips and agent-driven interface", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/skda29h4ahnt9ma9umks.html#story-0", "source_name": "Unknown", "published_at": "2026-04-28 14:44:57", "summary": null, "content_snippet": "OpenAI is reportedly developing an AI-first smartphone with custom chips from Qualcomm and MediaTek, aiming for mass production around 2028. The device will prioritize AI agents over traditional apps, potentially shifting the industry away from Apple and Google's ecosystems.", "full_text": "OpenAI is reportedly working on its own AI-first smartphone , with early plans pointing to mass production around 2028. The company is said to be collaborating with Qualcomm and MediaTek on custom chips, while Luxshare Precision Industry may handle design and assembly. Instead of apps, the device is expected to center around AI agents that execute tasks end-to-end. The hardware is being optimized for on-device AI, with heavier workloads pushed to OpenAI’s cloud. If this direction holds, it could shift phones from app-driven interfaces to outcome-driven interactions, putting pressure on ecosystems built by Apple and Google."}, {"id": 1271, "title": "OpenAI reportedly working with MediaTek, Qualcomm, and Luxshare on AI-agent smartphone for 2028", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/0vamxnduk6omsg7d8p5e.html#story-3", "source_name": "The Neuron", "published_at": "2026-04-28 11:07:39", "summary": null, "content_snippet": "OpenAI is collaborating with MediaTek, Qualcomm, and Luxshare to develop an AI-agent smartphone targeting 2028 production, aiming to control the device layer of the AI stack.", "full_text": "Then, before the ink could dry, supply-chain analyst Ming-Chi Kuo posted that OpenAI is reportedly working with MediaTek, Qualcomm, and Luxshare on an AI-agent smartphone targeting 2028 production. Same shape, different battlefield."}, {"id": 1272, "title": "OpenAI reportedly building its own smartphone on top of $6.4B io acquisition", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/0vamxnduk6omsg7d8p5e.html#story-4", "source_name": "The Neuron", "published_at": "2026-04-28 11:07:39", "summary": null, "content_snippet": "OpenAI is reportedly developing its own smartphone, leveraging its recent $6.4B acquisition of io, to gain control over the device layer and reduce reliance on third-party operating systems.", "full_text": null}]}, {"id": 342, "date": "2026-04-28", "category": "research", "headline": "ChatGPT helps solve 60-year-old Erdős problem", "summary": "An amateur mathematician used ChatGPT to crack a 60-year-old Erdős problem, demonstrating AI's potential to accelerate mathematical breakthroughs and problem-solving across disciplines.", "created_at": "2026-04-28 17:45:11", "articles": [{"id": 1276, "title": "ChatGPT helps amateur mathematician solve 60-year-old Erdős problem", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/0vamxnduk6omsg7d8p5e.html#story-8", "source_name": "The Neuron", "published_at": "2026-04-28 11:07:39", "summary": null, "content_snippet": "An amateur mathematician used ChatGPT to crack a 60-year-old Erdős problem, demonstrating the potential of AI to accelerate mathematical breakthroughs and problem-solving.", "full_text": "This week, an amateur mathematician used ChatGPT to solve a 60-year-old Erdős problem that had stumped specialists for decades. Per Scientific American, experts said the proof method \"had not occurred to humans\" before. ChatGPT explored a path no one else had tried. Yes, \"vibe-maths\" is now a verb. Sorry, we don't make the rules."}]}, {"id": 343, "date": "2026-04-28", "category": "research", "headline": "Talkie: 13B LLM trained only on pre-1931 text", "summary": "Researchers David Duvenaud and Alec Radford released Talkie, a 13-billion-parameter language model trained exclusively on text from before 1931. It offers a unique historical perspective on AI capabilities.", "created_at": "2026-04-28 17:45:11", "articles": [{"id": 1273, "title": "David Duvenaud and Alec Radford release Talkie, a 13B vintage LLM trained only on pre-1931 text", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/0vamxnduk6omsg7d8p5e.html#story-5", "source_name": "The Neuron", "published_at": "2026-04-28 11:07:39", "summary": null, "content_snippet": "Researchers David Duvenaud and Alec Radford released Talkie, a 13-billion-parameter language model trained exclusively on text from before 1931, offering a unique historical perspective on AI capabilities.", "full_text": null}]}, {"id": 344, "date": "2026-04-28", "category": "products_tools", "headline": "Public launches AI Agents for automated investing", "summary": "Public introduced AI Agents for automated portfolio management, allowing users to automate tasks like hedging portfolios via natural language prompts. This marks a shift from manual to AI-driven investing.", "created_at": "2026-04-28 17:45:11", "articles": [{"id": 1267, "title": "Public introduces AI Agents for automated portfolio management", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/skda29h4ahnt9ma9umks.html#story-3", "source_name": "Unknown", "published_at": "2026-04-28 14:44:57", "summary": null, "content_snippet": "Public has launched an AI Agents feature that allows users to automate investment tasks via natural language prompts, such as hedging portfolios or sweeping excess cash. This marks a shift from manual trading to AI-driven, intent-based execution.", "full_text": null}]}, {"id": 345, "date": "2026-04-28", "category": "industry_business", "headline": "China blocks Meta's $2B acquisition of Manus", "summary": "China's regulators blocked Meta's $2 billion acquisition of Manus after a year-long probe, signaling heightened scrutiny of foreign tech investments in the country.", "created_at": "2026-04-28 17:45:11", "articles": [{"id": 1274, "title": "China blocks Meta's $2B acquisition of Manus after year-long probe", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/0vamxnduk6omsg7d8p5e.html#story-6", "source_name": "The Neuron", "published_at": "2026-04-28 11:07:39", "summary": null, "content_snippet": "China's regulatory authorities blocked Meta's $2 billion acquisition of Manus following a year-long investigation, signaling heightened scrutiny of foreign tech investments in the country.", "full_text": null}]}, {"id": 346, "date": "2026-04-28", "category": "products_tools", "headline": "Cursor coding agent deletes company database in 9 seconds", "summary": "A Claude-powered Cursor coding agent wiped an entire company database, including backups, in 9 seconds after being asked to clean up unused tables. It highlights the risks of AI agents operating without safeguards.", "created_at": "2026-04-28 17:45:11", "articles": [{"id": 1268, "title": "Cursor coding agent accidentally deletes entire company database in 9 seconds", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/0vamxnduk6omsg7d8p5e.html#story-0", "source_name": "The Neuron", "published_at": "2026-04-28 11:07:39", "summary": null, "content_snippet": "A Claude-powered coding agent for Cursor wiped an entire company database, including backups, in just 9 seconds after being asked to clean up unused tables, highlighting the risks of AI agents operating without proper safeguards.", "full_text": null}]}, {"id": 291, "date": "2026-04-27", "category": "industry_business", "headline": "Meta slashes 8,000 jobs to fund $72B AI buildout", "summary": "Meta cut 10% of its workforce (8,000 jobs) to redirect funds toward a $72B AI infrastructure investment in 2026, targeting middle managers and non-agentic researchers. This marks a seismic shift toward agentic AI projects like Mythos-tier initiatives.", "created_at": "2026-04-27 08:25:24", "articles": [{"id": 1100, "title": "Meta cuts 8,000 jobs to fund $72B AI buildout", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/y67yurrwg39wnw2qjn58.html#story-1", "source_name": "The Neuron", "published_at": "2026-04-26 18:34:04", "summary": null, "content_snippet": "Meta announced a 10% workforce reduction (8,000 jobs) to fund its $72B AI capital expenditure in 2026, targeting middle managers and non-agentic AI researchers. This marks a major restructuring driven by AI infrastructure demands.", "full_text": null}, {"id": 1104, "title": "Meta's AI layoffs target middle managers and non-agentic researchers", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/y67yurrwg39wnw2qjn58.html#story-5", "source_name": "The Neuron", "published_at": "2026-04-26 18:34:04", "summary": null, "content_snippet": "Meta's workforce cuts focus on middle managers, researchers in non-agentic projects, and hires from Scale AI, reflecting a strategic shift toward high-impact AI projects like Mythos-tier initiatives.", "full_text": null}, {"id": 1105, "title": "Meta's $72B AI capex in 2026 up from $47B in 2025", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/y67yurrwg39wnw2qjn58.html#story-6", "source_name": "The Neuron", "published_at": "2026-04-26 18:34:04", "summary": null, "content_snippet": "Meta increased its AI capital expenditure from $47B in 2025 to $72B in 2026, signaling aggressive investment in AI infrastructure and capabilities.", "full_text": null}]}, {"id": 292, "date": "2026-04-27", "category": "model_releases", "headline": "DeepSeek V4 drops with 1M-token context at 10% lower cost", "summary": "DeepSeek's V4 model now offers a 1M-token context window (~750K words) and costs ~$4 per million output tokens, undercutting competitors like ChatGPT and Claude. This rewrite of open-source agentic AI infrastructure sets new benchmarks.", "created_at": "2026-04-27 08:25:24", "articles": [{"id": 1099, "title": "DeepSeek releases V4 model with 1M-token context window at 10% lower cost", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/y67yurrwg39wnw2qjn58.html#story-0", "source_name": "The Neuron", "published_at": "2026-04-26 18:34:04", "summary": null, "content_snippet": "DeepSeek's V4 model introduces a 1M-token context window (equivalent to ~750,000 words) and costs ~$4 per million output tokens, significantly undercutting competitors like ChatGPT and Claude. This shift highlights a new focus on long-context economics and efficiency in AI models.", "full_text": null}, {"id": 1114, "title": "DeepSeek-v4 and Kimi-K2.6 rewrite rules for open-source agentic AI infrastructure", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/x3gvwhgqeg14c7cvf7cn.html#story-4", "source_name": "AlphaSignal", "published_at": "2026-04-26 15:11:52", "summary": null, "content_snippet": "The releases of DeepSeek-v4 and Kimi-K2.6 set new benchmarks for open-source AI, offering developers cost-effective, scalable alternatives to proprietary models for agentic applications.", "full_text": "While the world was focused on Claude Opus 4.7 and GPT-5.5, we saw the release of two very important open LLMs: DeepSeek-v4 and Kimi-K2.6. These two models set the new frontier for open source AI and have been especially designed for agentic applications. Today, we dive into the technical breakthroughs behind the latest mega-releases, the licensing catches to watch for, and how they rewrite the rules of agentic infrastructure. Advances in open LLMs are giving more options to developers, putting them in control of their model, data, and compute."}]}, {"id": 293, "date": "2026-04-27", "category": "model_releases", "headline": "Kimi-K2.6 enables agent swarm orchestration with OpenClaw", "summary": "Kimi-K2.6 demonstrates advanced agent swarm capabilities, dividing complex tasks into sub-tasks handled by specialized agents. This improves efficiency and reduces hallucinations in long-horizon workflows, rivaling proprietary models.", "created_at": "2026-04-27 08:25:24", "articles": [{"id": 1113, "title": "Kimi-K2.6 demonstrates agent swarm orchestration with OpenClaw and Hermes frameworks", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/x3gvwhgqeg14c7cvf7cn.html#story-3", "source_name": "AlphaSignal", "published_at": "2026-04-26 15:11:52", "summary": null, "content_snippet": "Kimi-K2.6 showcases advanced agent swarm capabilities, dividing complex tasks into sub-tasks handled by specialized agents, improving efficiency and reducing hallucinations in long-horizon workflows.", "full_text": "While DeepSeek-v4 was the most anticipated release of the week, Kimi-K2.6 was the most impressive. It currently leads the open models on the Artificial Analysis Intelligence Index . It stands out for its native multimodal capabilities and deep integration with agentic frameworks like OpenClaw and Hermes."}]}, {"id": 294, "date": "2026-04-27", "category": "industry_business", "headline": "Google pledges up to $40B to Anthropic in cash and compute", "summary": "Google committed up to $40B to Anthropic, combining cash and compute resources to deepen ties and support Anthropic's AI development. This follows Meta's aggressive AI capex and signals a tech arms race.", "created_at": "2026-04-27 08:25:24", "articles": [{"id": 1101, "title": "Google commits up to $40B to Anthropic in cash and compute", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/y67yurrwg39wnw2qjn58.html#story-2", "source_name": "The Neuron", "published_at": "2026-04-26 18:34:04", "summary": null, "content_snippet": "Google has pledged up to $40B to Anthropic, combining cash and compute resources, signaling deepening ties and financial support for Anthropic's AI development.", "full_text": null}]}, {"id": 295, "date": "2026-04-27", "category": "industry_business", "headline": "Anthropic's Dario Amodei predicts white-collar job cuts", "summary": "Anthropic CEO Dario Amodei forecasts widespread white-collar job reductions due to AI automation, with Meta's layoffs as a high-profile example. This aligns with Meta's $72B AI investment and restructuring.", "created_at": "2026-04-27 08:25:24", "articles": [{"id": 1106, "title": "Anthropic's Dario Amodei predicts white-collar job cuts across the economy", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/y67yurrwg39wnw2qjn58.html#story-7", "source_name": "The Neuron", "published_at": "2026-04-26 18:34:04", "summary": null, "content_snippet": "Anthropic CEO Dario Amodei forecasts widespread white-collar job reductions due to AI automation, with Meta's layoffs serving as a high-profile example of this trend.", "full_text": "Why this matters: This is the first \"AI layoff wave at an AI-leading company\" moment of the year, and it arrives right as Anthropic's Dario Amodei predicts white-collar cuts across the economy. If you work in tech, this is the quiet signal that the ZIRP-era org chart is finally getting restructured, not by the CFO but by the infrastructure build."}]}, {"id": 296, "date": "2026-04-27", "category": "products_tools", "headline": "Meta and AWS ink multibillion Graviton5 chip deal for agentic AI", "summary": "Meta and AWS struck a multibillion-dollar deal to use AWS's Graviton5 chips for agentic AI applications. This infrastructure push underscores the industry's pivot toward scalable, high-impact AI projects.", "created_at": "2026-04-27 08:25:24", "articles": [{"id": 1103, "title": "Meta and AWS sign multibillion Graviton5 chip deal for agentic AI", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/y67yurrwg39wnw2qjn58.html#story-4", "source_name": "The Neuron", "published_at": "2026-04-26 18:34:04", "summary": null, "content_snippet": "Meta and AWS have struck a multibillion-dollar deal to use AWS's Graviton5 chips for agentic AI applications, highlighting the infrastructure push behind AI agent development.", "full_text": null}]}, {"id": 297, "date": "2026-04-27", "category": "products_tools", "headline": "Anthropic's Project Deal: Claude agents close 186 marketplace deals", "summary": "Anthropic's Project Deal proves Claude AI agents can complete 186 real-world marketplace transactions, demonstrating the commercial viability of AI-driven automation and agentic workflows.", "created_at": "2026-04-27 08:25:24", "articles": [{"id": 1102, "title": "Anthropic's Project Deal: Claude agents close 186 real marketplace deals", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/y67yurrwg39wnw2qjn58.html#story-3", "source_name": "The Neuron", "published_at": "2026-04-26 18:34:04", "summary": null, "content_snippet": "Anthropic's Project Deal demonstrates that Claude AI agents have successfully completed 186 real-world marketplace transactions, showcasing the commercial viability of AI-driven automation.", "full_text": null}]}, {"id": 298, "date": "2026-04-27", "category": "products_tools", "headline": "AI Hero's 'Grill Me' skill sharpens AI coding workflows", "summary": "Matt Pocock's 'Grill Me' skill forces AI models to rigorously interview users before coding, creating shared mental models to improve code quality in specs-to-code workflows.", "created_at": "2026-04-27 08:25:24", "articles": [{"id": 1109, "title": "AI Hero's 'Grill Me' skill improves AI coding workflows via rigorous questioning", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/y67yurrwg39wnw2qjn58.html#story-10", "source_name": "The Neuron", "published_at": "2026-04-26 18:34:04", "summary": null, "content_snippet": "Matt Pocock's 'Grill Me' skill forces AI models to interview users rigorously before coding, aiming to create shared mental models and improve code quality in 'specs-to-code' workflows.", "full_text": "Meta told staff this week it's cutting 10% of its workforce, roughly 8,000 people , in what Bloomberg called a \"push for efficiency\" and CNN called an AI-driven reorg. The cuts hit hardest inside Meta Superintelligence Labs, the AI division Zuckerberg spun up last year to compete with OpenAI and Anthropic."}]}, {"id": 299, "date": "2026-04-27", "category": "editorial", "headline": "Analyst replaces 100-person team with $6K/day Claude spending", "summary": "An energy analyst ('Jeremy') spent $6,000 daily on Claude tokens for three weeks, singlehandedly rebuilding a product that a 100-person team had worked on for a decade. This case study highlights AI's disruptive potential.", "created_at": "2026-04-27 08:25:24", "articles": [{"id": 1107, "title": "Jeremy story: Analyst replaces 100-person team with $6K/day Claude spending", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/y67yurrwg39wnw2qjn58.html#story-8", "source_name": "The Neuron", "published_at": "2026-04-26 18:34:04", "summary": null, "content_snippet": "An energy analyst ('Jeremy') spent $6,000 daily on Claude tokens for three weeks, singlehandedly rebuilding a product that a 100-person team had worked on for a decade, illustrating AI's disruptive productivity potential.", "full_text": "On Patrick O'Shaughnessy's podcast this week, SemiAnalysis' Dylan Patel told a story about \"Jeremy,\" an energy analyst on his team who spent $6,000 a day on Claude tokens for three weeks. Jeremy singlehandedly rebuilt a product that a 100-person data-services team at an incumbent had been working on for a decade."}]}, {"id": 300, "date": "2026-04-27", "category": "products_tools", "headline": "AlphaSignal offers free Workspace Agents until May 2026", "summary": "AlphaSignal is providing Workspace Agents for free until May 2026, allowing teams to automate workflows and collaborate more efficiently without immediate cost barriers.", "created_at": "2026-04-27 08:25:24", "articles": [{"id": 1136, "title": "AlphaSignal offers Workspace Agents for free until May 2026", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/i6z7z3qfe9hdo9v6cyz3.html#story-9", "source_name": "AlphaSignal", "published_at": "2026-04-24 23:59:07", "summary": null, "content_snippet": "AlphaSignal is providing Workspace Agents for free until May 2026, allowing teams to automate workflows and collaborate more efficiently without immediate cost barriers.", "full_text": null}]}, {"id": 301, "date": "2026-04-27", "category": "products_tools", "headline": "AlphaSignal launches API at $5/1M tokens with 1M context window", "summary": "AlphaSignal introduced API pricing starting at $5 per million input tokens, featuring a 1-million token context window. This makes advanced AI capabilities more affordable and accessible.", "created_at": "2026-04-27 08:25:24", "articles": [{"id": 1135, "title": "AlphaSignal announces API pricing at $5 per million tokens with 1M token context window", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/i6z7z3qfe9hdo9v6cyz3.html#story-8", "source_name": "AlphaSignal", "published_at": "2026-04-24 23:59:07", "summary": null, "content_snippet": "AlphaSignal introduced API pricing starting at $5 per million input tokens, featuring a 1-million token context window, making advanced AI capabilities more affordable and accessible.", "full_text": null}]}, {"id": 302, "date": "2026-04-27", "category": "industry_business", "headline": "Google to invest up to $40B in Anthropic amid AI agent race", "summary": "Google plans a $10B-$40B investment in Anthropic, following Amazon's $5B stake, as AI agents like Claude demonstrate autonomous deal-making capabilities. This signals a major AI infrastructure arms race.", "created_at": "2026-04-27 17:19:19", "articles": [{"id": 1156, "title": "Google to invest up to $40 billion in Anthropic", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/l0iwuaabvhxppwz7pefe.html#story-1", "source_name": "Unknown", "published_at": "2026-04-27 14:39:01", "summary": null, "content_snippet": "Google plans to invest at least $10 billion in Anthropic, with the potential to increase the total to $40 billion if performance targets are met. The funding, which follows Amazon’s $5 billion investment, highlights the growing importance of infrastructure in the AI competition.", "full_text": "Google will invest at least $10 billion in Anthropic , with the total potentially rising to $40 billion if performance targets are met, according to Bloomberg. The report comes days after Amazon committed $5 billion under a similar structure, with both deals said to value Anthropic at $350 billion. Demand has surged as Claude and tools like Claude Code gain traction with businesses looking to move faster and automate internal work. The funding would also help Anthropic lock in more chips and cloud capacity, showing how infrastructure has become one of the biggest weapons in the AI race."}]}, {"id": 303, "date": "2026-04-27", "category": "model_releases", "headline": "Anthropic's Claude agents autonomously complete $4K in real deals", "summary": "Anthropic's AI agents successfully negotiated 186 real-world deals worth $4,000 without human intervention in Project Deal, proving autonomous economic agency. This follows internal tests showing superior performance over weaker models.", "created_at": "2026-04-27 17:19:19", "articles": [{"id": 1158, "title": "Anthropic's Claude agents autonomously buy, sell, and negotiate deals in Project Deal", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/l0iwuaabvhxppwz7pefe.html#story-3", "source_name": "Unknown", "published_at": "2026-04-27 14:39:01", "summary": null, "content_snippet": "Anthropic’s internal test, Project Deal, demonstrated that Claude agents could autonomously handle buying, selling, and negotiating deals with no human approval. The experiment revealed significant performance gaps between different Claude models, suggesting AI commerce could arrive faster than expected.", "full_text": "Anthropic recently ran Project Deal , a week-long internal test where 69 employees handed buying and selling decisions entirely to Claude agents with no human approval. Each participant started with a $100 budget, while the AI created listings, negotiated prices, accepted offers, and completed trades inside Slack. The experiment produced 186 deals worth more than $4,000 across over 500 listed items. It also exposed a clear gap in model quality: Claude Opus agents consistently got better prices and closed more deals than Haiku versions, while most users did not realize they were getting worse results. The future of AI commerce may arrive faster than expected, but not all agents will be equal.”"}, {"id": 1159, "title": "Anthropic lets Claude negotiate real deals autonomously, closes $4,000 in trades", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/flze0zxy4xeu9pl7u831.html#story-0", "source_name": "AlphaSignal", "published_at": "2026-04-27 13:34:54", "summary": null, "content_snippet": "Anthropic demonstrated AI agents negotiating real financial transactions on behalf of users, closing 186 deals worth over $4,000 without human intervention. The experiment revealed that higher-quality models (like Opus) secured better deals than cheaper ones (like Haiku), potentially costing users money unknowingly.", "full_text": null}, {"id": 1173, "title": "Anthropic's AI agents successfully complete real deals in a test marketplace", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/qzj75u4u8s0vxi94rjuo.html#story-6", "source_name": "The Neuron", "published_at": "2026-04-27 11:32:20", "summary": null, "content_snippet": "Anthropic's AI agents demonstrated the ability to strike real deals in a test marketplace, outperforming weaker models that failed without realizing it.", "full_text": null}]}, {"id": 304, "date": "2026-04-27", "category": "products_tools", "headline": "Cursor integrates GPT-5.5 at 50% discount, smashes benchmarks", "summary": "Cursor added OpenAI's GPT-5.5 at half price, achieving a 72.8% benchmark score—outperforming previous models. This marks a major leap in AI-powered coding assistance efficiency.", "created_at": "2026-04-27 17:19:19", "articles": [{"id": 1160, "title": "Cursor adds GPT-5.5 at 50% off, tops its own benchmark at 72.8%", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/flze0zxy4xeu9pl7u831.html#story-1", "source_name": "AlphaSignal", "published_at": "2026-04-27 13:34:54", "summary": null, "content_snippet": "Cursor integrated OpenAI's GPT-5.5 at a discounted rate, achieving a 72.8% benchmark score and outperforming its previous models, signaling a major leap in AI-powered coding assistance.", "full_text": null}]}, {"id": 305, "date": "2026-04-27", "category": "open_source", "headline": "NVIDIA open-sources Lyra 2.0 for 3D world generation from images", "summary": "NVIDIA released Lyra 2.0, an open-source model converting 2D images into interactive 3D environments. This expands applications in gaming, simulation, and VR with minimal hardware requirements.", "created_at": "2026-04-27 17:19:19", "articles": [{"id": 1161, "title": "NVIDIA open-sources Lyra 2.0, a model that generates explorable 3D worlds from images", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/flze0zxy4xeu9pl7u831.html#story-2", "source_name": "AlphaSignal", "published_at": "2026-04-27 13:34:54", "summary": null, "content_snippet": "NVIDIA released Lyra 2.0, an open-source model capable of converting 2D images into interactive 3D environments, expanding possibilities for gaming, simulation, and virtual reality applications.", "full_text": null}]}, {"id": 306, "date": "2026-04-27", "category": "open_source", "headline": "Obscura: Rust-based headless browser loads pages 6x faster than Chrome", "summary": "Obscura, an open-source headless browser, reduces memory usage by 85% and speeds up page loads by 6x compared to Chrome. It includes stealth features like fingerprint randomization for privacy.", "created_at": "2026-04-27 17:19:19", "articles": [{"id": 1165, "title": "Open-source headless browser Obscura loads pages 6x faster than Chrome with built-in stealth", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/flze0zxy4xeu9pl7u831.html#story-6", "source_name": "AlphaSignal", "published_at": "2026-04-27 13:34:54", "summary": null, "content_snippet": "Obscura, an open-source headless browser built in Rust, reduces memory usage by 85% and speeds up page loads by 6x compared to Chrome, while including stealth features like fingerprint randomization and tracker blocking.", "full_text": null}]}, {"id": 307, "date": "2026-04-27", "category": "products_tools", "headline": "Google's NotebookLM auto-labels sources to streamline research", "summary": "NotebookLM now automatically labels and sorts sources when five or more are added, streamlining research workflows. This addresses the growing challenge of managing multiple references in AI-assisted work.", "created_at": "2026-04-27 17:19:19", "articles": [{"id": 1164, "title": "NotebookLM now auto-labels and sorts sources when you hit five or more", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/flze0zxy4xeu9pl7u831.html#story-5", "source_name": "AlphaSignal", "published_at": "2026-04-27 13:34:54", "summary": null, "content_snippet": "Google's NotebookLM introduced automated source labeling and organization features, streamlining research workflows by intelligently categorizing and sorting references when multiple sources are added.", "full_text": null}]}, {"id": 308, "date": "2026-04-27", "category": "funding_acquisitions", "headline": "China blocks Meta's $2B Manus acquisition over national security", "summary": "China's NDRC ordered Meta to unwind its $2B acquisition of AI startup Manus due to foreign ownership and national security concerns. This reverses a major deal in the AI talent acquisition race.", "created_at": "2026-04-27 17:19:19", "articles": [{"id": 1155, "title": "Meta's $2 billion Manus acquisition blocked by China", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/l0iwuaabvhxppwz7pefe.html#story-0", "source_name": "Unknown", "published_at": "2026-04-27 14:39:01", "summary": null, "content_snippet": "China’s National Development and Reform Commission ordered Meta to unwind its $2 billion acquisition of AI startup Manus due to foreign ownership and national security concerns, reversing a deal that had already closed. This rare move could cool China’s startup market and adds another setback for Meta in the AI race.", "full_text": "Meta has reportedly been ordered by China to unwind its $2 billion acquisition of AI startup Manus, in a rare move that reverses a deal after it had already closed. The notice is said to have come from China’s National Development and Reform Commission, citing foreign ownership and national security concerns tied to advanced AI assets. It is still unclear how the deal would be reversed, with money already transferred and staff reportedly integrated after Manus moved operations to Singapore. The decision could cool China’s startup market and adds another setback for Meta as it races against OpenAI and Anthropic."}]}, {"id": 309, "date": "2026-04-27", "category": "sci_tech_trends", "headline": "Silicon Valley bets on gene-editing to create 'baby geniuses' as AI hedge", "summary": "Peter Thiel, Sam Altman, and other tech leaders are funding gene-editing startups aiming to enhance human intelligence as a precaution against AI threats. This reflects growing transhumanist ambitions.", "created_at": "2026-04-27 17:19:19", "articles": [{"id": 1174, "title": "Silicon Valley leaders invest in gene-editing startups to create 'baby geniuses' as AI hedge", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/qzj75u4u8s0vxi94rjuo.html#story-7", "source_name": "The Neuron", "published_at": "2026-04-27 11:32:20", "summary": null, "content_snippet": "Peter Thiel, Sam Altman, Brian Armstrong, and Marc Andreessen are backing gene-editing startups aiming to create 'baby geniuses' as a precaution against AI threats.", "full_text": null}]}, {"id": 310, "date": "2026-04-27", "category": "research", "headline": "Stanford finds one prompt trick doubles GPT and Claude creativity", "summary": "A simple prompt modification discovered by Stanford researchers doubles the creativity of models like GPT and Claude. This offers a low-cost way to enhance AI output without additional training.", "created_at": "2026-04-27 17:19:19", "articles": [{"id": 1162, "title": "Stanford finds one prompt trick makes GPT and Claude 2x more creative", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/flze0zxy4xeu9pl7u831.html#story-3", "source_name": "AlphaSignal", "publish gent model optimized for 16GB GPUs, making advanced AI capabilities accessible on lower-end hardware for edge devices and embedded systems.", "full_text": null}]}, {"id": 313, "date": "2026-04-27", "category": "industry_business", "headline": "AI operational costs now exceed employee salaries at some firms", "summary": "AI infrastructure costs have become so high for some companies that they now surpass total employee salaries, signaling a dramatic shift in tech spending priorities toward AI infrastructure.", "created_at": "2026-04-27 17:19:19", "articles": [{"id": 1171, "title": "AI operational costs exceed employee salaries at some companies", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/qzj75u4u8s0vxi94rjuo.html#story-4", "source_name": "The Neuron", "published_at": "2026-04-27 11:32:20", "summary": null, "content_snippet": "AI infrastructure costs have become so high for some companies that they now surpass total employee salaries, signaling a shift in tech spending priorities.", "full_text": null}]}, {"id": 314, "date": "2026-04-27", "category": "industry_business", "headline": "DeepSeek cuts API prices 2.5x, undercutting GPT-5.5 Pro by 700x", "summary": "DeepSeek slashed API prices by 2.5x, making its models 700x cheaper than GPT-5.5 Pro. This intensifies price competition and accelerates AI adoption across industries.", "created_at": "2026-04-27 17:19:19", "articles": [{"id": 1172, "title": "DeepSeek cuts API prices 2.5x, making its models 700x cheaper than GPT-5.5 Pro", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/qzj75u4u8s0vxi94rjuo.html#story-5", "source_name": "The Neuron", "published_at": "2026-04-27 11:32:20", "summary": null, "content_snippet": "DeepSeek slashed its API prices by 2.5 times, reducing costs to 700 times cheaper than GPT-5.5 Pro, intensifying price competition in the AI market.", "full_text": null}]}, {"id": 272, "date": "2026-04-26", "category": "editorial", "headline": "Spiral Adds Memory to API Agents for Personalized Writing Assistance", "summary": "Spiral is enhancing its API agents with memory capabilities, allowing writing assistants to remember user preferences and improve personalized assistance over time.", "created_at": "2026-04-26 16:38:57", "articles": [{"id": 1066, "title": "Spiral Adds Memory to API Agents for Personalized Writing Assistance", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/6e3cvym9p9rfy8tswxbn.html#story-15", "source_name": "Every", "published_at": "2026-04-26 11:55:21", "summary": null, "content_snippet": "Spiral is enhancing its API agents with memory capabilities, allowing writing assistants to remember user preferences and improve personalized assistance over time.", "full_text": "Spiral is adding memory to its API agents, so your writing assistant can learn your projects, preferences, and common corrections over time. Instead of restating tone, structure, or your usual edits in every session, you can carry that context forward and get drafts that pick up where the last one left off. Memory is live now through the API (it’s not inside the app yet, but stay tuned). Try it at writewithspiral.com ."}]}, {"id": 273, "date": "2026-04-26", "category": "editorial", "headline": "Cora Seeks Alpha Testers for New Inbox Experience with Advanced Features", "summary": "Cora is recruiting alpha testers for its new inbox experience, which supports drafts, snooze, grouped views, keyboard shortcuts, metadata parsing, bulk archive, undo, and a context-aware chat for email management.", "created_at": "2026-04-26 16:38:57", "articles": [{"id": 1065, "title": "Cora Seeks Alpha Testers for New Inbox Experience with Advanced Features", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/6e3cvym9p9rfy8tswxbn.html#story-14", "source_name": "Every", "published_at": "2026-04-26 11:55:21", "summary": null, "content_snippet": "Cora is recruiting alpha testers for its new inbox experience, which supports drafts, snooze, grouped views, keyboard shortcuts, metadata parsing, bulk archive, undo, and a context-aware chat for email management.", "full_text": null}]}, {"id": 274, "date": "2026-04-26", "category": "editorial", "headline": "Every Releases Compound Engineering Camp Recording Covering Plugin and Workflow Updates", "summary": "The Compound Engineering Camp recording features Kieran Klaassen and Trevin Chow discussing new updates, deeper dives into brainstorming and ideation steps, and practical examples of using the compound engineering plugin in product-focused workflows.", "created_at": "2026-04-26 16:38:57", "articles": [{"id": 1064, "title": "Every Releases Compound Engineering Camp Recording Covering Plugin and Workflow Updates", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/6e3cvym9p9rfy8tswxbn.html#story-13", "source_name": "Every", "published_at": "2026-04-26 11:55:21", "summary": null, "content_snippet": "The Compound Engineering Camp recording features Kieran Klaassen and Trevin Chow discussing new updates, deeper dives into brainstorming and ideation steps, and practical examples of using the compound engineering plugin in product-focused workflows.", "full_text": null}]}, {"id": 275, "date": "2026-04-26", "category": "editorial", "headline": "Every and Betaworks Host 'Software Is the New Media' Event in New York City on April 28", "summary": "Every and Betaworks are hosting an evening conversation in New York City on April 28 to discuss how AI is transforming media, content, and software, and its implications for builders in these fields.", "created_at": "2026-04-26 16:38:57", "articles": [{"id": 1063, "title": "Every and Betaworks Host 'Software Is the New Media' Event in New York City on April 28", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/6e3cvym9p9rfy8tswxbn.html#story-12", "source_name": "Every", "published_at": "2026-04-26 11:55:21", "summary": null, "content_snippet": "Every and Betaworks are hosting an evening conversation in New York City on April 28 to discuss how AI is transforming media, content, and software, and its implications for builders in these fields.", "full_text": null}]}, {"id": 276, "date": "2026-04-26", "category": "editorial", "headline": "Every Hosts Codex for Knowledge Work Camp Demonstrating AI for Drafting, Research, and Automation", "summary": "Every's Codex for Knowledge Work Camp showcased how to use OpenAI's Codex for drafting, research, summarizing, parallel task execution, and building small automation tools for routine knowledge work.", "created_at": "2026-04-26 16:38:57", "articles": [{"id": 1062, "title": "Every Hosts Codex for Knowledge Work Camp Demonstrating AI for Drafting, Research, and Automation", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/6e3cvym9p9rfy8tswxbn.html#story-11", "source_name": "Every", "published_at": "2026-04-26 11:55:21", "summary": null, "content_snippet": "Every's Codex for Knowledge Work Camp showcased how to use OpenAI's Codex for drafting, research, summarizing, parallel task execution, and building small automation tools for routine knowledge work.", "full_text": null}]}, {"id": 277, "date": "2026-04-26", "category": "editorial", "headline": "Katie Parrott Shares How AI Autopilot Led to Accidental Duplicate Work and Three Practices to Stay Focused", "summary": "Katie Parrott accidentally completed a client assignment twice due to over-reliance on AI, highlighting the cognitive risks of fluent AI output. She shares three practices to maintain focus and scrutiny in work.", "created_at": "2026-04-26 16:38:57", "articles": [{"id": 1061, "title": "Katie Parrott Shares How AI Autopilot Led to Accidental Duplicate Work and Three Practices to Stay Focused", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/6e3cvym9p9rfy8tswxbn.html#story-10", "source_name": "Every", "published_at": "2026-04-26 11:55:21", "summary": null, "content_snippet": "Katie Parrott accidentally completed a client assignment twice due to over-reliance on AI, highlighting the cognitive risks of fluent AI output. She shares three practices to maintain focus and scrutiny in work.", "full_text": "“How I Escaped AI Autopilot” by Katie Parrott /Working Overtime: Katie Parrott accidentally completed a client assignment twice—because she’d delegated so much to AI that her brain never bothered storing a memory of doing it the first time. Research on pilots and cognitive bias explains why fluent, polished AI output is what makes it hardest to scrutinize. Read this for the three practices she’s now using to stay focused on her work."}]}, {"id": 278, "date": "2026-04-26", "category": "editorial", "headline": "Prompts Replacing Download Buttons as Front Door for AI-Native Tools", "summary": "Prompts are increasingly becoming the primary interface for AI-native tools, replacing traditional download buttons and shifting how users interact with AI applications.", "created_at": "2026-04-26 16:38:57", "articles": [{"id": 1060, "title": "Prompts Replacing Download Buttons as Front Door for AI-Native Tools", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/6e3cvym9p9rfy8tswxbn.html#story-9", "source_name": "Every", "published_at": "2026-04-26 11:55:21", "summary": null, "content_snippet": "Prompts are increasingly becoming the primary interface for AI-native tools, replacing traditional download buttons and shifting how users interact with AI applications.", "full_text": null}]}, {"id": 279, "date": "2026-04-26", "category": "editorial", "headline": "Austin Tedesco Shares Four-Step Workflow for Polished Product Videos Using Remotion and Claude Code", "summary": "Austin Tedesco details a four-step workflow for producing polished product videos with Remotion and Claude Code, demonstrating how AI tools can streamline creative processes.", "created_at": "2026-04-26 16:38:57", "articles": [{"id": 1059, "title": "Austin Tedesco Shares Four-Step Workflow for Polished Product Videos Using Remotion and Claude Code", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/6e3cvym9p9rfy8tswxbn.html#story-8", "source_name": "Every", "published_at": "2026-04-26 11:55:21", "summary": null, "content_snippet": "Austin Tedesco details a four-step workflow for producing polished product videos with Remotion and Claude Code, demonstrating how AI tools can streamline creative processes.", "full_text": null}]}, {"id": 280, "date": "2026-04-26", "category": "editorial", "headline": "GPT-5.5 Sparks Debate Between Nityesh and Naveen on Model vs. Product Rivalry Between Anthropic and OpenAI", "summary": "GPT-5.5's release ignited a debate between Nityesh (Claude Code advocate) and Naveen Naidu (Codex partisan) about whether the Anthropic vs. OpenAI rivalry is a model question or a product one.", "created_at": "2026-04-26 16:38:57", "articles": [{"id": 1058, "title": "GPT-5.5 Sparks Debate Between Nityesh and Naveen on Model vs. Product Rivalry Between Anthropic and OpenAI", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/6e3cvym9p9rfy8tswxbn.html#story-7", "source_name": "Every", "published_at": "2026-04-26 11:55:21", "summary": null, "content_snippet": "GPT-5.5's release ignited a debate between Nityesh (Claude Code advocate) and Naveen Naidu (Codex partisan) about whether the Anthropic vs. OpenAI rivalry is a model question or a product one.", "full_text": "“Model Wars” by Laura Entis /Context Window: GPT-5.5 touched off a debate between Nityesh (Claude Code devotee) and Naveen Naidu (Codex partisan) about whether the Anthropic-vs.-OpenAI rivalry is a model question or a product one. Plus: Austin Tedesco ‘s four-step workflow for producing polished product videos with Remotion and Claude Code, and why prompts are replacing the download button as the front door for AI-native tools."}]}, {"id": 281, "date": "2026-04-26", "category": "editorial", "headline": "Nityesh Agarwal Shares Workflow for Monitoring AI Stack Vulnerabilities with Agent-Run X Feed", "summary": "Nityesh Agarwal outlines a workflow for setting up an agent-run X feed that monitors an AI stack for vulnerabilities overnight, helping users proactively address security risks.", "created_at": "2026-04-26 16:38:57", "articles": [{"id": 1057, "title": "Nityesh Agarwal Shares Workflow for Monitoring AI Stack Vulnerabilities with Agent-Run X Feed", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/6e3cvym9p9rfy8tswxbn.html#story-6", "source_name": "Every", "published_at": "2026-04-26 11:55:21", "summary": null, "content_snippet": "Nityesh Agarwal outlines a workflow for setting up an agent-run X feed that monitors an AI stack for vulnerabilities overnight, helping users proactively address security risks.", "full_text": null}]}, {"id": 282, "date": "2026-04-26", "category": "editorial", "headline": "Vercel and Lovable Experience Back-to-Back Security Incidents Exposing User Data", "summary": "Back-to-back security incidents at Vercel and Lovable reveal two distinct ways AI tools can expose user data, raising concerns about data security in AI-driven platforms.", "created_at": "2026-04-26 16:38:57", "articles": [{"id": 1056, "title": "Vercel and Lovable Experience Back-to-Back Security Incidents Exposing User Data", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/6e3cvym9p9rfy8tswxbn.html#story-5", "source_name": "Every", "published_at": "2026-04-26 11:55:21", "summary": null, "content_snippet": "Back-to-back security incidents at Vercel and Lovable reveal two distinct ways AI tools can expose user data, raising concerns about data security in AI-driven platforms.", "full_text": "“Mini-Vibe Check: Claude Design Isn’t for Designers—Yet” by Katie Parrott /Context Window: Creative director Lucas Crespo put Anthropic’s new Claude Design through its paces. He finds it useful for empowering non-designers to produce on-brand assets, but poorly suited for open-ended creative work. Plus: Back-to-back security incidents at Vercel and Lovable reveal two distinct ways AI tools can expose your data, and a workflow from Nityesh Agarwal for setting up an agent-run X feed that monitors your AI stack for vulnerabilities overnight."}]}, {"id": 283, "date": "2026-04-26", "category": "editorial", "headline": "Anthropic's Claude Design Found Useful for Non-Designers but Limited for Open-Ended Creative Work", "summary": "Creative director Lucas Crespo tested Anthropic's new Claude Design and found it useful for empowering non-designers to produce on-brand assets but poorly suited for open-ended creative tasks.", "created_at": "2026-04-26 16:38:57", "articles": [{"id": 1055, "title": "Anthropic's Claude Design Found Useful for Non-Designers but Limited for Open-Ended Creative Work", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/6e3cvym9p9rfy8tswxbn.html#story-4", "source_name": "Every", "published_at": "2026-04-26 11:55:21", "summary": null, "content_snippet": "Creative director Lucas Crespo tested Anthropic's new Claude Design and found it useful for empowering non-designers to produce on-brand assets but poorly suited for open-ended creative tasks.", "full_text": null}]}, {"id": 284, "date": "2026-04-26", "category": "editorial", "headline": "Every's Claudie Agent Adopts New Responsibilities Without Spawning Additional Agents", "summary": "Every's consulting agent Claudie continues to absorb new responsibilities instead of creating new agents, highlighting two organizational structures that will define how companies deploy AI employees.", "created_at": "2026-04-26 16:38:57", "articles": [{"id": 1054, "title": "Every's Claudie Agent Adopts New Responsibilities Without Spawning Additional Agents", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/6e3cvym9p9rfy8tswxbn.html#story-3", "source_name": "Every", "published_at": "2026-04-26 11:55:21", "summary": null, "content_snippet": "Every's consulting agent Claudie continues to absorb new responsibilities instead of creating new agents, highlighting two organizational structures that will define how companies deploy AI employees.", "full_text": null}]}, {"id": 285, "date": "2026-04-26", "category": "editorial", "headline": "Every Introduces Monologue Notes for Recording and Transcribing Meetings and Calls", "summary": "Monologue Notes, a new feature in the Monologue app, records and transcribes meetings, calls, and voice memos, making transcripts available as context for coding agents. Two starter prompts help turn recordings into structured work sessions.", "created_at": "2026-04-26 16:38:57", "articles": [{"id": 1053, "title": "Every Introduces Monologue Notes for Recording and Transcribing Meetings and Calls", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/6e3cvym9p9rfy8tswxbn.html#story-2", "source_name": "Every", "published_at": "2026-04-26 11:55:21", "summary": null, "content_snippet": "Monologue Notes, a new feature in the Monologue app, records and transcribes meetings, calls, and voice memos, making transcripts available as context for coding agents. Two starter prompts help turn recordings into structured work sessions.", "full_text": "“Introducing Monologue Notes: Record Every Meeting, Call, and Voice Memo” by Naveen Naidu /On Every: The best thinking can happen away from your desk—on walks, on calls, in meetings—and then vanishes. Monologue Notes , a new feature in the Monologue app, records and transcribes all of it, then makes those transcripts available as context for whatever coding agent you use. Read this for the two starter prompts that turn your recordings into a structured work session and try it for yourself ."}]}, {"id": 286, "date": "2026-04-26", "category": "editorial", "headline": "Every Tests GPT-5.5 Benchmark Showing Strong Performance in Engineering Tasks", "summary": "Every's testing found GPT-5.5 to be the strongest OpenAI model for writing in about a year, outperforming predecessors in engineering tasks and excelling when working with existing plans or systems. Benchmark results and guidance on when to use GPT-5.5 versus Opus 4.7 are provided.", "created_at": "2026-04-26 16:38:57", "articles": [{"id": 1052, "title": "Every Tests GPT-5.5 Benchmark Showing Strong Performance in Engineering Tasks", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/6e3cvym9p9rfy8tswxbn.html#story-1", "source_name": "Every", "published_at": "2026-04-26 11:55:21", "summary": null, "content_snippet": "Every's testing found GPT-5.5 to be the strongest OpenAI model for writing in about a year, outperforming predecessors in engineering tasks and excelling when working with existing plans or systems. Benchmark results and guidance on when to use GPT-5.5 versus Opus 4.7 are provided.", "full_text": "“Vibe Check: GPT-5.5 Has It All” by Katie Parrott /Vibe Check: The newly released GPT-5.5 is faster and easier to work with than its predecessors while also outperforming them on serious engineering tasks. Every’s testing found it to be the strongest OpenAI model for writing in about a year, and its biggest edge over Opus 4.7 shows up when working with an existing plan or system. Read this for the benchmark results, Reach Test ratings, and guidance on when to reach for GPT-5.5 versus Opus 4.7."}]}, {"id": 287, "date": "2026-04-26", "category": "editorial", "headline": "Codex Compound Engineering Plugin Reaches 15,000 GitHub Stars with Major Update", "summary": "The Codex compound engineering plugin has surpassed 15,000 GitHub stars and received a significant update, expanding compatibility with more tools, adding built-in agents and skills, and simplifying setup. This marks a major milestone for the plugin's adoption and functionality.", "created_at": "2026-04-26 16:38:57", "articles": [{"id": 1051, "title": "Codex Compound Engineering Plugin Reaches 15,000 GitHub Stars with Major Update", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/6e3cvym9p9rfy8tswxbn.html#story-0", "source_name": "Every", "published_at": "2026-04-26 11:55:21", "summary": null, "content_snippet": "The Codex compound engineering plugin has surpassed 15,000 GitHub stars and received a significant update, expanding compatibility with more tools, adding built-in agents and skills, and simplifying setup. This marks a major milestone for the plugin's adoption and functionality.", "full_text": null}]}, {"id": 288, "date": "2026-04-26", "category": "model_releases", "headline": "DeepSeek unleashes v4 and v4 Flash with 1M token context", "summary": "DeepSeek launched two open models: v4 (1.6T params) and v4 Flash (284B params), both featuring a 1M token context window and MoE architecture. These models set new benchmarks for long-context and efficiency in open-source AI. (AlphaSignal: 1048)", "created_at": "2026-04-26 16:39:00", "articles": [{"id": 1048, "title": "DeepSeek releases DeepSeek-v4 and DeepSeek-v4 Flash with 1M token context and MoE architecture", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/x3gvwhgqeg14c7cvf7cn.html#story-0", "source_name": "AlphaSignal", "published_at": "2026-04-26 15:11:52", "summary": null, "content_snippet": "DeepSeek introduced two new open models, DeepSeek-v4 (1.6T parameters) and DeepSeek-v4 Flash (284B parameters), featuring a 1M token context window and Mixture-of-Experts (MoE) architecture with memory optimizations like Compressed Sparse Attention (CSA) and Heavily Compressed Attention (HCA).", "full_text": null}]}, {"id": 289, "date": "2026-04-26", "category": "model_releases", "headline": "Kimi-K2.6 debuts with 1M params, 256K context, and multimodal support", "summary": "Kimi-K2.6, a new open model, leads open-source with 1M total parameters, 256K token context, and native multimodal capabilities (text, image, video). It excels in agentic frameworks and autonomous task decomposition. (AlphaSignal: 1049)", "created_at": "2026-04-26 16:39:00", "articles": [{"id": 1049, "title": "Kimi-K2.6 launches with 1M total parameters, 256K token context, and native multimodal support", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/x3gvwhgqeg14c7cvf7cn.html#story-1", "source_name": "AlphaSignal", "published_at": "2026-04-26 15:11:52", "summary": null, "content_snippet": "Kimi-K2.6, a new open model, leads the open-source landscape with 1M total parameters, a 256K token context window, and native multimodal capabilities (text, image, video), excelling in agentic frameworks and coding tasks.", "full_text": "While the world was focused on Claude Opus 4.7 and GPT-5.5, we saw the release of two very important open LLMs: DeepSeek-v4 and Kimi-K2.6. These two models set the new frontier for open source AI and have been especially designed for agentic applications. Today, we dive into the technical breakthroughs behind the latest mega-releases, the licensing catches to watch for, and how they rewrite the rules of agentic infrastructure. Advances in open LLMs are giving more options to developers, putting them in control of their model, data, and compute."}]}, {"id": 290, "date": "2026-04-26", "category": "model_releases", "headline": "Kimi-K2.6 orchestrates 13-hour agent swarm with 1,000 tool calls", "summary": "Kimi-K2.6 demonstrated autonomous swarm orchestration, decomposing complex tasks into sub-tasks, executing them in parallel with specialized agents, and managing dependencies over 13 hours and 1,000 tool calls. (AlphaSignal: 1050)", "created_at": "2026-04-26 16:39:00", "articles": [{"id": 1050, "title": "Kimi-K2.6 demonstrates autonomous agent swarm orchestration over 13 hours and 1,000 tool calls", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/x3gvwhgqeg14c7cvf7cn.html#story-2", "source_name": "AlphaSignal", "published_at": "2026-04-26 15:11:52", "summary": null, "content_snippet": "Kimi-K2.6 showcased its ability to act as a swarm orchestrator, autonomously decomposing complex tasks into sub-tasks, executing them in parallel with specialized agents, and managing dependencies over an extended period.", "full_text": null}]}, {"id": 254, "date": "2026-04-25", "category": "model_releases", "headline": "OpenAI's GPT-5.5 beats rivals in agentic coding benchmarks", "summary": "GPT-5.5 introduces advanced agentic coding, autonomously planning, debugging, and completing multi-step tasks. It outperforms Opus 4.7 on SWE-Bench Pro (58.6% vs 64.3%) but faces memorization concerns. OpenAI also launched Workspace Agents for team workflow automation.", "created_at": "2026-04-25 07:16:20", "articles": [{"id": 853, "title": "GPT-5.5 loses to Opus 4.7 on SWE-Bench Pro with noted memorization concerns", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/tlq89n1qhvy9r20wllbr.html#story-7", "source_name": "The Neuron", "published_at": "2026-04-24 11:07:56", "summary": null, "content_snippet": "GPT-5.5 scored 58.6% on SWE-Bench Pro compared to Opus 4.7's 64.3%, with Anthropic flagging potential memorization issues in the evaluation.", "full_text": "Anyway, the rest of the AI world spent the week trying to figure out why Opus 4.7 suddenly feels like a GPT model and GPT-5.5 feels like Claude. Uno reverse day. Opposite universe. Parallel dimension. Let's get into it."}, {"id": 876, "title": "OpenAI releases GPT-5.5 with stronger agentic coding capabilities", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/i6z7z3qfe9hdo9v6cyz3.html#story-0", "source_name": "AlphaSignal", "published_at": "2026-04-24 23:59:07", "summary": null, "content_snippet": "GPT-5.5 introduces advanced agentic coding, enabling AI to autonomously plan, use tools, debug, and complete multi-step tasks with improved efficiency in coding, computer use, and research workflows.", "full_text": null}, {"id": 877, "title": "OpenAI launches Workspace Agents in ChatGPT to automate team workflows", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/i6z7z3qfe9hdo9v6cyz3.html#story-1", "source_name": "AlphaSignal", "published_at": "2026-04-24 23:59:07", "summary": null, "content_snippet": "Workspace Agents allow teams to create shared, persistent AI agents that automate complex workflows across tools like Slack, reducing manual work and enabling long-running processes within organizational permissions.", "full_text": null}]}, {"id": 255, "date": "2026-04-25", "category": "model_releases", "headline": "Qwen3.6-27B outperforms 397B model on coding tasks", "summary": "Qwen3.6-27B, a 27B open-source model, surpasses its larger 397B sibling in coding benchmarks while running on just 18GB VRAM. It supports reasoning preservation and native multiturn capabilities.", "created_at": "2026-04-25 07:16:20", "articles": [{"id": 878, "title": "Qwen releases open-source 27B model that outperforms its 397B model on coding tasks", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/i6z7z3qfe9hdo9v6cyz3.html#story-2", "source_name": "AlphaSignal", "published_at": "2026-04-24 23:59:07", "summary": null, "content_snippet": "Qwen3.6-27B, a smaller open-source model, surpasses its larger 397B sibling in coding benchmarks while running on just 18GB VRAM, offering advanced features like reasoning preservation and native multimodal input.", "full_text": null}]}, {"id": 256, "date": "2026-04-25", "category": "products_tools", "headline": "Unsloth launches quantized Qwen3.6-27B with fine-tuning tools", "summary": "Unsloth optimized Qwen3.6-27B for efficient fine-tuning and tool integration, making it more accessible for developers to deploy and customize for specific applications.", "created_at": "2026-04-25 07:16:20", "articles": [{"id": 882, "title": "Unsloth releases quantized Qwen3.6-27B with fine-tuning and tool calling support", "url": "https://kill-the-newsletter.com/feeds/ur published_at": "2026-04-24 23:59:07", "summary": null, "content_snippet": "A breakthrough recurrent model achieves text embeddings with constant memory usage, overcoming the memory constraints of traditional transformer models and enabling more efficient processing of long sequences.", "full_text": null}]}, {"id": 259, "date": "2026-04-25", "category": "products_tools", "headline": "Open-source tool converts documents into editable PowerPoint decks", "summary": "A new open-source tool transforms any document into a fully customizable PowerPoint presentation, streamlining visual summaries and report creation.", "created_at": "2026-04-25 07:16:20", "articles": [{"id": 880, "title": "Open-source tool converts any document into a fully editable PowerPoint deck", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/i6z7z3qfe9hdo9v6cyz3.html#story-4", "source_name": "AlphaSignal", "published_at": "2026-04-24 23:59:07", "summary": null, "content_snippet": "A new open-source tool enables users to transform any document into a customizable PowerPoint presentation, streamlining the creation of visual summaries and reports.", "full_text": null}]}, {"id": 260, "date": "2026-04-25", "category": "industry_business", "headline": "Google open-sources AI design guidelines after Anthropic locks them down", "summary": "Google released its internal AI design guidelines as open-source resources, following Anthropic's decision to restrict access to its own guidelines, promoting transparency in AI development.", "created_at": "2026-04-25 07:16:20", "articles": [{"id": 879, "title": "Google open-sources its AI design guidelines after Anthropic locks them down", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/i6z7z3qfe9hdo9v6cyz3.html#story-3", "source_name": "AlphaSignal", "published_at": "2026-04-24 23:59:07", "summary": null, "content_snippet": "Google released its internal AI design guidelines as open-source resources, following Anthropic's decision to restrict access to its own guidelines, promoting transparency in AI development practices.", "full_text": null}]}, {"id": 261, "date": "2026-04-25", "category": "industry_business", "headline": "Anthropic's silent upgrade from L4 to L6 engineer in two months", "summary": "Anthropic transitioned from an L4 engineer (Opus 4.6) to an L6 engineer (Mythos) in just two months, suggesting significant internal advancements in model capabilities.", "created_at": "2026-04-25 07:16:20", "articles": [{"id": 859, "title": "Dylan Patel highlights Anthropic's silent upgrade from L4 to L6 engineer in two months", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/tlq89n1qhvy9r20wllbr.html#story-13", "source_name": "The Neuron", "published_at": "2026-04-24 11:07:56", "summary": null, "content_snippet": "Dylan Patel observed that Anthropic transitioned from an L4 engineer (Opus 4.6) to an L6 engineer (Mythos) in just two months, suggesting significant internal advancements.", "full_text": null}]}, {"id": 262, "date": "2026-04-25", "category": "industry_business", "headline": "Opus 4.7 'slow' due to Anthropic's compute constraints", "summary": "Dan Shipper noted Opus 4.7 appears slower than GPT-5.5 because Anthropic is operating under compute limitations, despite its advanced architecture.", "created_at": "2026-04-25 07:16:20", "articles": [{"id": 858, "title": "Opus 4.7 feels 'slow' due to Anthropic's compute constraints, per Dan Shipper", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/tlq89n1qhvy9r20wllbr.html#story-12", "source_name": "The Neuron", "published_at": "2026-04-24 11:07:56", "summary": null, "content_snippet": "Dan Shipper noted that Opus 4.7 appears slower than GPT-5.5 because Anthropic is operating under compute limitations, despite its advanced model architecture.", "full_text": "There's actually a real explanation. Every's Dan Shipper noticed the same thing : Opus 4.7 \"feels slow\" next to 5.5 because OpenAI has a hardware advantage you can actually feel. And SemiAnalysis' Dylan Patel pointed out that Anthropic silently went from an L4 engineer (Opus 4.6) to an L6 (Mythos) in two months. The Opus 4.7 the rest of us get is compute-starved and deliberately restrained. Anthropic is a Ferrari on fuel rationing; OpenAI just bought the gas station. (No offense meant.)"}]}, {"id": 263, "date": "2026-04-25", "category": "industry_business", "headline": "Opus 4.7 + GPT-5.5 handoff boosts coding performance to 62.5/100", "summary": "Combining Opus 4.7 for planning and GPT-5.5 for execution achieved a 62.5/100 score on Every's Senior Engineer benchmark, outperforming either model alone.", "created_at": "2026-04-25 07:16:20", "articles": [{"id": 857, "title": "Dan Shipper discovers Opus 4.7 + GPT-5.5 handoff boosts coding performance", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/tlq89n1qhvy9r20wllbr.html#story-11", "source_name": "The Neuron", "published_at": "2026-04-24 11:07:56", "summary": null, "content_snippet": "Combining Opus 4.7 for planning and GPT-5.5 for execution achieved a 62.5/100 score on Every's Senior Engineer benchmark, outperforming either model alone.", "full_text": "Every's Dan Shipper just found the cheat code for senior-engineer-level coding: use Opus 4.7 to write the plan, then hand that plan to GPT-5.5 to execute. On Every's internal Senior Engineer benchmark, this combo scored 62.5/100 (for context: human senior engineers score 80-90; Opus 4.7 alone scores in the low 30s; GPT-5.5 alone scores in the low-to-mid 40s)."}]}, {"id": 264, "date": "2026-04-25", "category": "editorial", "headline": "Companies adopt 'setup prompts' for AI tool installation instead of downloads", "summary": "A new trend sees companies using AI setup prompts—copied and pasted into tools like Claude Code or Codex—to automate the installation of AI tools, replacing traditional download buttons.", "created_at": "2026-04-25 11:45:39", "articles": cess for Cyber to vet defenders", "summary": "OpenAI introduced Trusted Access for Cyber, a vetting program for AI models like GPT-5.5, after XBOW described its capabilities as 'Mythos-like' and open to all, raising security concerns.", "created_at": "2026-04-25 11:45:43", "articles": [{"id": 856, "title": "Partner XBOW describes GPT-5.5 as 'Mythos-like hacking, open to all'", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/tlq89n1qhvy9r20wllbr.html#story-10", "source_name": "The Neuron", "published_at": "2026-04-24 11:07:56", "summary": null, "content_snippet": "XBOW characterized GPT-5.5's capabilities as resembling Anthropic's Mythos model, prompting OpenAI to introduce Trusted Access for Cyber for vetted defenders.", "full_text": null}]}, {"id": 267, "date": "2026-04-25", "category": "editorial", "headline": "Companies adopt 'setup prompts' to install AI tools via agents like Claude Code or Codex", "summary": "Instead of traditional download buttons, companies are using setup prompts that users paste into AI coding agents (Claude Code or Codex) to automatically install tools, streamlining the onboarding process.", "created_at": "2026-04-25 16:37:34", "articles": [{"id": 994, "title": "Companies adopt 'setup prompts' to install AI tools via agents like Claude Code or Codex", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/ac2synpnwl24tvra1tvo.html#story-11", "source_name": "Every", "published_at": "2026-04-24 15:03:10", "summary": null, "content_snippet": "Instead of traditional download buttons, companies are using setup prompts that users paste into AI coding agents (Claude Code or Codex) to automatically install tools, streamlining the onboarding process.", "full_text": null}]}, {"id": 268, "date": "2026-04-25", "category": "editorial", "headline": "Every's head of growth develops workflow to create polished product videos using AI tools", "summary": "Austin Tedesco, Every's head of growth, created a workfl iness.", "created_at": "2026-04-24 08:04:10", "articles": [{"id": 799, "title": "Hapax launches AI automation platform for organizations without manual prompting", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/jgkpjsx92z53chn17lgb.html#story-1", "source_name": "Every", "published_at": "2026-04-23 18:04:17", "summary": null, "content_snippet": "Hapax introduces an AI automation tool that observes organizational workflows, automates tasks, and deploys custom AI workers without requiring manual prompts, targeting enterprise efficiency and trustworthiness.", "full_text": "The worst part about AI today is that it’s passive—you need to prompt it to get what you want, slowing down your team and keeping its abilities limited to those who know how to use it best. Hapax fixes that. Hapax observes how your organization works, figures out what to automate on its own, and deploys custom AI workers to help each employee be more effective and efficient. It does it all without being prompted or set up. And it’s trustworthy: their customers include banks managing up to $90 billion in assets. Try it today with HAPAXDEMO to get 15 credits."}]}, {"id": 232, "date": "2026-04-24", "category": "editorial", "headline": "OpenAI releases GPT-5.5 with senior engineer-level coding and writing capabilities", "summary": "OpenAI's new GPT-5.5 model outperforms previous models in coding and writing tasks, scoring 62.5 on the Senior Engineer Benchmark and excelling in structured work like dashboards and client deliverables. It is praised for being faster, more personable, and easier to collaborate with than prior models.", "created_at": "2026-04-24 08:04:10", "articles": [{"id": 798, "title": "OpenAI releases GPT-5.5 with senior engineer-level coding and writing capabilities", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/jgkpjsx92z53chn17lgb.html#story-0", "source_name": "Every", "published_at": "2026-04-23 18:04:17", "summary": null, "content_snippet": "OpenAI's new GPT-5.5 model outperforms previous models in coding and writing tasks, scoring 62.5 on the Senior Engineer Benchmark and excelling in structured work like dashboards and client deliverables. It is praised for being faster, more personable, and easier to collaborate with than prior models.", "full_text": "GPT-5.5 , out today, feels easier to settle into. It’s fast enough to use constantly, personable enough to collaborate with, and assertive enough to carry a plan through serious engineering work. It’s better at writing than any OpenAI model we’ve used in about a year, and it produced the strongest result we’ve seen on our new Senior Engineer Benchmark, which measures how well models can rewrite a messy production codebase the way a senior engineer would. It’s rare for a model to feel easier and stronger at the same time."}]}, {"id": 233, "date": "2026-04-24", "category": "products_tools", "headline": "OpenAI’s ChatGPT for Clinicians outperforms physicians on medical benchmark", "summary": "OpenAI’s specialized ChatGPT for Clinicians surpassed physicians in performance on a new medical benchmark, signaling AI’s expanding role in healthcare diagnostics and decision-making.", "created_at": "2026-04-24 08:04:14", "articles": [{"id": 765, "title": "OpenAI’s ChatGPT for Clinicians outperforms physicians on new medical benchmark", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/eeo6gorovx5kya6q5kh4.html#story-3", "source_name": "The Neuron", "published_at": "2026-04-23 11:06:02", "summary": null, "content_snippet": "OpenAI’s specialized ChatGPT for Clinicians reportedly surpasses physicians in performance on a newly introduced medical benchmark, highlighting AI’s growing role in healthcare diagnostics.", "full_text": "OpenAI launched ChatGPT for Clinicians (free for verified US physicians) alongside HealthBench Professional, a new 1,500+ conversation benchmark where GPT-5.4 reportedly outperformed specialty-matched physicians given unbounded time and web access; 7,000 pre-launch test conversations, 99.6% rated safe and accurate."}]}, {"id": 234, "date": "2026-04-24", "category": "products_tools", "headline": "GPT Image 2 enables direct 3D mesh editing via text prompts in CADAM", "summary": "CADAM integrates GPT Image 2 to let users generate and edit 3D CAD models using plain English text prompts, eliminating the need for traditional CAD software.", "created_at": "2026-04-24 08:04:14", "articles": [{"id": 755, "title": "GPT Image 2 now lets users edit 3D meshes directly with text prompts", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/jdhhgbdsj473dt2gmwyq.html#story-1", "source_name": "AlphaSignal", "published_at": "2026-04-23 13:09:30", "summary": null, "content_snippet": "CADAM, a browser-based app, integrates GPT Image 2 to allow users to generate and edit 3D CAD models using plain English text prompts, simplifying 3D design without requiring CAD software.", "full_text": "The new \"creative mode\" is the interesting part. It pipes your prompt through GPT Image 2 to edit the mesh (the 3D shape made of connected triangles) conversationally, the same way you'd edit a photo. This makes 3D design feel less like engineering and more like a chat."}]}, {"id": 235, "date": "2026-04-24", "category": "industry_business", "headline": "Meta records US employee keystrokes to train AI agents", "summary": "Meta has begun recording keystrokes from US employees to train its AI agents, sparking concerns about workplace surveillance and data privacy violations.", "created_at": "2026-04-24 08:04:14", "articles": [{"id": 766, "title": "Meta begins recording US employee keystrokes to train AI agents", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/eeo6gorovx5kya6q5kh4.html#story-4", "source_name": "The Neuron", "published_at": "2026-04-23 11:06:02", "summary": null, "content_snippet": "Meta has started recording keystrokes from US employees to
