e in the AI era.", "full_text": "“You’re the Manager Now” by Laura Entis /Context Window: The Claude Code desktop app gets a redesign built for managing parallel agent work—and Kieran Klaassen was already living in it. Plus: Dan Shipper explains why you should ignore the viral claim that smaller models can match Anthropic’s Mythos, Austin Tedesco shares the one question he asks Claude Code before shipping anything, and Eleanor Warnock on why the Dia browser’s bet on beauty might be the right one."}]}, {"id": 109, "date": "2026-04-19", "category": "editorial", "headline": "Austin Tedesco shares one question to ask Claude Code before shipping", "summary": "Austin Tedesco reveals the single question he asks Claude Code before finalizing any software release, emphasizing practical AI integration.", "created_at": "2026-04-19 16:36:27", "articles": [{"id": 456, "title": "Austin Tedesco shares one question to ask Claude Code before shipping", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/vnauq6e1nbqqxztbc236.html#story-12", "source_name": "Every", "published_at": "2026-04-19 11:55:22", "summary": null, "content_snippet": "Austin Tedesco reveals the single question he asks Claude Code before finalizing any software release, emphasizing practical AI integration.", "full_text": "“You’re the Manager Now” by Laura Entis /Context Window: The Claude Code desktop app gets a redesign built for managing parallel agent work—and Kieran Klaassen was already living in it. Plus: Dan Shipper explains why you should ignore the viral claim that smaller models can match Anthropic’s Mythos, Austin Tedesco shares the one question he asks Claude Code before shipping anything, and Eleanor Warnock on why the Dia browser’s bet on beauty might be the right one."}]}, {"id": 110, "date": "2026-04-19", "category": "editorial", "headline": "Dan Shipper and Willie Williams discuss new AI vocabulary on Context Window", "summary": "Dan Shipper interviews Willie Williams on Context Window, proposing new terminology for the AI age and discussing Anthropic’s Claude Managed Agents.", "created_at": "2026-04-19 16:36:27", "articles": [{"id": 455, "title": "Dan Shipper and Willie Williams discuss new AI vocabulary on Context Window", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/vnauq6e1nbqqxztbc236.html#story-11", "source_name": "Every", "published_at": "2026-04-19 11:55:22", "summary": null, "content_snippet": "Dan Shipper interviews Willie Williams on Context Window, proposing new terminology for the AI age and discussing Anthropic’s Claude Managed Agents.", "full_text": "🎧 🖥 “Mini-Vibe Check: Claude Managed Agents Handle the Infrastructure Work” by Laura Entis /Context Window: Dan Shipper sits down with Eve Bodnia , founder and CEO of Logical Intelligence, who argues that LLMs have a ceiling—and that energy-based models, which scan the full landscape of possible answers rather than predicting one token at a time, are what comes next. Plus: A Mini-Vibe Check on Anthropic’s Claude Managed Agents; Willie Williams proposes new vocabulary for the AI age. 🎧 🖥 Listen on Spotify or Apple Podcasts , or watch on X or YouTube ."}]}, {"id": 111, "date": "2026-04-19", "category": "editorial", "headline": "Every Staff uses NotebookLM to reverse-engineer the Pyramid Principle", "summary": "Every Staff explores using NotebookLM to apply the Pyramid Principle in reverse, offering insights into structured problem-solving.", "created_at": "2026-04-19 16:36:27", "articles": [{"id": 454, "title": "Every Staff uses NotebookLM to reverse-engineer the Pyramid Principle", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/vnauq6e1nbqqxztbc236.html#story-10", "source_name": "Every", "published_at": "2026-04-19 11:55:22", "summary": null, "content_snippet": "Every Staff explores using NotebookLM to apply the Pyramid Principle in reverse, offering insights into structured problem-solving.", "full_text": "Instead, I’ve been running Barbara Minto ’s Pyramid Principle in reverse inside NotebookLM. Minto was the first woman McKinsey ever hired out of Harvard Business School, and she was sent to London in the 1960s to figure out why the firm’s consultants wrote such terrible memos. Her book The Pyramid Principle , which came out of that work, is the closest thing consulting has to a scripture. At the top of the pyramid sits your answer, the governing thought. Underneath it sit groups of supporting points, each of which answers a why question or a how question about the layer above."}]}, {"id": 112, "date": "2026-04-19", "category": "editorial", "headline": "Every demos custom agents running daily operations in Notion workshop", "summary": "Every’s free workshop demonstrates custom agents handling daily operations, with a recording and write-up available for those who missed it.", "created_at": "2026-04-19 16:36:27", "articles": [{"id": 453, "title": "Every demos custom agents running daily operations in Notion workshop", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/vnauq6e1nbqqxztbc236.html#story-9", "source_name": "Every", "published_at": "2026-04-19 11:55:22", "summary": null, "content_snippet": "Every’s free workshop demonstrates custom agents handling daily operations, with a recording and write-up available for those who missed it.", "full_text": null}]}, {"id": 113, "date": "2026-04-19", "category": "editorial", "headline": "Every’s Compound Engineering Camp covers new developments and workflows", "summary": "Every’s recent Compound Engineering Camp, led by Kieran Klaassen and Trevin Chow, explored new features and product-focused workflows with the compound engineering plugin.", "created_at": "2026-04-19 16:36:27", "articles": [{"id": 452, "title": "Every’s Compound Engineering Camp covers new developments and workflows", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/vnauq6e1nbqqxztbc236.html#story-8", "source_name": "Every", "published_at": "2026-04-19 11:55:22", "summary": null, "content_snippet": "Every’s recent Compound Engineering Camp, led by Kieran Klaassen and Trevin Chow, explored new features and product-focused workflows with the compound engineering plugin.", "full_text": "Compound Engineering Camp : Cora general manager Kieran Klaassen and product leader Trevin Chow walked through what’s new, went deeper on the brainstorm and ideate steps, and shared examples of using the compound engineering plugin in product-focused workflows. Watch the recording ."}]}, {"id": 114, "date": "2026-04-19", "category": "editorial", "headline": "Every hosts Codex for Knowledge Work Camp on April 24", "summary": "Every is hosting a hands-on camp on April 24 with Dan Shipper and Austin Tedesco on using OpenAI’s Codex for writing, research, and knowledge work.", "created_at": "2026-04-19 16:36:27", "articles": [{"id": 451, "title": "Every hosts Codex for Knowledge Work Camp on April 24", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/vnauq6e1nbqqxztbc236.html#story-7", "source_name": "Every", "published_at": "2026-04-19 11:55:22", "summary": null, "content_snippet": "Every is hosting a hands-on camp on April 24 with Dan Shipper and Austin Tedesco on using OpenAI’s Codex for writing, research, and knowledge work.", "full_text": null}]}, {"id": 115, "date": "2026-04-19", "category": "editorial", "headline": "Spiral’s new onboarding quadruples style creation success rate", "summary": "Spiral’s rebuilt onboarding flow now generates personalized style guides in minutes, increasing successful style creation from 20% to 80% of new users.", "created_at": "2026-04-19 16:36:27", "articles": [{"id": 450, "title": "Spiral’s new onboarding quadruples style creation success rate", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/vnauq6e1nbqqxztbc236.html#story-6", "source_name": "Every", "published_at": "2026-04-19 11:55:22", "summary": null, "content_snippet": "Spiral’s rebuilt onboarding flow now generates personalized style guides in minutes, increasing successful style creation from 20% to 80% of new users.", "full_text": "Getting started with Spiral just got a lot faster. Marcus Moretti , general manager of Spiral, rebuilt the onboarding flow from the ground up. Now, instead of clicking through six explainer screens, you drop in writing samples from your X account, a website, uploaded files, or pasted text, and Spiral generates a style guide tuned to how you write. The result: About 80 percent of new users leave onboarding with a personalized style, up from roughly 20 percent before. The sooner Spiral knows your voice, the sooner it’s useful—and the new flow gets you there in minutes."}]}, {"id": 116, "date": "2026-04-19", "category": "editorial", "headline": "Jack Cheng distinguishes between 'tool-like software' and 'living software'", "summary": "Jack Cheng argues for a distinction between stable software and adaptive AI-powered software, each requiring different design and communication approaches.", "created_at": "2026-04-19 16:36:27", "articles": [{"id": 449, "title": "Jack Cheng distinguishes between 'tool-like software' and 'living software'", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/vnauq6e1nbqqxztbc236.html#story-5", "source_name": "Every", "published_at": "2026-04-19 11:55:22", "summary": null, "content_snippet": "Jack Cheng argues for a distinction between stable software and adaptive AI-powered software, each requiring different design and communication approaches.", "full_text": "“Living Software” by Jack Cheng : AI-accelerated development has made software feel zombieish—tools that shouldn’t be alive suddenly sprouting chat boxes and AI sidebars. Jack Cheng proposes a distinction: “tool-like software,” which users expect to be stable, versus “living software,” which users expect to adapt and grow. The two categories carry different expectations, and confusing them causes disorientation. Read this for his practical advice on how builders of both should design, ship, and communicate with their users."}]}, {"id": 117, "date": "2026-04-19", "category": "editorial", "headline": "Claude Code desktop app redesign focuses on managing parallel agent work", "summary": "Anthropic's Claude Code desktop app gets a redesign to better handle parallel agent workflows, with Kieran Klaassen already adopting it.", "created_at": "2026-04-19 16:36:27", "articles": [{"id": 448, "title": "Claude Code desktop app redesign focuses on managing parallel agent work", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/vnauq6e1nbqqxztbc236.html#story-4", "source_name": "Every", "published_at": "2026-04-19 11:55:22", "summary": null, "content_snippet": "Anthropic's Claude Code desktop app gets a redesign to better handle parallel agent workflows, with Kieran Klaassen already adopting it.", "full_text": "“You’re the Manager Now” by Laura Entis /Context Window: The Claude Code desktop app gets a redesign built for managing parallel agent work—and Kieran Klaassen was already living in it. Plus: Dan Shipper explains why you should ignore the viral claim that smaller models can match Anthropic’s Mythos, Austin Tedesco shares the one question he asks Claude Code before shipping anything, and Eleanor Warnock on why the Dia browser’s bet on beauty might be the right one."}]}, {"id": 118, "date": "2026-04-19", "category": "editorial", "headline": "Eve Bodnia argues LLMs have a ceiling and energy-based models are the future", "summary": "Eve Bodnia, founder of Logical Intelligence, claims LLMs have inherent limitations and proposes energy-based models as the next evolution in AI.", "created_at": "2026-04-19 16:36:27", "articles": [{"id": 447, "title": "Eve Bodnia argues LLMs have a ceiling and energy-based models are the future", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/vnauq6e1nbqqxztbc236.html#story-3", "source_name": "Every", "published_at": "2026-04-19 11:55:22", "summary": null, "content_snippet": "Eve Bodnia, founder of Logical Intelligence, claims LLMs have inherent limitations and proposes energy-based models as the next evolution in AI.", "full_text": "🎧 🖥 “Mini-Vibe Check: Claude Managed Agents Handle the Infrastructure Work” by Laura Entis /Context Window: Dan Shipper sits down with Eve Bodnia , founder and CEO of Logical Intelligence, who argues that LLMs have a ceiling—and that energy-based models, which scan the full landscape of possible answers rather than predicting one token at a time, are what comes next. Plus: A Mini-Vibe Check on Anthropic’s Claude Managed Agents; Willie Williams proposes new vocabulary for the AI age. 🎧 🖥 Listen on Spotify or Apple Podcasts , or watch on X or YouTube ."}]}, {"id": 119, "date": "2026-04-19", "category": "editorial", "headline": "Yash Poojary rebuilds Sparkle to declutter Macs with AI-powered cleanup", "summary": "Yash Poojary's updated Sparkle app now purges unnecessary files like screenshots and duplicates before organizing Macs with customizable folder structures.", "created_at": "2026-04-19 16:36:27", "articles": [{"id": 446, "title": "Yash Poojary rebuilds Sparkle to declutter Macs with AI-powered cleanup", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/vnauq6e1nbqqxztbc236.html#story-2", "source_name": "Every", "published_at": "2026-04-19 11:55:22", "summary": null, "content_snippet": "Yash Poojary's updated Sparkle app now purges unnecessary files like screenshots and duplicates before organizing Macs with customizable folder structures.", "full_text": "“(Re(Re))Introducing Sparkle: Marie Kondo Your Mac” by Yash Poojary /On Every: Yash Poojary rebuilt Sparkle to purge the 80% percent of files on the average Mac that are screenshots, installer packages, and duplicates you’ll never open again before it organizes. The new version runs a cleanup pass first, then proposes a custom folder structure you can reshape through chat until it matches you like to work. Download the app and try it yourself."}]}, {"id": 120, "date": "2026-04-19", "category": "editorial", "headline": "Kieran Klaassen discovers folders act as AI agent swarms in coding workflows", "summary": "Kieran Klaassen found that a project directory with specialized context and sub-agents can turn a general AI model into a domain expert, running 44 such setups.", "created_at": "2026-04-19 16:36:27", "articles": [{"id": 445, "title": "Kieran Klaassen discovers folders act as AI agent swarms in coding workflows", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/vnauq6e1nbqqxztbc236.html#story-1", "source_name": "Every", "published_at": "2026-04-19 11:55:22", "summary": null, "content_snippet": "Kieran Klaassen found that a project directory with specialized context and sub-agents can turn a general AI model into a domain expert, running 44 such setups.", "full_text": "“The Folder Is the Agent” by Kieran Klaassen /Source Code: After three months trying to make AI agent swarms work in his coding flow, Kieran Klaassen realized that what was doing the work was a folder. A project directory with a CLAUDE.md, accumulated context, and specialized sub-agents is all you need to turn a general model into a domain expert. He’s now running 44 of them, connected by a Ruby dispatch layer that routes work while he sleeps. Read this to learn how to build the dispatch layer yourself."}]}, {"id": 121, "date": "2026-04-19", "category": "editorial", "headline": "Anthropic releases Opus 4.7 coding model but loses inference capabilities", "summary": "Anthropic's Opus 4.7 is the best coding model tested on well-specified tasks but fails to infer user intent like previous versions, requiring prompt adjustments for users.", "created_at": "2026-04-19 16:36:27", "articles": [{"id": 444, "title": "Anthropic releases Opus 4.7 coding model but loses inference capabilities", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/vnauq6e1nbqqxztbc236.html#story-0", "source_name": "Every", "published_at": "2026-04-19 11:55:22", "summary": null, "content_snippet": "Anthropic's Opus 4.7 is the best coding model tested on well-specified tasks but fails to infer user intent like previous versions, requiring prompt adjustments for users.", "full_text": "“Vibe Check: Opus 4.7 Stopped Reading Between the Lines” by Katie Parrott /Vibe Check: Opus 4.7 is the best coding model Every has tested on well-specified tasks— Kieran Klaassen called his Rubber Duck benchmark run “best model ever”—but it won’t infer what you want the way 4.6 did, and the prompts you’ve tuned for the last two months will likely disappoint you at first. The gap between a tight brief and a loose one is wider than in any prior Opus. Read this for the full breakdown of where to switch to 4.7 now and where to stay on 4.6."}]}, {"id": 122, "date": "2026-04-19", "category": "model_releases", "headline": "Google DeepMind releases Gemma 4 family with native multimodal and agentic features", "summary": "Google DeepMind launched the Gemma 4 family of open-weight models featuring 256K context windows, native function calling, speech processing, and Mixture-of-Experts architecture in the 26B variant. These models integrate with MLX and vLLM on day zero and support variable aspect ratios and configurable token budgets for images.", "created_at": "2026-04-19 16:36:28", "articles": [{"id": 434, "title": "Google DeepMind releases Gemma 4 family of open-weight AI models", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/nexk3o84gljpq45dr009.html#story-0", "source_name": "AlphaSignal", "published_at": "2026-04-19 15:11:16", "summary": null, "content_snippet": "Google DeepMind launched the Gemma 4 family of open-weight AI models, designed for agentic workflows, function-calling, and local AI applications with native multimodal support and long context windows up to 256K tokens.", "full_text": "In this regard, Gemma 4 , Google DeepMind's latest family of open-weights models stands out because it is natively built for agentic workflows, function-calling, and complex reasoning on edge devices and workstations alike. These models are a perfect base on top of which you can build powerful local AI applications."}, {"id": 435, "title": "Gemma 4 models support native function calling and structured tool use", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/nexk3o84gljpq45dr009.html#story-1", "source_name": "AlphaSignal", "published_at": "2026-04-19 15:11:16", "summary": null, "content_snippet": "The Gemma 4 family includes native function calling capabilities, enabling developers to build AI agents that can interact with external tools and APIs for complex workflows.", "full_text": "The era of obsessing over raw parameter counts is ending. The new moat for AI applications is the orchestration layer you build around the model. Google's Gemma 4 family was engineered specifically for this shift, but it went largely unnoticed under the hype of large frontier models released in the past weeks. With native function calling, 256K context windows, and day-zero integration with engines like MLX and vLLM, these open-weight models are designed to be the core of your local infrastructure. And the proof-of-concept we've seen are very promising. Today, we break down why Gemma 4 is the raw material you need to build a private AI engine."}, {"id": 436, "title": "Gemma 4 models integrate with MLX and vLLM engines on day zero", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/nexk3o84gljpq45dr009.html#story-2", "source_name": "AlphaSignal", "published_at": "2026-04-19 15:11:16", "summary": null, "content_snippet": "Google’s Gemma 4 models offer immediate compatibility with MLX and vLLM, accelerating deployment for local AI infrastructure without additional integration delays.", "full_text": "The era of obsessing over raw parameter counts is ending. The new moat for AI applications is the orchestration layer you build around the model. Google's Gemma 4 family was engineered specifically for this shift, but it went largely unnoticed under the hype of large frontier models released in the past weeks. With native function calling, 256K context windows, and day-zero integration with engines like MLX and vLLM, these open-weight models are designed to be the core of your local infrastructure. And the proof-of-concept we've seen are very promising. Today, we break down why Gemma 4 is the raw material you need to build a private AI engine."}, {"id": 437, "title": "Gemma 4 models feature 256K context windows for long-form agentic tasks", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/nexk3o84gljpq45dr009.html#story-3", "source_name": "AlphaSignal", "published_at": "2026-04-19 15:11:16", "summary": null, "content_snippet": "The Gemma 4 family supports context windows up to 256,000 tokens, making them suitable for agentic applications that require processing long sequences of data.", "full_text": "The era of obsessing over raw parameter counts is ending. The new moat for AI applications is the orchestration layer you build around the model. Google's Gemma 4 family was engineered specifically for this shift, but it went largely unnoticed under the hype of large frontier models released in the past weeks. With native function calling, 256K context windows, and day-zero integration with engines like MLX and vLLM, these open-weight models are designed to be the core of your local infrastructure. And the proof-of-concept we've seen are very promising. Today, we break down why Gemma 4 is the raw material you need to build a private AI engine."}, {"id": 438, "title": "Gemma 4 models include Mixture-of-Experts (MoE) architecture in 26B variant", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/nexk3o84gljpq45dr009.html#story-4", "source_name": "AlphaSignal", "published_at": "2026-04-19 15:11:16", "summary": null, "content_snippet": "The Gemma 4 26B A4B model uses a Mixture-of-Experts architecture, activating only 3.8 billion parameters per token, balancing performance and efficiency for high-end devices.", "full_text": null}, {"id": 439, "title": "Gemma 4 models support variable aspect ratios for image inputs", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/nexk3o84gljpq45dr009.html#story-5", "source_name": "AlphaSignal", "published_at": "2026-04-19 15:11:16", "summary": null, "content_snippet": "Unlike typical vision models, Gemma 4 preserves original image aspect ratios, improving visual detail retention for practical applications like object detection and text parsing.", "full_text": null}, {"id": 440, "title": "Gemma 4 models offer configurable token budgets for visual inputs", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/nexk3o84gljpq45dr009.html#story-6", "source_name": "AlphaSignal", "published_at": "2026-04-19 15:11:16", "summary": null, "content_snippet": "Developers can allocate between 70 to 1120 tokens per image in Gemma 4, allowing fine-tuned control over speed, memory, and visual accuracy trade-offs.", "full_text": null}, {"id": 441, "title": "Gemma 4 models natively process speech in smaller variants", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/nexk3o84gljpq45dr009.html#story-7", "source_name": "AlphaSignal", "published_at": "2026-04-19 15:11:16", "summary": null, "content_snippet": "The Gemma 4 E2B and E4B models support native speech processing, making them ideal for edge devices and complete sensory AI agents.", "full_text": null}, {"id": 442, "title": "Developers combine Gemma 4 31B with specialized vision models like Falcon Perception and SAM 3.1", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/nexk3o84gljpq45dr009.html#story-8", "source_name": "AlphaSignal", "published_at": "2026-04-19 15:11:16", "summary": null, "content_snippet": "The Gemma 4 31B model is being paired with vision models for granular tasks such as object detection and image segmentation, enhancing its multimodal capabilities.", "full_text": "Developers have shown that on a MacBook Pro M5 Max with 48 GB unified memory, Gemma 4 26B A4B reaches over 100 tokens per second through native Swift and the MLX framework. The same model runs at usable speeds on older M-series chips once quantized."}, {"id": 443, "title": "Gemma 4 models deployed in local agentic frameworks like Hermes and Openclaw", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/nexk3o84gljpq45dr009.html#story-9", "source_name": "AlphaSignal", "published_at": "2026-04-19 15:11:16", "summary": null, "content_snippet": "Developers are integrating Gemma 4’s smaller variants into local agentic applications, leveraging native system instructions and structured JSON outputs for workflow automation.", "full_text": null}]}, {"id": 97, "date": "2026-04-18", "category": "editorial", "headline": "Brandon Gell discovers Opus 4.7 misses data error in monthly P&L analysis", "summary": "Brandon Gell found that Opus 4.7 missed a data error in a monthly P&L analysis, whereas Opus 4.6 had caught it unprompted, indicating a regression in the model's proactive error detection.", "created_at": "2026-04-18 07:08:10", "articles": [{"id": 319, "title": "Brandon Gell discovers Opus 4.7 misses data error in monthly P&L analysis", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/ptilbajjx4badzk504bh.html#story-6", "source_name": "Every", "published_at": "2026-04-17 20:40:07", "summary": null, "content_snippet": "Brandon Gell found that Opus 4.7 missed a data error in a monthly P&L analysis, whereas Opus 4.6 had caught it unprompted, indicating a regression in the model's proactive error detection.", "full_text": null}]}, {"id": 98, "date": "2026-04-18", "category": "editorial", "headline": "Katie Parrott compares Opus 4.7 to predecessor and finds predecessor superior for personal essay", "summary": "Katie Parrott ran Opus 4.7 head-to-head with Opus 4.6 on a personal essay task and preferred the predecessor's output, noting Opus 4.7's draft was competent but rhythmically flat.", "created_at": "2026-04-18 07:08:10", "articles": [{"id": 318, "title": "Katie Parrott compares Opus 4.7 to predecessor and finds predecessor superior for personal essay", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/ptilbajjx4badzk504bh.html#story-5", "source_name": "Every", "published_at": "2026-04-17 20:40:07", "summary": null, "content_snippet": "Katie Parrott ran Opus 4.7 head-to-head with Opus 4.6 on a personal essay task and preferred the predecessor's output, noting Opus 4.7's draft was competent but rhythmically flat.", "full_text": null}]}, {"id": 99, "date": "2026-04-18", "category": "editorial", "headline": "Mike Taylor praises Opus 4.7's consulting copy and slide deck design", "summary": "Mike Taylor found Opus 4.7's consulting copy sharper than his own writing and praised its slide deck design, showcasing the model's strengths in structured output generation.", "created_at": "2026-04-18 07:08:10", "articles": [{"id": 317, "title": "Mike Taylor praises Opus 4.7's consulting copy and slide deck design", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/ptilbajjx4badzk504bh.html#story-4", "source_name": "Every", "published_at": "2026-04-17 20:40:07", "summary": null, "content_snippet": "Mike Taylor found Opus 4.7's consulting copy sharper than his own writing and praised its slide deck design, showcasing the model's strengths in structured output generation.", "full_text": null}]}, {"id": 100, "date": "2026-04-18", "category": "editorial", "headline": "Dan Shipper observes Opus 4.7 diagnose codebase but refuse to execute solution", "summary": "Dan Shipper noted that Opus 4.7 could accurately diagnose a messy codebase but stopped short of executing the proposed solution, highlighting the model's stricter adherence to instructions.", "created_at": "2026-04-18 07:08:10", "articles": [{"id": 316, "title": "Dan Shipper observes Opus 4.7 diagnose codebase but refuse to execute solution", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/ptilbajjx4badzk504bh.html#story-3", "source_name": "Every", "published_at": "2026-04-17 20:40:07", "summary": null, "content_snippet": "Dan Shipper noted that Opus 4.7 could accurately diagnose a messy codebase but stopped short of executing the proposed solution, highlighting the model's stricter adherence to instructions.", "full_text": null}]}, {"id": 101, "date": "2026-04-18", "category": "editorial", "headline": "Kieran Klaassen finds Anthropic Opus 4.7 the best coding model for full e-commerce website build", "summary": "Kieran Klaassen tested Opus 4.7 on a challenging coding benchmark and declared it the best model he's ever tested, successfully building a full e-commerce site with custom features.", "created_at": "2026-04-18 07:08:10", "articles": [{"id": 315, "title": "Kieran Klaassen finds Anthropic Opus 4.7 the best coding model for full e-commerce website build", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/ptilbajjx4badzk504bh.html#story-2", "source_name": "Every", "published_at": "2026-04-17 20:40:07", "summary": null, "content_snippet": "Kieran Klaassen tested Opus 4.7 on a challenging coding benchmark and declared it the best model he's ever tested, successfully building a full e-commerce site with custom features.", "full_text": null}]}, {"id": 102, "date": "2026-04-18", "category": "editorial", "headline": "Every conducts live Vibe Check of Anthropic's Opus 4.7 with community testing", "summary": "Every hosted a live stream with five testers and Anthropic researcher Alex Albert to evaluate Opus 4.7, revealing its strengths and limitations across coding, writing, and agentic tasks.", "created_at": "2026-04-18 07:08:10", "articles": [{"id": 314, "title": "Every conducts live Vibe Check of Anthropic's Opus 4.7 with community testing", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/ptilbajjx4badzk504bh.html#story-1", "source_name": "Every", "published_at": "2026-04-17 20:40:07", "summary": null, "content_snippet": "Every hosted a live stream with five testers and Anthropic researcher Alex Albert to evaluate Opus 4.7, revealing its strengths and limitations across coding, writing, and agentic tasks.", "full_text": "Anthropic surprised us yesterday by dropping Opus 4.7 —so we did what we do: We went live on X and YouTube with five testers and figured it out in front of 10,000 people. Anthropic researcher Alex Albert even joined the stream to explain what had changed. Two hours of live testing and an afternoon in Slack later, here’s the short version: This model rewards people who write tight prompts and frustrates everyone who doesn’t. Here’s our complete Vibe Check on Opus 4.7 ."}]}, {"id": 103, "date": "2026-04-18", "category": "editorial", "headline": "Anthropic releases Opus 4.7 with stricter literal interpretation and reduced gap-filling", "summary": "Anthropic's latest Opus 4.7 model is more precise and literal, excelling at well-specified tasks but failing to infer or fill in gaps like its predecessor, requiring users to adjust their prompts accordingly.", "created_at": "2026-04-18 07:08:10", "articles": [{"id": 313, "title": "Anthropic releases Opus 4.7 with stricter literal interpretation and reduced gap-filling", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/ptilbajjx4badzk504bh.html#story-0", "source_name": "Every", "published_at": "2026-04-17 20:40:07", "summary": null, "content_snippet": "Anthropic's latest Opus 4.7 model is more precise and literal, excelling at well-specified tasks but failing to infer or fill in gaps like its predecessor, requiring users to adjust their prompts accordingly.", "full_text": "Anthropic surprised us yesterday by dropping Opus 4.7 —so we did what we do: We went live on X and YouTube with five testers and figured it out in front of 10,000 people. Anthropic researcher Alex Albert even joined the stream to explain what had changed. Two hours of live testing and an afternoon in Slack later, here’s the short version: This model rewards people who write tight prompts and frustrates everyone who doesn’t. Here’s our complete Vibe Check on Opus 4.7 ."}]}, {"id": 104, "date": "2026-04-18", "category": "products_tools", "headline": "Anthropic unveils CLAUDE.md strategy for coding agents", "summary": "Anthropic recommends nesting CLAUDE.md files at every folder level to auto-load context for Claude Code, boosting delegation and efficiency in coding workflows. AlphaSignal highlights Opus 4.7's xhigh effort mode and file-based memory for agentic coding.", "created_at": "2026-04-18 07:08:12", "articles": [{"id": 276, "title": "Anthropic explains how to optimize Opus 4.7 for agentic coding workflows", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/xbb3be7z1o862p5rtajh.html#story-7", "source_name": "AlphaSignal", "published_at": "2026-04-17 16:18:10", "summary": null, "content_snippet": "Anthropic provides guidance on leveraging Opus 4.7's new features, such as xhigh effort mode and file-based memory, for improved coding agent performance.", "full_text": null}, {"id": 339, "title": "Anthropic's CLAUDE.md file strategy recommended for optimizing Claude Code performance", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/a7fajxukvx5iz7kg1qs3.html#story-6", "source_name": "The Neuron", "published_at": "2026-04-17 11:06:29", "summary": null, "content_snippet": "Nesting CLAUDE.md files at every folder level enables Claude Code to auto-load context, improving delegation and efficiency when using the model for coding tasks.", "full_text": "The catch buried in Anthropic's own docs : the new tokenizer can use up to 35% more tokens for the same text. Combined with Claude Code's new xhigh effort default, Pro and Max users will hit weekly caps faster unless they manually dial down."}]}, {"id": 105, "date": "2026-04-18", "category": "industry_business", "headline": "Anthropic CPO Mike Krieger resigns from Figma board", "summary": "Anthropic's Chief Product Officer Mike Krieger resigned from Figma's board amid rumors of Anthropic developing competing design software, causing Figma's stock to drop.", "created_at": "2026-04-18 07:08:12", "articles": [{"id": 285, "title": "Anthropic CPO Mike Krieger resigns from Figma board amid design software rumors", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/a7fajxukvx5iz7kg1qs3.html#story-3", "source_name": "The Neuron", "published_at": "2026-04-17 11:06:29", "summary": null, "content_snippet": "Anthropic's Chief Product Officer Mike Krieger resigned from Figma's board the same day reports surfaced Anthropic developing competing design software, causing Figma's stock to slide.", "full_text": "Keeping score on the SaaSpocalypse: Anthropic CPO Mike Krieger resigned from Figma's board the same day reports surfaced Anthropic is shipping design software. Figma stock slid. Rumor has it that was going to launch yesterday… but it did not."}]}, {"id": 106, "date": "2026-04-18", "category": "products_tools", "headline": "Nous Research launches Tool Gateway for unified AI access", "summary": "Nous Research introduces Tool Gateway, a platform simplifying access to multiple AI models and tools for seamless integration across workflows.", "created_at": "2026-04-18 07:08:13", "articles": [{"id": 277, "title": "Nous Research introduces Tool Gateway for unified model and tool access", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/xbb3be7z1o862p5rtajh.html#story-8", "source_name": "AlphaSignal", "published_at": "2026-04-17 16:18:10", "summary": null, "content_snippet": "Tool Gateway simplifies access to multiple AI models and tools, enabling seamless integration and execution across different systems and workflows.", "full_text": null}]}, {"id": 107, "date": "2026-04-18", "category": "products_tools", "headline": "Meta shifts to closed Muse Spark model, abandons open weights", "summary": "Meta pivots from its open-weights strategy to launch Muse Spark, a closed multimodal reasoning model with tool use and multi-agent orchestration.", "created_at": "2026-04-18 07:08:13", "articles": [{"id": 288, "title": "Meta Pivots From Open Weights Strategy with Closed Muse Spark Model", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/j39thqpblp2cojsbvt53.html#story-0", "source_name": "Unknown", "published_at": "2026-04-17 10:03:14", "summary": null, "content_snippet": "Meta abandoned its open-weights strategy to introduce Muse Spark, a closed multimodal reasoning model with tool use and multi-agent orchestration, marking its first AI product from the nine-month-old Superintelligence Labs.", "full_text": "In Meta’s tests, Muse Spark outperformed all models on HealthBench Hard, a subset of OpenAI’s health benchmark, at 42.8 percent, ahead of second-best GPT-5.4 (40.1 percent). Muse Spark also led DeepSearchQA, an agentic browsing evaluation, at 74.8 percent, ahead of Claude Opus 4.6 Max (73.7 percent)."}]}, {"id": 81, "date": "2026-04-17", "category": "editorial", "headline": "Every Introduces Compound Engineering Camp for Product Managers and Founders", "summary": "Every hosted a Compound Engineering Camp to showcase updates to their AI-native philosophy, extending its utility beyond engineers to product managers and founders with new workflows and tools.", "created_at": "2026-04-17 07:47:05", "articles": [{"id": 224, "title": "Every Introduces Compound Engineering Camp for Product Managers and Founders", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/p4q4c9aqipco1kwlxhkd.html#story-0", "source_name": "Every", "published_at": "2026-04-16 17:42:20", "summary": null, "content_snippet": "Every hosted a Compound Engineering Camp to showcase updates to their AI-native philosophy, extending its utility beyond engineers to product managers and founders with new workflows and tools.", "full_text": "​ Compound engineering is the AI-native philosophy that helps Every ship products with single-person teams, and it has 14,000+ stars on GitHub. Since the last camp, Kieran Klaassen , general manager of Cora and the creator of compound engineering and product leader Trevin Chow have been extending the system with new steps and workflows that make it just as useful for product managers and founders as it is for engineers."}]}, {"id": 82, "date": "2026-04-17", "category": "model_releases", "headline": "Claude Opus 4.7 and OpenAI's Spud expected to launch today", "summary": "Rumors indicate both Anthropic's Claude Opus 4.7 and OpenAI's Spud models may drop today, with instability in current Claude versions hinting at imminent releases. This could mark a major shift in AI model capabilities.", "created_at": "2026-04-17 07:47:07", "articles": [{"id": 195, "title": "Claude Opus 4.7 and OpenAI's Spud expected to launch today", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/2bbbs5akfnh8hl9tfs3i.html#story-1", "source_name": "The Neuron", "published_at": "2026-04-16 10:03:23", "summary": null, "content_snippet": "Rumors suggest both Claude Opus 4.7 and OpenAI's Spud models may drop today, with signs of instability in current Claude versions hinting at an imminent release.", "full_text": null}]}, {"id": 83, "date": "2026-04-17", "category": "model_releases", "headline": "GPT-5.4 Pro solves 60-year-old Erdős conjecture", "summary": "Mathematician Przemek Chojecki used GPT-5.4 Pro to generate a three-page proof for Erdős problem #1196, bypassing decades of human probabilistic approaches. This marks the first AI-generated solution to the long-standing conjecture.", "created_at": "2026-04-17 07:47:07", "articles": [{"id": 194, "title": "GPT-5.4 Pro writes 'Book Proof' for Erdős problem #1196", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/2bbbs5akfnh8hl9tfs3i.html#story-0", "source_name": "The Neuron", "published_at": "2026-04-16 10:03:23", "summary": null, "content_snippet": "Mathematician Przemek Chojecki used GPT-5.4 Pro to solve a 60-year-old Erdős conjecture with a three-page proof, bypassing decades of human probabilistic approaches. This marks the first AI-generated 'Book Proof,' a mythical standard in mathematics.", "full_text": "Yesterday, GPT-5.4 Pro wrote one. Mathematician Przemek Chojecki used it to crack Erdős problem #1196 , a 60-year-old asymptotic primitive set conjecture that had only ever seen partial human progress. The kicker, per Yale mathematician Jared Lichtman? The proof is three pages long , uses a single elegant trick (a von Mangoldt function rearrangement), and bypasses the entire probability \"gambit\" implicit in every human attempt since Erdős's own 1935 paper . Lichtman called it \"a Book Proof.\" AI just got published in God's notebook. Wild."}]}, {"id": 84, "date": "2026-04-17", "category": "products_tools", "headline": "Allbirds rebrands to NewBird AI, pivots to GPU cloud", "summary": "Allbirds rebranded as 'NewBird AI' and shifted to GPU-as-a-Service, causing a 600% stock surge. The move reflects capital markets prioritizing AI exposure over traditional footwear.", "created_at": "2026-04-17 07:47:07", "articles": [{"id": 196, "title": "Allbirds rebrands as NewBird AI and pivots to GPU clouds", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/2bbbs5akfnh8hl9tfs3i.html#story-2", "source_name": "The Neuron", "published_at": "2026-04-16 10:03:23", "summary": null, "content_snippet": "Allbirds, a B Corp known for eco-friendly shoes, renamed itself 'NewBird AI' and pivoted to GPU-as-a-Service, causing a 600% stock surge. The move reflects capital markets prioritizing AI exposure over fundamentals.", "full_text": null}]}, {"id": 85, "date": "2026-04-17", "category": "products_tools", "headline": "Anthropic releases Claude Opus 4.7 with major upgrades", "summary": "Claude Opus 4.7 introduces stricter instruction adherence, self-verification, higher-resolution vision (up to 2,576 pixels), and task budgets for extended agent workflows. Benchmarks show a 13-point jump in visual reasoning and a 10.9-point improvement in SWE-bench Pro coding tasks.", "created_at": "2026-04-17 16:54:14", "articles": [{"id": 269, "title": "Anthropic releases Claude Opus 4.7 with improved long-running tasks and instruction following", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/xbb3be7z1o862p5rtajh.html#story-0", "source_name": "AlphaSignal", "published_at": "2026-04-17 16:18:10", "summary": null, "content_snippet": "Opus 4.7 introduces stricter instruction adherence, self-verification, higher-resolution vision (up to 2,576 pixels), and task budgets for extended agent workflows, enhancing reliability for complex tasks.", "full_text": null}, {"id": 278, "title": "Anthropic releases Claude Opus 4.7 ahead of Mythos", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/jutg9no32hdw4r44uk3u.html#story-0", "source_name": "Unknown", "published_at": "2026-04-17 14:41:36", "summary": null, "content_snippet": "Anthropic launched its upgraded flagship model, Claude Opus 4.7, featuring improved reliability, planning, and verification capabilities. The update enhances coding, instruction following, memory, and visual understanding, while also supporting agentic workflows and real-world tasks like automating CAD designs.", "full_text": "Anthropic has released Claude Opus 4.7 , upgrading its flagship model while keeping its more powerful Mythos system limited to a small group of security partners. The update focuses on reliability, with the model designed to plan, verify, and check its own outputs before responding, leading to stronger performance across coding, instruction following, memory, and visual understanding. It also improves agentic workflows, tool use, and long-running tasks, alongside higher-resolution multimodal input, and can now handle real-world workflows like automating CAD , where you describe a design and the model builds it inside the software. While Mythos remains out of reach, 4.7 offers a clearer look at how Anthropic is preparing for more capable systems."}, {"id": 283, "title": "Anthropic releases Claude Opus 4.7 with improved vision and coding benchmarks", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/a7fajxukvx5iz7kg1qs3.html#story-1", "source_name": "The Neuron", "published_at": "2026-04-17 11:06:29", "summary": null, "content_snippet": "Anthropic launched Claude Opus 4.7, featuring a 13-point jump in visual reasoning (69.1% to 82.1%), support for images up to 2,576 pixels, and a 10.9-point improvement in SWE-bench Pro coding benchmarks.", "full_text": "Claude Opus 4.7 is Anthropic's new flagship with a 3x vision upgrade (images up to 2,576 pixels), #1 on Vals AI's Vibe Code Benchmark at 71%, and a new xhigh effort level; same $5/$25 per MTok pricing as 4.6, though the new tokenizer can use up to 35% more tokens for identical prompts —$20/mo Pro, $100/mo Max."}]}, {"id": 86, "date": "2026-04-17", "category": "products_tools", "headline": "OpenAI expands Codex into a full macOS agent workstation", "summary": "Codex now acts as a system-level agent on macOS, using screen reading and cursor control to operate apps, manage workflows, and run background tasks without APIs. It includes persistent memory, automations, and 90+ plugins.", "created_at": "2026-04-17 16:54:14", "articles": [{"id": 271, "title": "OpenAI expands Codex to control desktop apps and automate macOS workflows", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/xbb3be7z1o862p5rtajh.html#story-2", "source_name": "AlphaSignal", "published_at": "2026-04-17 16:18:10", "summary": null, "content_snippet": "Codex now acts as a system-level agent on macOS, using screen reading and cursor control to operate apps, manage workflows, and run background tasks without APIs.", "full_text": null}, {"id": 284, "title": "OpenAI overhauls Codex into a Mac-level agent workstation with 90+ plugins", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/a7fajxukvx5iz7kg1qs3.html#story-2", "source_name": "The Neuron", "published_at": "2026-04-17 11:06:29", "summary": null, "content_snippet": "OpenAI transformed Codex into a full agent workstation with computer use capabilities, persistent memory, automations, and 90+ plugins, positioning it as a competitor to Anthropic's Claude Cowork.", "full_text": "Hours after Anthropic’s release… OpenAI overhauled Codex , its coding app, to be “Codex for (almost) everything”… a.k.a OpenAi’s version of Claude Cowork. It comes with Mac-level computer use (agents click and type alongside you), an in-app browser, persistent memory, automations that wake up across days, and 90+ new plugins (Atlassian Rovo, CircleCI, Microsoft Suite, etc). It can do a lot more than that too."}]}, {"id": 87, "date": "2026-04-17", "category": "model_releases", "headline": "Alibaba open-sources Qwen3.6-35B-A3B, a sparse MoE model", "summary": "Qwen3.6-35B-A3B reduces compute costs by activating only 3B parameters per token using a sparse mixture-of-experts design. It maintains performance while cutting resource demands.", "created_at": "2026-04-17 16:54:14", "articles": [{"id": 273, "title": "Alibaba open-sources Qwen3.6-35B-A3B, a sparse MoE model with only 3B active parameters per token", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/xbb3be7z1o862p5rtajh.html#story-4", "source_name": "AlphaSignal", "published_at": "2026-04-17 16:18:10", "summary": null, "content_snippet": "This open-source model reduces compute costs while maintaining performance by activating only a small subset of parameters per token using a sparse mixture-of-experts design.", "full_text": null}]}, {"id": 88, "date": "2026-04-17", "category": "products_tools", "headline": "Perplexity launches Personal Computer for AI agents on Mac apps", "summary": "Perplexity's new tool enables agents to interact with and automate tasks across multiple Mac applications, expanding agentic workflows beyond single-tool interactions.", "created_at": "2026-04-17 16:54:14", "articles": [{"id": 274, "title": "Perplexity launches Personal Computer to run AI agents across Mac applications", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/xbb3be7z1o862p5rtajh.html#story-5", "source_name": "AlphaSignal", "published_at": "2026-04-17 16:18:10", "summary": null, "content_snippet": "Perplexity's new tool enables agents to interact with and automate tasks across multiple Mac apps, expanding agentic workflows beyond single-tool interactions.", "full_text": null}]}, {"id": 89, "date": "2026-04-17", "category": "products_tools", "headline": "Palabra.ai launches real-time speech translation in 60+ languages", "summary": "Palabra provides human-like real-time translation with voice cloning and speaker diarization, supporting Zoom, Meet, and Teams without setup.", "created_at": "2026-04-17 16:54:14", "articles": [{"id": 272, "title": "Palabra.ai launches real-time speech translation with natural voice output in 60+ languages", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/xbb3be7z1o862p5rtajh.html#story-3", "source_name": "AlphaSignal", "published_at": "2026-04-17 16:18:10", "summary": null, "content_snippet": "Palabra provides human-like real-time translation with voice cloning and speaker diarization, supporting Zoom, Meet, and Teams without setup.", "full_text": null}]}, {"id": 90, "date": "2026-04-17", "category": "products_tools", "headline": "Lightfield automates CRM workflows with plain-English commands", "summary": "Lightfield enables users to define sales workflows in natural language, automating prospect scoring, outreach drafting, and report generation across CRM pipelines.", "created_at": "2026-04-17 16:54:14", "articles": [{"id": 270, "title": "Lightfield launches Skills for plain-English CRM workflow automation", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/xbb3be7z1o862p5rtajh.html#story-1", "source_name": "AlphaSignal", "published_at": "2026-04-17 16:18:10", "summary": null, "content_snippet": "Lightfield enables users to define sales workflows in natural language, automating prospect scoring, outreach drafting, and report generation across CRM pipelines.", "full_text": null}]}, {"id": 91, "date": "2026-04-17", "category": "research", "headline": "Physical Intelligence unveils π0.7 robot brain for adaptive task learning", "summary": "π0.7 enables robots to perform tasks they weren’t explicitly trained on by adapting to verbal instructions. Still in research, it represents a step toward generalizable robotics.", "created_at": "2026-04-17 16:54:14", "articles": [{"id": 281, "title": "Physical Intelligence unveils π0.7 robot brain for adaptive task learning", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/jutg9no32hdw4r44uk3u.html#story-3", "source_name": "Unknown", "published_at": "2026-04-17 14:41:36", "summary": null, "content_snippet": "Physical Intelligence launched π0.7, a robotics model that enables robots to perform tasks they weren’t explicitly trained on by adapting to verbal instructions. While still in research, it represents progress toward flexible, general-purpose robotics for real-world automation.", "full_text": "Physical Intelligence has introduced π0.7 , a new model that allows robots to perform tasks they were never explicitly trained on by adapting to instructions through verbal guidance instead of retraining. While it still struggles with fully autonomous multi-step tasks from a single command, the system shows early progress toward more flexible, general-purpose robotics. It remains in the research phase, but points to a shift away from rigid training toward systems that can learn and adjust in real time, which is critical for scaling automation in real-world environments."}]}, {"id": 92, "date": "2026-04-17", "category": "model_releases", "headline": "OpenAI launches GPT-Rosalind for biology and drug discovery", "summary": "GPT-Rosalind is designed to assist with scientific research and workflows, offering specialized capabilities for complex research tasks in life sciences and genomics.", "created_at": "2026-04-17 16:54:14", "articles": [{"id": 275, "title": "OpenAI releases GPT-Rosalind for scientific workflows and research tasks", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/xbb3be7z1o862p5rtajh.html#story-6", "source_name": "AlphaSignal", "published_at": "2026-04-17 16:18:10", "summary": null, "content_snippet": "GPT-Rosalind is designed to assist with scientific research and workflows, offering specialized capabilities for complex research tasks.", "full_text": null}, {"id": 280, "title": "OpenAI launches GPT-Rosalind for biology and drug discovery", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/jutg9no32hdw4r44uk3u.html#story-2", "source_name": "Unknown", "published_at": "2026-04-17 14:41:36", "summary": null, "content_snippet": "OpenAI introduced GPT-Rosalind, a specialized model for life sciences that accelerates early-stage research in biology, drug discovery, and genomics. It combines advanced reasoning with improved tool use to help scientists explore hypotheses and design experiments more efficiently.", "full_text": "OpenAI has introduced GPT-Rosalind , a model focused on life sciences, built to support research across biology, drug discovery, and translational medicine. It combines stronger reasoning across chemistry, protein engineering, and genomics with improved tool use, helping researchers move from literature review to experimental planning more efficiently. The aim is to speed up early-stage discovery, where timelines often stretch over 10 to 15 years, by enabling scientists to explore more hypotheses, connect complex data, and design better experiments earlier in the process."}]}, {"id": 93, "date": "2026-04-17", "category": "open_source", "headline": "Tencent open-sources HY-World 2.0 for 3D world generation", "summary": "HY-World 2.0 generates complete editable 3D environments from text, images, or video, producing production-ready assets like meshes and point clouds.", "created_at": "2026-04-17 16:54:14", "articles": [{"id": 279, "title": "Tencent open-sources HY-World 2.0 for 3D world generation", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/jutg9no32hdw4r44uk3u.html#story-1", "source_name": "Unknown", "published_at": "2026-04-17 14:41:36", "summary": null, "content_snippet": "Tencent released HY-World 2.0, a multimodal AI system that generates complete editable 3D environments from text, images, or video. The model produces production-ready assets like meshes and point clouds for engines like Unity and Unreal, enabling faster prototyping and asset creation.", "full_text": "Tencent has released HY-World 2.0 , a multimodal system that can generate complete 3D environments from text, images, and video, with outputs designed for real production use. Instead of producing short clips or static scenes, it creates editable assets like meshes, point clouds, and Gaussian splats that can be exported into engines like Unity and Unreal. The system works through a multi-stage pipeline that constructs panoramic scenes, plans navigation, expands environments, and assembles them into coherent worlds, making it possible to generate maps, prototype levels, and build assets far more quickly than traditional workflows."}]}, {"id": 94, "date": "2026-04-17", "category": "products_tools", "headline": "Anthropic recommends CLAUDE.md files for folder-level context", "summary": "Anthropic suggests nesting CLAUDE.md files at every folder level to enable Claude Code to auto-load context, improving developer efficiency.", "created_at": "2026-04-17 16:54:14", "articles": [{"id": 287, "title": "Anthropic introduces CLAUDE.md files for folder-level context in Claude Code", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/a7fajxukvx5iz7kg1qs3.html#story-5", "source_name": "The Neuron", "published_at": "2026-04-17 11:06:29", "summary": null, "content_snippet": "Anthropic recommends nesting CLAUDE.md files at every folder level to enable Claude Code to auto-load context, improving efficiency for developers using the tool.", "full_text": "The catch buried in Anthropic's own docs : the new tokenizer can use up to 35% more tokens for the same text. Combined with Claude Code's new xhigh effort default, Pro and Max users will hit weekly caps faster unless they manually dial down."}]}, {"id": 95, "date": "2026-04-17", "category": "industry_business", "headline": "Amazon cancels creator accounts via AI agent without human review", "summary": "Amazon deployed an AI agent that outright cancels creator accounts for potential violations without flagging or providing appeal options, leading to creators losing years of work.", "created_at": "2026-04-17 16:54:14", "articles": [{"id": 282, "title": "Amazon cancels creator accounts via AI agent without human review", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/a7fajxukvx5iz7kg1qs3.html#story-0", "source_name": "The Neuron", "published_at": "2026-04-17 11:06:29", "summary": null, "content_snippet": "Amazon deployed an AI agent that outright cancels creator accounts for potential violations without flagging or providing appeal options, leading to creators losing years of work and income with no recourse.", "full_text": "What happened: Amazon deployed an AI agent that, rather than flagging accounts for potential violations, just cancels them. Outright. Another creator, Tom Ray, reportedly lost his entire \"per-page\" formatted comics catalog going back to 2018. When an 800-pound gorilla outsources due process to a moderation LLM, losing one platform can technically mean losing a life's work."}]}, {"id": 96, "date": "2026-04-17", "category": "industry_business", "headline": "Canva rebrands as AI platform ahead of $42B IPO test", "summary": "Canva repositioned itself as an AI-driven design platform during its IPO test, signaling a shift toward integrating AI tools into its core offerings.", "created_at": "2026-04-17 16:54:14", "articles": [{"id": 286, "title": "Canva rebrands as an AI platform with design tools at $42B IPO test", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/a7fajxukvx5iz7kg1qs3.html#story-4", "source_name": "The Neuron", "published_at": "2026-04-17 11:06:29", "summary": null, "content_snippet": "Canva repositioned itself as an AI-driven design platform during its IPO test, signaling a shift toward integrating AI tools into its core offerings.", "full_text": null}]}, {"id": 52, "date": "2026-04-16", "category": "products_tools", "headline": "Anthropic’s Claude Code gets Routines for multi-task automation", "summary": "Anthropic added Routines to Claude Code, letting users automate workflows via APIs, schedules, and GitHub events. The desktop app was also rebuilt for better multi-task agent orchestration, streamlining complex workflows.", "created_at": "2026-04-16 07:46:38", "articles": [{"id": 138, "title": "Anthropic introduces Routines in Claude Code to automate workflows via API and GitHub", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/fqyabicklt95kn2wy758.html#story-0", "source_name": "AlphaSignal", "published_at": "2026-04-15 19:42:57", "summary": null, "content_snippet": "Anthropic added Routines to Claude Code, allowing users to automate workflows across APIs, schedules, and GitHub events. This enables repeatable executions without local infrastructure, streamlining repetitive tasks.", "full_text": null}, {"id": 142, "title": "Anthropic rebuilds Claude Code desktop for multi-task agent orchestration", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/fqyabicklt95kn2wy758.html#story-4", "source_name": "AlphaSignal", "published_at": "2026-04-15 19:42:57", "summary": null, "content_snippet": "Anthropic rebuilt Claude Code’s desktop version to enhance multi-task agent orchestration, improving workflow automation and execution across complex tasks.", "full_text": null}]}, {"id": 53, "date": "2026-04-16", "category": "products_tools", "headline": "Hugging Face Hub now shares GPU kernels for optimized compute", "summary": "Hugging Face enables sharing and loading GPU kernels directly from the Hub, simplifying access to optimized computational resources for AI workloads.", "created_at": "2026-04-16 07:46:38", "articles": [{"id": 145, "title": "Hugging Face enables sharing and loading GPU kernels from Hub", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/fqyabicklt95kn2wy758.html#story-7", "source_name": "AlphaSignal", "published_at": "2026-04-15 19:42:57", "summary": null, "content_snippet": "Hugging Face introduced the ability to share and load GPU kernels directly from the Hugging Face Hub, simplifying access to optimized computational resources.", "full_text": null}]}, {"id": 54, "date": "2026-04-16", "category": "model_releases", "headline": "OpenAI’s GPT-5.4-Cyber targets cybersecurity defenders", "summary": "OpenAI expanded its Trusted Access program with GPT-5.4-Cyber, a version tuned for defensive cybersecurity workflows, aiding analysts in software and infrastructure analysis.", "created_at": "2026-04-16 07:46:38", "articles": [{"id": 139, "title": "OpenAI expands Trusted Access with GPT-5.4-Cyber for cybersecurity defenders", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/fqyabicklt95kn2wy758.html#story-1", "source_name": "AlphaSignal", "published_at": "2026-04-15 19:42:57", "summary": null, "content_snippet": "OpenAI introduced GPT-5.4-Cyber, a version of GPT-5.4 tuned for defensive cybersecurity workflows, as part of its Trusted Access program for verified defenders analyzing software and infrastructure.", "full_text": null}]}, {"id": 55, "date": "2026-04-16", "category": "products_tools", "headline": "Cursor’s multi-agent system speeds up CUDA kernels by 38%", "summary": "Cursor, with NVIDIA, built a multi-agent system that auto-writes and optimizes CUDA kernels, delivering a 38% average speedup across 235 real-world problems.", "created_at": "2026-04-16 07:46:38", "articles": [{"id": 141, "title": "Cursor develops multi-agent system optimizing CUDA kernels with 38% speedup", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/fqyabicklt95kn2wy758.html#story-3", "source_name": "AlphaSignal", "published_at": "2026-04-15 19:42:57", "summary": null, "content_snippet": "Cursor, in collaboration with NVIDIA, built a multi-agent system that automatically writes and optimizes CUDA kernels, achieving a 38% average performance improvement across 235 real-world problems.", "full_text": null}]}, {"id": 56, "date": "2026-04-16", "category": "products_tools", "headline": "Holo3 agents power autonomous browser automation in HoloTab", "summary": "H Company’s Holo3 agent, which hit 79% on OSWorld at 1/10 the cost, now drives HoloTab—a Chrome extension enabling parallel autonomous browser automation.", "created_at": "2026-04-16 07:46:38", "articles": [{"id": 140, "title": "H Company launches Holo3 agents for browser automation in Chrome extension HoloTab", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/fqyabicklt95kn2wy758.html#story-2", "source_name": "AlphaSignal", "published_at": "2026-04-15 19:42:57", "summary": null, "content_snippet": "H Company’s Holo3 agent, which achieved 79% on OSWorld at 1/10 the inference cost, now powers HoloTab, a Chrome extension enabling autonomous browser automation with parallel agent execution.", "full_text": null}]}, {"id": 57, "date": "2026-04-16", "category": "products_tools", "headline": "DeepLearning.AI and JetBrains launch spec-driven coding course", "summary": "DeepLearning.AI and JetBrains unveiled a new course on Spec-Driven Development with Coding Agents, teaching structured agentic coding via clear specifications.", "created_at": "2026-04-16 07:46:38", "articles": [{"id": 136, "title": "DeepLearning.AI and JetBrains launch new course on Spec-Driven Development with Coding Agents", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/cw3qxo1xsxdqp5ozhj1l.html#story-0", "source_name": "Unknown", "published_at": "2026-04-15 20:08:05", "summary": null, "content_snippet": "DeepLearning.AI and JetBrains introduced a new course, 'Spec-Driven Development with Coding Agents,' taught by Paul Everitt, offering a structured approach to coding with agents by writing clear specs to ensure reliable and maintainable software development.", "full_text": null}, {"id": 137, "title": "DeepLearning.AI announces 7-day Tamagotchi-style web app challenge using spec-driven development", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/cw3qxo1xsxdqp5ozhj1l.html#story-1", "source_name": "Unknown", "published_at": "2026-04-15 20:08:05", "summary": null, "content_snippet": "DeepLearning.AI launched a 7-day build challenge where participants create a Tamagotchi-style web app using spec-driven development, emphasizing clear, testable specs for coding agents, with rewards and a submission deadline of April 22.", "full_text": null}]}, {"id": 58, "date": "2026-04-16", "category": "research", "headline": "Anthropic’s AI researchers outperform humans on alignment benchmark", "summary": "Anthropic showed nine parallel Claude Opus 4.6 agents outperformed its human researchers on a real alignment problem, recovering 97% of the gap for $18K.", "created_at": "2026-04-16 07:46:38", "articles": [{"id": 144, "title": "Anthropic shows AI researchers outperform humans on alignment benchmark", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/fqyabicklt95kn2wy758.html#story-6", "source_name": "AlphaSignal", "published_at": "2026-04-15 19:42:57", "summary": null, "content_snippet": "Anthropic demonstrated that AI researchers using their tools outperform humans on alignment benchmarks, highlighting the efficiency gains of AI-assisted research workflows.", "full_text": null}, {"id": 145, "title": "Hugging Face enables sharing and loading GPU kernels from Hub", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/fqyabicklt95kn2wy758.html#story-7", "source_name": "AlphaSignal", "published_at": "2026-04-15 19:42:57", "summary": null, "content_snippet": "Hugging Face introduced the ability to share and load GPU kernels directly from the Hugging Face Hub, simplifying access to optimized computational resources.", "full_text": null}]}, {"id": 59, "date": "2026-04-16", "category": "products_tools", "headline": "Google Chrome adds reusable prompt-based AI workflows", "summary": "Google integrated reusable prompt-based AI workflows into Chrome, letting users automate and reuse AI-driven tasks directly within the browser.", "created_at": "2026-04-16 07:46:38", "articles": [{"id": 143, "title": "Google equips Chrome with reusable prompt-based AI workflows", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/fqyabicklt95kn2wy758.html#story-5", "source_name": "AlphaSignal", "published_at": "2026-04-15 19:42:57", "summary": null, "content_snippet": "Google added reusable prompt-based AI workflows to Chrome, enabling users to automate and reuse AI-driven tasks directly within the browser.", "full_text": null}]}, {"id": 60, "date": "2026-04-16", "category": "sci_tech_trends", "headline": "Teleport turns session recordings into security intelligence", "summary": "Teleport converts SSH, Kubernetes, and database session recordings into structured security insights, boosting threat detection for IT teams.", "created_at": "2026-04-16 07:46:38", "articles": [{"id": 161, "title": "Teleport converts session recordings into structured security intelligence", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/l6m4ggyygat1t894wrr5.html#story-5", "source_name": "Unknown", "published_at": "2026-04-15 13:40:48", "summary": null, "content_snippet": "Teleport transforms SSH, Kubernetes, and database session recordings into summarized security intelligence, enhancing threat detection and analysis for IT teams.", "full_text": null}]}, {"id": 61, "date": "2026-04-16", "category": "editorial", "headline": "Austin Tedesco implements confidence check workflow for Claude Code outputs", "summary": "Every's head of growth Austin Tedesco uses a confidence scoring system (1-100) to ensure Claude Code's outputs meet a 90% threshold before shipping, improving quality across tasks without over-optimizing.", "created_at": "2026-04-16 17:11:30", "articles": [{"id": 193, "title": "Austin Tedesco implements confidence check workflow for Claude Code outputs", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/ptox0e7e1f01leiwmcfr.html#story-5", "source_name": "Every", "published_at": "2026-04-16 14:55:18", "summary": null, "content_snippet": "Every's head of growth Austin Tedesco uses a confidence scoring system (1-100) to ensure Claude Code's outputs meet a 90% threshold before shipping, improving quality across tasks without over-optimizing.", "full_text": "Before he lets Claude Code ship anything, Austin Tedesco , Every’s head of growth, asks it one question: How confident are you in this, on a scale of 1–100? Anything under 90 percent and he sends it back to find improvements. Without an engineering background, this single question has changed the quality of everything from growth experiments to product PRs."}]}, {"id": 62, "date": "2026-04-16", "category": "editorial", "headline": "GitBook launches connected knowledge system for AI-era documentation", "summary": "GitBook introduces a connected knowledge system that combines product docs, external sources, and an embeddable AI assistant to provide accurate, source-backed answers and user behavior insights.", "created_at": "2026-04-16 17:11:30", "articles": [{"id": 192, "title": "GitBook launches connected knowledge system for AI-era documentation", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/ptox0e7e1f01leiwmcfr.html#story-4", "source_name": "Every", "published_at": "2026-04-16 14:55:18", "summary": null, "content_snippet": "GitBook introduces a connected knowledge system that combines product docs, external sources, and an embeddable AI assistant to provide accurate, source-backed answers and user behavior insights.", "full_text": "AI-era documentation can be a nightmare. Your user is querying an LLM to figure out how to use your product, and the LLM is pulling from all manner of outdated sources. GitBook fixes this. Its connected knowledge system combines your docs, external sources like YouTube tutorials and GitHub Discussions, and an embeddable AI assistant that can be inserted inside your product. Answers are grounded in actual knowledge and link back to real sources—and you get data that helps you tell exactly where users get stuck. Used by teams at Nvidia, Zoom, and n8n."}]}, {"id": 63, "date": "2026-04-16", "category": "editorial", "headline": "Dan Shipper explains why smaller models can't truly match Mythos' capabilities", "summary": "Every's CEO Dan Shipper argues that smaller models operate in different contexts and cannot autonomously find critical vulnerabilities across major systems like Mythos, emphasizing the importance of higher-level problem framing.", "created_at": "2026-04-16 17:11:30", "articles": [{"id": 191, "title": "Dan Shipper explains why smaller models can't truly match Mythos' capabilities", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/ptox0e7e1f01leiwmcfr.html#story-3", "source_name": "Every", "published_at": "2026-04-16 14:55:18", "summary": null, "content_snippet": "Every's CEO Dan Shipper argues that smaller models operate in different contexts and cannot autonomously find critical vulnerabilities across major systems like Mythos, emphasizing the importance of higher-level problem framing.", "full_text": "Because this is a framing issue, says Dan Shipper , Every’s CEO. Mythos and smaller models are operating within completely different ones. Yes, you can point a smaller model to a codebase and tell it to find a bug when you already know that capability is possible, but you cannot ask it to find serious vulnerabilities in critical software across every major operating system and browser, autonomously, the way Mythos did."}]}, {"id": 64, "date": "2026-04-16", "category": "editorial", "headline": "Researcher claims smaller AI models can match Mythos in finding security vulnerabilities", "summary": "A cybersecurity researcher reported that smaller AI models could identify the same security vulnerabilities as Mythos, Anthropic's unreleased advanced model, sparking debate about model capabilities and framing.", "created_at": "2026-04-16 17:11:30", "articles": [{"id": 190, "title": "Researcher claims smaller AI models can match Mythos in finding security vulnerabilities", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/ptox0e7e1f01leiwmcfr.html#story-2", "source_name": "Every", "published_at": "2026-04-16 14:55:18", "summary": null, "content_snippet": "A cybersecurity researcher reported that smaller AI models could identify the same security vulnerabilities as Mythos, Anthropic's unreleased advanced model, sparking debate about model capabilities and framing.", "full_text": null}]}, {"id": 65, "date": "2026-04-16", "category": "editorial", "headline": "Monologue general manager criticizes Anthropic's Claude Code redesign as derivative", "summary": "Naveen Naidu, general manager of Monologue, argues that Anthropic's new Claude Code UI resembles Cursor and was inspired by Codex's design, highlighting a trend toward agent oversight rather than manual coding.", "created_at": "2026-04-16 17:11:30", "articles": [{"id": 189, "title": "Monologue general manager criticizes Anthropic's Claude Code redesign as derivative", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/ptox0e7e1f01leiwmcfr.html#story-1", "source_name": "Every", "published_at": "2026-04-16 14:55:18", "summary": null, "content_snippet": "Naveen Naidu, general manager of Monologue, argues that Anthropic's new Claude Code UI resembles Cursor and was inspired by Codex's design, highlighting a trend toward agent oversight rather than manual coding.", "full_text": null}]}, {"id": 66, "date": "2026-04-16", "category": "editorial", "headline": "Anthropic redesigns Claude Code desktop app with new developer UI", "summary": "Anthropic updated the Claude Code desktop app with a redesigned interface featuring a sidebar for session management, drag-and-drop panes, and an integrated terminal and file editor, making it easier to work on multiple projects simultaneously.", "created_at": "2026-04-16 17:11:30", "articles": [{"id": 188, "title": "Anthropic redesigns Claude Code desktop app with new developer UI", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/ptox0e7e1f01leiwmcfr.html#story-0", "source_name": "Every", "published_at": "2026-04-16 14:55:18", "summary": null, "content_snippet": "Anthropic updated the Claude Code desktop app with a redesigned interface featuring a sidebar for session management, drag-and-drop panes, and an integrated terminal and file editor, making it easier to work on multiple projects simultaneously.", "full_text": "Now: Anthropic gave Claude Code’s desktop app a redesign, adding a sidebar for managing sessions, drag-and-drop panes, and an integrated terminal and file editor. Altogether, it makes it easier to work multiple projects in parallel. Cora general manager Kieran Klaassen was thrilled —this was already his preferred setup."}]}, {"id": 67, "date": "2026-04-16", "category": "products_tools", "headline": "Google launches native Gemini app for Mac with desktop optimization", "summary": "Google released a native desktop version of its Gemini app for Mac, offering a seamless and optimized experience for Apple users. This expands Gemini's accessibility beyond web and mobile platforms.", "created_at": "2026-04-16 17:11:36", "articles": [{"id": 187, "title": "Google brings Gemini app to Mac with native desktop experience", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/lg17kvkedlv4hra8volx.html#story-8", "source_name": "AlphaSignal", "published_at": "2026-04-16 16:45:36", "summary": null, "content_snippet": "Google launched a native desktop version of its Gemini app for Mac, providing a seamless and optimized experience for users on Apple’s operating system.", "full_text": null}]}, {"id": 68, "date": "2026-04-16", "category": "products_tools", "headline": "Anthropic’s Claude Code Routines replace Zapier/n8n in 5 minutes", "summary": "Anthropic introduced Claude Code Routines, allowing users to replace no-code automation tools like Zapier or n8n by describing tasks in plain English. This simplifies workflow automation for non-technical users.", "created_at": "2026-04-16 17:11:36", "articles": [{"id": 200, "title": "Claude Code Routines replace n8n/Zapier workflows in 5 minutes", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/2bbbs5akfnh8hl9tfs3i.html#story-6", "source_name": "The Neuron", "published_at": "2026-04-16 10:03:23", "summary": null, "content_snippet": "Anthropic's new Claude Code Routines allow users to replace n8n, Make.com, or Zapier workflows by describing tasks in plain English, simplifying automation for non-technical users.", "full_text": "Anthropic just shipped Claude Code Routines , and as Nick Saraev walks through in his demo , it is a 1-to-1 replacement for n8n, Make.com, and Zapier. The old way: drag-and-drop nodes, set up credentials, map variables, debug for hours. The new way: describe what you want in plain English, hit save, done."}]}, {"id": 69, "date": "2026-04-16", "category": "model_releases", "headline": "Anthropic’s LLMs inherit traits via hidden statistical patterns", "summary": "Anthropic’s research reveals LLMs can inherit behaviors from unrelated training data through statistical patterns, not semantic meaning. This challenges assumptions about model training and alignment.", "created_at": "2026-04-16 17:11:36", "articles": [{"id": 183, "title": "Anthropic demonstrates LLMs transfer traits through hidden statistical patterns", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/lg17kvkedlv4hra8volx.html#story-4", "source_name": "AlphaSignal", "published_at": "2026-04-16 16:45:36", "summary": null, "content_snippet": "Anthropic’s research shows that large language models can inherit behaviors from seemingly unrelated training data through statistical patterns, not semantic meaning, revealing subliminal learning mechanisms.", "full_text": null}]}, {"id": 70, "date": "2026-04-16", "category": "products_tools", "headline": "OpenAI updates Agents SDK with sandbox execution and model-native harness", "summary": "OpenAI’s updated Agents SDK introduces a model-native harness and sandbox execution for safer, structured agent workflows. This enables more reliable multi-step tasks in production environments.", "created_at": "2026-04-16 17:11:36", "articles": [{"id": 181, "title": "OpenAI updates Agents SDK with sandbox execution and model-native harness", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnn
