<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Node — AI Intelligence Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Fraunces:opsz,wght@9..144,700;9..144,900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --cream:#FFF2C5;--peach:#FFE8E5;--ice:#E0F1FF;
  --black:#111111;--white:#FFFFFF;--page-bg:#0D0D0D;
  --live:#EF4444;
  --page-text:#F0F0F0;
  --page-text2:rgba(255,255,255,0.5);
  --page-text3:rgba(255,255,255,0.25);
  --text:rgba(17,17,17,1);
  --text-body:rgba(17,17,17,0.75);
  --text2:rgba(17,17,17,0.45);
  --text3:rgba(17,17,17,0.25);
  /* Diffused light system — huge spread, low alpha, tinted ambient occlusion */
  --glow-cream:255,230,140;
  --glow-peach:255,180,170;
  --glow-ice:150,200,255;
  --ease-quintic:cubic-bezier(0.23, 1, 0.32, 1);
}
html,body{
  height:100%;overflow:hidden;
  background:#000;
  font-family:'Outfit',-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
  color:var(--page-text);
}

/* ═══ APP SHELL ═══ */
.app{
  height:100%;display:flex;flex-direction:column;
  max-width:430px;margin:0 auto;
  background:var(--page-bg);overflow:hidden;position:relative;
}
@media(min-width:431px){
  .app{border-radius:28px;margin-top:10px;height:calc(100% - 20px);box-shadow:0 8px 40px rgba(0,0,0,0.4)}
}

/* ═══ HEADER ═══ */
.header{
  padding:16px 20px 0;flex-shrink:0;
  position:relative;z-index:100;
}
.header-row{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:14px;
}
.logo{font-size:24px;font-weight:800;letter-spacing:-0.01em;display:flex;align-items:center;gap:8px;color:var(--page-text)}
.logo-icon{font-size:20px;color:#F59E0B}
.refresh-btn{
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,0.06);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--page-text2);transition:all .2s;
}
.refresh-btn:hover{background:rgba(255,255,255,0.1)}
.refresh-btn.spinning svg{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Category pills — horizontally scrollable with fade mask on the right to hint at more */
.cat-pills{
  display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;padding-right:24px;
  scrollbar-width:none;
  -webkit-mask-image:linear-gradient(to right, black calc(100% - 40px), transparent);
  mask-image:linear-gradient(to right, black calc(100% - 40px), transparent);
}
.cat-pills::-webkit-scrollbar{display:none}
.cpill{
  font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;
  padding:10px 20px;border-radius:9999px;border:none;cursor:pointer;
  white-space:nowrap;transition:all .2s;
}
.cpill.on{background:var(--white);color:var(--black)}
.cpill:not(.on){background:rgba(255,255,255,0.08);color:var(--page-text2);border:1px solid rgba(255,255,255,0.06)}

/* Time pills */
.time-pills{display:flex;gap:6px;padding:0 0 10px}
.tpill{
  font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;
  padding:6px 14px;border-radius:9999px;border:none;cursor:pointer;
  white-space:nowrap;transition:all .2s;
}
.tpill.on{background:var(--cream);color:var(--black);border:1px solid rgba(255,255,255,0.08)}
.tpill:not(.on){background:transparent;color:var(--page-text3);border:1px solid transparent}

/* ═══ SEARCH BAR ═══ */
.search-bar{
  position:absolute;top:0;left:0;right:0;
  padding:16px 20px;
  background:var(--page-bg);z-index:150;
  transform:translateY(-100%);opacity:0;
  transition:all .3s cubic-bezier(.22,1,.36,1);
}
.search-bar.open{transform:translateY(0);opacity:1}
.search-input-wrap{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:16px;padding:12px 16px;
}
.search-input{
  flex:1;background:none;border:none;outline:none;
  font-family:'Outfit',sans-serif;font-size:16px;
  color:var(--page-text);
}
.search-input::placeholder{color:var(--page-text3)}
.search-close{background:none;border:none;cursor:pointer;color:var(--page-text2);font-size:18px;padding:4px}

/* ═══ CARD STACK ═══ */
.stack-area{
  flex:1;position:relative;
  display:flex;flex-direction:column;
  align-items:center;          /* horizontal center (x-axis for flex column) */
  justify-content:center;      /* vertical center (y-axis for flex column) */
  overflow:hidden;
  padding:4px 20px 96px;       /* bottom padding clears floating nav pill */
  filter:saturate(1.08) brightness(1.02);  /* compensation for lost backdrop-filter saturate */
}
.stack{
  position:relative;
  width:100%;
  height:auto;                 /* CRITICAL: hug .stack-top's natural height so .stack-bg inset:0 = top card's size */
  transform:translateY(-30px); /* lift the card pile so bg cards don't collide with the slider below */
}
.stack-counter{
  position:absolute;
  bottom:104px;
  left:20px;right:20px;
  z-index:15;                  /* above stack-bg (z:10) so it's never occluded */
  padding-top:16px;            /* anti-collision buffer from descending bg cards */
}

/* Ripple canvas — light layer over everything, screen-blended onto whatever's below */
.ripple-canvas{
  position:absolute;inset:0;
  width:100%;height:100%;
  pointer-events:none;
  z-index:20;                  /* above .stack-top (z:10) — illumination from above */
  mix-blend-mode:screen;       /* canvas pixels ADD brightness to the card/bezel below */
}

/* Behind cards — empty colored shapes, just edges peeking */
.stack-bg{
  position:absolute;
  left:0;right:0;top:0;bottom:0;
  border-radius:28px;
  will-change:transform,box-shadow;
  transition:box-shadow .4s var(--ease-quintic);
}
.stack-bg.c-cream{box-shadow:0 24px 80px -20px rgba(var(--glow-cream),0.22),0 8px 32px -8px rgba(var(--glow-cream),0.12)}
.stack-bg.c-peach{box-shadow:0 24px 80px -20px rgba(var(--glow-peach),0.22),0 8px 32px -8px rgba(var(--glow-peach),0.12)}
.stack-bg.c-ice{box-shadow:0 24px 80px -20px rgba(var(--glow-ice),0.22),0 8px 32px -8px rgba(var(--glow-ice),0.12)}

/* Top card — content-hugging with max cap; ripple canvas illuminates via mix-blend-mode:screen
   NOTE: backdrop-filter was removed because it creates an isolation group that breaks
   mix-blend-mode on the canvas sibling. Saturation compensation is applied to .stack-area. */
.stack-top{
  position:relative;           /* no longer absolute-filling — let flex parent center it */
  width:100%;
  height:auto;                 /* hug content height */
  max-height:75vh;             /* cap tall cards */
  border-radius:28px;
  padding:28px 28px 22px;
  overflow-y:auto;             /* internal scroll when content exceeds max-height */
  overflow-x:hidden;
  will-change:transform,box-shadow,filter;
  cursor:pointer;
  user-select:none;-webkit-user-select:none;
  touch-action:pan-y;
  z-index:10;
  display:flex;flex-direction:column;
  transition:box-shadow .5s var(--ease-quintic);
}
.stack-top::-webkit-scrollbar{display:none}
.stack-top.swiping{overflow:hidden;transition:none}
.stack-top.flinging{filter:blur(1.2px)}

/* Card colors — 0.82 opacity: the golden-point between solid card and frosted-glass halo */
.c-cream{background:rgba(255,242,197,0.82)}
.c-peach{background:rgba(255,232,229,0.82)}
.c-ice{background:rgba(224,241,255,0.82)}

/* Diffused aura per tint — massive spread, minimal alpha */
.stack-top.c-cream{box-shadow:0 40px 120px -20px rgba(var(--glow-cream),0.35),0 12px 48px -8px rgba(var(--glow-cream),0.18),inset 0 1px 0 rgba(255,255,255,0.5)}
.stack-top.c-peach{box-shadow:0 40px 120px -20px rgba(var(--glow-peach),0.35),0 12px 48px -8px rgba(var(--glow-peach),0.18),inset 0 1px 0 rgba(255,255,255,0.5)}
.stack-top.c-ice{box-shadow:0 40px 120px -20px rgba(var(--glow-ice),0.35),0 12px 48px -8px rgba(var(--glow-ice),0.18),inset 0 1px 0 rgba(255,255,255,0.5)}

/* LIVE badge */
.live{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--live);color:white;
  font-size:10px;font-weight:700;padding:4px 10px;
  border-radius:6px;text-transform:uppercase;
  letter-spacing:0.06em;margin-bottom:14px;
  width:fit-content;
}
.live-dot{width:5px;height:5px;border-radius:50%;background:white;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

.card-h{
  font-size:24px;font-weight:800;line-height:1.2;
  letter-spacing:-0.02em;color:var(--black);margin:10px 0 14px 0;
}
.card-meta{font-size:13px;color:var(--text2);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.dot{width:3px;height:3px;border-radius:50%;background:var(--text3);flex-shrink:0}
.card-snippet{
  font-size:15px;line-height:1.6;color:#444;
  margin-top:0;
  font-weight:450;
}
/* .card-body no longer used on card view — kept for potential future reuse */
.card-body{
  font-size:14px;line-height:1.6;color:var(--text-body);
}
.card-foot{display:flex;justify-content:space-between;align-items:center;margin-top:auto;padding-top:24px}
.card-cat{
  font-size:11px;font-weight:600;color:var(--text);
  text-transform:uppercase;letter-spacing:0.1em;
  padding:6px 12px;border-radius:9999px;
  background:rgba(17,17,17,0.06);
  border:1px solid rgba(17,17,17,0.08);
}
.bk-btn{
  background:none;border:none;cursor:pointer;
  color:var(--text3);transition:color .15s;padding:4px;
}
.bk-btn:hover{color:var(--text)}
.bk-btn.on{color:#F59E0B}
.bk-btn.on svg{fill:#F59E0B;stroke:#F59E0B}

/* ═══ PURE TYPOGRAPHIC FLOW — thumbnail removed, summary un-clamped ═══ */

/* Bookmark button — circular chip at card-foot, right-aligned opposite the category pill */
.bk-btn{
  width:36px;height:36px;
  border-radius:50%;
  background:rgba(17,17,17,0.06);
  border:1px solid rgba(17,17,17,0.08);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text2);
  padding:0;
  transition:background .2s,color .2s,border-color .2s;
}
.bk-btn:hover{
  background:rgba(17,17,17,0.1);
  color:var(--text);
}
.bk-btn svg{width:17px;height:17px;transition:all .2s}
.bk-btn.on{
  background:rgba(245,158,11,0.12);
  border-color:rgba(245,158,11,0.35);
  color:#F59E0B;
}
.bk-btn.on svg{fill:#F59E0B;stroke:#F59E0B}

/* Bookmark micro-interaction — spring pop + glow pulse on toggle */
@keyframes bk-pop{
  0%   {transform:scale(1)}
  40%  {transform:scale(1.32)}
  70%  {transform:scale(0.93)}
  100% {transform:scale(1)}
}
@keyframes bk-glow{
  0%   {box-shadow:0 0 0 0 rgba(245,158,11,0.55)}
  100% {box-shadow:0 0 0 16px rgba(245,158,11,0)}
}
.bk-btn.pulsing{animation:bk-pop .5s var(--ease-quintic)}
.bk-btn.pulsing.on{
  animation:bk-pop .5s var(--ease-quintic),bk-glow .7s ease-out;
}

/* Card meta pill — tags & favicon */
.card-meta{gap:8px}
.meta-pill{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 9px;border-radius:9999px;
  background:rgba(17,17,17,0.06);
  font-size:11px;font-weight:600;
  color:var(--text2);
  letter-spacing:0.02em;
}
.meta-pill.live{
  background:var(--live);color:white;
  text-transform:uppercase;letter-spacing:0.06em;
}
.fav-icon{
  width:14px;height:14px;border-radius:3px;
  flex-shrink:0;
  object-fit:cover;
  background:rgba(17,17,17,0.08);
}
.read-time{
  font-size:11px;color:var(--text2);font-weight:500;
}

/* Card foot — category pill only (bookmark moved to thumbnail) */
.card-foot{gap:8px}
.card-cat{flex:0 0 auto}

/* Search keyword highlight — subtle dark tint + bold, readable on cream/peach/ice */
.card-h mark,.card-snippet mark,.art-text mark,.art-title mark{
  background:rgba(245,158,11,0.22);
  color:inherit;
  font-weight:700;
  border-radius:3px;
  padding:0 3px;
  box-decoration-break:clone;
  -webkit-box-decoration-break:clone;
}
/* Detail view title mark — slightly stronger since titles are already bold */
.art-title mark{background:rgba(245,158,11,0.28)}

/* Search bar — enhanced with result counter, history, and timeline sparkline */
.search-counter{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  gap:8px 12px;
  padding:12px 20px 2px;
  color:var(--page-text3);
  font-size:12px;font-weight:500;letter-spacing:0.02em;
}
.search-counter-text{flex:1 1 250px;min-width:200px;line-height:1.45}
.search-counter strong{color:var(--page-text);font-weight:600}
#timeline-sparkline{
  flex-shrink:0;
  opacity:0.92;
  image-rendering:crisp-edges;
  cursor:pointer;
}
/* Filter badge when a bar is selected */
.timeline-filter-badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:9999px;
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(245,158,11,0.35);
  font-size:11px;font-weight:600;
  color:var(--page-text);margin-top:4px;
  cursor:pointer;
  transition:background .2s;
}
.timeline-filter-badge:hover{background:rgba(255,255,255,0.18)}
.timeline-filter-badge .close{
  font-size:13px;color:rgba(255,100,100,0.7);
  margin-left:2px;
}
.timeline-wrap{
  display:flex;flex-direction:column;align-items:flex-end;
  gap:2px;flex-shrink:0;
}
.timeline-label{
  font-size:9px;color:var(--page-text3);
  letter-spacing:0.08em;text-transform:uppercase;
  opacity:0.7;
}
.search-history{
  padding:12px 20px 4px;
  display:flex;flex-wrap:wrap;gap:6px;
}
.search-history-label{
  display:block;width:100%;
  font-size:11px;color:var(--page-text3);
  text-transform:uppercase;letter-spacing:0.08em;
  margin-bottom:8px;font-weight:600;
}
.search-chip{
  font-family:'Outfit',sans-serif;font-size:12px;
  padding:6px 12px;border-radius:9999px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  color:var(--page-text2);cursor:pointer;
  transition:all .2s;
}
.search-chip:hover{background:rgba(255,255,255,0.1);color:var(--page-text)}
.search-chip.clear{color:rgba(255,100,100,0.7);border-color:rgba(255,100,100,0.15)}

/* Scrubbable slider — replaces the old progress bar with a draggable range input */
.stack-counter{
  display:flex;align-items:center;gap:10px;
  font-size:11px;color:var(--page-text3);
  letter-spacing:0.04em;font-variant-numeric:tabular-nums;
}
#stack-slider{
  -webkit-appearance:none;
  appearance:none;
  flex:1;height:2px;
  background:rgba(255,255,255,0.10);
  border-radius:2px;
  outline:none;
  cursor:pointer;
  transition:background .2s;
}
#stack-slider:hover{background:rgba(255,255,255,0.16)}
/* Amber thumb — glowing dot */
#stack-slider::-webkit-slider-thumb{
  -webkit-appearance:none;
  appearance:none;
  width:14px;height:14px;border-radius:50%;
  background:#F59E0B;
  cursor:pointer;
  border:2px solid rgba(0,0,0,0.25);
  box-shadow:0 0 10px rgba(245,158,11,0.45),0 2px 6px rgba(0,0,0,0.3);
  transition:transform .15s,box-shadow .15s;
}
#stack-slider::-webkit-slider-thumb:hover{
  transform:scale(1.2);
  box-shadow:0 0 16px rgba(245,158,11,0.6),0 2px 8px rgba(0,0,0,0.35);
}
#stack-slider::-webkit-slider-thumb:active{
  transform:scale(1.05);
}
#stack-slider::-moz-range-thumb{
  width:14px;height:14px;border-radius:50%;
  background:#F59E0B;
  cursor:pointer;
  border:2px solid rgba(0,0,0,0.25);
  box-shadow:0 0 10px rgba(245,158,11,0.45);
}

/* ═══ SLICE B — DETAIL PAGE SURGERY ═══ */

/* Glass header on detail — OK to use backdrop-filter here, no canvas conflict */
.art-top{
  background:rgba(255,255,255,0.55) !important;
  backdrop-filter:blur(16px) saturate(1.3);
  -webkit-backdrop-filter:blur(16px) saturate(1.3);
  border-bottom:1px solid rgba(17,17,17,0.06);
}

/* Source cards — proper physical-card feel with border + inner shadow */
.art-link{
  background:rgba(255,255,255,0.45) !important;
  border:1px solid rgba(17,17,17,0.08);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.6);
  padding:14px 16px 14px 14px !important;
}
.art-link:hover{
  background:rgba(255,255,255,0.7) !important;
  border-color:rgba(17,17,17,0.15);
}
.art-link-fav{
  width:20px;height:20px;border-radius:5px;
  background:rgba(17,17,17,0.06);
  flex-shrink:0;
  object-fit:cover;
}

/* ═══ KEYWORD PILLS — topic chips bridging Detail → Search ═══ */
.art-pills{
  display:flex;gap:6px;
  overflow-x:auto;
  scrollbar-width:none;
  margin:-4px -24px 22px;
  padding:0 24px 4px;
  -webkit-mask-image:linear-gradient(to right, black calc(100% - 28px), transparent);
  mask-image:linear-gradient(to right, black calc(100% - 28px), transparent);
}
.art-pills::-webkit-scrollbar{display:none}
.art-pill{
  flex-shrink:0;
  display:inline-flex;align-items:center;gap:3px;
  padding:5px 12px 5px 10px;
  border-radius:9999px;
  background:transparent;
  border:1px solid rgba(17,17,17,0.16);
  color:var(--text);
  font-family:'Outfit',sans-serif;
  font-size:11px;font-weight:600;
  cursor:pointer;
  transition:all .2s var(--ease-quintic);
  letter-spacing:0.01em;
  white-space:nowrap;
}
.art-pill::before{
  content:'#';
  color:var(--text2);
  font-weight:500;
  font-size:12px;
}
.art-pill:hover{
  background:rgba(17,17,17,0.06);
  border-color:rgba(17,17,17,0.32);
  transform:translateY(-1px);
  color:var(--black);
}
.art-pill:hover::before{color:#F59E0B}
.art-pill:active{transform:translateY(0)}

/* ═══ BREADCRUMB LADDER — track navigation history through Story Echoes ═══ */
.art-breadcrumb{
  padding:2px 24px 10px;
  animation:breadcrumbIn .35s var(--ease-quintic);
}
.art-breadcrumb-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 14px 6px 9px;
  background:rgba(17,17,17,0.05);
  border:1px solid rgba(17,17,17,0.09);
  border-radius:9999px;
  font-family:'Outfit',sans-serif;
  font-size:11px;font-weight:500;
  cursor:pointer;
  max-width:100%;min-width:0;
  transition:all .2s var(--ease-quintic);
}
.art-breadcrumb-btn:hover{
  background:rgba(17,17,17,0.09);
  transform:translateX(-2px);
}
.art-breadcrumb-btn svg{width:13px;height:13px;flex-shrink:0;color:var(--text2)}
.art-breadcrumb-label{
  color:var(--text2);
  text-transform:uppercase;
  letter-spacing:0.08em;
  font-weight:600;
  flex-shrink:0;
}
.art-breadcrumb-title{
  color:var(--text);
  font-weight:600;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  min-width:0;
  max-width:220px;
}
.art-breadcrumb-depth{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:16px;height:16px;padding:0 5px;
  font-size:9px;font-weight:700;
  background:rgba(245,158,11,0.18);
  color:#92400E;
  border-radius:9999px;
  margin-left:4px;
}
@keyframes breadcrumbIn{
  from{opacity:0;transform:translateY(-6px)}
  to{opacity:1;transform:translateY(0)}
}

/* ═══ STORY ECHOES — thematic sibling strip at the bottom of detail view ═══ */
.echoes-section{
  margin:32px -24px 16px;        /* bleed to card edge so strip can scroll full-width */
  padding:24px 24px 8px;
  border-top:1px solid rgba(17,17,17,0.08);
}
.echoes-label{
  font-size:11px;font-weight:700;
  color:var(--text2);
  letter-spacing:0.14em;
  text-transform:uppercase;
  margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.echoes-label::before{
  content:'◈';font-size:12px;color:#F59E0B;
}
.echoes-strip{
  display:flex;gap:12px;
  overflow-x:auto;
  padding-bottom:8px;
  scroll-snap-type:x mandatory;
  scrollbar-width:none;
  -webkit-mask-image:linear-gradient(to right, black calc(100% - 24px), transparent);
  mask-image:linear-gradient(to right, black calc(100% - 24px), transparent);
}
.echoes-strip::-webkit-scrollbar{display:none}
.echo-card{
  flex:0 0 190px;
  padding:14px 14px 12px;
  background:rgba(17,17,17,0.04);
  border:1px solid rgba(17,17,17,0.08);
  border-radius:14px;
  cursor:pointer;
  scroll-snap-align:start;
  transition:all .25s var(--ease-quintic);
  display:flex;flex-direction:column;
}
.echo-card:hover{
  background:rgba(17,17,17,0.07);
  border-color:rgba(17,17,17,0.16);
  transform:translateY(-2px);
}
.echo-card:active{transform:translateY(0)}
.echo-meta{
  display:flex;align-items:center;gap:6px;
  font-size:10px;color:var(--text2);
  margin-bottom:8px;letter-spacing:0.02em;
}
.echo-meta .fav-icon{width:12px;height:12px}
.echo-title{
  font-size:13px;font-weight:700;
  color:var(--black);line-height:1.35;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;
  overflow:hidden;
  margin-bottom:10px;
  flex:1;
}
.echo-spark{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10px;color:#B45309;font-weight:700;
  padding:3px 8px;border-radius:9999px;
  background:rgba(245,158,11,0.14);
  border:1px solid rgba(245,158,11,0.22);
  width:fit-content;
  letter-spacing:0.02em;
}
.echo-spark svg{width:9px;height:9px;fill:#B45309}

/* ═══ KNOWLEDGE GRAPH VIEW ═══ */
.view-graph{display:none;flex-direction:column;flex:1;overflow:hidden;padding:16px 0 0}
.graph-header{padding:0 20px 8px;display:flex;justify-content:space-between;align-items:flex-start}
.graph-title{
  font-family:'Fraunces',Georgia,serif;
  font-size:26px;font-weight:800;
  color:var(--page-text);letter-spacing:-0.5px;
}
.graph-sub{font-size:11px;color:var(--page-text3);margin-top:4px;letter-spacing:0.04em}
#graph-canvas{flex:1;width:100%}
.graph-legend{
  padding:6px 20px 12px;display:flex;gap:14px;
  font-size:10px;color:var(--page-text3);letter-spacing:0.04em;
}
.graph-legend span::before{
  content:'';display:inline-block;width:8px;height:8px;
  border-radius:50%;margin-right:5px;vertical-align:middle;
}
.graph-legend .gl-node::before{background:rgba(255,255,255,0.4)}
.graph-legend .gl-hover::before{background:#F59E0B}
.graph-legend .gl-edge::before{background:rgba(245,158,11,0.5);border-radius:1px;height:2px;width:14px}

/* "Read original" floating button — sticky at bottom of detail */
.read-orig-wrap{
  position:sticky;bottom:16px;left:0;right:0;
  display:flex;justify-content:center;
  margin-top:32px;pointer-events:none;
}
.read-orig-btn{
  pointer-events:auto;
  display:inline-flex;align-items:center;gap:10px;
  padding:14px 28px;
  background:rgba(17,17,17,0.92);
  color:var(--white);
  font-family:'Outfit',sans-serif;
  font-size:14px;font-weight:600;
  border:none;border-radius:9999px;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  cursor:pointer;text-decoration:none;
  box-shadow:0 10px 40px -8px rgba(0,0,0,0.4);
  transition:transform .2s,box-shadow .2s;
}
.read-orig-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 14px 48px -8px rgba(0,0,0,0.5);
}
.read-orig-btn svg{width:16px;height:16px}

/* ═══ ZEN READING MODE — Aa toggle cycles through 3 font scales ═══ */
.zen-btn{
  background:none;border:none;cursor:pointer;
  font-family:'Fraunces',Georgia,serif;
  font-size:16px;font-weight:700;
  color:var(--text2);
  padding:4px 6px;border-radius:6px;
  transition:all .2s var(--ease-quintic);
  letter-spacing:-0.02em;
}
.zen-btn:hover{color:var(--text);background:rgba(17,17,17,0.06)}
.zen-btn.active{color:#B45309;background:rgba(245,158,11,0.12)}
.art-text{transition:font-size .3s var(--ease-quintic),line-height .3s var(--ease-quintic)}
.art-text.zen-md p{font-size:18px !important;line-height:1.82}
.art-text.zen-md p:first-child::first-letter{font-size:2.8em}
.art-text.zen-lg p{font-size:20px !important;line-height:1.88}
.art-text.zen-lg p:first-child::first-letter{font-size:2.6em}

/* Lead paragraph — first paragraph of detail gets larger font and Drop Cap */
.art-text{
  font-size:16px !important;
  line-height:1.75;
}
.art-text p:first-child::first-letter{
  font-size:3em;
  font-weight:800;
  float:left;
  line-height:0.9;
  padding:4px 10px 0 0;
  font-family:'Fraunces',Georgia,serif;
  color:var(--black);
}

/* Empty / Loading states */
.state-msg{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
}
.state-msg p{color:var(--page-text3);font-size:15px;line-height:1.6;text-align:center}
.state-btn{
  font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;
  padding:10px 24px;border-radius:9999px;border:none;cursor:pointer;
  background:rgba(255,255,255,0.1);color:var(--page-text);
  transition:background .2s;
}
.state-btn:hover{background:rgba(255,255,255,0.15)}

/* Swipe hint */
.swipe-hint{
  text-align:center;padding:4px 0;
  color:var(--page-text3);font-size:11px;
  animation:hintFade 4s ease-in-out forwards;
}
@keyframes hintFade{0%{opacity:0}15%{opacity:1}75%{opacity:1}100%{opacity:0}}

/* ═══ SAVED VIEW — Bento-lite list for quick scanning ═══ */
.view-saved{display:none;flex:1;overflow-y:auto;padding:16px 20px 110px}
.view-saved::-webkit-scrollbar{display:none}
.saved-h{
  font-size:28px;font-weight:800;letter-spacing:-0.5px;
  margin:4px 0 4px;color:var(--page-text);
  font-family:'Fraunces',Georgia,serif;
}
.saved-sub{
  font-size:12px;color:var(--page-text3);
  margin-bottom:20px;letter-spacing:0.04em;
}
.saved-stack{display:flex;flex-direction:column;gap:12px}

/* Compact list card — 3-4 per screen */
.scard{
  padding:16px 18px;border-radius:18px;
  cursor:pointer;position:relative;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  transition:background .2s,border-color .2s,transform .2s var(--ease-quintic);
}
.scard:hover{
  background:rgba(255,255,255,0.07);
  border-color:rgba(255,255,255,0.14);
}
.scard:active{transform:scale(0.985)}
.scard-meta{
  display:flex;align-items:center;gap:8px;
  font-size:11px;color:var(--page-text3);
  margin-bottom:8px;letter-spacing:0.02em;
}
.scard-meta .fav-icon{background:rgba(255,255,255,0.1)}
.scard-meta .dot{background:rgba(255,255,255,0.2)}
.scard-t{
  font-size:16px;font-weight:700;line-height:1.3;
  color:var(--page-text);margin-bottom:6px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;
}
.scard-s{
  font-size:13px;color:var(--page-text2);line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;margin-bottom:10px;
}
.scard-foot{
  display:flex;justify-content:space-between;align-items:center;
  padding-top:2px;
}
.scard-cat{
  font-size:10px;font-weight:600;
  color:var(--page-text3);
  text-transform:uppercase;letter-spacing:0.1em;
  padding:4px 10px;border-radius:9999px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
}
.scard-unsave{
  background:none;border:none;cursor:pointer;
  color:#F59E0B;padding:2px;
  display:flex;align-items:center;justify-content:center;
}
.scard-unsave svg{width:16px;height:16px;fill:#F59E0B;stroke:#F59E0B}

/* Export button */
.saved-header{
  display:flex;justify-content:space-between;align-items:flex-start;
}
.export-btn{
  background:transparent;
  border:1px solid rgba(255,255,255,0.18);
  color:var(--page-text2);
  padding:6px 14px;border-radius:9999px;
  font-family:'Outfit',sans-serif;
  font-size:11px;font-weight:600;
  letter-spacing:0.08em;
  cursor:pointer;
  transition:all .2s var(--ease-quintic);
  display:flex;align-items:center;gap:5px;
  white-space:nowrap;
  margin-top:8px;
}
.export-btn:hover{
  background:rgba(255,255,255,0.08);
  border-color:rgba(245,158,11,0.4);
  color:var(--page-text);
}
.export-btn:active{transform:scale(0.96)}
.export-btn svg{width:14px;height:14px}

/* Empty state */
.saved-empty{
  padding:60px 20px;text-align:center;
  color:var(--page-text3);
}
.saved-empty-big{
  font-family:'Fraunces',Georgia,serif;
  font-size:48px;color:var(--page-text3);
  margin-bottom:12px;opacity:0.4;
}
.saved-empty-msg{font-size:14px;line-height:1.6}

/* ═══ ARTICLE DETAIL (card modal) ═══ */
.art-overlay{
  position:fixed;inset:0;z-index:190;
  background:rgba(0,0,0,0);
  pointer-events:none;
  transition:background .35s;
}
.art-overlay.open{background:rgba(0,0,0,0.55);pointer-events:auto}

.article{
  position:fixed;
  top:40px;bottom:20px;left:16px;right:16px;
  max-width:398px;margin:0 auto;
  z-index:200;
  border-radius:28px;
  overflow:hidden;
  transform:translateY(110vh);
  transition:transform .4s cubic-bezier(.22,1,.36,1);
}
.article.open{transform:translateY(0)}
.article-scroll{
  height:100%;overflow-y:auto;
  border-radius:28px;
}
.article-scroll::-webkit-scrollbar{display:none}
.article-inner{min-height:100%;padding:0 0 32px;color:var(--black)}

.art-top{
  position:sticky;top:0;z-index:5;
  padding:14px 20px;display:flex;justify-content:space-between;align-items:center;
}
.art-back{
  width:40px;height:40px;border-radius:50%;
  background:rgba(17,17,17,0.06);border:none;
  cursor:pointer;color:var(--black);
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.art-back:hover{background:rgba(17,17,17,0.1)}
.art-acts{display:flex;gap:6px}
.art-icon{
  width:36px;height:36px;border-radius:50%;
  background:none;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--text2);transition:all .15s;
}
.art-icon:hover{color:var(--black)}
.art-icon.on{color:#F59E0B}
.art-icon.on svg{fill:#F59E0B;stroke:#F59E0B}

.art-body{padding:4px 24px}
.art-cat{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text2);margin-bottom:12px}
.art-title{font-size:26px;font-weight:800;line-height:1.18;letter-spacing:-0.02em;margin-bottom:16px}
.art-info{font-size:12px;color:var(--text2);margin-bottom:12px}
.art-source{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.art-sname{font-size:14px;font-weight:600}
.follow{
  background:var(--black);color:var(--white);border:none;
  font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;
  padding:6px 16px;border-radius:9999px;cursor:pointer;
  transition:opacity .15s;
}
.follow:hover{opacity:0.8}
.follow.following{background:rgba(17,17,17,0.1);color:var(--black)}
.art-text{font-size:15px;line-height:1.75;color:var(--text-body);margin-bottom:24px}
.art-text p{margin-bottom:14px}
.art-text p:last-child{margin-bottom:0}
.art-divider{height:1px;background:rgba(17,17,17,0.08);margin-bottom:16px}
.art-links-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text2);margin-bottom:12px}
.art-link{
  display:flex;align-items:center;gap:10px;
  padding:14px 16px;margin-bottom:8px;
  background:rgba(17,17,17,0.03);border-radius:14px;
  text-decoration:none;color:var(--text);
  font-size:14px;font-weight:500;
  transition:background .15s;
}
.art-link:hover{background:rgba(17,17,17,0.06)}
.art-link svg{flex-shrink:0;color:var(--text2)}
.art-link-url{font-size:11px;color:var(--text2);margin-top:2px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Toast */
.toast{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--black);color:var(--white);
  padding:10px 20px;border-radius:12px;font-size:13px;font-weight:500;
  opacity:0;transition:all .3s;z-index:999;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ═══ BOTTOM NAV ═══ */
.nav{
  position:fixed;
  bottom:24px;left:50%;transform:translateX(-50%);
  z-index:300;
  display:flex;align-items:center;gap:4px;
  padding:8px 12px;
  background:rgba(20,20,20,0.94);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:9999px;
  box-shadow:0 8px 40px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.03);
}
.nav-btn{
  width:48px;height:48px;border-radius:50%;
  background:none;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,0.3);
  transition:all .2s;position:relative;
}
.nav-btn.on{color:#FFFFFF}
.nav-btn.on::after{
  content:'';position:absolute;bottom:6px;
  width:4px;height:4px;border-radius:50%;
  background:#F59E0B;
}
.nav-btn:active{transform:scale(0.9)}

/* ═══ LOADING ═══ */
.loading{
  position:absolute;inset:0;z-index:500;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;
  background:var(--page-bg);transition:opacity .3s;
}
.loading.hide{opacity:0;pointer-events:none}
.loading-dots{display:flex;gap:6px}
.loading-dots span{
  width:8px;height:8px;border-radius:50%;
  background:rgba(255,255,255,0.3);
  animation:ldot 1.2s ease-in-out infinite;
}
.loading-dots span:nth-child(2){animation-delay:.15s}
.loading-dots span:nth-child(3){animation-delay:.3s}
@keyframes ldot{0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1}}
.loading-text{font-size:14px;color:var(--page-text3)}
</style>
</head>
<body>
<div class="app">
  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="loading-dots"><span></span><span></span><span></span></div>
    <div class="loading-text" id="loading-text">Loading stories...</div>
  </div>

  <!-- Header -->
  <div class="header" id="header">
    <div class="header-row">
      <div class="logo"><span class="logo-icon">◧</span>Node</div>
    </div>
    <div class="cat-pills" id="cat-pills"></div>
    <div class="time-pills" id="time-pills"></div>
    <div class="search-bar" id="search-bar">
      <div class="search-input-wrap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-input" id="search-input" type="text" placeholder="Search headline, summary, full text..." oninput="onSearch(this.value)" onkeydown="if(event.key==='Enter')onSearchEnter()">
        <button class="search-close" onclick="toggleSearch(false)">&times;</button>
      </div>
      <div id="search-panel"></div>
    </div>
  </div>

  <!-- Feed: Card Stack -->
  <div class="stack-area" id="body-feed">
    <canvas class="ripple-canvas" id="ripple-canvas"></canvas>
    <div class="stack" id="stack"></div>
    <div class="stack-counter" id="stack-counter">
      <span id="prog-cur">01</span>
      <input type="range" id="stack-slider" min="0" max="0" value="0">
      <span id="prog-total">01</span>
    </div>
  </div>

  <!-- Saved View -->
  <div class="view-saved" id="body-saved">
    <div class="saved-header">
      <div>
        <div class="saved-h">Saved</div>
        <div class="saved-sub" id="saved-sub"></div>
      </div>
      <button class="export-btn" onclick="exportBriefing()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        EXPORT .MD
      </button>
    </div>
    <div class="saved-stack" id="saved-stack"></div>
  </div>

  <!-- Knowledge Graph View -->
  <div class="view-graph" id="body-graph">
    <div class="graph-header">
      <div>
        <div class="graph-title">Intelligence Map</div>
        <div class="graph-sub" id="graph-sub"></div>
      </div>
    </div>
    <div class="graph-legend">
      <span class="gl-node">Entity</span>
      <span class="gl-hover">Highlighted</span>
      <span class="gl-edge">Co-occurrence</span>
    </div>
    <canvas id="graph-canvas"></canvas>
  </div>

  <!-- Overlay behind article -->
  <div class="art-overlay" id="art-overlay" onclick="closeArt()"></div>

  <!-- Article Detail (card modal) -->
  <div class="article" id="article">
    <div class="article-scroll" id="art-scroll">
      <div class="article-inner" id="art-inner">
        <div class="art-top" id="art-top">
          <button class="art-back" onclick="closeArt()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
            </svg>
          </button>
          <div class="art-acts">
            <button class="zen-btn" id="zen-toggle" onclick="toggleZenMode()" title="Reading size">Aa</button>
            <button class="art-icon" id="art-bk" onclick="toggleStar()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            </button>
            <button class="art-icon" onclick="copyArt()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
            </button>
          </div>
        </div>
        <div class="art-breadcrumb" id="art-breadcrumb" style="display:none"></div>
        <div class="art-body" id="art-body"></div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">Copied</div>

  <!-- Bottom Nav -->
  <div class="nav" id="nav">
    <button class="nav-btn on" id="pn-feed" onclick="go('feed')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </button>
    <button class="nav-btn" id="pn-search" onclick="toggleSearch()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </button>
    <button class="nav-btn" id="pn-graph" onclick="go('graph')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="6" cy="6" r="2"/><circle cx="18" cy="8" r="2"/><circle cx="12" cy="18" r="2"/>
        <line x1="7.5" y1="7.5" x2="11" y2="16.5"/><line x1="16.5" y1="9.5" x2="13" y2="16.5"/><line x1="8" y1="6.5" x2="16" y2="7.5"/>
      </svg>
    </button>
    <button class="nav-btn" id="pn-saved" onclick="go('saved')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
      </svg>
    </button>
  </div>
</div>

<script defer src="https://va.vercel-scripts.com/v1/script.js"></script>
<script>
/* ═══ RIPPLE PAINTER — Morandi baseline + fluid distortion on swipe ═══ */
const Ripple=(()=>{
  // Toggle for debug hooks (_tick frame driver). Flip to false for shipped builds.
  const DEBUG=true;
  const cvs=document.getElementById('ripple-canvas');
  const ctx=cvs.getContext('2d');
  let W=0,H=0,dpr=Math.min(window.devicePixelRatio||1,2);
  // Morandi palette — dusty, desaturated, soft
  const BLOBS=[
    {rx:0.22,ry:0.28,r:0.55,color:'#8B9AA8'},
    {rx:0.78,ry:0.18,r:0.45,color:'#B8A99A'},
    {rx:0.15,ry:0.78,r:0.60,color:'#9AA89B'},
    {rx:0.85,ry:0.72,r:0.50,color:'#B5A5B0'},
    {rx:0.55,ry:0.50,r:0.40,color:'#A8A29C'},
  ];
  const ripples=[];
  let lastSpawn=0;

  function resize(){
    const rect=cvs.getBoundingClientRect();
    W=rect.width;H=rect.height;
    cvs.width=W*dpr;cvs.height=H*dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }

  function drawBaseline(){
    ctx.clearRect(0,0,W,H);
    for(const b of BLOBS){
      const cx=b.rx*W,cy=b.ry*H,rad=b.r*Math.min(W,H);
      const g=ctx.createRadialGradient(cx,cy,0,cx,cy,rad);
      g.addColorStop(0,b.color+'55');
      g.addColorStop(0.5,b.color+'1e');
      g.addColorStop(1,b.color+'00');
      ctx.fillStyle=g;
      ctx.fillRect(0,0,W,H);
    }
  }

  function drawRipple(r,age){
    const t=age/r.life;
    if(!(t>=0&&t<1))return;                    // guard NaN / out-of-range
    const eased=1-Math.pow(1-t,5);             // Quintic Out — matches --ease-quintic
    const radius=r.startR+(r.maxR-r.startR)*eased;
    if(!(radius>0.5))return;                   // createRadialGradient rejects r1≤0 in some engines
    const alpha=r.strength*(1-t)*(1-t);        // quadratic fade — lingers, then vanishes
    const coreAlpha=alpha;                     // full strength — the incandescent nucleus
    const bloomAlpha=alpha*0.75;               // outer halo at 75% core intensity

    // Elongation — stretch along velocity vector, creating motion-blur-like streak
    const speed=Math.sqrt(r.vx*r.vx+r.vy*r.vy);
    const stretch=1+Math.min(speed*0.3,0.8);   // 1.0 → 1.8 at peak velocity
    const angle=Math.atan2(r.vy,r.vx);

    ctx.save();
    ctx.globalCompositeOperation='screen';
    ctx.translate(r.x,r.y);
    ctx.rotate(angle);
    ctx.scale(stretch,1);                      // deform coord system: radial gradient becomes truly elliptical

    // Outer bloom — inherits card tint (ambient sync)
    const bloomGrad=ctx.createRadialGradient(0,0,0,0,0,radius);
    bloomGrad.addColorStop(0,   `rgba(${r.hue},${bloomAlpha})`);
    bloomGrad.addColorStop(0.4, `rgba(${r.hue},${bloomAlpha*0.55})`);
    bloomGrad.addColorStop(1,   `rgba(${r.hue},0)`);
    ctx.fillStyle=bloomGrad;
    ctx.beginPath();ctx.arc(0,0,radius,0,Math.PI*2);ctx.fill();

    // Hot white core — incandescent nucleus, smaller + tighter
    const coreR=radius*0.55;
    const coreGrad=ctx.createRadialGradient(0,0,0,0,0,coreR);
    coreGrad.addColorStop(0,   `rgba(255,255,255,${coreAlpha})`);
    coreGrad.addColorStop(0.3, `rgba(255,255,255,${coreAlpha*0.6})`);
    coreGrad.addColorStop(1,   `rgba(255,255,255,0)`);
    ctx.fillStyle=coreGrad;
    ctx.beginPath();ctx.arc(0,0,coreR,0,Math.PI*2);ctx.fill();

    ctx.restore();
  }

  function frame(now){
    drawBaseline();
    for(let i=ripples.length-1;i>=0;i--){
      const r=ripples[i];
      const age=now-r.born;
      if(age>=r.life){ripples.splice(i,1);continue}
      drawRipple(r,age);
    }
    requestAnimationFrame(frame);
  }

  // Card-tint palette — ambient sync: the ripple inherits the active card's RGB
  const THEME_RGB={
    'c-cream':'255,242,197',  // #FFF2C5
    'c-peach':'255,232,229',  // #FFE8E5
    'c-ice':  '224,241,255',  // #E0F1FF
  };

  /**
   * Energy-Sensing Ripple — hybrid tracking, velocity-driven, ambient-synced.
   * Stores full velocity vector on each ripple so drawRipple can elongate
   * along the direction of motion.
   */
  function spawnRipple(x,y,vx,vy,now,cardTheme){
    // Throttle — one spawn per ~80ms keeps the trail legible, not soup
    if(now-lastSpawn<80)return;
    // Velocity floor — micro-movements leave the Morandi baseline still
    const speed=Math.sqrt(vx*vx+vy*vy);
    if(speed<0.1)return;
    lastSpawn=now;

    const hue=THEME_RGB[cardTheme]||THEME_RGB['c-ice'];

    // Energy mapping: faster drag → larger, brighter, shorter-lived
    const maxR    =50+Math.min(speed*120,250);
    const life    =Math.max(800-speed*200,400);
    const strength=0.25+Math.min(speed*0.35,0.55);  // peak 0.8 at fast velocity (was 0.4)

    ripples.push({x,y,vx,vy,born:now,life,startR:0,maxR,strength,hue});
  }

  function onDrag(x,y,vx,vy,theme){
    spawnRipple(x,y,vx,vy,performance.now(),theme);
  }

  resize();
  window.addEventListener('resize',resize);
  requestAnimationFrame(frame);
  const api={onDrag,resize,_ripples:ripples};
  if(DEBUG)api._tick=()=>frame(performance.now());
  return api;
})();

/* ═══ STATE ═══ */
let ALL=[],CATS=[],TODAY='',CAT_MAP={};
let filter={cat:'all',period:'day'};
let stackIdx=0,cur=null,view='feed',searchQ='';
let timelineFilter=null;  // null or "YYYY-MM-DD" — set when user clicks a sparkline bar
const rs=new Set(JSON.parse(localStorage.getItem('ai_read')||'[]'));
const fs=new Set(JSON.parse(localStorage.getItem('ai_fav')||'[]'));
const CNAMES=['c-cream','c-peach','c-ice'];
const CBGS=['#FFF2C5','#FFE8E5','#E0F1FF'];

/* Deep Morandi palette — contrast-first pairs so the thumbnail never merges
   with the cream/peach/ice card background. Each pair is drawn from saturated
   jewel tones dimmed just enough to stay editorial, not cartoonish. */
const MORANDI_PAIRS=[
  ['#4F5D75','#2D3142'],  // deep gunmetal + navy
  ['#E5989B','#B5838D'],  // dusty rose + dried rose
  ['#6B9080','#3A5A40'],  // forest green + moss
  ['#5C4D7D','#35224A'],  // royal purple + eggplant
  ['#C27A7E','#8C4A4E'],  // brick + rust red
  ['#2C4858','#8E9AAF'],  // deep teal + dusty blue
  ['#6A4A3C','#C28B6A'],  // chocolate + tan
  ['#3D405B','#81B29A'],  // indigo + sage
];
/* Seeded hash → deterministic color pair per story */
function seedHash(s){let h=5381;for(let i=0;i<s.length;i++)h=((h<<5)+h+s.charCodeAt(i))|0;return Math.abs(h)}
function thumbColors(story){
  const seed=seedHash((story.headline||'')+(story.id||''));
  return MORANDI_PAIRS[seed%MORANDI_PAIRS.length];
}

/* Extract domain from URL for favicon + reading time estimate */
function domainOf(url){try{return new URL(url).hostname.replace(/^www\./,'')}catch{return ''}}
function faviconUrl(url){const d=domainOf(url);return d?`https://www.google.com/s2/favicons?domain=${d}&sz=64`:''}
function readTime(text){const words=(text||'').split(/\s+/).filter(Boolean).length;return Math.max(1,Math.ceil(words/200))}
/* Extract a short one-liner hook from a summary (first sentence, capped) */
function oneLiner(text,maxLen=140){
  if(!text)return '';
  const first=text.split(/(?<=[.!?])\s+/)[0]||text;
  return first.length>maxLen?first.substring(0,maxLen).replace(/\s+\S*$/,'')+'…':first;
}

const $=id=>document.getElementById(id);
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function isT(d){return d===TODAY}
function isW(d){const x=(new Date(TODAY)-new Date(d))/864e5;return x>=0&&x<7}
function isM(d){return d&&TODAY&&d.substring(0,7)===TODAY.substring(0,7)}
function isY(d){return d&&TODAY&&d.substring(0,4)===TODAY.substring(0,4)}

/* Highlight matches of q inside text as <mark> — works on already-escaped output.
   q is escaped for regex metachars; HTML-escape is applied to text before substitution. */
function hi(text,q){
  const escaped=esc(text||'');
  if(!q||!text)return escaped;
  const reSafe=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  try{
    const re=new RegExp('('+reSafe+')','gi');
    return escaped.replace(re,'<mark>$1</mark>');
  }catch{return escaped}
}

/* Search scoring — weighted hit across headline / summary / full_text / snippet */
function scoreStory(x,q){
  let score=0;
  const hl=(x.headline||'').toLowerCase();
  const sm=(x.summary||'').toLowerCase();
  if(hl.includes(q))score+=10;
  if(sm.includes(q))score+=3;
  let ftHit=false,snipHit=false;
  for(const a of (x.articles||[])){
    if(!ftHit&&(a.full_text||'').toLowerCase().includes(q)){score+=5;ftHit=true}
    if(!snipHit&&(a.content_snippet||'').toLowerCase().includes(q)){score+=2;snipHit=true}
  }
  if(score===0)return 0;
  // Freshness bonus
  if(isT(x.date))score+=3;
  else if(isW(x.date))score+=1;
  // Cross-newsletter coverage bonus (up to +2)
  score+=Math.min(2,Math.max(0,((x.articles||[]).length)-1));
  return score;
}

function flt(){
  let s=ALL;
  if(filter.cat!=='all')s=s.filter(x=>x.category===filter.cat);
  // When searching: bypass period filter so results span all time, ranked by relevance
  if(!searchQ){
    if(filter.period==='day')s=s.filter(x=>isT(x.date));
    else if(filter.period==='week')s=s.filter(x=>isW(x.date));
    else if(filter.period==='month')s=s.filter(x=>isM(x.date));
    else if(filter.period==='year')s=s.filter(x=>isY(x.date));
  }
  if(searchQ){
    const q=searchQ.toLowerCase().trim();
    if(!q)return s;
    const aff=getAffinity();
    const hasAff=Object.keys(aff).length>0;
    const scored=[];
    for(const x of s){
      let sc=scoreStory(x,q);
      if(sc<=0)continue;
      // Affinity boost in search: user's interests rank higher
      if(hasAff)sc+=Math.min(4,affinityScore(x,aff)*0.5);
      scored.push([sc,x]);
    }
    scored.sort((a,b)=>b[0]-a[0]);
    let results=scored.map(p=>p[1]);
    if(timelineFilter)results=results.filter(x=>x.date===timelineFilter);
    return results;
  }
  // Feed: apply affinity sort within each date group (preserves chronological primary order)
  const aff=getAffinity();
  if(Object.keys(aff).length>0){
    s=[...s].sort((a,b)=>{
      const dateCmp=(b.date||'').localeCompare(a.date||'');
      if(dateCmp!==0)return dateCmp;
      return affinityScore(b,aff)-affinityScore(a,aff);
    });
  }
  return s;
}

/* ═══ STORY ECHOES — thematic relatedness scoring ═══
   Picks proper nouns from the current story and ranks every other story
   by keyword overlap + freshness + category + own cross-coverage. */
const ECHO_STOP=new Set([
  'the','this','that','with','from','have','has','had','was','were','been',
  'will','would','could','should','may','might','new','most','more','less',
  'all','any','some','its','their','there','here','today','now','just',
  'about','into','over','under','after','before','first','last','next',
  'ai','api','app','why','how','what','who','when','where','they','them',
  'models','model','launch','launches','launched','announce','announces','announced',
  'release','releases','released','update','updates','updated','also','than','then',
  // Generic product-tier words — capitalized but not distinctive
  'pro','plus','max','mini','lite','beta','alpha','free','basic','standard','premium',
]);
function extractKeywords(story){
  const text=((story.headline||'')+' '+(story.summary||''));
  const words=text.match(/\b[A-Z][A-Za-z0-9\-'\.]{2,}\b/g)||[];
  const seen=new Set(),kws=[];
  for(const w of words){
    const lo=w.toLowerCase();
    if(ECHO_STOP.has(lo))continue;
    if(seen.has(lo))continue;
    seen.add(lo);
    kws.push(w);
    if(kws.length>=8)break;
  }
  return kws;
}
function scoreEcho(current,candidate,keywords){
  if(current.id===candidate.id)return[0,[]];
  const text=((candidate.headline||'')+' '+(candidate.summary||'')).toLowerCase();
  const matched=[];
  for(const kw of keywords){
    // Word-boundary match kills substring false positives ("mfu" inside other words)
    const lo=kw.toLowerCase().replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    const re=new RegExp('\\b'+lo+'\\b');
    if(re.test(text))matched.push(kw);
  }
  if(matched.length===0)return[0,[]];
  let score=matched.length*5;                               // keyword overlap
  if(current.category===candidate.category)score+=2;        // same category
  const dayDiff=Math.abs((new Date(current.date)-new Date(candidate.date))/864e5);
  if(dayDiff<=3)score+=3;else if(dayDiff<=7)score+=1;       // freshness proximity
  score+=Math.min(2,Math.max(0,((candidate.articles||[]).length)-1));  // candidate own coverage
  return[score,matched];
}
const ECHO_MIN_SCORE=10;   // below this, the match is just noise
function findEchoes(story,max=6){
  const keywords=extractKeywords(story);
  if(!keywords.length)return[];
  const scored=[];
  for(const candidate of ALL){
    const [s,m]=scoreEcho(story,candidate,keywords);
    if(s>=ECHO_MIN_SCORE)scored.push({story:candidate,score:s,matched:m});
  }
  scored.sort((a,b)=>b.score-a.score);
  return scored.slice(0,max);
}

/* ═══ CROSS-SOURCE TIMELINE — daily story counts as a 30-day bar sparkline ═══ */
function buildTimelineData(stories,days=30){
  const counts={};
  for(const s of stories){
    if(s.date)counts[s.date]=(counts[s.date]||0)+1;
  }
  // Walk backward from TODAY, padding zeros for empty days
  const result=[];
  const today=new Date(TODAY+'T00:00:00Z');
  for(let i=days-1;i>=0;i--){
    const d=new Date(today);
    d.setUTCDate(d.getUTCDate()-i);
    const iso=d.toISOString().slice(0,10);
    result.push(counts[iso]||0);
  }
  return result;
}

function renderSparkline(canvasId,dailyCounts,selIdx){
  const canvas=document.getElementById(canvasId);
  if(!canvas)return;
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.getBoundingClientRect();
  if(rect.width===0||rect.height===0)return;
  canvas.width=rect.width*dpr;
  canvas.height=rect.height*dpr;
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,rect.width,rect.height);
  const maxCount=Math.max(...dailyCounts,1);
  const barWidth=rect.width/dailyCounts.length;
  const gap=1;
  // Baseline
  ctx.fillStyle='rgba(255,255,255,0.05)';
  ctx.fillRect(0,rect.height-1,rect.width,1);
  // Bars — selected bar glows white; today bar slightly brighter; rest = amber
  dailyCounts.forEach((count,i)=>{
    if(count===0)return;
    const barHeight=Math.max(1,(count/maxCount)*(rect.height-1));
    const x=i*barWidth;
    const y=rect.height-barHeight;
    if(i===selIdx){
      ctx.fillStyle='rgba(255,255,255,0.95)';                  // SELECTED — white glow
    }else if(selIdx>=0){
      ctx.fillStyle='rgba(245,158,11,0.30)';                   // dimmed when something is selected
    }else if(i===dailyCounts.length-1){
      ctx.fillStyle='rgba(252,211,77,0.95)';                   // today marker
    }else{
      ctx.fillStyle='rgba(245,158,11,0.78)';                   // normal
    }
    ctx.fillRect(x,y,Math.max(1,barWidth-gap),barHeight);
  });
  // Store barWidth on the canvas element for hit-testing
  canvas._barWidth=barWidth;
}

/* ═══ PERSONALIZATION — deterministic affinity matrix from bookmarks + searches ═══ */
const AFF_KEY='node_affinity';
function getAffinity(){try{return JSON.parse(localStorage.getItem(AFF_KEY)||'{}')}catch{return{}}}
function bumpAffinity(story,weight){
  weight=weight||1;
  const aff=getAffinity();
  const kws=extractKeywords(story).map(k=>normKw(k).toLowerCase());
  for(const kw of kws)aff[kw]=(aff[kw]||0)+weight;
  // Also bump the category
  if(story.category)aff['_cat:'+story.category]=(aff['_cat:'+story.category]||0)+weight;
  localStorage.setItem(AFF_KEY,JSON.stringify(aff));
}
function affinityScore(story,aff){
  const kws=extractKeywords(story).map(k=>normKw(k).toLowerCase());
  let score=0;
  for(const kw of kws)score+=(aff[kw]||0);
  // Category affinity
  if(story.category)score+=(aff['_cat:'+story.category]||0)*0.5;
  return score;
}

/* Search history — persisted in localStorage, max 8 entries */
const SH_KEY='ai_searches';
function getSearchHistory(){try{return JSON.parse(localStorage.getItem(SH_KEY)||'[]')}catch{return[]}}
function saveSearchHistory(q){
  if(!q||q.length<2)return;
  let list=getSearchHistory().filter(x=>x.toLowerCase()!==q.toLowerCase());
  list.unshift(q);
  list=list.slice(0,8);
  localStorage.setItem(SH_KEY,JSON.stringify(list));
  // Affinity: search = weaker signal (+0.5)
  const aff=getAffinity();
  const lo=q.toLowerCase().trim();
  if(lo.length>=3)aff[lo]=(aff[lo]||0)+0.5;
  localStorage.setItem(AFF_KEY,JSON.stringify(aff));
}
function clearSearchHistory(){localStorage.removeItem(SH_KEY);renderSearchPanel()}

function starSvg(filled){
  return`<svg width="20" height="20" viewBox="0 0 24 24" fill="${filled?'#F59E0B':'none'}" stroke="${filled?'#F59E0B':'currentColor'}" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
}

/* ═══ RENDER HEADER ═══ */
function renderHeader(){
  const cats=[{id:'all',name:'Trending'},...CATS.map(c=>({id:c.id,name:c.name_en}))];
  $('cat-pills').innerHTML=cats.map(c=>
    `<button class="cpill ${filter.cat===c.id?'on':''}" onclick="filter.cat='${c.id}';stackIdx=0;render()">${c.name}</button>`
  ).join('');
  const periods=[
    {id:'day',label:'Today'},
    {id:'week',label:'This Week'},
    {id:'month',label:'This Month'},
    {id:'year',label:'This Year'},
  ];
  $('time-pills').innerHTML=periods.map(p=>
    `<button class="tpill ${filter.period===p.id?'on':''}" onclick="filter.period='${p.id}';stackIdx=0;render()">${p.label}</button>`
  ).join('');
}

/* ═══ CARD STACK ═══ */
function renderStack(){
  const stories=flt();
  const container=$('stack');

  if(!stories.length){
    container.innerHTML=`<div class="state-msg">
      <p>No stories for this filter.</p>
      <button class="state-btn" onclick="filter.period='week';stackIdx=0;render()">Try This Week</button>
    </div>`;
    $('stack-counter').style.display='none';
    return;
  }

  if(stackIdx>=stories.length)stackIdx=stories.length-1;
  if(stackIdx<0)stackIdx=0;

  container.innerHTML='';

  // Behind cards: just colored shapes peeking out at bottom (no content)
  const behindCount=Math.min(5,stories.length-1-stackIdx);
  for(let i=behindCount;i>=1;i--){
    const si=stackIdx+i;
    const bg=document.createElement('div');
    bg.className=`stack-bg ${CNAMES[si%3]}`;
    bg.style.zIndex=10-i;
    bg.style.top=`${i*8}px`;
    bg.style.left=`${i*3}px`;
    bg.style.right=`${i*3}px`;
    bg.style.bottom=`${-i*7}px`;
    bg.style.opacity=1-i*0.12;
    container.appendChild(bg);
  }

  // Top card with full content
  const s=stories[stackIdx];
  const card=document.createElement('div');
  card.className=`stack-top ${CNAMES[stackIdx%3]}`;
  card.dataset.idx=stackIdx;

  const ir=rs.has(s.id+'');
  const ib=fs.has(s.id+'');
  const firstArt=(s.articles&&s.articles[0])||{};
  const src=firstArt.source_name||'';
  const srcUrl=firstArt.url||'';
  const sc=(s.articles||[]).length;
  const live=isT(s.date)?'<span class="meta-pill live">● LIVE</span>':'';
  const readStyle=ir?'opacity:0.55':'';
  const fav=faviconUrl(srcUrl);
  const rt=readTime(s.summary);
  const srcBlock=src
    ? `<span class="meta-pill">${fav?`<img class="fav-icon" src="${fav}" alt="" onerror="this.style.display='none'">`:''}${esc(src)}</span>`
    : '';

  card.innerHTML=`
    <div style="${readStyle};display:flex;flex-direction:column;flex:1;min-height:0">
      <div class="card-meta">
        ${live}
        ${srcBlock}
        <span class="read-time">${rt} min read</span>
        ${sc>1?`<span class="meta-pill">${sc} sources</span>`:''}
      </div>
      <div class="card-h">${hi(s.headline,searchQ)}</div>
      <div class="card-snippet">${hi(s.summary||'',searchQ)}</div>
      <div class="card-foot">
        <span class="card-cat">${(CAT_MAP[s.category]||{}).name_en||s.category}</span>
        <button class="bk-btn ${ib?'on':''}" data-id="${s.id}" aria-label="Bookmark">${starSvg(ib)}</button>
      </div>
    </div>
  `;

  container.appendChild(card);

  // Bookmark button — circular chip at card-foot, with spring pop + glow micro-interaction
  card.querySelector('.bk-btn').addEventListener('click',e=>{
    e.stopPropagation();
    e.preventDefault();
    const btn=e.currentTarget;
    // Retrigger the animation reliably even on rapid toggles
    btn.classList.remove('pulsing');
    void btn.offsetWidth;       // force reflow
    btn.classList.add('pulsing');
    setTimeout(()=>btn.classList.remove('pulsing'),700);
    toggleFav(s.id);
  });

  // Tap to open
  card._wasSwiped=false;
  card.addEventListener('click',()=>{
    if(!card._wasSwiped)openArt(stackIdx);
  });

  // Swipe
  setupSwipe(card);

  // Slider — update properties in-place (never re-create, or drag breaks mid-swipe)
  $('stack-counter').style.display='flex';
  const slider=$('stack-slider');
  slider.max=Math.max(0,stories.length-1);
  slider.value=stackIdx;
  $('prog-cur').textContent=String(stackIdx+1).padStart(2,'0');
  $('prog-total').textContent=String(stories.length).padStart(2,'0');

  // Swipe hint (first time only)
  if(!localStorage.getItem('ai_hint')&&stackIdx===0&&stories.length>1){
    $('stack-counter').insertAdjacentHTML('afterend',
      '<div class="swipe-hint">Swipe cards to browse</div>');
    localStorage.setItem('ai_hint','1');
  }
}

/* ═══ SWIPE ═══ */
function setupSwipe(el){
  let sx=0,sy=0,dx=0,swiping=false,moved=false;
  let lastT=0,lastX=0,lastY=0,vx=0,vy=0;

  const canvasRect=()=>document.getElementById('ripple-canvas').getBoundingClientRect();

  const onStart=e=>{
    const t=e.touches?e.touches[0]:e;
    sx=t.clientX;sy=t.clientY;
    dx=0;swiping=false;moved=false;
    lastT=performance.now();lastX=t.clientX;lastY=t.clientY;vx=0;vy=0;
    el._wasSwiped=false;
    el.style.transition='none';
    el.classList.add('swiping');
    el.classList.remove('flinging');
  };

  const onMove=e=>{
    const t=e.touches?e.touches[0]:e;
    dx=t.clientX-sx;
    const dy=t.clientY-sy;
    if(!moved&&(Math.abs(dx)>8||Math.abs(dy)>8))moved=true;
    if(!swiping&&moved&&Math.abs(dx)>Math.abs(dy)*1.2&&Math.abs(dx)>10){
      swiping=true;
    }
    if(swiping){
      if(e.cancelable)e.preventDefault();
      const now=performance.now();
      const dt=Math.max(1,now-lastT);
      vx=(t.clientX-lastX)/dt;
      vy=(t.clientY-lastY)/dt;
      lastT=now;lastX=t.clientX;lastY=t.clientY;

      const rot=dx*0.05;
      el.style.transform=`translateX(${dx}px) rotate(${rot}deg)`;
      el.style.opacity=Math.max(0.4,1-Math.abs(dx)/400);

      // Active card tint — used for both the edge glow AND the ambient ripple hue
      const theme=el.classList.contains('c-cream')?'c-cream':
                  el.classList.contains('c-peach')?'c-peach':'c-ice';
      const glowTint=theme==='c-cream'?'255,230,140':
                     theme==='c-peach'?'255,180,170':'150,200,255';

      // Edge glow offset — the diffused shadow leans into the drag direction
      const lean=dx*0.35,leanBlur=Math.min(60,40+Math.abs(dx)*0.25);
      el.style.boxShadow=
        `${lean}px 40px 120px -20px rgba(${glowTint},0.45),`+
        `${lean*0.5}px 12px ${leanBlur}px -8px rgba(${glowTint},0.22),`+
        `inset 0 1px 0 rgba(255,255,255,0.5)`;

      // Spawn background ripple at the finger point, inheriting card tint + velocity vector
      const rect=canvasRect();
      Ripple.onDrag(t.clientX-rect.left,t.clientY-rect.top,vx,vy,theme);
    }
  };

  const onEnd=()=>{
    el.classList.remove('swiping');
    if(swiping){
      el._wasSwiped=true;
      el.style.transition='transform .5s var(--ease-quintic),opacity .5s var(--ease-quintic),box-shadow .5s var(--ease-quintic),filter .35s var(--ease-quintic)';
      el.style.boxShadow='';
      const stories=flt();
      const fast=Math.abs(vx)>0.7;
      if(fast)el.classList.add('flinging');

      if(dx<-80&&stackIdx<stories.length-1){
        el.style.transform=`translateX(-500px) rotate(-18deg)`;
        el.style.opacity='0';
        setTimeout(()=>{stackIdx++;renderStack()},320);
      }else if(dx>80&&stackIdx>0){
        el.style.transform=`translateX(500px) rotate(18deg)`;
        el.style.opacity='0';
        setTimeout(()=>{stackIdx--;renderStack()},320);
      }else{
        el.style.transform='';
        el.style.opacity='';
        setTimeout(()=>el.classList.remove('flinging'),350);
      }
    }else if(moved){
      el._wasSwiped=true;
      el.style.transform='';
      el.style.opacity='';
      el.style.boxShadow='';
    }else{
      el.style.transform='';
      el.style.opacity='';
      el.style.boxShadow='';
    }
  };

  el.addEventListener('touchstart',onStart,{passive:true});
  el.addEventListener('touchmove',onMove,{passive:false});
  el.addEventListener('touchend',onEnd);
  el.addEventListener('mousedown',e=>{
    e.preventDefault();onStart(e);
    const mm=e2=>onMove(e2);
    const mu=()=>{onEnd();document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu)};
    document.addEventListener('mousemove',mm);
    document.addEventListener('mouseup',mu);
  });
}
