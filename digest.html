/* ═══ NAV ═══ */
function go(v){
  view=v;
  if($('search-bar').classList.contains('open'))toggleSearch(false);
  $('body-feed').style.display=v==='feed'?'flex':'none';
  $('body-saved').style.display=v==='saved'?'block':'none';
  $('body-graph').style.display=v==='graph'?'flex':'none';
  $('header').style.display=v==='feed'?'':'none';
  $('pn-feed').classList.toggle('on',v==='feed');
  $('pn-saved').classList.toggle('on',v==='saved');
  $('pn-graph').classList.toggle('on',v==='graph');
  $('pn-search').classList.remove('on');
  if(v==='saved')renderSaved();
  if(v==='feed')render();
  if(v==='graph')initGraph();
}

function renderSearchPanel(){
  const el=$('search-panel');
  if(!el)return;
  if(searchQ&&searchQ.trim()){
    // Build timeline from the UNFILTERED search results (before timeline slice)
    const savedFilter=timelineFilter;
    timelineFilter=null;
    const allSearchResults=flt();
    timelineFilter=savedFilter;
    const slicedResults=savedFilter?allSearchResults.filter(x=>x.date===savedFilter):allSearchResults;
    const total=ALL.length;

    // Compute selected bar index
    let selIdx=-1;
    if(timelineFilter){
      const today=new Date(TODAY+'T00:00:00Z');
      const sel=new Date(timelineFilter+'T00:00:00Z');
      const dayDiff=Math.round((today-sel)/864e5);
      selIdx=29-dayDiff;
    }

    // Filter badge (shows the active date filter + clear button)
    const filterBadge=timelineFilter
      ? `<span class="timeline-filter-badge" onclick="timelineFilter=null;stackIdx=0;renderStack();renderSearchPanel()">
           Drilling: <strong>${timelineFilter}</strong> (${slicedResults.length} stories)
           <span class="close">&times;</span>
         </span>`
      : '';

    el.innerHTML=`<div class="search-counter">
      <div class="search-counter-text">
        Found <strong>${allSearchResults.length}</strong> match${allSearchResults.length===1?'':'es'} across
        headline, summary &amp; full text · searched ${total} total stories
        ${filterBadge}
      </div>
      <div class="timeline-wrap">
        <canvas id="timeline-sparkline" width="120" height="24"></canvas>
        <span class="timeline-label">LAST 30 DAYS</span>
      </div>
    </div>`;

    // Render sparkline + attach click handler
    requestAnimationFrame(()=>{
      const tlData=buildTimelineData(allSearchResults,30);
      renderSparkline('timeline-sparkline',tlData,selIdx);
      // Hit-testing click handler
      const cvs=document.getElementById('timeline-sparkline');
      if(cvs)cvs.onclick=(e)=>{
        const rect=cvs.getBoundingClientRect();
        const x=e.clientX-rect.left;
        const barIdx=Math.min(29,Math.max(0,Math.floor(x/(rect.width/30))));
        // Convert index to date
        const today=new Date(TODAY+'T00:00:00Z');
        const target=new Date(today);
        target.setUTCDate(target.getUTCDate()-(29-barIdx));
        const dateStr=target.toISOString().slice(0,10);
        // Toggle
        timelineFilter=(timelineFilter===dateStr)?null:dateStr;
        stackIdx=0;
        renderStack();
        renderSearchPanel();
      };
    });
  }else{
    const hist=getSearchHistory();
    if(!hist.length){
      el.innerHTML=`<div class="search-history">
        <span class="search-history-label">Try searching</span>
        ${['Nvidia','OpenAI','Anthropic','GPT-5','open source','funding']
          .map(w=>`<button class="search-chip" onclick="applySearch('${w}')">${w}</button>`).join('')}
      </div>`;
    }else{
      el.innerHTML=`<div class="search-history">
        <span class="search-history-label">Recent</span>
        ${hist.map(w=>`<button class="search-chip" onclick="applySearch('${w.replace(/'/g,"\\'")}')">${esc(w)}</button>`).join('')}
        <button class="search-chip clear" onclick="clearSearchHistory()">Clear</button>
      </div>`;
    }
  }
}
function applySearch(q){
  $('search-input').value=q;
  searchQ=q;
  stackIdx=0;
  render();
  renderSearchPanel();
}
function onSearchEnter(){
  if(searchQ&&searchQ.trim().length>=2)saveSearchHistory(searchQ.trim());
  renderSearchPanel();
}
function toggleSearch(forceOpen){
  const bar=$('search-bar');
  const open=forceOpen!==undefined?forceOpen:!bar.classList.contains('open');
  bar.classList.toggle('open',open);
  // Mutual exclusion: search open → deactivate other nav dots
  $('pn-search').classList.toggle('on',open);
  if(open){
    $('pn-feed').classList.remove('on');
    $('pn-saved').classList.remove('on');
    $('search-input').focus();
    renderSearchPanel();
  }else{
    // Restore the correct tab state when search closes
    $('pn-feed').classList.toggle('on',view==='feed');
    $('pn-saved').classList.toggle('on',view==='saved');
    $('search-input').value='';searchQ='';timelineFilter=null;stackIdx=0;render();
  }
}
function onSearch(v){searchQ=v;timelineFilter=null;stackIdx=0;renderStack();renderSearchPanel()}

/* ═══ ACTIONS ═══ */
function toggleFav(id){
  const sid=id+'';
  const wasBookmarked=fs.has(sid);
  if(wasBookmarked)fs.delete(sid);else fs.add(sid);
  localStorage.setItem('ai_fav',JSON.stringify([...fs]));
  // Affinity: bookmark = strong interest signal (+1 per keyword)
  if(!wasBookmarked){
    const story=ALL.find(s=>s.id+''===sid);
    if(story)bumpAffinity(story,1);
  }
  // In-place update on feed so the spring+glow animation isn't wiped by a re-render.
  if(view==='feed'){
    const btn=document.querySelector('.card-foot .bk-btn[data-id="'+sid+'"]');
    if(btn){
      const isNow=fs.has(sid);
      btn.classList.toggle('on',isNow);
      btn.innerHTML=starSvg(isNow);
    }
  }else{
    renderSaved();
  }
  // Sync the detail view's star if the currently-open article is this one
  if(cur&&cur.id+''===sid){
    $('art-bk').innerHTML=starSvg(fs.has(sid));
    $('art-bk').classList.toggle('on',fs.has(sid));
  }
}
function toggleStar(){if(cur)toggleFav(cur.id)}
function toggleFollow(name,btn){
  const follows=JSON.parse(localStorage.getItem('ai_follows')||'[]');
  const idx=follows.indexOf(name);
  if(idx>-1){follows.splice(idx,1);btn.textContent='Follow';btn.classList.remove('following')}
  else{follows.push(name);btn.textContent='Following';btn.classList.add('following')}
  localStorage.setItem('ai_follows',JSON.stringify(follows));
}
function copyArt(){
  if(!cur)return;
  const src=(cur.articles||[]).map(a=>a.url).filter(Boolean).join('\n');
  navigator.clipboard.writeText(`${cur.headline}\n\n${cur.summary||''}\n\nDate: ${cur.date}\n\nSources:\n${src}`);
  showToast('Copied to clipboard');
}
function showToast(msg){
  const t=$('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

/* ═══ KEYBOARD ═══ */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(cur){
      if(historyStack.length>0)goBack();           // climb one rung first
      else closeArt();                              // fully close when at root
    }else if($('search-bar').classList.contains('open'))toggleSearch(false);
  }
  if(!cur&&view==='feed'){
    const stories=flt();
    if(e.key==='ArrowLeft'&&stackIdx>0){stackIdx--;renderStack()}
    if(e.key==='ArrowRight'&&stackIdx<stories.length-1){stackIdx++;renderStack()}
    if(e.key==='Enter'&&stories.length)openArt(stackIdx);
  }
});

/* ═══ INIT ═══ */
async function loadData(){
  try{
    const r=await fetch('/api/stories');const d=await r.json();
    ALL=d.stories||[];CATS=d.categories||[];TODAY=d.today||'';
    CAT_MAP={};CATS.forEach(c=>CAT_MAP[c.id]=c);

    const tc=ALL.filter(s=>s.date===TODAY).length;
    if(tc===0){
      $('loading-text').textContent='Fetching today\'s news...';
      try{
        await fetch('/api/fetch');
        const r2=await fetch('/api/stories');const d2=await r2.json();
        ALL=d2.stories||[];CATS=d2.categories||[];TODAY=d2.today||'';
        CAT_MAP={};CATS.forEach(c=>CAT_MAP[c.id]=c);
      }catch(e2){}
    }

    const tc2=ALL.filter(s=>s.date===TODAY).length;
    const wc=ALL.filter(s=>isW(s.date)).length;
    filter.period=tc2>0?'day':wc>0?'week':'month';

    $('loading').classList.add('hide');
    setTimeout(()=>$('loading').style.display='none',300);
    render();
  }catch(e){
    $('loading-text').textContent='Failed to load. Retrying...';
    setTimeout(loadData,3000);
  }
}

", "summary": "Qwen3.6-35B-A3B reduces compute costs by activating only 3B parameters per token using a sparse mixture-of-experts design. It maintains performance while cutting resource demands.", "created_at": "2026-04-17 16:54:14", "articles": [{"id": 273, "title": "Alibaba open-sources Qwen3.6-35B-A3B, a sparse MoE model with only 3B active parameters per token", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/xbb3be7z1o862p5rtajh.html#story-4", "source_name": "AlphaSignal", "published_at": "2026-04-17 16:18:10", "summary": null, "content_snippet": "This open-source model reduces compute costs while maintaining performance by activating only a small subset of parameters per token using a sparse mixture-of-experts design.", "full_text": null}]}, {"id": 88, "date": "2026-04-17", "category": "products_tools", "headline": "Perplexity launches Personal Computer for AI agents on Mac apps", "summary": "Perplexity's new tool enables agents to interact with and automate tasks across multiple Mac applications, expanding agentic workflows beyond single-tool interactions.", "created_at": "2026-04-17 16:54:14", "articles": [{"id": 274, "title": "Perplexity launches Personal Computer to run AI agents across Mac applications", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/xbb3be7z1o862p5rtajh.html#story-5", "source_name": "AlphaSignal", "published_at": "2026-04-17 16:18:10", "summary": null, "content_snippet": "Perplexity's new tool enables agents to interact with and automate tasks across multiple Mac apps, expanding agentic workflows beyond single-tool interactions.", "full_text": null}]}, {"id": 89, "date": "2026-04-17", "category": "products_tools", "headline": "Palabra.ai launches real-time speech translation in 60+ languages", "summary": "Palabra provides human-like real-time translation with voice cloning and speaker diarization, supporting Zoom, Meet, and Teams without setup.", "created_at": "2026-04-17 16:54:14", "articles": [{"id": 272, "title": "Palabra.ai launches real-time speech translation with natural voice output in 60+ languages", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/xbb3be7z1o862p5rtajh.html#story-3", "source_name": "AlphaSignal", "published_at": "2026-04-17 16:18:10", "summary": null, "content_snippet": "Palabra provides human-like real-time translation with voice cloning and speaker diarization, supporting Zoom, Meet, and Teams without setup.", "full_text": null}]}, {"id": 90, "date": "2026-04-17", "category": "products_tools", "headline": "Lightfield automates CRM workflows with plain-English commands", "summary": "Lightfield enables users to define sales workflows in natural language, automating prospect scoring, outreach drafting, and report generation across CRM pipelines.", "created_at": "2026-04-17 16:54:14", "articles": [{"id": 270, "title": "Lightfield launches Skills for plain-English CRM workflow automation", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/xbb3be7z1o862p5rtajh.html#story-1", "source_name": "AlphaSignal", "published_at": "2026-04-17 16:18:10", "summary": null, "content_snippet": "Lightfield enables users to define sales workflows in natural language, automating prospect scoring, outreach drafting, and report generation across CRM pipelines.", "full_text": null}]}, {"id": 91, "date": "2026-04-17", "category": "research", "headline": "Physical Intelligence unveils π0.7 robot brain for adaptive task learning", "summary": "π0.7 enables robots to perform tasks they weren’t explicitly trained on by adapting to verbal instructions. Still in research, it represents a step toward generalizable robotics.", "created_at": "2026-04-17 16:54:14", "articles": [{"id": 281, "title": "Physical Intelligence unveils π0.7 robot brain for adaptive task learning", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/jutg9no32hdw4r44uk3u.html#story-3", "source_name": "Unknown", "published_at": "2026-04-17 14:41:36", "summary": null, "content_snippet": "Physical Intelligence launched π0.7, a robotics model that enables robots to perform tasks they weren’t explicitly trained on by adapting to verbal instructions. While still in research, it represents progress toward flexible, general-purpose robotics for real-world automation.", "full_text": "Physical Intelligence has introduced π0.7 , a new model that allows robots to perform tasks they were never explicitly trained on by adapting to instructions through verbal guidance instead of retraining. While it still struggles with fully autonomous multi-step tasks from a single command, the system shows early progress toward more flexible, general-purpose robotics. It remains in the research phase, but points to a shift away from rigid training toward systems that can learn and adjust in real time, which is critical for scaling automation in real-world environments."}]}, {"id": 92, "date": "2026-04-17", "category": "model_releases", "headline": "OpenAI launches GPT-Rosalind for biology and drug discovery", "summary": "GPT-Rosalind is designed to assist with scientific research and workflows, offering specialized capabilities for complex research tasks in life sciences and genomics.", "created_at": "2026-04-17 16:54:14", "articles": [{"id": 275, "title": "OpenAI releases GPT-Rosalind for scientific workflows and research tasks", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/xbb3be7z1o862p5rtajh.html#story-6", "source_name": "AlphaSignal", "published_at": "2026-04-17 16:18:10", "summary": null, "content_snippet": "GPT-Rosalind is designed to assist with scientific research and workflows, offering specialized capabilities for complex research tasks.", "full_text": null}, {"id": 280, "title": "OpenAI launches GPT-Rosalind for biology and drug discovery", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/jutg9no32hdw4r44uk3u.html#story-2", "source_name": "Unknown", "published_at": "2026-04-17 14:41:36", "summary": null, "content_snippet": "OpenAI introduced GPT-Rosalind, a specialized model for life sciences that accelerates early-stage research in biology, drug discovery, and genomics. It combines advanced reasoning with improved tool use to help scientists explore hypotheses and design experiments more efficiently.", "full_text": "OpenAI has introduced GPT-Rosalind , a model focused on life sciences, built to support research across biology, drug discovery, and translational medicine. It combines stronger reasoning across chemistry, protein engineering, and genomics with improved tool use, helping researchers move from literature review to experimental planning more efficiently. The aim is to speed up early-stage discovery, where timelines often stretch over 10 to 15 years, by enabling scientists to explore more hypotheses, connect complex data, and design better experiments earlier in the process."}]}, {"id": 93, "date": "2026-04-17", "category": "open_source", "headline": "Tencent open-sources HY-World 2.0 for 3D world generation", "summary": "HY-World 2.0 generates complete editable 3D environments from text, images, or video, producing production-ready assets like meshes and point clouds.", "created_at": "2026-04-17 16:54:14", "articles": [{"id": 279, "title": "Tencent open-sources HY-World 2.0 for 3D world generation", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/jutg9no32hdw4r44uk3u.html#story-1", "source_name": "Unknown", "published_at": "2026-04-17 14:41:36", "summary": null, "content_snippet": "Tencent released HY-World 2.0, a multimodal AI system that generates complete editable 3D environments from text, images, or video. The model produces production-ready assets like meshes and point clouds for engines like Unity and Unreal, enabling faster prototyping and asset creation.", "full_text": "Tencent has released HY-World 2.0 , a multimodal system that can generate complete 3D environments from text, images, and video, with outputs designed for real production use. Instead of producing short clips or static scenes, it creates editable assets like meshes, point clouds, and Gaussian splats that can be exported into engines like Unity and Unreal. The system works through a multi-stage pipeline that constructs panoramic scenes, plans navigation, expands environments, and assembles them into coherent worlds, making it possible to generate maps, prototype levels, and build assets far more quickly than traditional workflows."}]}, {"id": 94, "date": "2026-04-17", "category": "products_tools", "headline": "Anthropic recommends CLAUDE.md files for folder-level context", "summary": "Anthropic suggests nesting CLAUDE.md files at every folder level to enable Claude Code to auto-load context, improving developer efficiency.", "created_at": "2026-04-17 16:54:14", "articles": [{"id": 287, "title": "Anthropic introduces CLAUDE.md files for folder-level context in Claude Code", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/a7fajxukvx5iz7kg1qs3.html#story-5", "source_name": "The Neuron", "published_at": "2026-04-17 11:06:29", "summary": null, "content_snippet": "Anthropic recommends nesting CLAUDE.md files at every folder level to enable Claude Code to auto-load context, improving efficiency for developers using the tool.", "full_text": "The catch buried in Anthropic's own docs : the new tokenizer can use up to 35% more tokens for the same text. Combined with Claude Code's new xhigh effort default, Pro and Max users will hit weekly caps faster unless they manually dial down."}]}, {"id": 95, "date": "2026-04-17", "category": "industry_business", "headline": "Amazon cancels creator accounts via AI agent without human review", "summary": "Amazon deployed an AI agent that outright cancels creator accounts for potential violations without flagging or providing appeal options, leading to creators losing years of work.", "created_at": "2026-04-17 16:54:14", "articles": [{"id": 282, "title": "Amazon cancels creator accounts via AI agent without human review", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/a7fajxukvx5iz7kg1qs3.html#story-0", "source_name": "The Neuron", "published_at": "2026-04-17 11:06:29", "summary": null, "content_snippet": "Amazon deployed an AI agent that outright cancels creator accounts for potential violations without flagging or providing appeal options, leading to creators losing years of work and income with no recourse.", "full_text": "What happened: Amazon deployed an AI agent that, rather than flagging accounts for potential violations, just cancels them. Outright. Another creator, Tom Ray, reportedly lost his entire \"per-page\" formatted comics catalog going back to 2018. When an 800-pound gorilla outsources due process to a moderation LLM, losing one platform can technically mean losing a life's work."}]}, {"id": 96, "date": "2026-04-17", "category": "industry_business", "headline": "Canva rebrands as AI platform ahead of $42B IPO test", "summary": "Canva repositioned itself as an AI-driven design platform during its IPO test, signaling a shift toward integrating AI tools into its core offerings.", "created_at": "2026-04-17 16:54:14", "articles": [{"id": 286, "title": "Canva rebrands as an AI platform with design tools at $42B IPO test", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/a7fajxukvx5iz7kg1qs3.html#story-4", "source_name": "The Neuron", "published_at": "2026-04-17 11:06:29", "summary": null, "content_snippet": "Canva repositioned itself as an AI-driven design platform during its IPO test, signaling a shift toward integrating AI tools into its core offerings.", "full_text": null}]}, {"id": 52, "date": "2026-04-16", "category": "products_tools", "headline": "Anthropic’s Claude Code gets Routines for multi-task automation", "summary": "Anthropic added Routines to Claude Code, letting users automate workflows via APIs, schedules, and GitHub events. The desktop app was also rebuilt for better multi-task agent orchestration, streamlining complex workflows.", "created_at": "2026-04-16 07:46:38", "articles": [{"id": 138, "title": "Anthropic introduces Routines in Claude Code to automate workflows via API and GitHub", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/fqyabicklt95kn2wy758.html#story-0", "source_name": "AlphaSignal", "published_at": "2026-04-15 19:42:57", "summary": null, "content_snippet": "Anthropic added Routines to Claude Code, allowing users to automate workflows across APIs, schedules, and GitHub events. This enables repeatable executions without local infrastructure, streamlining repetitive tasks.", "full_text": null}, {"id": 142, "title": "Anthropic rebuilds Claude Code desktop for multi-task agent orchestration", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/fqyabicklt95kn2wy758.html#story-4", "source_name": "AlphaSignal", "published_at": "2026-04-15 19:42:57", "summary": null, "content_snippet": "Anthropic rebuilt Claude Code’s desktop version to enhance multi-task agent orchestration, improving workflow automation and execution across complex tasks.", "full_text": null}]}, {"id": 53, "date": "2026-04-16", "category": "products_tools", "headline": "Hugging Face Hub now shares GPU kernels for optimized compute", "summary": "Hugging Face enables sharing and loading GPU kernels directly from the Hub, simplifying access to optimized computational resources for AI workloads.", "created_at": "2026-04-16 07:46:38", "articles": [{"id": 145, "title": "Hugging Face enables sharing and loading GPU kernels from Hub", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/fqyabicklt95kn2wy758.html#story-7", "source_name": "AlphaSignal", "published_at": "2026-04-15 19:42:57", "summary": null, "content_snippet": "Hugging Face introduced the ability to share and load GPU kernels directly from the Hugging Face Hub, simplifying access to optimized computational resources.", "full_text": null}]}, {"id": 54, "date": "2026-04-16", "category": "model_releases", "headline": "OpenAI’s GPT-5.4-Cyber targets cybersecurity defenders", "summary": "OpenAI expanded its Trusted Access program with GPT-5.4-Cyber, a version tuned for defensive cybersecurity workflows, aiding analysts in software and infrastructure analysis.", "created_at": "2026-04-16 07:46:38", "articles": [{"id": 139, "title": "OpenAI expands Trusted Access with GPT-5.4-Cyber for cybersecurity defenders", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/fqyabicklt95kn2wy758.html#story-1", "source_name": "AlphaSignal", "published_at": "2026-04-15 19:42:57", "summary": null, "content_snippet": "OpenAI introduced GPT-5.4-Cyber, a version of GPT-5.4 tuned for defensive cybersecurity workflows, as part of its Trusted Access program for verified defenders analyzing software and infrastructure.", "full_text": null}]}, {"id": 55, "date": "2026-04-16", "category": "products_tools", "headline": "Cursor’s multi-agent system speeds up CUDA kernels by 38%", "summary": "Cursor, with NVIDIA, built a multi-agent system that auto-writes and optimizes CUDA kernels, delivering a 38% average speedup across 235 real-world problems.", "created_at": "2026-04-16 07:46:38", "articles": [{"id": 141, "title": "Cursor develops multi-agent system optimizing CUDA kernels with 38% speedup", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/fqyabicklt95kn2wy758.html#story-3", "source_name": "AlphaSignal", "published_at": "2026-04-15 19:42:57", "summary": null, "content_snippet": "Cursor, in collaboration with NVIDIA, built a multi-agent system that automatically writes and optimizes CUDA kernels, achieving a 38% average performance improvement across 235 real-world problems.", "full_text": null}]}, {"id": 56, "date": "2026-04-16", "category": "products_tools", "headlin w3qxo1xsxdqp5ozhj1l.html#story-1", "source_name": "Unknown", "published_at": "2026-04-15 20:08:05", "summary": null, "content_snippet": "DeepLearning.AI launched a 7-day build challenge where participants create a Tamagotchi-style web app using spec-driven development, emphasizing clear, testable specs for coding agents, with rewards and a submission deadline of April 22.", "full_text": null}]}, {"id": 58, "date": "2026-04-16", "category": "research", "headline": "Anthropic’s AI researchers outperform humans on alignment benchmark", "summary": "Anthropic showed nine parallel Claude Opus 4.6 agents outperformed its human researchers on a real alignment problem, recovering 97% of the gap for $18K.", "created_at": "2026-04-16 07:46:38", "articles": [{"id": 144, "title": "Anthropic shows AI researchers outperform humans on alignment benchmark", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/fqyabicklt95kn2wy758.html#story-6", "source_name": "AlphaSignal", "published_at": "2026-04-15 19:42:57", "summary": null, "content_snippet": "Anthropic demonstrated that AI researchers using their tools outperform humans on alignment benchmarks, highlighting the efficiency gains of AI-assisted research workflows.", "full_text": null}, {"id": 145, "title": "Hugging Face enables sharing and loading GPU kernels from Hub", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/fqyabicklt95kn2wy758.html#story-7", "source_name": "AlphaSignal", "published_at": "2026-04-15 19:42:57", "summary": null, "content_snippet": "Hugging Face introduced the ability to share and load GPU kernels directly from the Hugging Face Hub, simplifying access to optimized computational resources.", "full_text": null}]}, {"id": 59, "date": "2026-04-16", "category": "products_tools", "headline": "Google Chrome adds reusable prompt-based AI workflows", "summary": "Google integrated reusable prompt-based AI workflows into Chrome, letting users automate and reuse AI-driven tasks directly within the browser.", "created_at": "2026-04-16 07:46:38", "articles": [{"id": 143, "title": "Google equips Chrome with reusable prompt-based AI workflows", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/fqyabicklt95kn2wy758.html#story-5", "source_name": "AlphaSignal", "published_at": "2026-04-15 19:42:57", "summary": null, "content_snippet": "Google added reusable prompt-based AI workflows to Chrome, enabling users to automate and reuse AI-driven tasks directly within the browser.", "full_text": null}]}, {"id": 60, "date": "2026-04-16", "category": "sci_tech_trends", "headline": "Teleport turns session recordings into security intelligence", "summary": "Teleport converts SSH, Kubernetes, and database session recordings into structured security insights, boosting threat detection for IT teams.", "created_at": "2026-04-16 07:46:38", "articles": [{"id": 161, "title": "Teleport converts session recordings into structured security intelligence", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/l6m4ggyygat1t894wrr5.html#story-5", "source_name": "Unknown", "published_at": "2026-04-15 13:40:48", "summary": null, "content_snippet": "Teleport transforms SSH, Kubernetes, and database session recordings into summarized security intelligence, enhancing threat detection and analysis for IT teams.", "full_text": null}]}, {"id": 61, "date": "2026-04-16", "category": "editorial", "headline": "Austin Tedesco implements confidence check workflow for Claude Code outputs", "summary": "Every's head of growth Austin Tedesco uses a confidence scoring system (1-100) to ensure Claude Code's outputs meet a 90% threshold before shipping, improving quality across tasks without over-optimizing.", "created_at": "2026-04-16 17:11:30", "articles": [{"id": 193, "title": "Austin Tedesco implements confidence check workflow for Claude Code outputs", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/ptox0e7e1f01leiwmcfr.html#story-5", "source_name": "Every", "published_at": "2026-04-16 14:55:18", "summary": null, "content_snippet": "Every's head of growth Austin Tedesco uses a confidence scoring system (1-100) to ensure Claude Code's outputs meet a 90% threshold before shipping, improving quality across tasks without over-optimizing.", "full_text": "Before he lets Claude Code ship anything, Austin Tedesco , Every’s head of growth, asks it one question: How confident are you in this, on a scale of 1–100? Anything under 90 percent and he sends it back to find improvements. Without an engineering background, this single question has changed the quality of everything from growth experiments to product PRs."}]}, {"id": 62, "date": "2026-04-16", "category": "editorial", "headline": "GitBook launches connected knowledge system for AI-era documentation", "summary": "GitBook introduces a connected knowledge system that combines product docs, external sources, and an embeddable AI assistant to provide accurate, source-backed answers and user behavior insights.", "created_at": "2026-04-16 17:11:30", "articles": [{"id": 192, "title": "GitBook launches connected knowledge system for AI-era documentation", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/ptox0e7e1f01leiwmcfr.html#story-4", "source_name": "Every", "published_at": "2026-04-16 14:55:18", "summary": null, "content_snippet": "GitBook introduces a connected knowledge system that combines product docs, external sources, and an embeddable AI assistant to provide accurate, source-backed answers and user behavior insights.", "full_text": "AI-era documentation can be a nightmare. Your user is querying an LLM to figure out how to use your product, and the LLM is pulling from all manner of outdated sources. GitBook fixes this. Its connected knowledge system combines your docs, external sources like YouTube tutorials and GitHub Discussions, and an embeddable AI assistant that can be inserted inside your product. Answers are grounded in actual knowledge and link back to real sources—and you get data that helps you tell exactly where users get stuck. Used by teams at Nvidia, Zoom, and n8n."}]}, {"id": 63, "date": "2026-04-16", "category": "editorial", "headline": "Dan Shipper explains why smaller models can't truly match Mythos' capabilities", "summary": "Every's CEO Dan Shipper argues that smaller models operate in different contexts and cannot autonomously find critical vulnerabilities across major systems like Mythos, emphasizing the importance of higher-level problem framing.", "created_at": "2026-04-16 17:11:30", "articles": [{"id": 191, "title": "Dan Shipper explains why smaller models can't truly match Mythos' capabilities", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/ptox0e7e1f01leiwmcfr.html#story-3", "source_name": "Every", "published_at": "2026-04-16 14:55:18", "summary": null, "content_snippet": "Every's CEO Dan Shipper argues that smaller models operate in different contexts and cannot autonomously find critical vulnerabilities across major systems like Mythos, emphasizing the importance of higher-level problem framing.", "full_text": "Because this is a framing issue, says Dan Shipper , Every’s CEO. Mythos and smaller models are operating within completely different ones. Yes, you can point a smaller model to a codebase and tell it to find a bug when you already know that capability is possible, but you cannot ask it to find serious vulnerabilities in critical software across every major operating system and browser, autonomously, the way Mythos did."}]}, {"id": 64, "date": "2026-04-16", "category": "editorial", "headline": "Researcher claims smaller AI models can match Mythos in finding security vulnerabilities", "summary": "A cybersecurity researcher reported that smaller AI models could identify the same security vulnerabilities as Mythos, Anthropic's unreleased advanced model, sparking debate about model capabilities and framing.", "created_at": "2026-04-16 17:11:30", "articles": [{"id": 190, "title": "Researcher claims smaller AI models can match Mythos in finding security vulnerabilities", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/ptox0e7e1f01leiwmcfr.html#story-2", "source_name": "Every", "published_at": "2026-04-16 14:55:18", "summary": null, "content_snippet": "A cybersecurity researcher reported that smaller AI models could identify the same security vulnerabilities as Mythos, Anthropic's unreleased advanced model, sparking debate about model capabilities and framing.", "full_text": null}]}, {"id": 65, "date": "2026-04-16", "category": "editorial", "headline": "Monologue general manager criticizes Anthropic's Claude Code redesign as derivative", "summary": "Naveen Naidu, general manager of Monologue, argues that Anthropic's new Claude Code UI resembles Cursor and was inspired by Codex's design, highlighting a trend toward agent oversight rather than manual coding.", "created_at": "2026-04-16 17:11:30", "articles": [{"id": 189, "title": "Monologue general manager criticizes Anthropic's Claude Code redesign as derivative", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/ptox0e7e1f01leiwmcfr.html#story-1", "source_name": "Every", "published_at": "2026-04-16 14:55:18", "summary": null, "content_snippet": "Naveen Naidu, general manager of Monologue, argues that Anthropic's new Claude Code UI resembles Cursor and was inspired by Codex's design, highlighting a trend toward agent oversight rather than manual coding.", "full_text": null}]}, {"id": 66, "date": "2026-04-16", "category": "editorial", "headline": "Anthropic redesigns Claude Code desktop app with new developer UI", "summary": "Anthropic updated the Claude Code desktop app with a redesigned interface featuring a sidebar for session management, drag-and-drop panes, and an integrated terminal and file editor, making it easier to work on multiple projects simultaneously.", "created_at": "2026-04-16 17:11:30", "articles": [{"id": 188, "title": "Anthropic redesigns Claude Code desktop app with new developer UI", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/ptox0e7e1f01leiwmcfr.html#story-0", "source_name": "Every", "published_at": "2026-04-16 14:55:18", "summary": null, "content_snippet": "Anthropic updated the Claude Code desktop app with a redesigned interface featuring a sidebar for session management, drag-and-drop panes, and an integrated terminal and file editor, making it easier to work on multiple projects simultaneously.", "full_text": "Now: Anthropic gave Claude Code’s desktop app a redesign, adding a sidebar for managing sessions, drag-and-drop panes, and an integrated terminal and file editor. Altogether, it makes it easier to work multiple projects in parallel. Cora general manager Kieran Klaassen was thrilled —this was already his preferred setup."}]}, {"id": 67, "date": "2026-04-16", "category": "products_tools", "headline": "Google launches native Gemini app for Mac with desktop optimization", "summary": "Google released a native desktop version of its Gemini app for Mac, offering a seamless and optimized experience for Apple users. This expands Gemini's accessibility beyond web and mobile platforms.", "created_at": "2026-04-16 17:11:36", "articles": [{"id": 187, "title": "Google brings Gemini app to Mac with native desktop experience", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/lg17kvkedlv4hra8volx.html#story-8", "source_name": "AlphaSignal", "published_at": "2026-04-16 16:45:36", "summary": null, "content_snippet": "Google launched a native desktop version of its Gemini app for Mac, providing a seamless and optimized experience for users on Apple’s operating system.", "full_text": null}]}, {"id": 68, "date": "2026-04-16", "category": "products_tools", "headline": "Anthropic’s Claude Code Routines replace Zapier/n8n in 5 minutes", "summary": "Anthropic introduced Claude Code Routines, allowing users to replace no-code automation tools like Zapier or n8n by describing tasks in plain English. This simplifies workflow automation for non-technical users.", "created_at": "2026-04-16 17:11:36", "articles": [{"id": 200, "title": "Claude Code Routines replace n8n/Zapier workflows in 5 minutes", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/2bbbs5akfnh8hl9tfs3i.html#story-6", "source_name": "The Neuron", "published_at": "2026-04-16 10:03:23", "summary": null, "content_snippet": "Anthropic's new Claude Code Routines allow users to replace n8n, Make.com, or Zapier workflows by describing tasks in plain English, simplifying automation for non-technical users.", "full_text": "Anthropic just shipped Claude Code Routines , and as Nick Saraev walks through in his demo , it is a 1-to-1 replacement for n8n, Make.com, and Zapier. The old way: drag-and-drop nodes, set up credentials, map variables, debug for hours. The new way: describe what you want in plain English, hit save, done."}]}, {"id": 69, "date": "2026-04-16", "category": "model_releases", "headline": "Anthropic’s LLMs inherit traits via hidden statistical patterns", "summary": "Anthropic’s research reveals LLMs can inherit behaviors from unrelated training data through statistical patterns, not semantic meaning. This challenges assumptions about model training and alignment.", "created_at": "2026-04-16 17:11:36", "articles": [{"id": 183, "title": "Anthropic demonstrates LLMs transfer traits through hidden statistical patterns", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/lg17kvkedlv4hra8volx.html#story-4", "source_name": "AlphaSignal", "published_at": "2026-04-16 16:45:36", "summary": null, "content_snippet": "Anthropic’s research shows that large language models can inherit behaviors from seemingly unrelated training data through statistical patterns, not semantic meaning, revealing subliminal learning mechanisms.", "full_text": null}]}, {"id": 70, "date": "2026-04-16", "category": "products_tools", "headline": "OpenAI updates Agents SDK with sandbox execution and model-native harness", "summary": "OpenAI’s updated Agents SDK introduces a model-native harness and sandbox execution for safer, structured agent workflows. This enables more reliable multi-step tasks in production environments.", "created_at": "2026-04-16 17:11:36", "articles": [{"id": 181, "title": "OpenAI updates Agents SDK with sandbox execution and model-native harness", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/lg17kvkedlv4hra8volx.html#story-2", "source_name": "AlphaSignal", "published_at": "2026-04-16 16:45:36", "summary": null, "content_snippet": "OpenAI’s updated Agents SDK introduces a model-native harness and built-in sandbox execution, enabling safer, structured agent workflows across files, tools, and multi-step tasks in production environments.", "full_text": null}]}, {"id": 71, "date": "2026-04-16", "category": "products_tools", "headline": "Cursor adds interactive canvases for dashboard and interface building", "summary": "Cursor introduces visual canvases that let developers create interactive dashboards and interfaces directly in the IDE. This enhances workflow flexibility and productivity for building UIs.", "created_at": "2026-04-16 17:11:36", "articles": [{"id": 184, "title": "Cursor adds canvases for building interactive dashboards and interfaces", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/lg17kvkedlv4hra8volx.html#story-5", "source_name": "AlphaSignal", "published_at": "2026-04-16 16:45:36", "summary": null, "content_snippet": "Cursor introduces visual canvases that enable developers to create interactive dashboards and interfaces directly within the IDE, enhancing workflow flexibility and productivity.", "full_text": null}]}, {"id": 72, "date": "2026-04-16", "category": "products_tools", "headline": "Windsurf launches agent command center with Devin cloud delegation", "summary": "Windsurf unveiled an agent command center and cloud delegation feature, integrating with Devin to streamline AI agent management and execution in cloud environments.", "created_at": "2026-04-16 17:11:36", "articles": [{"id": 185, "title": "Windsurf introduces agent command center and cloud delegation with Devin", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/lg17kvkedlv4hra8volx.html#story-6", "source_name": "AlphaSignal", "published_at": "2026-04-16 16:45:36", "summary": null, "content_snippet": "Windsurf launches an agent command center and cloud delegation feature, integrating with Devin to streamline AI agent management and execution in cloud environments.", "full_text": null}]}, {"id": 73, "date": "2026-04-16", "category": "sci_tech_trends", "headline": "Arm unveils AGI CPU for AI infrastructure at Arm Everywhere event", "summary": "Arm announced its first production silicon for AI compute, the Arm AGI CPU, marking a major step toward integrating performance and efficiency in the AI stack.", "created_at": "2026-04-16 17:11:36", "articles": [{"id": 201, "title": "Arm unveils AGI CPU for AI infrastructure at Arm Everywhere event", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/2bbbs5akfnh8hl9tfs3i.html#story-7", "source_name": "The Neuron", "published_at": "2026-04-16 10:03:23", "summary": null, "content_snippet": "Arm announced its first production silicon for AI compute, the Arm AGI CPU, marking a major step toward integrating performance and efficiency in the AI stack.", "full_text": "At Arm Everywhere , Arm marked a major milestone for the compute platform: its expansion into production silicon with the Arm AGI CPU . Joined on stage by leaders from Meta and OpenAI, Arm outlined what this move means for the future of AI infrastructure. Built for the rise of agentic AI, this next step brings Arm into data center silicon for the first time—signaling a more integrated approach to performance, efficiency and scale across the AI stack."}]}, {"id": 74, "date": "2026-04-16", "category": "products_tools", "headline": "Wispr Flow enables voice-to-text code prompts across tools", "summary": "Wispr Flow allows developers to speak prompts naturally and generate code-ready text instantly across tools like Cursor, Claude, Notion, and Slack, improving speed and efficiency.", "created_at": "2026-04-16 17:11:36", "articles": [{"id": 182, "title": "Wispr Flow enables voice-to-text input for instant code-ready prompts across tools", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/lg17kvkedlv4hra8volx.html#story-3", "source_name": "AlphaSignal", "published_at": "2026-04-16 16:45:36", "summary": null, "content_snippet": "Wispr Flow allows developers to speak prompts naturally and generate code-ready text instantly across various tools like Cursor, Claude, Notion, and Slack, improving speed and efficiency.", "full_text": "Wispr Flow is voice input that works everywhere you type. Speak prompts into Cursor or Claude, describe experiments in Notion, reply to threads in Slack. No filler words, no cleanup. 4x faster than typing. Millions of developers use Flow daily, including teams at OpenAI and Vercel."}]}, {"id": 75, "date": "2026-04-16", "category": "industry_business", "headline": "Federal court rules AI chats lack attorney-client privilege", "summary": "A federal court ruled that communications with AI tools do not qualify for attorney-client privilege, raising legal concerns for sensitive AI-assisted work.", "created_at": "2026-04-16 17:11:36", "articles": [{"id": 198, "title": "Federal court rules AI chats lack attorney-client privilege", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/2bbbs5akfnh8hl9tfs3i.html#story-4", "source_name": "The Neuron", "published_at": "2026-04-16 10:03:23", "summary": null, "content_snippet": "A federal court ruled that communications with AI tools do not qualify for attorney-client privilege, raising legal concerns for sensitive AI-assisted work.", "full_text": null}]}, {"id": 76, "date": "2026-04-16", "category": "industry_business", "headline": "OpenAI’s $852B valuation faces investor scrutiny", "summary": "OpenAI’s sky-high $852B valuation is drawing skepticism from investors, while Anthropic reportedly fields $800B acquisition offers from VCs.", "created_at": "2026-04-16 17:11:36", "articles": [{"id": 197, "title": "OpenAI's $852B valuation faces backer scrutiny", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/2bbbs5akfnh8hl9tfs3i.html#story-3", "source_name": "The Neuron", "published_at": "2026-04-16 10:03:23", "summary": null, "content_snippet": "OpenAI's sky-high $852B valuation is drawing skepticism from investors, while Anthropic is reportedly flooded with $800B acquisition offers from VCs.", "full_text": null}]}, {"id": 77, "date": "2026-04-16", "category": "products_tools", "headline": "Google releases Gemini 3.1 Flash TTS with multi-speaker support", "summary": "Google introduced Gemini 3.1 Flash TTS, a text-to-speech model with precise speech control, multi-speaker dialogue, and structured scene direction for consistent context.", "created_at": "2026-04-16 17:11:36", "articles": [{"id": 179, "title": "Google releases Gemini 3.1 Flash TTS with multi-speaker support and structured speech direction", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/lg17kvkedlv4hra8volx.html#story-0", "source_name": "AlphaSignal", "published_at": "2026-04-16 16:45:36", "summary": null, "content_snippet": "Google introduced a new text-to-speech model that allows precise control over speech generation using inline instructions, supporting multi-speaker dialogue and scene direction for consistent context in production workflows.", "full_text": null}]}, {"id": 78, "date": "2026-04-16", "category": "products_tools", "headline": "Lambda boosts GPU utilization 6 17:11:36", "articles": [{"id": 199, "title": "Tasklet launches 14 new triggers for cloud agent automation", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/2bbbs5akfnh8hl9tfs3i.html#story-5", "source_name": "The Neuron", "published_at": "2026-04-16 10:03:23", "summary": null, "content_snippet": "Tasklet introduced 14 new triggers enabling cloud agents to instantly react to Slack, Calendar, and Drive events, expanding workflow automation capabilities.", "full_text": "Tasklet shipped 14 new event triggers so your cloud agent now responds the instant something happens in Slack, Google Calendar, Drive, Outlook, Telegram, YouTube, Apple Shortcuts, Notion, GitHub, or HubSpot. Try prompts like \"brief me on every meeting 15 min before it starts\" or \"respond when someone in #ask-ai mentions Jarvis\" (free tier; paid plans from $35/mo)."}]}, {"id": 19, "date": "2026-04-15", "category": "products_tools", "headline": "Anthropic launches Ultraplan mode for Claude to design before coding", "summary": "Anthropic introduced Ultraplan, a cloud-based planning mode for Claude that generates structured blueprints for projects before any code is written, shifting engineers toward oversight and reducing upfront coding errors. This expands Claude's enterprise capabilities beyond coding assistants.", "created_at": "2026-04-15 07:46:04", "articles": [{"id": 12, "title": "Claude for Word launches as direct competition to Microsoft's AI dominance", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/twk58r8ipr25ctktk81s.html#story-4", "source_name": "The Neuron", "published_at": "2026-04-14 11:09:59", "summary": null, "content_snippet": "Anthropic released 'Claude for Word,' a tool integrating its AI model directly into Microsoft Word, challenging Microsoft's AI ecosystem and expanding Anthropic's enterprise reach.", "full_text": null}, {"id": 13, "title": "Anthropic introduces Ultraplan mode for Claude to design before coding", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/twk58r8ipr25ctktk81s.html#story-5", "source_name": "The Neuron", "published_at": "2026-04-14 11:09:59", "summary": null, "content_snippet": "Anthropic launched Ultraplan, a cloud-based planning mode for Claude that generates structured blueprints for projects before any code is written, shifting the role of engineers toward oversight and refinement.", "full_text": "Anthropic just shipped Ultraplan , a cloud-based planning mode that decouples thinking from doing : instead of one local agent reasoning sequentially, Ultraplan spins up three exploration agents and one critique agent on Anthropic's infrastructure, points them at your synced GitHub repo, and returns a structured blueprint before a single line gets written. Your job becomes art director: review the plan, push back on what looks wrong, approve, then let local execution run."}]}, {"id": 20, "date": "2026-04-15", "category": "industry_business", "headline": "Federal Reserve warns banks over risks from Anthropic's Mythos model", "summary": "The Federal Reserve summoned major bank CEOs to discuss cybersecurity threats posed by Anthropic's Mythos model, signaling regulatory scrutiny over AI's potential impact on financial infrastructure and systemic risks.", "created_at": "2026-04-15 07:46:04", "articles": [{"id": 10, "title": "Federal Reserve summons big-bank CEOs to discuss cyber risks from Anthropic's Mythos model", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/twk58r8ipr25ctktk81s.html#story-2", "source_name": "The Neuron", "published_at": "2026-04-14 11:09:59", "summary": null, "content_snippet": "The Federal Reserve convened major bank CEOs to address potential cybersecurity threats posed by Anthropic's Mythos model, signaling regulatory concerns over AI's impact on financial infrastructure.", "full_text": null}]}, {"id": 21, "date": "2026-04-15", "category": "products_tools", "headline": "Vercel releases Open Agents for cloud-based coding agent workflows", "summary": "Vercel launched Open Agents, an open-source template for building cloud-based coding agents with persistent workflows and GitHub integration, targeting teams like Stripe and Spotify for scalable AI-driven development.", "created_at": "2026-04-15 07:46:04", "articles": [{"id": 50, "title": "Vercel releases Open Agents for cloud-based coding agent workflows", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/byv6rg2ndnhgheizgqb5.html#story-2", "source_name": "AlphaSignal", "published_at": "2026-04-14 18:38:27", "summary": null, "content_snippet": "Vercel introduces Open Agents, an open-source template for building cloud-based coding agents with persistent workflows and GitHub integration, targeting teams like Stripe and Spotify.", "full_text": null}]}, {"id": 22, "date": "2026-04-15", "category": "products_tools", "headline": "Cursor enables parallel agents with tiled layouts, cuts dropped frames by 87%", "summary": "Cursor updated its Agents Window to support parallel agent workflows with tiled layouts, improving editing performance by reducing dropped frames by 87% during large file changes, enhancing developer productivity.", "created_at": "2026-04-15 07:46:04", "articles": [{"id": 48, "title": "Cursor enables parallel agents with tiled layouts and reduces dropped frames by 87%", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/byv6rg2ndnhgheizgqb5.html#story-0", "source_name": "AlphaSignal", "published_at": "2026-04-14 18:38:27", "summary": null, "content_snippet": "Cursor updates its Agents Window to support parallel agent workflows with a tiled layout, improving editing performance by reducing dropped frames during large file changes by 87%.", "full_text": null}]}, {"id": 23, "date": "2026-04-15", "category": "products_tools", "headline": "Hugging Face automates paper ingestion for 'chat with your paper' feature", "summary": "Hugging Face introduced automated paper ingestion to enable users to chat with their research papers, streamlining knowledge access and interaction for researchers and developers.", "created_at": "2026-04-15 07:46:04", "articles": [{"id": 57, "title": "Hugging Face automates paper ingestion for chat with your paper feature", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/byv6rg2ndnhgheizgqb5.html#story-9", "source_name": "AlphaSignal", "published_at": "2026-04-14 18:38:27", "summary": null, "content_snippet": "Hugging Face introduces automated paper ingestion to enable users to chat with their research papers, streamlining knowledge access and interaction.", "full_text": null}]}, {"id": 24, "date": "2026-04-15", "category": "research", "headline": "AI2 finds science agents struggle with real-world experimental reasoning", "summary": "AI2 evaluated science agents and revealed significant limitations in their ability to conduct real-world experimental reasoning, highlighting gaps between AI capabilities and practical scientific tasks.", "created_at": "2026-04-15 07:46:04", "articles": [{"id": 56, "title": "AI2 evaluates science agents and reveals limits in real experimental reasoning", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/byv6rg2ndnhgheizgqb5.html#story-8", "source_name": "AlphaSignal", "published_at": "2026-04-14 18:38:27", "summary": null, "content_snippet": "AI2 assesses the performance of science agents, finding significant limitations in their ability to conduct real-world experimental reasoning.", "full_text": null}]}, {"id": 25, "date": "2026-04-15", "category": "products_tools", "headline": "Alibaba demonstrates multi-agent LLMs generating software exploits", "summary": "Alibaba showed that multi-agent LLMs can autonomously generate and validate software exploits, raising concerns about AI-driven security risks and the dual-use nature of advanced AI systems.", "created_at": "2026-04-15 07:46:04", "articles": [{"id": 55, "title": "Alibaba demonstrates multi-agent LLMs generating and validating software exploits", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/byv6rg2ndnhgheizgqb5.html#story-7", "source_name": "AlphaSignal", "published_at": "2026-04-14 18:38:27", "summary": null, "content_snippet": "Alibaba shows that multi-agent LLMs can autonomously generate and validate software exploits, highlighting potential security risks and capabilities.", "full_text": null}]}, {"id": 26, "date": "2026-04-15", "category": "products_tools", "headline": "Nous Research scales Hermes Agent to mobile and web platforms", "summary": "Nous Research expanded the Hermes Agent to support mobile and web platforms, enhancing its accessibility and functionality for broader deployment across different environments.", "created_at": "2026-04-15 07:46:04", "articles": [{"id": 54, "title": "Nous Research scales Hermes Agent across mobile and web platforms", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/byv6rg2ndnhgheizgqb5.html#story-6", "source_name": "AlphaSignal", "published_at": "2026-04-14 18:38:27", "summary": null, "content_snippet": "Nous Research expands the Hermes Agent to support mobile and web platforms, enhancing its accessibility and functionality.", "full_text": null}]}, {"id": 27, "date": "2026-04-15", "category": "products_tools", "headline": "Lovable adds built-in payments for app monetization", "summary": "Lovable introduced built-in payments and monetization features for apps, simplifying revenue generation for developers by integrating financial transactions directly into their applications.", "created_at": "2026-04-15 07:46:04", "articles": [{"id": 53, "title": "Lovable adds app monetization with built-in payments and setup", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/byv6rg2ndnhgheizgqb5.html#story-5", "source_name": "AlphaSignal", "published_at": "2026-04-14 18:38:27", "summary": null, "content_snippet": "Lovable introduces built-in payments and monetization features for apps, simplifying the process for developers to generate revenue.", "full_text": null}]}, {"id": 28, "date": "2026-04-15", "category": "products_tools", "headline": "Google's Memory Caching extends RNNs for long-context tasks without full attention", "summary": "Google Research proposed Memory Caching (MC), a method to extend RNNs with growing memory for handling longer inputs efficiently without the high compute costs of transformers, improving long-context AI tasks.", "created_at": "2026-04-15 07:46:04", "articles": [{"id": 52, "title": "Google improves long-context AI tasks without using full attention mechanisms", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/byv6rg2ndnhgheizgqb5.html#story-4", "source_name": "AlphaSignal", "published_at": "2026-04-14 18:38:27", "summary": null, "content_snippet": "Google Research proposes Memory Caching (MC), a method to extend RNNs with growing memory for handling longer inputs efficiently without the high compute costs of transformers.", "full_text": null}]}, {"id": 29, "date": "2026-04-15", "category": "products_tools", "headline": "Datadog advises on reducing risk in AI-powered delivery pipelines", "summary": "Datadog explored how teams can improve pipeline reliability and reduce release risk in AI-powered software delivery using real-time insights and feature flags, addressing critical DevOps challenges.", "created_at": "2026-04-15 07:46:04", "articles": [{"id": 51, "title": "Datadog discusses reducing release risk in AI-powered delivery pipelines", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/byv6rg2ndnhgheizgqb5.html#story-3", "source_name": "AlphaSignal", "published_at": "2026-04-14 18:38:27", "summary": null, "content_snippet": "Datadog explores how teams can improve pipeline reliability and reduce release risk in AI-powered software delivery using real-time insights and feature flags.", "full_text": null}]}, {"id": 30, "date": "2026-04-15", "category": "products_tools", "headline": "WorkOS emphasizes authorization for safe enterprise AI agent deployment", "summary": "WorkOS highlighted the importance of authorization over authentication for safely deploying AI agents at scale in enterprise environments, addressing critical security and governance needs.", "created_at": "2026-04-15 07:46:04", "articles": [{"id": 49, "title": "WorkOS explains why authorization is critical for enterprise AI agent deployment", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/byv6rg2ndnhgheizgqb5.html#story-1", "source_name": "AlphaSignal", "published_at": "2026-04-14 18:38:27", "summary": null, "content_snippet": "WorkOS highlights the importance of authorization over authentication for safely deploying AI agents at scale in enterprise environments.", "full_text": "Every AI agent demo looks magical, but most hit a wall in enterprise deployment. It's not model quality or latency. It's authorization. Authentication proves an agent's identity. Authorization defines its blast radius. The winners in enterprise AI won't have the most features.They'll be the ones enterprises can safely trust. Learn how WorkOS FGA scopes that blast radius with resource-level permissions."}]}, {"id": 31, "date": "2026-04-15", "category": "products_tools", "headline": "Sundai Claw launches autonomous software factory with OpenClaw Telegram agent", "summary": "Sundai Claw introduced an OpenClaw Telegram agent that autonomously generates project cards, GitHub repos, spec docs, and deploys apps from natural-language requests, making agentic workflows debuggable and controllable.", "created_at": "2026-04-15 07:46:04", "articles": [{"id": 42, "title": "Sundai Claw launches autonomous software factory with OpenClaw Telegram agent", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/77noc2sts953moolpdje.html#story-0", "source_name": "AI Tinkerers", "published_at": "2026-04-15 04:41:07", "summary": null, "content_snippet": "Sundai Claw, an OpenClaw Telegram agent, autonomously generates project cards, GitHub repos, spec docs, and deploys apps from natural-language requests, making agentic workflows debuggable and controllable with guardrails.", "full_text": null}]}, {"id": 32, "date": "2026-04-15", "category": "products_tools", "headline": "ATX introduces automated code review loop with targeted AI agents", "summary": "ATX (Agent Nexus) created a closed loop for continuous code review by generating specialized agents that iterate on fixes, turning review into a repeatable agentic workflow for scalable development.", "created_at": "2026-04-15 07:46:04", "articles": [{"id": 44, "title": "ATX introduces automated code review loop with targeted AI agents", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/77noc2sts953moolpdje.html#story-2", "source_name": "AI Tinkerers", "published_at": "2026-04-15 04:41:07", "summary": null, "content_snippet": "ATX (Agent Nexus) creates a closed loop for continuous code review by generating specialized agents that iterate on fixes, turning review into a repeatable agentic workflow.", "full_text": null}]}, {"id": 33, "date": "2026-04-15", "category": "products_tools", "headline": "DroneQRF fuses drone telemetry into predictive security intelligence", "summary": "DroneQRF normalizes disparate drone data streams into a unified threat scoring model, enabling predictive and prescriptive security actions for high-stakes operations like critical infrastructure protection.", "created_at": "2026-04-15 07:46:04", "articles": [{"id": 45, "title": "DroneQRF platform fuses drone telemetry into predictive security intelligence", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/77noc2sts953moolpdje.html#story-3", "source_name": "AI Tinkerers", "published_at": "2026-04-15 04:41:07", "summary": null, "content_snippet": "DroneQRF normalizes disparate drone data streams into a unified threat scoring model, enabling predictive and prescriptive security actions for high-stakes operations.", "full_text": "Several demos focused on improving developer workflows. Rohan Hasabe’s ATX introduces an automated code review loop using specialized agents. We also saw explorations into the security implications of agentic tools with Will Sergeant’s work on Agentic Trust and Security Verification , and Michael Lever’s DroneQRF platform for predictive drone security, highlighting the integration of diverse data streams."}]}, {"id": 34, "date": "2026-04-15", "category": "editorial", "headline": "Every's head of platform argues for new vocabulary to describe AI-driven experiences", "summary": "The newsletter highlights the need for new terms to describe the emotional and technical nuances of AI interactions, referencing The Dictionary of Obscure Sorrows as an example of evolving language.", "created_at": "2026-04-15 17:00:01", "articles": [{"id": 94, "title": "Every's head of platform argues for new vocabulary to describe AI-driven experiences", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/cmvdqn58hf7i6zsh2p0q.html#story-3", "source_name": "Every", "published_at": "2026-04-15 15:10:26", "summary": null, "content_snippet": "The newsletter highlights the need for new terms to describe the emotional and technical nuances of AI interactions, referencing The Dictionary of Obscure Sorrows as an example of evolving language.", "full_text": null}]}, {"id": 35, "date": "2026-04-15", "category": "editorial", "headline": "Spiral general manager Marcus Moretti uses Anthropic's Claude Managed Agents to build new agent", "summary": "Moretti leverages managed agents to quickly develop a new agent for interacting with other agents via Spiral's API, reducing infrastructure maintenance and testing requirements.", "created_at": "2026-04-15 17:00:01", "articles": [{"id": 93, "title": "Spiral general manager Marcus Moretti uses Anthropic's Claude Managed Agents to build new agent", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/cmvdqn58hf7i6zsh2p0q.html#story-2", "source_name": "Every", "published_at": "2026-04-15 15:10:26", "summary": null, "content_snippet": "Moretti leverages managed agents to quickly develop a new agent for interacting with other agents via Spiral's API, reducing infrastructure maintenance and testing requirements.", "full_text": "Spiral general manager Marcus Moretti used the service to spin up a new Spiral agent. Agents already power the Spiral web experience, but there was an opportunity to build a new one designed specifically for interacting with other agents calling Spiral’s API. (Agents don’t require the same conversational niceties as humans.)"}]}, {"id": 36, "date": "2026-04-15", "category": "editorial", "headline": "Anthropic launches Claude Managed Agents in public beta", "summary": "Anthropic's new hosted service handles sessions, memory, tool use, and credentials for AI agents, simplifying development and reducing infrastructure maintenance for developers.", "created_at": "2026-04-15 17:00:01", "articles": [{"id": 92, "title": "Anthropic launches Claude Managed Agents in public beta", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/cmvdqn58hf7i6zsh2p0q.html#story-1", "source_name": "Every", "published_at": "2026-04-15 15:10:26", "summary": null, "content_snippet": "Anthropic's new hosted service handles sessions, memory, tool use, and credentials for AI agents, simplifying development and reducing infrastructure maintenance for developers.", "full_text": "That work matters a lot less now since Anthropic launched Claude Managed Agents earlier this month in public beta, a hosted service that handles sessions, memory, tool use, and credentials. You say how you want your agent to operate, and Claude makes it happen."}]}, {"id": 37, "date": "2026-04-15", "category": "editorial", "headline": "Every releases new episode of AI & I podcast featuring Logical Intelligence CEO Eve Bodnia", "summary": "The podcast episode discusses the limitations of LLMs and introduces energy-based models (EBMs) as a potential alternative, arguing that EBMs offer better architecture transparency, data-native processing, and panoramic reasoning compared to LLMs.", "created_at": "2026-04-15 17:00:01", "articles": [{"id": 91, "title": "Every releases new episode of AI & I podcast featuring Logical Intelligence CEO Eve Bodnia", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/cmvdqn58hf7i6zsh2p0q.html#story-0", "source_name": "Every", "published_at": "2026-04-15 15:10:26", "summary": null, "content_snippet": "The podcast episode discusses the limitations of LLMs and introduces energy-based models (EBMs) as a potential alternative, arguing that EBMs offer better architecture transparency, data-native processing, and panoramic reasoning compared to LLMs.", "full_text": null}]}, {"id": 38, "date": "2026-04-15", "category": "products_tools", "headline": "Anthropic launches Claude Code Routines for automated AI tasks", "summary": "Anthropic released Claude Code Routines, allowing Claude to run on a schedule without a powered-on laptop, enhancing automation for developers and enterprises. This follows Anthropic's push into agentic workflows.", "created_at": "2026-04-15 17:00:09", "articles": [{"id": 98, "title": "Claude Code Routines ships: Claude runs on a schedule without needing a laptop", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/fob00af9ap3ncdkd2lzs.html#story-3", "source_name": "The Neuron", "published_at": "2026-04-15 14:09:55", "summary": null, "content_snippet": "Anthropic announced the release of Claude Code Routines, enabling Claude to operate on a schedule without requiring a user's laptop to be powered on, enhancing automation capabilities.", "full_text": "Claude Code Routines runs any Claude Code prompt on a schedule, via API call, or on GitHub events from Anthropic's cloud (no laptop required). Each routine gets its own API endpoint for alerts and Zapier-style triggers —free with every Claude Code plan."}, {"id": 103, "title": "Anthropic expected to release Claude Opus 4.7 and AI design tool", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/l6m4ggyygat1t894wrr5.html#story-2", "source_name": "Unknown", "published_at": "2026-04-15 13:40:48", "summary": null, "content_snippet": "Anthropic is anticipated to launch Claude Opus 4.7 alongside a new AI-powered design tool for building websites and presentations, targeting both technical and non-technical users. This expands Claude’s role beyond chat and coding into visual and product creation workflows.", "full_text": "Anthropic is expected to release Claude Opus 4.7 alongside a new AI-powered design tool for building websites and presentations, with both potentially launching as soon as this week. The tool is designed to let users create landing pages, slides, and full products from natural language prompts, targeting both technical and non-technical users. It is likely to compete with tools like Gamma and Google Stitch, expanding Claude’s role beyond chat and coding into visual and product creation workflows. The update signals Anthropic is pushing to turn its models into full-stack creative systems, as competition moves toward AI that can generate complete products, not just text."}]}, {"id": 39, "date": "2026-04-15", "category": "products_tools", "headline": "OpenAI debuts GPT-5.4-Cyber for cybersecurity defenders", "summary": "OpenAI launched GPT-5.4-Cyber, a permissive AI model for defensive security tasks like malware detection, available to verified users via its Trusted Access for Cyber initiative.", "created_at": "2026-04-15 17:00:09", "articles": [{"id": 97, "title": "OpenAI launches GPT-5.4-Cyber, a cyber-permissive model for defenders", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/fob00af9ap3ncdkd2lzs.html#story-2", "source_name": "The Neuron", "published_at": "2026-04-15 14:09:55", "summary": null, "content_snippet": "OpenAI introduced GPT-5.4-Cyber, a model designed to assist cybersecurity defenders with permissive capabilities, expanding its AI tools for security applications.", "full_text": null}, {"id": 101, "title": "OpenAI launches GPT-5.4-Cyber for defensive security work", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/l6m4ggyygat1t894wrr5.html#story-0", "source_name": "Unknown", "published_at": "2026-04-15 13:40:48", "summary": null, "content_snippet": "OpenAI introduced GPT-5.4-Cyber, a permissive AI model for defensive security tasks like malware detection, expanding access to verified users through its Trusted Access for Cyber initiative. This reflects a more open approach to deploying advanced cyber capabilities compared to competitors like Anthropic.", "full_text": "OpenAI has introduced GPT-5.4-Cyber , a more permissive version of its flagship model built for defensive security work, expanding access to thousands of verified users through its Trusted Access for Cyber initiative. Unlike Anthropic’s Mythos, which is limited to a small group of partners, OpenAI is allowing anyone who passes identity checks to use the system, reflecting a more open approach to deploying advanced cyber capabilities. The model can reverse-engineer compiled software to detect malware and vulnerabilities without needing source code, aiming to help analysts inspect and secure systems more efficiently. The release signals a growing split between leading AI labs on how powerful security models should be distributed, as competition pushes both sides to balance access, safety, and real-world impact."}]}, {"id": 40, "date": "2026-04-15", "category": "products_tools", "headline": "Adobe unveils Firefly AI Assistant for creative workflows", "summary": "Adobe introduced Firefly AI Assistant, an agent-based tool that plans and executes multi-step workflows across Photoshop and Premiere while keeping users in control.", "created_at": "2026-04-15 17:00:09", "articles": [{"id": 105, "title": "Adobe introduces Firefly AI Assistant for agent workflows in creative work", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/l6m4ggyygat1t894wrr5.html#story-4", "source_name": "Unknown", "published_at": "2026-04-15 13:40:48", "summary": null, "content_snippet": "Adobe launched Firefly AI Assistant, an agent-based tool that plans and executes multi-step workflows across creative apps like Photoshop and Premiere while keeping users in control. The update also enhances video and image editing capabilities and supports over 30 AI models.", "full_text": null}]}, {"id": 41, "date": "2026-04-15", "category": "products_tools", "headline": "Google builds desktop agent to automate Gmail, Drive, Calendar tasks", "summary": "Google is expanding its Gemini platform with a new agent system that executes tasks across apps like Gmail, Drive, and Calendar, shifting from chat-based prompts to full task automation.", "created_at": "2026-04-15 17:00:09", "articles": [{"id": 102, "title": "Google develops desktop agent to compete with Cowork", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/l6m4ggyygat1t894wrr5.html#story-1", "source_name": "Unknown", "published_at": "2026-04-15 13:40:48", "summary": null, "content_snippet": "Google is expanding its Gemini platform with a new agent system that can execute tasks across apps like Gmail, Drive, and Calendar, shifting from chat-based prompts to full task automation. This positions Google to compete with emerging agent platforms from OpenAI and Anthropic.", "full_text": null}]}, {"id": 42, "date": "2026-04-15", "category": "model_releases", "headline": "Nanochat trains LLMs from scratch on a single GPU", "summary": "Nanochat implements a full LLM training pipeline in one repo, making model engineering replicable and accessible on a single GPU using Andrej Karpathy's minimal PyTorch harness.", "created_at": "2026-04-15 17:00:09", "articles": [{"id": 46, "title": "Nanochat trains LLMs from scratch on a single GPU with Andrej Karpathy's minimal PyTorch harness", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/77noc2sts953moolpdje.html#story-4", "source_name": "AI Tinkerers", "published_at": "2026-04-15 04:41:07", "summary": null, "content_snippet": "Nanochat implements a full LLM training pipeline—tokenization, pretraining, finetuning, evaluation, and inference—in one repo, making model engineering replicable and accessible on a single GPU.", "full_text": "This week, we saw builders shipping concrete systems, from autonomous software factories to LLM training pipelines. Nate Aune’s Sundai Claw tackles autonomous software creation, while Sofie Van Landeghem showed how Karpathy’s Nanochat trains LLMs from scratch on a single GPU."}]}, {"id": 43, "date": "2026-04-15", "category": "industry_business", "headline": "Anthropic attracts $800B investor offers amid enterprise demand", "summary": "Anthropic has received investor offers valuing the company at around $800 billion, more than double its previous valuation, driven by strong enterprise demand for its AI tools.", "created_at": "2026-04-15 17:00:09", "articles": [{"id": 104, "title": "Anthropic attracts investor offers at $800 billion valuation", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/l6m4ggyygat1t894wrr5.html#story-3", "source_name": "Unknown", "published_at": "2026-04-15 13:40:48", "summary": null, "content_snippet": "Anthropic has received investor offers valuing the company at around $800 billion, more than double its previous valuation, driven by strong enterprise demand for its AI tools. The company is also exploring an IPO, signaling growing investor interest in top AI labs.", "full_text": "Anthropic has received investor offers that could value the company at around $800 billion, more than double the $350 billion valuation tied to its $30 billion raise in February, though talks are still early and may not lead to a deal. The interest comes as Anthropic’s annual revenue run rate has surged to about $30 billion, driven by strong demand from enterprise customers using its AI tools for coding, cybersecurity, and automation. The company has so far resisted the offers and is also said to be exploring a potential IPO as early as October, suggesting it has multiple paths to raise capital as competition with OpenAI intensifies. The discussions signals how quickly investor appetite is concentrating around a small group of top AI labs, with valuations rising in step with their growing control over revenue, infrastructure, and frontier model development."}]}, {"id": 44, "date": "2026-04-15", "category": "sci_tech_trends", "headline": "Meta builds AI version of Mark Zuckerberg for employee interactions", "summary": "Meta is reportedly building an AI replica of Mark Zuckerberg trained on his voice and mannerisms to interact with employees and simulate leadership communication.", "created_at": "2026-04-15 17:00:09", "articles": [{"id": 7, "title": "Meta develops AI version of Mark Zuckerberg for employee interactions", "url": "https://kill-the-newsletter.com/feeds/REDACTED_KTN_FEED_ID/entries/bql3xpiw9wr3ghjvlhzc.html#story-5", "source_name": "Unknown", "published_at": "2026-04-14 13:42:46", "summary": null, "content_snippet": "Meta is reportedly building an AI replica of Mark Zuckerberg trained on his voice, mannerisms, and internal thinking to interact with employees and simulate leadership communication. This reflects Meta’s broader push into AI-driven organizational roles.", "full_text": null}]}, {"id": 45, "date": "2026-04-15", "category": "products_tools", "headline": "Notion’s coding agent runs 13 days straight with self-verification", "summary": "Notion co-founder Simon Last shared a method to keep an AI coding agent operational for 13 days
