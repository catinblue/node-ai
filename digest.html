/* ═══ BREADCRUMB / NAVIGATION HISTORY ═══
   historyStack holds previous article contexts so the user can climb back
   through an Echo exploration chain. Push on echo, pop on back, clear on fresh. */
let historyStack=[];
let _curFrom='saved';   // Tracks the 'from' context of the currently-open article

/* ═══ KNOWLEDGE GRAPH — force-directed keyword co-occurrence visualization ═══ */
const GRAPH_STOP=new Set([...ECHO_STOP,'neuron','every','alphasignal','valley','tinkerers',
  "ai's",'ai-powered','ai-driven','ai-based','ai-enabled','code']);
function normKw(kw){return kw.replace(/['']s$/,'')}

function buildGraphData(stories,topN){
  topN=topN||35;
  const freq={},cooc={};
  for(const s of stories){
    const raw=extractKeywords(s).map(normKw).filter(k=>!GRAPH_STOP.has(k.toLowerCase()));
    const unique=[...new Set(raw)];
    for(const kw of unique)freq[kw]=(freq[kw]||0)+1;
    for(let i=0;i<unique.length;i++)
      for(let j=i+1;j<unique.length;j++){
        const pair=[unique[i],unique[j]].sort().join('|');
        cooc[pair]=(cooc[pair]||0)+1;
      }
  }
  const topKws=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,topN).map(([k])=>k);
  const topSet=new Set(topKws);
  const nodes=topKws.map(kw=>({id:kw,freq:freq[kw],x:0,y:0,vx:0,vy:0,dragging:false}));
  const edges=[];
  for(const[pair,w]of Object.entries(cooc)){
    const[a,b]=pair.split('|');
    if(topSet.has(a)&&topSet.has(b)&&w>=2)edges.push({source:a,target:b,weight:w});
  }
  return{nodes,edges};
}

function tickGraph(nodes,edges,W,H){
  const nm={};nodes.forEach(n=>nm[n.id]=n);
  // Repulsion
  for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){
    const a=nodes[i],b=nodes[j];
    let dx=b.x-a.x,dy=b.y-a.y;
    const d=Math.max(1,Math.sqrt(dx*dx+dy*dy));
    const f=1400/(d*d);
    const fx=(dx/d)*f,fy=(dy/d)*f;
    a.vx-=fx;a.vy-=fy;b.vx+=fx;b.vy+=fy;
  }
  // Attraction along edges
  for(const e of edges){
    const a=nm[e.source],b=nm[e.target];
    if(!a||!b)continue;
    let dx=b.x-a.x,dy=b.y-a.y;
    const d=Math.max(1,Math.sqrt(dx*dx+dy*dy));
    const f=(d-90)*0.007*Math.min(e.weight,6);
    const fx=(dx/d)*f,fy=(dy/d)*f;
    a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;
  }
  // Center gravity
  for(const n of nodes){n.vx+=(W/2-n.x)*0.004;n.vy+=(H/2-n.y)*0.004}
  // Apply + damp + bound
  for(const n of nodes){
    if(n.dragging)continue;
    n.vx*=0.86;n.vy*=0.86;
    n.x+=n.vx;n.y+=n.vy;
    n.x=Math.max(35,Math.min(W-35,n.x));
    n.y=Math.max(35,Math.min(H-35,n.y));
  }
}

function drawGraph(ctx,nodes,edges,W,H,hover){
  ctx.clearRect(0,0,W,H);
  const nm={};nodes.forEach(n=>nm[n.id]=n);
  const maxF=Math.max(...nodes.map(n=>n.freq));
  // Edges
  for(const e of edges){
    const a=nm[e.source],b=nm[e.target];if(!a||!b)continue;
    const hot=hover&&(e.source===hover||e.target===hover);
    ctx.strokeStyle=hot?'rgba(245,158,11,0.50)':'rgba(255,255,255,0.05)';
    ctx.lineWidth=hot?Math.min(3,e.weight*0.6):Math.min(1.5,e.weight*0.3);
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
  }
  // Nodes
  for(const n of nodes){
    const r=5+(n.freq/maxF)*16;
    const isH=hover===n.id;
    const isN=hover&&edges.some(e=>(e.source===hover&&e.target===n.id)||(e.target===hover&&e.source===n.id));
    ctx.beginPath();ctx.arc(n.x,n.y,r,0,Math.PI*2);
    if(isH){ctx.fillStyle='#F59E0B';ctx.shadowColor='rgba(245,158,11,0.5)';ctx.shadowBlur=18}
    else if(isN){ctx.fillStyle='rgba(245,158,11,0.40)';ctx.shadowBlur=0}
    else if(hover){ctx.fillStyle='rgba(255,255,255,0.10)';ctx.shadowBlur=0}
    else{ctx.fillStyle='rgba(255,255,255,0.32)';ctx.shadowBlur=0}
    ctx.fill();ctx.shadowBlur=0;
    // Label
    if(r>=7||isH||isN){
      ctx.fillStyle=isH?'#FCD34D':isN?'rgba(252,211,77,0.70)':'rgba(255,255,255,0.42)';
      ctx.font=`${isH?700:500} ${Math.max(10,r*0.75)}px Outfit`;
      ctx.textAlign='center';ctx.textBaseline='bottom';
      ctx.fillText(n.id,n.x,n.y-r-3);
    }
  }
}

let _gData=null,_gAnim=null,_gHover=null,_gDrag=null,_gW=0,_gH=0,_gCtx=null;

function initGraph(){
  const cvs=$('graph-canvas');if(!cvs)return;
  const par=cvs.parentElement;
  const dpr=Math.min(window.devicePixelRatio||1,2);
  _gW=par.clientWidth;_gH=par.clientHeight-cvs.offsetTop;
  cvs.style.width=_gW+'px';cvs.style.height=_gH+'px';
  cvs.width=_gW*dpr;cvs.height=_gH*dpr;
  _gCtx=cvs.getContext('2d');
  _gCtx.setTransform(dpr,0,0,dpr,0,0);

  if(!_gData){
    _gData=buildGraphData(ALL,35);
    _gData.nodes.forEach((n,i)=>{
      n.x=_gW/2+Math.cos(i*0.42)*(_gW*0.28)+(Math.random()-0.5)*50;
      n.y=_gH/2+Math.sin(i*0.42)*(_gH*0.28)+(Math.random()-0.5)*50;
    });
    // Interaction handlers
    const maxF=Math.max(..._gData.nodes.map(n=>n.freq));
    function hit(mx,my){
      for(const n of _gData.nodes){
        const r=5+(n.freq/maxF)*16;
        if(Math.hypot(mx-n.x,my-n.y)<=r+5)return n;
      }return null;
    }
    let dsx=0,dsy=0;
    // Unified pointer handlers — same logic for mouse and touch.
    // Touch: pressing a node surfaces the hover highlight (neighbors light up)
    // so mobile users get the same visual feedback as desktop hover.
    function _gPtr(e){
      const r=cvs.getBoundingClientRect();
      const s=e.touches?e.touches[0]:e;
      return{x:s.clientX-r.left,y:s.clientY-r.top};
    }
    function _gMove(e){
      const{x:mx,y:my}=_gPtr(e);
      if(_gDrag){_gDrag.x=mx;_gDrag.y=my;_gDrag.vx=0;_gDrag.vy=0}
      else{const h=hit(mx,my);_gHover=h?h.id:null;cvs.style.cursor=h?'pointer':'default'}
    }
    function _gDown(e){
      const{x:mx,y:my}=_gPtr(e);
      const h=hit(mx,my);
      if(h){
        _gDrag=h;h.dragging=true;dsx=mx;dsy=my;
        if(e.touches)_gHover=h.id;
        if(e.cancelable)e.preventDefault();
      }
    }
    function _gUp(){
      if(_gDrag){
        _gDrag.dragging=false;
        if(Math.hypot(_gDrag.x-dsx,_gDrag.y-dsy)<5){
          const kw=_gDrag.id;
          go('feed');
          setTimeout(()=>searchForKeyword(kw),150);
        }
        _gDrag=null;
      }
    }
    cvs.addEventListener('mousemove',_gMove);
    cvs.addEventListener('mousedown',_gDown);
    window.addEventListener('mouseup',_gUp);
    cvs.addEventListener('touchstart',_gDown,{passive:false});
    cvs.addEventListener('touchmove',e=>{if(e.cancelable)e.preventDefault();_gMove(e)},{passive:false});
    cvs.addEventListener('touchend',_gUp);
    cvs.addEventListener('touchcancel',_gUp);
  }
  $('graph-sub').textContent=`${_gData.nodes.length} entities · ${_gData.edges.length} connections · ${ALL.length} stories`;
  // Start animation
  if(_gAnim)cancelAnimationFrame(_gAnim);
  function frame(){
    if(view!=='graph'){_gAnim=null;return}
    tickGraph(_gData.nodes,_gData.edges,_gW,_gH);
    drawGraph(_gCtx,_gData.nodes,_gData.edges,_gW,_gH,_gHover);
    _gAnim=requestAnimationFrame(frame);
  }
  frame();
}

/* ═══ EXPORT BRIEFING — Saved stories → downloadable Markdown file ═══ */
function exportBriefing(){
  if(!fs||fs.size===0){
    const t=$('toast');
    t.textContent='No saved stories to export';
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2000);
    return;
  }
  const saved=ALL.filter(s=>fs.has(s.id+''))
    .sort((a,b)=>(b.date||'').localeCompare(a.date||'')||b.id-a.id);
  const today=new Date().toISOString().slice(0,10);

  let md=`# ◧ Node Intelligence Briefing\n\n`;
  md+=`> Generated: **${today}** · ${saved.length} curated ${saved.length===1?'story':'stories'}\n\n`;
  md+=`---\n\n`;

  saved.forEach((s,i)=>{
    const arts=s.articles||[];
    const src=arts[0]?.source_name||'Unknown';
    const url=arts[0]?.url||'';
    const cat=(CAT_MAP[s.category]||{}).name_en||s.category||'';
    const kws=extractKeywords(s).map(k=>`\`#${k}\``).join(' ');
    const coverage=arts.length>1?` · ${arts.length} sources`:'';

    md+=`## ${i+1}. ${s.headline}\n\n`;
    md+=`**${s.date}** · ${src}${coverage} · *${cat}*\n\n`;

    if(s.summary){
      md+=`> ${s.summary}\n\n`;
    }

    // Include scraped full_text excerpt if available
    const ft=arts.find(a=>a.full_text&&a.full_text.length>200);
    if(ft){
      const excerpt=ft.full_text.substring(0,500).replace(/\n+/g,'\n>\n> ');
      md+=`**Original excerpt:**\n\n> ${excerpt}${ft.full_text.length>500?'...':''}\n\n`;
    }

    if(kws)md+=`Tags: ${kws}\n\n`;

    // Source links
    if(arts.length){
      md+=`**Sources:**\n`;
      for(const a of arts){
        if(a.url)md+=`- [${a.source_name||'Link'}](${a.url})\n`;
      }
      md+=`\n`;
    }

    md+=`---\n\n`;
  });

  md+=`*Exported from [◧ Node](https://github.com) — AI Intelligence Terminal*\n`;

  // Trigger download via Blob API
  const blob=new Blob([md],{type:'text/markdown;charset=utf-8'});
  const href=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=href;
  a.download=`Node_Briefing_${today}.md`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(href);

  // Success toast
  const t=$('toast');
  t.textContent=`Exported ${saved.length} stories as Markdown`;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function searchForKeyword(kw){
  // Jump from a Detail keyword pill → Search mode with that term preloaded.
  // Abandons any in-progress echo-exploration chain (topic-jump, not backtrack).
  historyStack.length=0;
  closeArt();
  setTimeout(()=>{
    toggleSearch(true);                           // open search bar
    $('search-input').value=kw;
    searchQ=kw;
    stackIdx=0;
    render();
    renderSearchPanel();
    saveSearchHistory(kw);                        // persist into recent
  },350);
}

function navigateToEcho(idx,from){
  // Called when user clicks an Echo card — push current article and descend.
  // IMPORTANT: push BEFORE closeArt (which nulls cur), then use nav='back' in openArt so it doesn't clear the stack.
  if(cur)historyStack.push({id:cur.id,from:_curFrom||'saved'});
  closeArt();
  setTimeout(()=>openArt(idx,from,'back'),350);
}

function goBack(){
  if(!historyStack.length)return;
  const prev=historyStack.pop();
  const idx=ALL.findIndex(s=>s.id===prev.id);
  if(idx<0){renderBreadcrumb();return}
  closeArt();
  setTimeout(()=>openArt(idx,prev.from,'back'),350);
}

function renderBreadcrumb(){
  const bc=$('art-breadcrumb');
  if(!bc)return;
  if(!historyStack.length){
    bc.style.display='none';
    bc.innerHTML='';
    return;
  }
  const prev=historyStack[historyStack.length-1];
  const prevStory=ALL.find(s=>s.id===prev.id);
  const prevTitle=prevStory?prevStory.headline:'previous story';
  const depth=historyStack.length;
  bc.style.display='block';
  bc.innerHTML=`
    <button class="art-breadcrumb-btn" onclick="goBack()" aria-label="Back to previous article">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      <span class="art-breadcrumb-label">Back to</span>
      <span class="art-breadcrumb-title">${esc(prevTitle)}</span>
      ${depth>1?`<span class="art-breadcrumb-depth">${depth}</span>`:''}
    </button>
  `;
}

/* ═══ ARTICLE DETAIL ═══ */
function openArt(idx,from,nav){
  const list=from==='saved'?ALL:flt();
  const s=list[idx];if(!s)return;
  // History stack management — 'back' means stack was already handled by caller.
  // Any other nav mode (fresh card tap, saved tap, etc.) clears the exploration chain.
  if(nav!=='back')historyStack.length=0;
  _curFrom=from;
  cur=s;
  rs.add(s.id+'');localStorage.setItem('ai_read',JSON.stringify([...rs]));

  const bg=CBGS[idx%3];
  const inner=$('art-inner');
  inner.style.background=bg;
  $('art-top').style.background=bg;

  const cat=CAT_MAP[s.category]||{};
  const ib=fs.has(s.id+'');
  const src=(s.articles&&s.articles[0])?s.articles[0].source_name:'';
  const follows=JSON.parse(localStorage.getItem('ai_follows')||'[]');
  const isFollowed=follows.includes(src);

  $('art-bk').innerHTML=starSvg(ib);
  $('art-bk').classList.toggle('on',ib);

  // Content priority (Slice A+B+AI-Valley-cleanup fix).
  //   1. full_text (scraped newsletter prose from Slice B, or cleaned archive from clean_ai_valley)
  //   2. per-article content_snippet (per-story LLM extraction)
  //   3. story.summary (story-level LLM aggregate — last resort)
  let fullText='';
  let isOriginal=false;
  const arts=s.articles||[];

  // 1. Any article with full_text? Use the longest one (threshold 100 chars to accept cleaned archives).
  const scraped=arts.filter(a=>a.full_text&&a.full_text.length>100)
    .sort((a,b)=>b.full_text.length-a.full_text.length);
  if(scraped.length){
    fullText=scraped[0].full_text;
    isOriginal=true;
  }else{
    // 2. Gather unique content_snippets, dedupe near-identical ones.
    const seen=new Set();
    const snippets=[];
    for(const a of arts){
      const t=(a.content_snippet||'').trim();
      if(!t||t.length<20)continue;
      const key=t.substring(0,80).toLowerCase();
      if(seen.has(key))continue;
      seen.add(key);
      snippets.push(t);
    }
    if(snippets.length){
      fullText=snippets.join('\n\n');
    }else{
      // 3. Last resort — story-level summary.
      fullText=s.summary||'';
    }
  }
  // Paragraph wrapping — split on blank lines, wrap each chunk in <p>, escape for safety.
  // Also scrub blockquote artifacts (" > " → " — ") left by BeautifulSoup HTML extraction.
  const bodyHtml=fullText.split(/\n\n+/).map(p=>{
    const clean=p.replace(/\n/g,' ')
                 .replace(/^\s*>\s*/,'')          // strip leading blockquote marker
                 .replace(/\s+>\s+/g,' — ')       // mid-paragraph markers → em-dash
                 .replace(/\s+/g,' ')
                 .trim();
    return clean?`<p>${esc(clean)}</p>`:'';
  }).filter(Boolean).join('');

  const links=(s.articles||[]).map(a=>{
    const fav=faviconUrl(a.url);
    return `
    <a class="art-link" href="${safeUrl(a.url)}" target="_blank" rel="noopener">
      ${fav?`<img class="art-link-fav" src="${fav}" alt="" onerror="this.style.display='none'">`:`
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
      </svg>`}
      <div style="flex:1">
        <div>${esc(a.source_name)}</div>
        <div class="art-link-url">${esc((a.url||'').replace(/^https?:\/\//,'').substring(0,50))}</div>
      </div>
    </a>`;
  }).join('');

  // "Read original" — floats above detail; links to first article URL
  const primaryUrl=(s.articles||[])[0]?.url||'';
  const readOrig=primaryUrl?`
    <div class="read-orig-wrap">
      <a class="read-orig-btn" href="${safeUrl(primaryUrl)}" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        Read original
      </a>
    </div>`:'';

  // Keyword pills — topic chips that jump from Detail → Search
  const pillKeywords=extractKeywords(s);
  const pillsBlock=pillKeywords.length?`
    <div class="art-pills">
      ${pillKeywords.map(kw=>{
        const safe=esc(kw).replace(/'/g,'&#39;');
        return `<button class="art-pill" onclick="searchForKeyword('${kw.replace(/[\\']/g,m=>'\\'+m)}')">${safe}</button>`;
      }).join('')}
    </div>`:'';

  // Story Echoes — thematically related coverage
  const echoes=findEchoes(s,6);
  const echoesBlock=echoes.length?`
    <div class="echoes-section">
      <div class="echoes-label">STORY ECHOES · ${echoes.length} related</div>
      <div class="echoes-strip">
        ${echoes.map(e=>{
          const gi=ALL.indexOf(e.story);
          const eFav=faviconUrl((e.story.articles||[])[0]?.url||'');
          const eSrc=(e.story.articles||[])[0]?.source_name||'';
          return `<div class="echo-card" onclick="event.stopPropagation();navigateToEcho(${gi},'saved')">
            <div class="echo-meta">
              ${eFav?`<img class="fav-icon" src="${eFav}" alt="" onerror="this.style.display='none'">`:''}
              <span>${esc(eSrc)}</span>
            </div>
            <div class="echo-title">${esc(e.story.headline)}</div>
            <div class="echo-spark">
              <svg viewBox="0 0 24 24"><path d="M13 3L4 14h7l-1 7 9-11h-7l1-7z"/></svg>
              ${e.matched.length} match${e.matched.length>1?'es':''}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`:'';

  // Apply highlight to the body HTML after it's been built (highlights search term inside each <p>)
  const bodyHtmlHi=searchQ
    ? bodyHtml.replace(/(<p[^>]*>)([\s\S]*?)(<\/p>)/g,(_,a,b,c)=>{
        const re=new RegExp('('+searchQ.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
        return a+b.replace(re,'<mark>$1</mark>')+c;
      })
    : bodyHtml;
  $('art-body').innerHTML=`
    <div class="art-cat">${cat.name_en||s.category}</div>
    <div class="art-title">${hi(s.headline,searchQ)}</div>
    <div class="art-info">${s.date} &middot; ${(s.articles||[]).length} source${(s.articles||[]).length>1?'s':''} &middot; ${readTime(fullText)} min read</div>
    <div class="art-source">
      <span class="art-sname">${esc(src)}</span>
      <button class="follow ${isFollowed?'following':''}" data-source="${esc(src)}" onclick="toggleFollow(this.dataset.source,this)">${isFollowed?'Following':'Follow'}</button>
    </div>
    ${pillsBlock}
    <div class="art-text">${bodyHtmlHi}</div>
    ${links?`<div class="art-divider"></div><div class="art-links-title">Sources</div>${links}`:''}
    ${echoesBlock}
    ${readOrig}
  `;

  $('art-overlay').classList.add('open');
  $('article').classList.add('open');
  $('nav').style.display='none';
  $('art-scroll').scrollTop=0;
  renderBreadcrumb();
  applyZenMode();

  // Deep-read tracking — 30s dwell OR scroll-to-bottom (92% tolerance) fires once.
  // Either signal wins; subsequent opens of the same story don't double-count
  // because markDeepRead() guards on storyId. The cleanup closure is stashed on
  // window so closeArt can tear it down without plumbing state through globals.
  const _drScroll=$('art-scroll');
  let _drFired=false;
  const _drFire=()=>{
    if(_drFired||!cur)return;
    _drFired=true;
    if(markDeepRead(cur.id))bumpAffinity(cur,0.7);
  };
  const _drTimer=setTimeout(_drFire,30000);
  const _drOnScroll=()=>{
    if(_drFired)return;
    const ratio=(_drScroll.scrollTop+_drScroll.clientHeight)/_drScroll.scrollHeight;
    if(ratio>=0.92)_drFire();                  // near-bottom tolerance — footer padding eats the last few px
  };
  _drScroll.addEventListener('scroll',_drOnScroll,{passive:true});
  window._drCleanup=()=>{
    clearTimeout(_drTimer);
    _drScroll.removeEventListener('scroll',_drOnScroll);
  };
}

function closeArt(){
  if(window._drCleanup){window._drCleanup();window._drCleanup=null;}
  $('art-overlay').classList.remove('open');
  $('article').classList.remove('open');
  $('nav').style.display='';
  cur=null;
  render();
}

/* ═══ NAV ═══ */
function go(v){
  view=v;
  if($('search-bar').classList.contains('open'))toggleSearch(false);
  $('body-feed').style.display=v==='feed'?'flex':'none';
  $('body-saved').style.display=v==='saved'?'block':'none';
  $('body-graph').style.display=v==='graph'?'flex':'none';
  $('header').style.display=v==='feed'?'':'none';
  $('pn-feed').classList.toggle('on',v==='feed');
  $('pn-saved').classList.toggle('on',v==='saved');
  $('pn-graph').classList.toggle('on',v==='graph');
  $('pn-search').classList.remove('on');
  if(v==='saved')renderSaved();
  if(v==='feed')render();
  if(v==='graph')initGraph();
}

function renderSearchPanel(){
  const el=$('search-panel');
  if(!el)return;
  if(searchQ&&searchQ.trim()){
    // Build timeline from the UNFILTERED search results (before timeline slice)
    const savedFilter=timelineFilter;
    timelineFilter=null;
    const allSearchResults=flt();
    timelineFilter=savedFilter;
    const slicedResults=savedFilter?allSearchResults.filter(x=>x.date===savedFilter):allSearchResults;
    const total=ALL.length;

    // Compute selected bar index
    let selIdx=-1;
    if(timelineFilter){
      const today=new Date(TODAY+'T00:00:00Z');
      const sel=new Date(timelineFilter+'T00:00:00Z');
      const dayDiff=Math.round((today-sel)/864e5);
      selIdx=29-dayDiff;
    }

    // Filter badge (shows the active date filter + clear button)
    const filterBadge=timelineFilter
      ? `<span class="timeline-filter-badge" onclick="timelineFilter=null;stackIdx=0;renderStack();renderSearchPanel()">
           Drilling: <strong>${timelineFilter}</strong> (${slicedResults.length} stories)
           <span class="close">&times;</span>
         </span>`
      : '';

    el.innerHTML=`<div class="search-counter">
      <div class="search-counter-text">
        Found <strong>${allSearchResults.length}</strong> match${allSearchResults.length===1?'':'es'} across
        headline, summary &amp; full text · searched ${total} total stories
        ${filterBadge}
      </div>
      <div class="timeline-wrap">
        <canvas id="timeline-sparkline" width="120" height="24"></canvas>
        <span class="timeline-label">LAST 30 DAYS</span>
      </div>
    </div>`;

    // Render sparkline + attach click handler
    requestAnimationFrame(()=>{
      const tlData=buildTimelineData(allSearchResults,30);
      renderSparkline('timeline-sparkline',tlData,selIdx);
      // Hit-testing click handler
      const cvs=document.getElementById('timeline-sparkline');
      if(cvs)cvs.onclick=(e)=>{
        const rect=cvs.getBoundingClientRect();
        const x=e.clientX-rect.left;
        const barIdx=Math.min(29,Math.max(0,Math.floor(x/(rect.width/30))));
        // Convert index to date
        const today=new Date(TODAY+'T00:00:00Z');
        const target=new Date(today);
        target.setUTCDate(target.getUTCDate()-(29-barIdx));
        const dateStr=target.toISOString().slice(0,10);
        // Toggle
        timelineFilter=(timelineFilter===dateStr)?null:dateStr;
        stackIdx=0;
        _surfaceSearchResults();
        renderStack();
        renderSearchPanel();
      };
    });
  }else{
    const hist=getSearchHistory();
    // Chips use data-q + this.dataset.q so we never embed user input
    // inside a JS string literal in an onclick — avoids backslash/quote
    // escaping traps. esc() still HTML-escapes the label + attribute value.
    if(!hist.length){
      el.innerHTML=`<div class="search-history">
        <span class="search-history-label">Try searching</span>
        ${['Nvidia','OpenAI','Anthropic','GPT-5','open source','funding']
          .map(w=>`<button class="search-chip" data-q="${esc(w)}" onclick="applySearch(this.dataset.q)">${esc(w)}</button>`).join('')}
      </div>`;
    }else{
      el.innerHTML=`<div class="search-history">
        <span class="search-history-label">Recent</span>
        ${hist.map(w=>`<button class="search-chip" data-q="${esc(w)}" onclick="applySearch(this.dataset.q)">${esc(w)}</button>`).join('')}
        <button class="search-chip clear" onclick="clearSearchHistory()">Clear</button>
      </div>`;
    }
  }
}
/* Silently surface the feed view so search-result cards (rendered into
   #stack inside #body-feed) become visible. Called by every search
   interaction that produces cards — doesn't touch nav dots (pn-search
   owns the indicator during active search) or the search bar itself. */
function _surfaceSearchResults(){
  if(view==='feed')return;
  view='feed';
  $('body-feed').style.display='flex';
  $('body-saved').style.display='none';
  $('body-graph').style.display='none';
  $('header').style.display='';
}

function applySearch(q){
  $('search-input').value=q;
  searchQ=q;
  stackIdx=0;
  _surfaceSearchResults();
  render();
  renderSearchPanel();
}
function onSearchEnter(){
  if(searchQ&&searchQ.trim().length>=2)saveSearchHistory(searchQ.trim());
  renderSearchPanel();
}
function toggleSearch(forceOpen){
  const bar=$('search-bar');
  const open=forceOpen!==undefined?forceOpen:!bar.classList.contains('open');

  // Bar is a sibling of #header in the DOM, so it can overlay any view
  // (Graph / Saved) without being hidden by go()'s display:none on header.
  // If you open search from Graph, live results won't render visually (the
  // feed stack is hidden), but you can still type and see the timeline
  // sparkline + search history inside the bar itself.

  bar.classList.toggle('open',open);
  // Mutual exclusion: search open → deactivate all other nav dots (full symmetry)
  $('pn-search').classList.toggle('on',open);
  if(open){
    $('pn-feed').classList.remove('on');
    $('pn-saved').classList.remove('on');
    $('pn-graph').classList.remove('on');
    $('search-input').focus();
    renderSearchPanel();
  }else{
    // Restore the correct tab state when search closes — symmetric across all 3 views
    $('pn-feed').classList.toggle('on',view==='feed');
    $('pn-saved').classList.toggle('on',view==='saved');
    $('pn-graph').classList.toggle('on',view==='graph');
    $('search-input').value='';searchQ='';timelineFilter=null;stackIdx=0;render();
  }
}
function onSearch(v){searchQ=v;timelineFilter=null;stackIdx=0;_surfaceSearchResults();renderStack();renderSearchPanel()}

/* ═══ ACTIONS ═══ */
function toggleFav(id){
  const sid=id+'';
  const wasBookmarked=fs.has(sid);
  if(wasBookmarked)fs.delete(sid);else fs.add(sid);
  localStorage.setItem('ai_fav',JSON.stringify([...fs]));
  // Affinity: bookmark = strong interest signal (+1 per keyword)
  if(!wasBookmarked){
    const story=ALL.find(s=>s.id+''===sid);
    if(story)bumpAffinity(story,1);
  }
  // In-place update on feed so the spring+glow animation isn't wiped by a re-render.
  if(view==='feed'){
    const btn=document.querySelector('.card-foot .bk-btn[data-id="'+sid+'"]');
    if(btn){
      const isNow=fs.has(sid);
      btn.classList.toggle('on',isNow);
      btn.innerHTML=starSvg(isNow);
    }
  }else{
    renderSaved();
  }
  // Sync the detail view's star if the currently-open article is this one
  if(cur&&cur.id+''===sid){
    $('art-bk').innerHTML=starSvg(fs.has(sid));
    $('art-bk').classList.toggle('on',fs.has(sid));
  }
}
function toggleStar(){if(cur)toggleFav(cur.id)}
function toggleFollow(name,btn){
  const follows=JSON.parse(localStorage.getItem('ai_follows')||'[]');
  const idx=follows.indexOf(name);
  if(idx>-1){follows.splice(idx,1);btn.textContent='Follow';btn.classList.remove('following')}
  else{follows.push(name);btn.textContent='Following';btn.classList.add('following')}
  localStorage.setItem('ai_follows',JSON.stringify(follows));
}
function copyArt(){
  if(!cur)return;
  const src=(cur.articles||[]).map(a=>a.url).filter(Boolean).join('\n');
  navigator.clipboard.writeText(`${cur.headline}\n\n${cur.summary||''}\n\nDate: ${cur.date}\n\nSources:\n${src}`);
  showToast('Copied to clipboard');
}
function showToast(msg){
  const t=$('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

/* ═══ KEYBOARD ═══ */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(cur){
      if(historyStack.length>0)goBack();           // climb one rung first
      else closeArt();                              // fully close when at root
    }else if($('search-bar').classList.contains('open'))toggleSearch(false);
  }
  if(!cur&&view==='feed'){
    const stories=flt();
    if(e.key==='ArrowLeft'&&stackIdx>0){stackIdx--;renderStack()}
    if(e.key==='ArrowRight'&&stackIdx<stories.length-1){stackIdx++;renderStack()}
    if(e.key==='Enter'&&stories.length)openArt(stackIdx);
  }
});

/* ═══ INIT ═══ */
let _loadRetries=0;
async function loadData(){
  try{
    const r=await fetch('/api/stories');
    if(!r.ok)throw new Error(`/api/stories ${r.status}`);
    const d=await r.json();
    ALL=d.stories||[];CATS=d.categories||[];TODAY=d.today||'';
    CAT_MAP={};CATS.forEach(c=>CAT_MAP[c.id]=c);

    const tc=ALL.filter(s=>s.date===TODAY).length;
    if(tc===0){
      $('loading-text').textContent='Fetching today\'s news...';
      try{
        const fr=await fetch('/api/fetch', {method:'POST'});
        if(!fr.ok)throw new Error(`/api/fetch ${fr.status}`);
        const r2=await fetch('/api/stories');
        if(!r2.ok)throw new Error(`/api/stories (post-fetch) ${r2.status}`);
        const d2=await r2.json();
        ALL=d2.stories||[];CATS=d2.categories||[];TODAY=d2.today||'';
        CAT_MAP={};CATS.forEach(c=>CAT_MAP[c.id]=c);
      }catch(e2){
        // Surface the failure — keep the base /api/stories data on screen
        // rather than silently pretending everything succeeded.
        console.warn('Auto-fetch failed:', e2);
      }
    }

    const tc2=ALL.filter(s=>s.date===TODAY).length;
    const wc=ALL.filter(s=>isW(s.date)).length;
    filter.period=tc2>0?'day':wc>0?'week':'month';

    $('loading').classList.add('hide');
    setTimeout(()=>$('loading').style.display='none',300);
    render();
  }catch(e){
    _loadRetries++;
    if(_loadRetries<=2){
      $('loading-text').textContent='Failed to load. Retrying...';
      setTimeout(loadData,3000);
    }else{
      // No /api/stories endpoint reachable — likely opened via a generic static server.
      // This template isn't meant to be served directly; point the user at the right entry points.
      $('loading-text').innerHTML=
        'Cannot reach <code>/api/stories</code>.<br>'+
        'Open <code>digest.html</code> (static build) or run <code>python serve.py</code> for dev mode.';
    }
  }

eased its internal AI design guidelines as open-source resources, following Anthropic's decision to restrict access to its own guidelines, promoting transparency in AI development practices.", "full_text": null}]}, {"id": 261, "date": "2026-04-25", "category": "industry_business", "headline": "Anthropic's silent upgrade from L4 to L6 engineer in two months", "summary": "Anthropic transitioned from an L4 engineer (Opus 4.6) to an L6 engineer (Mythos) in just two months, suggesting significant internal advancements in model capabilities.", "created_at": "2026-04-25 07:16:20", "articles": [{"id": 859, "title": "Dylan Patel highlights Anthropic's silent upgrade from L4 to L6 engineer in two months", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/tlq89n1qhvy9r20wllbr.html#story-13", "source_name": "The Neuron", "published_at": "2026-04-24 11:07:56", "summary": null, "content_snippet": "Dylan Patel observed that Anthropic transitioned from an L4 engineer (Opus 4.6) to an L6 engineer (Mythos) in just two months, suggesting significant internal advancements.", "full_text": null}]}, {"id": 262, "date": "2026-04-25", "category": "industry_business", "headline": "Opus 4.7 'slow' due to Anthropic's compute constraints", "summary": "Dan Shipper noted Opus 4.7 appears slower than GPT-5.5 because Anthropic is operating under compute limitations, despite its advanced architecture.", "created_at": "2026-04-25 07:16:20", "articles": [{"id": 858, "title": "Opus 4.7 feels 'slow' due to Anthropic's compute constraints, per Dan Shipper", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/tlq89n1qhvy9r20wllbr.html#story-12", "source_name": "The Neuron", "published_at": "2026-04-24 11:07:56", "summary": null, "content_snippet": "Dan Shipper noted that Opus 4.7 appears slower than GPT-5.5 because Anthropic is operating under compute limitations, despite its advanced model architecture.", "full_text": "There's actually a real explanation. Every's Dan Shipper noticed the same thing : Opus 4.7 \"feels slow\" next to 5.5 because OpenAI has a hardware advantage you can actually feel. And SemiAnalysis' Dylan Patel pointed out that Anthropic silently went from an L4 engineer (Opus 4.6) to an L6 (Mythos) in two months. The Opus 4.7 the rest of us get is compute-starved and deliberately restrained. Anthropic is a Ferrari on fuel rationing; OpenAI just bought the gas station. (No offense meant.)"}]}, {"id": 263, "date": "2026-04-25", "category": "industry_business", "headline": "Opus 4.7 + GPT-5.5 handoff boosts coding performance to 62.5/100", "summary": "Combining Opus 4.7 for planning and GPT-5.5 for execution achieved a 62.5/100 score on Every's Senior Engineer benchmark, outperforming either model alone.", "created_at": "2026-04-25 07:16:20", "articles": [{"id": 857, "title": "Dan Shipper discovers Opus 4.7 + GPT-5.5 handoff boosts coding performance", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/tlq89n1qhvy9r20wllbr.html#story-11", "source_name": "The Neuron", "published_at": "2026-04-24 11:07:56", "summary": null, "content_snippet": "Combining Opus 4.7 for planning and GPT-5.5 for execution achieved a 62.5/100 score on Every's Senior Engineer benchmark, outperforming either model alone.", "full_text": "Every's Dan Shipper just found the cheat code for senior-engineer-level coding: use Opus 4.7 to write the plan, then hand that plan to GPT-5.5 to execute. On Every's internal Senior Engineer benchmark, this combo scored 62.5/100 (for context: human senior engineers score 80-90; Opus 4.7 alone scores in the low 30s; GPT-5.5 alone scores in the low-to-mid 40s)."}]}, {"id": 264, "date": "2026-04-25", "category": "editorial", "headline": "Companies adopt 'setup prompts' for AI tool installation instead of downloads", "summary": "A new trend sees companies using AI setup prompts—copied and pasted into tools like Claude Code or Codex—to automate the installation of AI tools, replac _, it’s a ___' has surged in U.S. company documents since 2023, correlating with LLM adoption, leading human writers to avoid the style to prevent AI detection.", "created_at": "2026-04-25 16:37:34", "articles": [{"id": 991, "title": "AI-generated 'not just a ___, it’s a ___' sentence construction rises in corporate documents", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/ac2synpnwl24tvra1tvo.html#story-8", "source_name": "Every", "published_at": "2026-04-24 15:03:10", "summary": null, "content_snippet": "The phrase 'not just a ___, it’s a ___' has surged in U.S. company documents since 2023, correlating with LLM adoption, leading human writers to avoid the style to prevent AI detection.", "full_text": null}]}, {"id": 271, "date": "2026-04-25", "category": "editorial", "headline": "Anthropic struggles with demand surge while OpenAI invests in infrastructure to drive product adoption", "summary": "Anthropic faces challenges keeping up with demand for its models, whereas OpenAI has heavily invested in infrastructure, now focusing on increasing user adoption of its products.", "created_at": "2026-04-25 16:37:34", "articles": [{"id": 990, "title": "Anthropic struggles with demand surge while OpenAI invests in infrastructure to drive product adoption", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/ac2synpnwl24tvra1tvo.html#story-7", "source_name": "Every", "published_at": "2026-04-24 15:03:10", "summary": null, "content_snippet": "Anthropic faces challenges keeping up with demand for its models, whereas OpenAI has heavily invested in infrastructure, now focusing on increasing user adoption of its products.", "full_text": null}]}, {"id": 231, "date": "2026-04-24", "category": "editorial", "headline": "Hapax launches AI automation platform for organizations without manual prompting", "summary": "Hapax introduces an AI automation tool that observes organizational workflows, automates tasks, and deploys custom AI workers without requiring manual prompts, targeting enterprise efficiency and trustworthiness.", "created_at": "2026-04-24 08:04:10", "articles": [{"id": 799, "title": "Hapax launches AI automation platform for organizations without manual prompting", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/jgkpjsx92z53chn17lgb.html#story-1", "source_name": "Every", "published_at": "2026-04-23 18:04:17", "summary": null, "content_snippet": "Hapax introduces an AI automation tool that observes organizational workflows, automates tasks, and deploys custom AI workers without requiring manual prompts, targeting enterprise efficiency and trustworthiness.", "full_text": "The worst part about AI today is that it’s passive—you need to prompt it to get what you want, slowing down your team and keeping its abilities limited to those who know how to use it best. Hapax fixes that. Hapax observes how your organization works, figures out what to automate on its own, and deploys custom AI workers to help each employee be more effective and efficient. It does it all without being prompted or set up. And it’s trustworthy: their customers include banks managing up to $90 billion in assets. Try it today with HAPAXDEMO to get 15 credits."}]}, {"id": 232, "date": "2026-04-24", "category": "editorial", "headline": "OpenAI releases GPT-5.5 with senior engineer-level coding and writing capabilities", "summary": "OpenAI's new GPT-5.5 model outperforms previous models in coding and writing tasks, scoring 62.5 on the Senior Engineer Benchmark and excelling in structured work like dashboards and client deliverables. It is praised for being faster, more personable, and easier to collaborate with than prior models.", "created_at": "2026-04-24 08:04:10", "articles": [{"id": 798, "title": "OpenAI releases GPT-5.5 with senior engineer-level coding and writing capabilities", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/jgkpjsx92z53chn17lgb.html#story-0", "source_name": "Every", "published_at": "2026-04-23 18:04:17", "summary": null, "content_snippet": "OpenAI's new GPT-5.5 model outperforms previous models in coding and writing tasks, scoring 62.5 on the Senior Engineer Benchmark and excelling in structured work like dashboards and client deliverables. It is praised for being faster, more personable, and easier to collaborate with than prior models.", "full_text": "GPT-5.5 , out today, feels easier to settle into. It’s fast enough to use constantly, personable enough to collaborate with, and assertive enough to carry a plan through serious engineering work. It’s better at writing than any OpenAI model we’ve used in about a year, and it produced the strongest result we’ve seen on our new Senior Engineer Benchmark, which measures how well models can rewrite a messy production codebase the way a senior engineer would. It’s rare for a model to feel easier and stronger at the same time."}]}, {"id": 233, "date": "2026-04-24", "category": "products_tools", "headline": "OpenAI’s ChatGPT for Clinicians outperforms physicians on medical benchmark", "summary": "OpenAI’s specialized ChatGPT for Clinicians surpassed physicians in performance on a new medical benchmark, signaling AI’s expanding role in healthcare diagnostics and decision-making.", "created_at": "2026-04-24 08:04:14", "articles": [{"id": 765, "title": "OpenAI’s ChatGPT for Clinicians outperforms physicians on new medical benchmark", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/eeo6gorovx5kya6q5kh4.html#story-3", "source_name": "The Neuron", "published_at": "2026-04-23 11:06:02", "summary": null, "content_snippet": "OpenAI’s specialized ChatGPT for Clinicians reportedly surpasses physicians in performance on a newly introduced medical benchmark, highlighting AI’s growing role in healthcare diagnostics.", "full_text": "OpenAI launched ChatGPT for Clinicians (free for verified US physicians) alongside HealthBench Professional, a new 1,500+ conversation benchmark where GPT-5.4 reportedly outperformed specialty-matched physicians given unbounded time and web access; 7,000 pre-launch test conversations, 99.6% rated safe and accurate."}]}, {"id": 234, "date": "2026-04-24", "category": "products_tools", "headline": "GPT Image 2 enables direct 3D mesh editing via text prompts in CADAM", "summary": "CADAM integrates GPT Image 2 to let users generate and edit 3D CAD models using plain English text prompts, eliminating the need for traditional CAD software.", "created_at": "2026-04-24 08:04:14", "articles": [{"id": 755, "title": "GPT Image 2 now lets users edit 3D meshes directly with text prompts", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/jdhhgbdsj473dt2gmwyq.html#story-1", "source_name": "AlphaSignal", "published_at": "2026-04-23 13:09:30", "summary": null, "content_snippet": "CADAM, a browser-based app, integrates GPT Image 2 to allow users to generate and edit 3D CAD models using plain English text prompts, simplifying 3D design without requiring CAD software.", "full_text": "The new \"creative mode\" is the interesting part. It pipes your prompt through GPT Image 2 to edit the mesh (the 3D shape made of connected triangles) conversationally, the same way you'd edit a photo. This makes 3D design feel less like engineering and more like a chat."}]}, {"id": 235, "date": "2026-04-24", "category": "industry_business", "headline": "Meta records US employee keystrokes to train AI agents", "summary": "Meta has begun recording keystrokes from US employees to train its AI agents, sparking concerns about workplace surveillance and data privacy violations.", "created_at": "2026-04-24 08:04:14", "articles": [{"id": 766, "title": "Meta begins recording US employee keystrokes to train AI agents", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/eeo6gorovx5kya6q5kh4.html#story-4", "source_name": "The Neuron", "published_at": "2026-04-23 11:06:02", "summary": ngs, AI-generated storyboards, and coding agents to efficiently create polished product videos, reducing the time and effort required for production.", "full_text": null}]}, {"id": 242, "date": "2026-04-24", "category": "editorial", "headline": "AI sentence construction 'not just X, it's Y' surges in corporate documents, signaling LLM adoption", "summary": "The usage of the correlative construction 'not just X, it's Y' has quadrupled in U.S. company documents since 2023, correlating with LLM adoption. Human writers now avoid this style to prevent accusations of AI-generated text.", "created_at": "2026-04-24 16:52:52", "articles": [{"id": 840, "title": "AI sentence construction 'not just X, it's Y' surges in corporate documents, signaling LLM adoption", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/ac2synpnwl24tvra1tvo.html#story-2", "source_name": "Every", "published_at": "2026-04-24 15:03:10", "summary": null, "content_snippet": "The usage of the correlative construction 'not just X, it's Y' has quadrupled in U.S. company documents since 2023, correlating with LLM adoption. Human writers now avoid this style to prevent accusations of AI-generated text.", "full_text": null}]}, {"id": 243, "date": "2026-04-24", "category": "editorial", "headline": "Anthropic removes Claude Code from $20 Claude Pro plan, sparking user backlash and OpenAI jabs", "summary": "Anthropic tested removing Claude Code from its $20 Claude Pro plan, leading to user outcry and public criticism from OpenAI executives. The move sparked a debate between Every's team members about product pricing, model performance, and infrastructure efficiency.", "created_at": "2026-04-24 16:52:52", "articles": [{"id": 839, "title": "Anthropic removes Claude Code from $20 Claude Pro plan, sparking user backlash and OpenAI jabs", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/ac2synpnwl24tvra1tvo.html#story-1", "source_name": "Every", "published_at": "2026-04 4", "category": "editorial", "headline": "Every's Codex for Knowledge Work camp scheduled for April 24", "summary": "Every is hosting a camp on April 24 at 12 p.m. ET to demonstrate how to use Codex for knowledge work, including drafting, researching, and automating tasks. The event is exclusive to paid subscribers and offers a bonus of free Pro Lite access for 250 attendees.", "created_at": "2026-04-24 16:52:52", "articles": [{"id": 861, "title": "Every's Codex for Knowledge Work camp scheduled for April 24", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/8irul5jawq11yn3lrkh5.html#story-0", "source_name": "Every", "published_at": "2026-04-23 19:37:02", "summary": null, "content_snippet": "Every is hosting a camp on April 24 at 12 p.m. ET to demonstrate how to use Codex for knowledge work, including drafting, researching, and automating tasks. The event is exclusive to paid subscribers and offers a bonus of free Pro Lite access for 250 attendees.", "full_text": "CEO Dan Shipper and Austin Tedesco , Every's head of growth, will show you how to use Codex for knowledge work: drafting, researching, summarizing, running tasks in parallel, and building tools that automate routine tasks. You’ll leave with a clearer idea of when to use Codex, how to use it well, and a set of workflows you can start using right away."}]}, {"id": 246, "date": "2026-04-24", "category": "model_releases", "headline": "DeepSeek launches V4 Flash and V4 Pro, its most powerful open models yet", "summary": "DeepSeek released V4 Flash and V4 Pro, open-source AI systems with major gains in coding, reasoning, and agentic tasks. The models use a Hybrid Attention Architecture and support 1M token contexts, setting new benchmarks for open models.", "created_at": "2026-04-24 16:52:57", "articles": [{"id": 844, "title": "DeepSeek unveils flagship AI model V4 Flash and V4 Pro", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/e49i1q3dhel04h6p24rm.html#story-1", "source_name": "Unknown", "published_at": "2026-04-24 14:43:26", "summary": null, "content_snippet": "DeepSeek released V4 Flash and V4 Pro, its most powerful open-source AI systems yet, with major gains in coding, reasoning, and agentic tasks, a Hybrid Attention Architecture, and a 1 million token context length.", "full_text": "A year after shaking the AI industry, DeepSeek is back with a new challenge to OpenAI, Anthropic, and Google. The company has released preview versions of V4 Flash and V4 Pro , calling them its most powerful open-source AI systems yet. DeepSeek says V4 delivers major gains in coding, reasoning, and agentic tasks while introducing a Hybrid Attention Architecture designed to better remember context across long conversations. It also expands context length to 1 million tokens, allowing users to input entire codebases or long documents in a single prompt."}]}, {"id": 247, "date": "2026-04-24", "category": "model_releases", "headline": "OpenAI debuts GPT-5.5, powering its AI superapp with advanced capabilities", "summary": "OpenAI unveiled GPT-5.5, its newest flagship model and engine behind its AI superapp. It features improved coding, research, and agentic capabilities, developed with recursive self-improvement, and outperforms Anthropic's Opus 4.7 on key benchmarks.", "created_at": "2026-04-24 16:52:57", "articles": [{"id": 843, "title": "OpenAI launches GPT-5.5 to power its AI superapp", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/e49i1q3dhel04h6p24rm.html#story-0", "source_name": "Unknown", "published_at": "2026-04-24 14:43:26", "summary": null, "content_snippet": "OpenAI unveiled GPT-5.5, its newest flagship model and the engine behind its AI superapp, featuring improved coding, research, and agentic capabilities. The model was developed with recursive self-improvement and will roll out to Plus, Pro, Business, and Enterprise users.", "full_text": "OpenAI has unveiled GPT-5.5 , its newest flagship model and the engine behind the company’s long-awaited AI superapp. The launch comes just seven weeks after GPT-5.4, highlighting an aggressive release pace as competition intensifies. OpenAI says GPT-5.5 and its coding agent Codex helped build the model itself through recursive self-improvement, where AI systems assist in creating stronger successors."}, {"id": 846, "title": "OpenAI releases GPT-5.5 one week after Anthropic's Opus 4.7", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/tlq89n1qhvy9r20wllbr.html#story-0", "source_name": "The Neuron", "published_at": "2026-04-24 11:07:56", "summary": null, "content_snippet": "OpenAI launched GPT-5.5, a 'worker-class' model optimized for task completion, outperforming Opus 4.7 on key benchmarks like Terminal-Bench 2.0 and GDPval, while also achieving notable advancements in mathematical proofs and cyber capabilities.", "full_text": null}, {"id": 851, "title": "OpenAI's GPT-5.5 outperforms Anthropic's Opus 4.7 on Terminal-Bench 2.0", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/tlq89n1qhvy9r20wllbr.html#story-5", "source_name": "The Neuron", "published_at": "2026-04-24 11:07:56", "summary": null, "content_snippet": "GPT-5.5 achieved an 82.7% score on Terminal-Bench 2.0, significantly surpassing Opus 4.7's 69.4%, highlighting its superior task-execution capabilities.", "full_text": "It wins Terminal-Bench 2.0 (82.7% vs Opus 4.7's 69.4%) and ties or beats industry pros on 84.9% of GDPval tasks across 44 jobs. It loses SWE-Bench Pro (58.6% vs 64.3%) with an asterisk citing Anthropic's own flagged \" signs of memorization \" on that eval."}, {"id": 852, "title": "GPT-5.5 ties or beats industry professionals on 84.9% of GDPval tasks", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/tlq89n1qhvy9r20wllbr.html#story-6", "source_name": "The Neuron", "published_at": "2026-04-24 11:07:56", "summary": null, "content_snippet": "GPT-5.5 demonstrated strong performance across 44 jobs, matching or exceeding industry experts on 84.9% of GDPval tasks, underscoring its practical utility.", "full_text": "Anyway, the rest of the AI world spent the week trying to figure out why Opus 4.7 suddenly feels like a GPT model and GPT-5.5 feels like Claude. Uno reverse day. Opposite universe. Parallel dimension. Let's get into it."}, {"id": 854, "title": "GPT-5.5 advances FrontierMath Tier 4 and helps discover new mathematical proof", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/tlq89n1qhvy9r20wllbr.html#story-8", "source_name": "The Neuron", "published_at": "2026-04-24 11:07:56", "summary": null, "content_snippet": "GPT-5.5 improved its FrontierMath Tier 4 score from 27.1% to 35.4% and contributed to the discovery of a new proof about off-diagonal Ramsey numbers, later verified in Lean.", "full_text": null}, {"id": 855, "title": "OpenAI rates GPT-5.5 'High' on bio/chem and cyber capabilities", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/tlq89n1qhvy9r20wllbr.html#story-9", "source_name": "The Neuron", "published_at": "2026-04-24 11:07:56", "summary": null, "content_snippet": "GPT-5.5 received a 'High' rating for both biological/chemical and cyber capabilities, indicating strong performance in specialized domains.", "full_text": null}]}, {"id": 248, "date": "2026-04-24", "category": "products_tools", "headline": "Spotify integrates with Anthropic's Claude for AI-powered music recs", "summary": "Spotify now operates within Anthropic's Claude AI assistant, enabling users to receive personalized music recommendations directly through the chat interface, expanding AI-driven user experiences.", "created_at": "2026-04-24 16:52:57", "articles": [{"id": 850, "title": "Spotify integrates with Claude for personalized music recommendations", "url": "https://kill-the-newsletter.com/feeds/ur2ca0tsnnmqfou3ibc5/entries/tlq89n1qhvy9r20wllbr.html#story-4", "source_name": "The Neuron", "publis
